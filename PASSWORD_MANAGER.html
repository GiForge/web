<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PATCH: CSP header via meta tag - blocca XSS, eval, script inline non autorizzati -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none';">
    <title>KeePass Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');

        :root {
            --bg:        #0d1117;
            --surface:   #161b22;
            --surface2:  #21262d;
            --border:    #30363d;
            --accent:    #58a6ff;
            --accent2:   #1f6feb;
            --danger:    #f85149;
            --success:   #3fb950;
            --warn:      #d29922;
            --text:      #e6edf3;
            --muted:     #8b949e;
            --radius:    8px;
            --mono:      'IBM Plex Mono', monospace;
            --sans:      'IBM Plex Sans', sans-serif;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── LOGIN ───────────────────────────────────────────── */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(ellipse at 50% 0%, #1f2d45 0%, #0d1117 60%);
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 64px rgba(0,0,0,.6);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .shield {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 16px rgba(88,166,255,.4));
        }
        .login-logo h1 {
            font-family: var(--mono);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: .05em;
            color: var(--accent);
        }
        .login-logo p {
            color: var(--muted);
            font-size: .82rem;
            margin-top: 6px;
            font-family: var(--mono);
        }

        /* ── MAIN APP ────────────────────────────────────────── */
        .main-container { display: none; height: 100vh; flex-direction: column; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .vault-label {
            font-family: var(--mono);
            font-size: .85rem;
            color: var(--accent);
            flex: 1;
        }
        .toolbar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .content-area { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-family: var(--mono);
            font-size: .7rem;
            letter-spacing: .1em;
            color: var(--muted);
            margin-bottom: 10px;
            padding: 0 4px;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg);
        }

        /* ── FORMS ───────────────────────────────────────────── */
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        input[type="text"],
        input[type="password"],
        input[type="url"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: .9rem;
            transition: border-color .2s;
        }
        input[type="password"] { font-family: var(--mono); letter-spacing: .1em; }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea { resize: vertical; min-height: 90px; }
        select option { background: var(--surface2); }

        /* ── BUTTONS ─────────────────────────────────────────── */
        button {
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter .15s, transform .1s;
        }
        button:hover { filter: brightness(1.15); }
        button:active { transform: scale(.97); }

        .btn-primary   { background: var(--accent2); color: #fff; }
        .btn-success   { background: var(--success); color: #000; }
        .btn-danger    { background: var(--danger);  color: #fff; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-info      { background: #1c3d5a; color: var(--accent); border: 1px solid var(--accent2); }
        .btn-warn      { background: #3d2c00; color: var(--warn); border: 1px solid var(--warn); }
        .btn-ghost     { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-sm        { padding: 5px 11px; font-size: .78rem; }
        .btn-icon      { background: transparent; color: var(--muted); width: 32px; height: 32px; display:flex; align-items:center; justify-content:center; padding:0; font-size:.95rem; border-radius: var(--radius); }
        .btn-icon:hover { background: var(--surface2); color: var(--text); filter:none; }

        .button-row { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── TREE ────────────────────────────────────────────── */
        .tree-item {
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: .85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .15s;
            color: var(--text);
            margin: 1px 0;
        }
        .tree-item:hover { background: var(--surface2); }
        .tree-item.selected { background: var(--accent2); color: #fff; }
        .tree-item.folder { font-weight: 600; }
        .tree-item.entry  { font-size: .8rem; color: var(--muted); }
        .tree-item.entry.selected { color: #fff; }

        /* ── CARDS ───────────────────────────────────────────── */
        .entry-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            transition: border-color .2s, box-shadow .2s;
            cursor: pointer;
        }
        .entry-card:hover { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2); }
        .entry-title { font-family: var(--mono); font-weight: 600; color: var(--accent); font-size: 1rem; margin-bottom: 10px; }
        .entry-meta  { display: grid; grid-template-columns: 110px 1fr; gap: 8px 12px; margin-bottom: 12px; font-size: .82rem; }
        .meta-label  { color: var(--muted); font-weight: 600; }
        .meta-value  { color: var(--text); word-break: break-all; }
        .pwd-dot     { font-family: var(--mono); letter-spacing: 3px; color: var(--muted); }

        .folder-path {
            font-family: var(--mono);
            font-size: .75rem;
            color: var(--accent);
            background: rgba(88,166,255,.08);
            border-left: 3px solid var(--accent2);
            padding: 8px 12px;
            margin-bottom: 18px;
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        /* ── MODALS ──────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 580px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-head h2 { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); }

        /* ── STRENGTH ────────────────────────────────────────── */
        .strength-track { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .strength-fill  { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
        .s-weak   { width: 33%; background: var(--danger); }
        .s-medium { width: 66%; background: var(--warn); }
        .s-strong { width: 100%; background: var(--success); }

        /* ── TOAST ───────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: .85rem;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
            animation: toastIn .25s ease;
            max-width: 360px;
        }
        .toast.ok   { border-left: 3px solid var(--success); }
        .toast.err  { border-left: 3px solid var(--danger); }
        .toast.warn { border-left: 3px solid var(--warn); }
        @keyframes toastIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
        @keyframes toastOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(12px); } }

        /* ── CUSTOM FIELD ────────────────────────────────────── */
        .cf-wrap {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 10px;
        }
        .cf-head { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }

        /* ── ATTACHMENT ──────────────────────────────────────── */
        .att-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .82rem;
        }

        /* ── EMPTY STATE ─────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: .3; }

        /* ── COLLAPSIBLE FORM ────────────────────────────────── */
        .sub-form { display: none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }

        /* ── AUTOLOCK BAR ────────────────────────────────────── */
        #lockBar {
            height: 3px;
            background: var(--accent2);
            width: 100%;
            transform-origin: left;
            transition: transform linear;
        }

        /* ── CONFIRM DIALOG ──────────────────────────────────── */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .confirm-box h3 { font-family: var(--mono); color: var(--danger); margin-bottom: 10px; }
        .confirm-box p  { color: var(--muted); font-size: .88rem; margin-bottom: 22px; }

        @media (max-width: 640px) {
            .sidebar { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
            .content-area { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════════════ -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <span class="shield">🔐</span>
            <h1>KEEPASS MANAGER</h1>
            <p>AES-256-GCM · PBKDF2-SHA256 · 310k iter</p>
        </div>

        <div class="button-row" style="margin-bottom:24px;">
            <button id="showCreateVaultBtn" class="btn-primary" style="flex:1;">➕ Nuovo Vault</button>
            <button id="showLoadVaultBtn"   class="btn-secondary" style="flex:1;">📂 Apri Vault</button>
        </div>

        <div id="createVaultForm" class="sub-form">
            <h3 style="font-family:var(--mono);color:var(--accent);margin-bottom:18px;font-size:.95rem;">CREA VAULT</h3>
            <div class="form-group">
                <label for="newVaultName">Nome Vault</label>
                <input type="text" id="newVaultName" placeholder="Il mio vault" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="newVaultPassword">Master Password *</label>
                <input type="password" id="newVaultPassword" placeholder="Min. 14 caratteri" autocomplete="new-password">
                <div class="strength-track"><div class="strength-fill" id="createStrengthBar"></div></div>
            </div>
            <div class="form-group">
                <label for="newVaultPasswordConfirm">Conferma *</label>
                <input type="password" id="newVaultPasswordConfirm" placeholder="Ripeti la password" autocomplete="new-password">
            </div>
            <div class="button-row">
                <button id="createVaultBtn" class="btn-success">🔒 Crea</button>
                <button class="btn-ghost cancel-form-btn">Annulla</button>
            </div>
        </div>

        <div id="loadVaultForm" class="sub-form">
            <h3 style="font-family:var(--mono);color:var(--accent);margin-bottom:18px;font-size:.95rem;">APRI VAULT</h3>
            <div class="form-group">
                <label for="vaultFile">File (.webvault, .xml)</label>
                <input type="file" id="vaultFile" accept=".webvault,.xml">
            </div>
            <div class="form-group">
                <label for="vaultPassword">Master Password</label>
                <input type="password" id="vaultPassword" placeholder="Password del vault" autocomplete="current-password">
            </div>
            <div class="button-row">
                <button id="loadVaultBtn" class="btn-primary">🔓 Apri</button>
                <button class="btn-ghost cancel-form-btn">Annulla</button>
            </div>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     MAIN APP
════════════════════════════════════════════════════════════ -->
<div id="mainContainer" class="main-container">
    <!-- auto-lock progress bar -->
    <div id="lockBar"></div>

    <div class="topbar">
        <div class="vault-label" id="currentVaultName">🔐 Vault</div>
        <button id="showImportBtn"  class="btn-icon" title="Importa XML">📥</button>
        <button id="exportVaultBtn" class="btn-icon" title="Esporta Vault">💾</button>
        <button id="closeVaultBtn"  class="btn-icon btn-warn" title="Chiudi Vault">🚪</button>
    </div>

    <div class="toolbar">
        <button id="showAddFolderBtn" class="btn-secondary btn-sm">📁 Cartella</button>
        <button id="showAddEntryBtn"  class="btn-success btn-sm">➕ Entry</button>
        <button id="generatePasswordBtn" class="btn-info btn-sm">🎲 Password</button>
        <input type="text" id="searchBox" style="flex:1;min-width:160px;max-width:360px;" placeholder="🔍 Cerca…" autocomplete="off">
    </div>

    <div class="content-area">
        <div class="sidebar">
            <div class="sidebar-title">STRUTTURA</div>
            <div id="folderTree"></div>
        </div>
        <div class="main-content">
            <div class="folder-path" id="folderPath">📁 Root</div>
            <div id="entriesList"></div>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     MODAL: IMPORTA XML
════════════════════════════════════════════════════════════ -->
<div id="importModal" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <h2>📥 Importa da XML</h2>
            <button id="closeImportBtn" class="btn-icon">✕</button>
        </div>
        <div class="form-group">
            <label for="importFile">File XML KeePass</label>
            <input type="file" id="importFile" accept=".xml">
        </div>
        <div class="form-group">
            <label for="importPassword">Password (se cifrato)</label>
            <input type="password" id="importPassword" placeholder="Vuoto se non cifrato" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="importTarget">Cartella destinazione</label>
            <select id="importTarget"><option value="">Root</option></select>
        </div>
        <div class="button-row">
            <button id="importXmlBtn" class="btn-success">📥 Importa</button>
            <button id="cancelImportBtn" class="btn-ghost">Annulla</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     MODAL: NUOVA CARTELLA
════════════════════════════════════════════════════════════ -->
<div id="folderModal" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <h2>📁 Nuova Cartella</h2>
            <button id="closeFolderBtn" class="btn-icon">✕</button>
        </div>
        <div class="form-group">
            <label for="folderName">Nome *</label>
            <input type="text" id="folderName" placeholder="es. Email, Banking" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="parentFolder">Cartella Padre</label>
            <select id="parentFolder"><option value="">Root</option></select>
        </div>
        <div class="button-row">
            <button id="addFolderBtn" class="btn-primary">💾 Crea</button>
            <button id="cancelFolderBtn" class="btn-ghost">Annulla</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     MODAL: ENTRY
════════════════════════════════════════════════════════════ -->
<div id="entryModal" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <h2 id="entryModalTitle">➕ Nuova Entry</h2>
            <button id="closeEntryBtn" class="btn-icon">✕</button>
        </div>
        <input type="hidden" id="editEntryId">
        <div class="form-group">
            <label for="entryTitle">Titolo *</label>
            <input type="text" id="entryTitle" placeholder="es. Gmail" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="entryUsername">Username *</label>
            <input type="text" id="entryUsername" placeholder="user@example.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="entryPassword">Password *</label>
            <input type="password" id="entryPassword" placeholder="Password" autocomplete="new-password">
            <div class="strength-track"><div class="strength-fill" id="entryStrengthBar"></div></div>
        </div>
        <div class="form-group">
            <label for="entryUrl">URL</label>
            <input type="url" id="entryUrl" placeholder="https://example.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="entryNotes">Note</label>
            <textarea id="entryNotes" placeholder="Note aggiuntive…"></textarea>
        </div>
        <div class="form-group">
            <label for="entryFolder">Cartella</label>
            <select id="entryFolder"><option value="">Root</option></select>
        </div>
        <div class="form-group">
            <label>Custom Fields</label>
            <div id="customFieldsList"></div>
            <button id="addCustomFieldBtn" class="btn-secondary btn-sm" style="margin-top:8px;">➕ Campo</button>
        </div>
        <div class="form-group">
            <label>Allegati</label>
            <input type="file" id="attachmentFile" multiple>
            <div id="attachmentsList" style="margin-top:8px;"></div>
        </div>
        <div class="button-row">
            <button id="saveEntryBtn" class="btn-primary">💾 Salva</button>
            <button id="generateEntryPasswordBtn" class="btn-info">🎲 Genera</button>
            <button id="cancelEntryBtn" class="btn-ghost">Annulla</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     CUSTOM CONFIRM DIALOG (sostituisce window.confirm)
════════════════════════════════════════════════════════════ -->
<div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-box">
        <h3 id="confirmTitle">Conferma</h3>
        <p  id="confirmMsg">Sei sicuro?</p>
        <div class="button-row" style="justify-content:center;">
            <button id="confirmOk"     class="btn-danger">Conferma</button>
            <button id="confirmCancel" class="btn-ghost">Annulla</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   COSTANTI
══════════════════════════════════════════════════════════════ */
const VAULT_FORMAT        = 'webvault-v2';
const KDF_ITERATIONS_MIN  = 310000;   // PATCH: valore minimo accettato da file
const KDF_ITERATIONS_SAVE = 310000;   // iterazioni usate in scrittura
const MIN_PASS_LEN        = 14;
const AUTO_LOCK_MS        = 5 * 60 * 1000;
const CLIPBOARD_CLEAR_MS  = 30000;
const MAX_FILE_SIZE_MB    = 10;
const LOCK_BAR_UPDATE_MS  = 500;

/* ══════════════════════════════════════════════════════════════
   STATO GLOBALE  (non esistono dati sensibili in variabili JS plain)
   PATCH: masterPassword è Uint8Array cancellabile; vaultData vive solo
   in memoria e viene azzerato con wipeSensitiveState().
══════════════════════════════════════════════════════════════ */
let _masterPasswordBytes = null; // Uint8Array — PATCH: non stringa
let vaultData            = createEmptyVaultData();
let selectedFolderId     = null;
let selectedEntryId      = null;
let customFieldsCount    = 0;
let searchQuery          = '';
let autoLockTimer        = null;
let autoLockStart        = 0;
let lockBarRaf           = null;
let clipboardClearTimer  = null;
let vaultOpen            = false;

/* ══════════════════════════════════════════════════════════════
   PATCH: custom confirm (elimina window.confirm simulabile via JS)
══════════════════════════════════════════════════════════════ */
function secureConfirm(title, msg) {
    return new Promise(resolve => {
        document.getElementById('confirmTitle').textContent  = title;
        document.getElementById('confirmMsg').textContent    = msg;
        const overlay = document.getElementById('confirmOverlay');
        overlay.classList.add('active');
        function cleanup(result) {
            overlay.classList.remove('active');
            document.getElementById('confirmOk').removeEventListener('click', onOk);
            document.getElementById('confirmCancel').removeEventListener('click', onCancel);
            resolve(result);
        }
        function onOk()     { cleanup(true);  }
        function onCancel() { cleanup(false); }
        document.getElementById('confirmOk').addEventListener('click', onOk);
        document.getElementById('confirmCancel').addEventListener('click', onCancel);
    });
}

function ensureWebCrypto() {
    if (!globalThis.crypto?.subtle || !globalThis.crypto?.getRandomValues)
        throw new Error('WebCrypto non disponibile. Usa un browser moderno su HTTPS.');
}

/* ══════════════════════════════════════════════════════════════
   CRYPTO
══════════════════════════════════════════════════════════════ */
function generateUUID() {
    if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
    const b = new Uint8Array(16);
    crypto.getRandomValues(b);
    b[6] = (b[6] & 0x0f) | 0x40;
    b[8] = (b[8] & 0x3f) | 0x80;
    const h = [...b].map(x => x.toString(16).padStart(2,'0'));
    return `${h.slice(0,4).join('')}-${h.slice(4,6).join('')}-${h.slice(6,8).join('')}-${h.slice(8,10).join('')}-${h.slice(10).join('')}`;
}

function secureRandomInt(max) {
    if (!Number.isInteger(max) || max <= 0 || max > 0xffffffff)
        throw new Error('Limite non valido');
    const limit = 0xffffffff - (0xffffffff % max);
    const buf = new Uint32Array(1);
    do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
    return buf[0] % max;
}

function secureShuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = secureRandomInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function bytesToBase64(bytes) {
    let s = '';
    bytes.forEach(b => s += String.fromCharCode(b));
    return btoa(s);
}

function base64ToBytes(str) {
    const s = atob(str);
    const b = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
    return b;
}

// PATCH: deriveVaultKey accetta Uint8Array oltre a stringa,
// così la password non deve essere riconvertita in stringa.
async function deriveVaultKey(passwordBytesOrString, salt, iterations) {
    ensureWebCrypto();
    // PATCH: valida le iterazioni lato client (anche se non è una garanzia crittografica)
    if (typeof iterations !== 'number' || iterations < KDF_ITERATIONS_MIN)
        throw new Error(`Iterazioni KDF insufficienti: ${iterations}. Minimo: ${KDF_ITERATIONS_MIN}`);
    const raw = typeof passwordBytesOrString === 'string'
        ? new TextEncoder().encode(passwordBytesOrString)
        : passwordBytesOrString;
    const km = await crypto.subtle.importKey('raw', raw, 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
        km,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
    );
}

async function encryptVaultData(plainText, passwordBytesOrString) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await deriveVaultKey(passwordBytesOrString, salt, KDF_ITERATIONS_SAVE);
    const ct   = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        new TextEncoder().encode(plainText)
    );
    return {
        format:     VAULT_FORMAT,
        cipher:     'AES-GCM',
        kdf:        'PBKDF2-SHA256',
        iterations: KDF_ITERATIONS_SAVE,  // PATCH: sempre valore costante in scrittura
        salt:       bytesToBase64(salt),
        iv:         bytesToBase64(iv),
        ciphertext: bytesToBase64(new Uint8Array(ct)),
        createdAt:  new Date().toISOString()
    };
}

async function decryptVaultData(payload, passwordBytesOrString) {
    const data = typeof payload === 'string' ? JSON.parse(payload) : payload;
    // PATCH: validazione formato
    if (data.format !== VAULT_FORMAT || data.cipher !== 'AES-GCM' || data.kdf !== 'PBKDF2-SHA256')
        throw new Error('Formato vault non supportato');
    // PATCH: impedisce downgrade attack sulle iterazioni — se il file dice meno di
    // KDF_ITERATIONS_MIN rifiutiamo il vault invece di usare il valore manipolato.
    const iters = Number(data.iterations);
    if (!Number.isInteger(iters) || iters < KDF_ITERATIONS_MIN)
        throw new Error(`Iterazioni KDF nel file troppo basse (${iters}). File potenzialmente manomesso.`);
    const salt = base64ToBytes(data.salt);
    const iv   = base64ToBytes(data.iv);
    const ct   = base64ToBytes(data.ciphertext);
    const key  = await deriveVaultKey(passwordBytesOrString, salt, iters);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(plain);
}

/* ══════════════════════════════════════════════════════════════
   GESTIONE PASSWORD MASTER  (PATCH: Uint8Array, mai stringa plain)
══════════════════════════════════════════════════════════════ */
function storeMasterPassword(str) {
    clearMasterPassword();
    _masterPasswordBytes = new TextEncoder().encode(str);
}

function clearMasterPassword() {
    zeroBytes(_masterPasswordBytes);
    _masterPasswordBytes = null;
}

function getMasterPasswordBytes() {
    if (!_masterPasswordBytes) throw new Error('Master password non disponibile');
    return _masterPasswordBytes; // restituisce riferimento — non copiare
}

function isMasterPasswordStrongEnough(p) { return p.length >= MIN_PASS_LEN; }

function createNewVault() {
    const name    = document.getElementById('newVaultName').value.trim();
    const pass    = document.getElementById('newVaultPassword').value;
    const confirm = document.getElementById('newVaultPasswordConfirm').value;

    if (!pass) { toast('⚠️ Inserisci una master password', 'err'); return; }
    if (pass !== confirm) { toast('⚠️ Le password non coincidono', 'err'); return; }
    if (!isMasterPasswordStrongEnough(pass)) {
        toast(`⚠️ Master password: minimo ${MIN_PASS_LEN} caratteri`, 'err'); return;
    }
    vaultData = createEmptyVaultData();
    vaultData.meta.databaseName = name || 'My Secure Vault';
    vaultData.meta.masterKeyChanged = new Date().toISOString();
    storeMasterPassword(pass);
    // PATCH: pulisce subito il campo password dal DOM
    document.getElementById('newVaultPassword').value        = '';
    document.getElementById('newVaultPasswordConfirm').value = '';
    openMainApplication();
    toast('✅ Vault creato');
}

async function loadVault() {
    const fileInput = document.getElementById('vaultFile');
    const passInput = document.getElementById('vaultPassword');
    const pass      = passInput.value;

    if (!fileInput.files.length || !pass) {
        toast('⚠️ Seleziona file e inserisci password', 'err'); return;
    }
    // PATCH: controlla dimensione file prima di leggere
    if (fileInput.files[0].size > MAX_FILE_SIZE_MB * 1024 * 1024) {
        toast(`❌ File troppo grande (max ${MAX_FILE_SIZE_MB} MB)`, 'err'); return;
    }
    try {
        const file    = fileInput.files[0];
        const content = await readFileAsText(file);
        vaultData = createEmptyVaultData();
        if (file.name.toLowerCase().endsWith('.xml')) {
            await loadFromXML(content, pass);
        } else {
            await loadEncryptedVault(content, pass);
        }
        storeMasterPassword(pass);
        passInput.value = '';
        openMainApplication();
        toast('✅ Vault aperto');
    } catch (e) {
        console.error(e);
        wipeSensitiveState();
        // PATCH: messaggio generico — non rivela se la password è errata o il file è corrotto
        toast('❌ Apertura fallita: password errata o file non valido', 'err');
    }
}

function readFileAsText(file) {
    return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload  = e => res(e.target.result);
        r.onerror = rej;
        r.readAsText(file);
    });
}

async function loadEncryptedVault(content, pass) {
    const decrypted = await decryptVaultData(content, pass);
    const parsed    = JSON.parse(decrypted);
    validateVaultShape(parsed);
    vaultData = parsed;
}

// PATCH: validazione profonda del vault con controllo tipi
function validateVaultShape(data) {
    if (!data || typeof data !== 'object')
        throw new Error('Vault non è un oggetto');
    if (!data.meta || typeof data.meta !== 'object')
        throw new Error('meta mancante');
    if (!data.root || typeof data.root !== 'object')
        throw new Error('root mancante');
    if (!Array.isArray(data.root.groups) || !Array.isArray(data.root.entries))
        throw new Error('Struttura root non valida');
    // PATCH: verifica che iterations nel meta non sia stato manomesso
    // (questo campo è nel JSON decifrato, ma è bene validarlo comunque)
    if (data.meta.maintenanceHistoryDays !== undefined &&
        (typeof data.meta.maintenanceHistoryDays !== 'number' || data.meta.maintenanceHistoryDays < 0))
        throw new Error('Campo numerico non valido nel meta');
}

/* ══════════════════════════════════════════════════════════════
   PARSING XML
══════════════════════════════════════════════════════════════ */
async function loadFromXML(xmlString, pass) {
    // PATCH: limite dimensione stringa XML (contro Billion Laughs / DoS)
    if (xmlString.length > MAX_FILE_SIZE_MB * 1024 * 1024)
        throw new Error('XML troppo grande');
    const parser = new DOMParser();
    let doc = parser.parseFromString(xmlString, 'text/xml');
    if (doc.querySelector('parsererror')) throw new Error('XML non valido');

    const encNode = doc.querySelector('Encrypted');
    if (encNode && encNode.textContent.trim().toLowerCase() === 'true') {
        const encData = doc.querySelector('EncryptedData')?.textContent;
        if (!encData) throw new Error('Dati cifrati mancanti');
        const dec = await decryptVaultData(encData, pass);
        doc = parser.parseFromString(dec, 'text/xml');
        if (doc.querySelector('parsererror')) throw new Error('XML cifrato non valido');
    }

    const metaNode = doc.querySelector('Meta');
    if (metaNode) {
        // PATCH: usa textContent (non innerHTML) — nessun rischio XSS
        vaultData.meta.databaseName        = metaNode.querySelector('DatabaseName')?.textContent  || 'Database';
        vaultData.meta.databaseDescription = metaNode.querySelector('DatabaseDescription')?.textContent || '';
        vaultData.meta.defaultUserName     = metaNode.querySelector('DefaultUserName')?.textContent || '';
    }
    const rootNode = doc.querySelector('Root > Group');
    if (!rootNode) throw new Error('XML non valido: manca Root > Group');
    vaultData.root = parseXMLGroup(rootNode);
}

function parseXMLGroup(node) {
    const g = {
        uuid:    node.querySelector('UUID')?.textContent    || generateUUID(),
        name:    node.querySelector('Name')?.textContent    || 'Group',
        notes:   node.querySelector('Notes')?.textContent   || '',
        iconID:  parseInt(node.querySelector('IconID')?.textContent || '48', 10),
        times:   parseXMLTimes(node.querySelector('Times')),
        groups:  [],
        entries: []
    };
    node.querySelectorAll(':scope > Group').forEach(n => g.groups.push(parseXMLGroup(n)));
    node.querySelectorAll(':scope > Entry').forEach(n => g.entries.push(parseXMLEntry(n)));
    return g;
}

function parseXMLEntry(node) {
    const e = {
        uuid:     node.querySelector('UUID')?.textContent  || generateUUID(),
        iconID:   parseInt(node.querySelector('IconID')?.textContent || '0', 10),
        times:    parseXMLTimes(node.querySelector('Times')),
        strings:  {},
        binaries: [],
        autoType: { enabled: true, dataTransferObfuscation: 0, sequence: '{USERNAME}{TAB}{PASSWORD}{ENTER}' },
        history:  []
    };
    node.querySelectorAll('String').forEach(s => {
        const key  = s.querySelector('Key')?.textContent;
        const vn   = s.querySelector('Value');
        if (key) e.strings[key] = { value: vn?.textContent || '', protected: vn?.getAttribute('Protected') === 'True' };
    });
    node.querySelectorAll('Binary').forEach(b => {
        const key = b.querySelector('Key')?.textContent;
        const vn  = b.querySelector('Value');
        if (key) e.binaries.push({ name: key, data: vn?.textContent || '', compressed: vn?.getAttribute('Compressed') === 'True' });
    });
    return e;
}

function parseXMLTimes(n) {
    if (!n) return createTimes();
    return {
        creationTime:         n.querySelector('CreationTime')?.textContent         || new Date().toISOString(),
        lastModificationTime: n.querySelector('LastModificationTime')?.textContent || new Date().toISOString(),
        lastAccessTime:       n.querySelector('LastAccessTime')?.textContent       || new Date().toISOString(),
        expiryTime:           n.querySelector('ExpiryTime')?.textContent           || '2999-12-31T00:00:00.000Z',
        expires:              n.querySelector('Expires')?.textContent === 'True',
        usageCount:           parseInt(n.querySelector('UsageCount')?.textContent  || '0', 10),
        locationChanged:      n.querySelector('LocationChanged')?.textContent      || new Date().toISOString()
    };
}

async function importXML() {
    const fi  = document.getElementById('importFile');
    const pw  = document.getElementById('importPassword').value;
    const tid = document.getElementById('importTarget').value;
    if (!fi.files.length) { toast('⚠️ Seleziona un file XML', 'err'); return; }
    if (fi.files[0].size > MAX_FILE_SIZE_MB * 1024 * 1024) {
        toast(`❌ File troppo grande (max ${MAX_FILE_SIZE_MB} MB)`, 'err'); return;
    }
    const prev = vaultData;
    try {
        vaultData = createEmptyVaultData();
        // PATCH: usa la password fornita, fallback ai bytes master (NON alla stringa)
        const importPass = pw || getMasterPasswordBytes();
        await loadFromXML(await readFileAsText(fi.files[0]), importPass);
        const imported = vaultData.root;
        vaultData = prev;
        const target = tid ? findGroupById(vaultData.root, tid) : vaultData.root;

        imported.groups.forEach(g => target.groups.push(g));
        imported.entries.forEach(e => target.entries.push(e));

        toast(`✅ Importati ${imported.groups.length} cartelle, ${imported.entries.length} entries`);

        vaultData = prev;
        console.error(e);
        toast('❌ Errore importazione: ' + e.message, 'err');

// PATCH: wipeSensitiveState azzera masterPassword come Uint8Array
function wipeSensitiveState() {
    vaultOpen = false;
    clearMasterPassword(); // PATCH: sovrascrive i byte
    vaultData = createEmptyVaultData();
    selectedFolderId = selectedEntryId = null;
    searchQuery = ''; customFieldsCount = 0;
    clearTimeout(autoLockTimer); autoLockTimer = null;
    cancelAnimationFrame(lockBarRaf); lockBarRaf = null;
    clearTimeout(clipboardClearTimer); clipboardClearTimer = null;

    // Pulisce tutti i campi sensibili nel DOM
    ['newVaultName','newVaultPassword','newVaultPasswordConfirm',
     'vaultPassword','searchBox','entryTitle','entryUsername',
     'entryPassword','entryUrl','entryNotes'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    ['entriesList','folderTree','customFieldsList','attachmentsList'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.replaceChildren();
    });
    document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));

    // Reset lock bar
    const bar = document.getElementById('lockBar');
    if (bar) { bar.style.transform = 'scaleX(1)'; bar.style.transition = 'none'; }
}

/* ══════════════════════════════════════════════════════════════
   AUTO-LOCK  (con barra visiva)
══════════════════════════════════════════════════════════════ */
function resetAutoLockTimer() {
    if (!vaultOpen) return;
    clearTimeout(autoLockTimer);
    cancelAnimationFrame(lockBarRaf);
    autoLockStart = performance.now();
    autoLockTimer = setTimeout(lockDueToInactivity, AUTO_LOCK_MS);
    animateLockBar();
}

function animateLockBar() {
    const bar = document.getElementById('lockBar');
    if (!bar || !vaultOpen) return;
    const elapsed  = performance.now() - autoLockStart;
    const fraction = Math.max(0, 1 - elapsed / AUTO_LOCK_MS);
    bar.style.transform  = `scaleX(${fraction})`;
    bar.style.transition = 'none';
    if (fraction > 0) lockBarRaf = requestAnimationFrame(animateLockBar);
}

    document.getElementById('entryPassword').value = '';
}

async function saveEntry() {
    const editId   = document.getElementById('editEntryId').value;
    const title    = document.getElementById('entryTitle').value.trim();
    const username = document.getElementById('entryUsername').value.trim();
    const password = document.getElementById('entryPassword').value;
    const url      = document.getElementById('entryUrl').value.trim();
    const notes    = document.getElementById('entryNotes').value.trim();
    const folderId = document.getElementById('entryFolder').value;

    if (!title || !username || !password) {
        toast('⚠️ Compila i campi obbligatori', 'err'); return;
    }

    // Raccoglie custom fields
    const customFields = {};
    document.querySelectorAll('.cf-wrap').forEach(wrap => {
        const k  = wrap.querySelector('.cf-key').value.trim();
        const v  = wrap.querySelector('.cf-val').value.trim();
        const pr = wrap.querySelector('.cf-prot').checked;
        if (k) customFields[k] = { value: v, protected: pr };
    });

    // Allegati
    let binaries = [];
    const fi = document.getElementById('attachmentFile');
    if (fi.files.length > 0) {
        binaries = await Promise.all(Array.from(fi.files).map(readFileAsBase64));
    } else if (editId) {
        binaries = findEntryById(vaultData.root, editId)?.binaries || [];
    }

    const existing = editId ? findEntryById(vaultData.root, editId) : null;
    const entry = {
        uuid:    editId || generateUUID(),
        iconID:  existing?.iconID || 0,
        times:   existing
            ? { ...existing.times, lastModificationTime: new Date().toISOString(), lastAccessTime: new Date().toISOString() }
            : createTimes(),
        strings: {
            Title:    { value: title,    protected: false },
            UserName: { value: username, protected: false },
            Password: { value: password, protected: true },
            URL:      { value: url,      protected: false },
            Notes:    { value: notes,    protected: false },
            ...customFields
        },
        binaries,
        autoType: { enabled: true, dataTransferObfuscation: 0, sequence: '{USERNAME}{TAB}{PASSWORD}{ENTER}' },
        history:  existing?.history || []
    };

    if (editId) {
        findAndReplaceEntry(vaultData.root, editId, entry);
        toast('✅ Entry aggiornata');
    } else {
        const group = folderId ? findGroupById(vaultData.root, folderId) : vaultData.root;
        if (group) { group.entries.push(entry); toast('✅ Entry creata'); }
    }

    // PATCH: pulisce subito la password dal DOM dopo il salvataggio
    document.getElementById('entryPassword').value = '';
    renderFolderTree(); renderEntries(); closeEntryModal();
}

function readFileAsBase64(file) {
    return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload  = e => res({ name: file.name, data: e.target.result.split(',')[1], compressed: false });
        r.onerror = rej;
        r.readAsDataURL(file);
    });
}

/* ══════════════════════════════════════════════════════════════
   CUSTOM FIELDS
══════════════════════════════════════════════════════════════ */
function addCustomField(key = '', value = '', isProtected = false) {
    const list = document.getElementById('customFieldsList');
    customFieldsCount++;
    const wrap = el('div', { className: 'cf-wrap' });

    const keyIn = el('input', { type: 'text', className: 'cf-key', placeholder: 'Nome campo', value: key });
    keyIn.style.flex = '1';

    const protIn  = el('input', { type: 'checkbox', className: 'cf-prot' });
    protIn.checked = Boolean(isProtected);
    const protLbl = el('label');
    protLbl.style.cssText = 'display:flex;align-items:center;gap:4px;font-size:.8rem;color:var(--muted);text-transform:none;letter-spacing:0;';
    protLbl.append(protIn, document.createTextNode(' Protetto'));

    const removeBtn = el('button', { className: 'btn-icon', type: 'button' });
    removeBtn.textContent = '🗑️';
    removeBtn.addEventListener('click', () => wrap.remove());

    const head = el('div', { className: 'cf-head' });
    head.append(keyIn, protLbl, removeBtn);

    const valIn = el('input', { type: 'text', className: 'cf-val', placeholder: 'Valore', value });

    wrap.append(head, valIn);
    list.appendChild(wrap);
}

/* ══════════════════════════════════════════════════════════════
   TREE — RENDER
══════════════════════════════════════════════════════════════ */
function renderFolderTree() {
    const container = document.getElementById('folderTree');
    container.replaceChildren();

    const rootItem = el('div', { className: 'tree-item folder' + (selectedFolderId === null && !selectedEntryId ? ' selected' : '') });
    // PATCH: textContent, non innerHTML
    rootItem.textContent = '📁 Root';
    rootItem.addEventListener('click', () => selectFolder(null));
    container.appendChild(rootItem);

    if (!selectedFolderId && !searchQuery) {
        vaultData.root.entries.forEach(e => container.appendChild(makeEntryTreeItem(e)));
    }
    renderGroupChildren(vaultData.root, container, 0);
}

function renderGroupChildren(group, container, level) {
    group.groups.forEach(sub => {
        const item = el('div', { className: 'tree-item folder' + (selectedFolderId === sub.uuid && !selectedEntryId ? ' selected' : '') });
        item.textContent = '📁 ' + sub.name; // PATCH: textContent
        item.style.marginLeft = `${level * 14}px`;
        item.addEventListener('click', ev => { ev.stopPropagation(); selectFolder(sub.uuid); });
        container.appendChild(item);
        if (selectedFolderId === sub.uuid && !searchQuery) {
            sub.entries.forEach(e => {
                const ei = makeEntryTreeItem(e);
                ei.style.marginLeft = `${(level + 1) * 14}px`;
                container.appendChild(ei);
            });
        }
        renderGroupChildren(sub, container, level + 1);
    });
}

function makeEntryTreeItem(entry) {
    const item = el('div', { className: 'tree-item entry' + (selectedEntryId === entry.uuid ? ' selected' : '') });
    item.textContent = '🔑 ' + (entry.strings.Title?.value || 'Untitled'); // PATCH: textContent
    item.addEventListener('click', ev => { ev.stopPropagation(); selectEntry(entry.uuid); });
    return item;
}

function selectFolder(id) {
    selectedFolderId = id; selectedEntryId = null;
    renderFolderTree(); renderEntries(); updateFolderPath();
}

function selectEntry(id) {
    selectedEntryId = id;
    renderFolderTree(); renderEntryDetail(id);
}

function updateFolderPath() {
    const el_ = document.getElementById('folderPath');
    if (selectedFolderId) {
        const path = getGroupPath(vaultData.root, selectedFolderId);
        el_.textContent = '📁 ' + (path ? path.join(' / ') : 'Root');
    } else {
        el_.textContent = '📁 Root';
    }
}

function getGroupPath(group, targetId, current = []) {
    if (group.uuid === targetId) return [...current, group.name];
    for (const s of group.groups) {
        const p = getGroupPath(s, targetId, [...current, group.name]);
        if (p) return p;
    }
    return null;
}

/* ══════════════════════════════════════════════════════════════
   ENTRIES — RENDER
══════════════════════════════════════════════════════════════ */
function renderEntries() {
    if (selectedEntryId) { renderEntryDetail(selectedEntryId); return; }
    const container = document.getElementById('entriesList');
    container.replaceChildren();
    const group = selectedFolderId ? findGroupById(vaultData.root, selectedFolderId) : vaultData.root;
    let entries = group ? [...group.entries] : [];
    if (searchQuery) entries = searchAllEntries(vaultData.root, searchQuery);
    if (!entries.length) { container.appendChild(makeEmptyState()); return; }
    entries.forEach(e => container.appendChild(makeEntryCard(e)));
}

function makeEntryCard(entry) {
    const card = el('div', { className: 'entry-card' });
    card.addEventListener('click', () => selectEntry(entry.uuid));

    const title = el('div', { className: 'entry-title' });
    title.textContent = '🔑 ' + (entry.strings.Title?.value || 'Untitled'); // PATCH: textContent

    const meta = el('div', { className: 'entry-meta' });
    appendMeta(meta, 'Username', entry.strings.UserName?.value || '');
    if (entry.strings.URL?.value) appendMeta(meta, 'URL', entry.strings.URL.value);

    const btns = el('div', { className: 'button-row' });
    const cpBtn = el('button', { className: 'btn-info btn-sm', type: 'button' });
    cpBtn.textContent = '📋 Password';
    cpBtn.addEventListener('click', ev => { ev.stopPropagation(); copyField(entry.uuid, 'Password', true); });

    const edBtn = el('button', { className: 'btn-secondary btn-sm', type: 'button' });
    edBtn.textContent = '✏️';
    edBtn.addEventListener('click', ev => { ev.stopPropagation(); editEntry(entry.uuid); });

    const dlBtn = el('button', { className: 'btn-danger btn-sm', type: 'button' });
    dlBtn.textContent = '🗑️';
    dlBtn.addEventListener('click', ev => { ev.stopPropagation(); deleteEntry(entry.uuid); });

    btns.append(cpBtn, edBtn, dlBtn);
    card.append(title, meta, btns);
    return card;
}

function renderEntryDetail(entryId) {
    const entry = findEntryById(vaultData.root, entryId);
    if (!entry) return;
    const container = document.getElementById('entriesList');
    container.replaceChildren();

    const card = el('div', { className: 'entry-card' });
    const title = el('div', { className: 'entry-title' });
    title.textContent = '🔑 ' + (entry.strings.Title?.value || 'Untitled'); // PATCH: textContent

    const meta = el('div', { className: 'entry-meta' });
    appendMeta(meta, 'Username', entry.strings.UserName?.value || '');

    // Password nascosta con elemento dedicato
    const pwdLbl = el('span', { className: 'meta-label' }); pwdLbl.textContent = 'Password';
    const pwdVal = el('span', { className: 'meta-value pwd-dot', id: 'pwd-' + entryId });
    pwdVal.textContent = '••••••••';
    meta.append(pwdLbl, pwdVal);

    if (entry.strings.URL?.value) appendUrlMeta(meta, entry.strings.URL.value);
    if (entry.strings.Notes?.value) appendMeta(meta, 'Note', entry.strings.Notes.value);

    const std = ['Title','UserName','Password','URL','Notes'];
    Object.entries(entry.strings).forEach(([k, v]) => {
        if (!std.includes(k)) appendMeta(meta, k, v.protected ? '••••••••' : v.value);
    });
    if (entry.binaries.length)
        appendMeta(meta, 'Allegati', entry.binaries.map(b => '📎 ' + b.name).join(', '));

    const btns = el('div', { className: 'button-row' });

    const showBtn = el('button', { className: 'btn-secondary btn-sm', type: 'button' });
    showBtn.textContent = '👁️ Mostra';
    showBtn.addEventListener('click', () => togglePasswordView(entryId, showBtn));

    const cpUser = el('button', { className: 'btn-info btn-sm', type: 'button' });
    cpUser.textContent = '📋 User';
    cpUser.addEventListener('click', () => copyField(entryId, 'UserName', false));

    const cpPass = el('button', { className: 'btn-info btn-sm', type: 'button' });
    cpPass.textContent = '📋 Pass';
    cpPass.addEventListener('click', () => copyField(entryId, 'Password', true));

    const edBtn = el('button', { className: 'btn-secondary btn-sm', type: 'button' });
    edBtn.textContent = '✏️ Modifica';
    edBtn.addEventListener('click', () => editEntry(entryId));

    const dlBtn = el('button', { className: 'btn-danger btn-sm', type: 'button' });
    dlBtn.textContent = '🗑️ Elimina';
    dlBtn.addEventListener('click', () => deleteEntry(entryId));

    btns.append(showBtn, cpUser, cpPass, edBtn, dlBtn);
    card.append(title, meta, btns);
    container.appendChild(card);
}

/* ══════════════════════════════════════════════════════════════
   CRUD ENTRIES
══════════════════════════════════════════════════════════════ */
function editEntry(id) {
    const entry = findEntryById(vaultData.root, id);
    if (!entry) return;
    document.getElementById('entryModalTitle').textContent = '✏️ Modifica Entry';
    document.getElementById('editEntryId').value   = id;
    document.getElementById('entryTitle').value    = entry.strings.Title?.value    || '';
    document.getElementById('entryUsername').value = entry.strings.UserName?.value || '';
    // PATCH: scrive la password nel campo (necessario per modifica) —
    // il campo viene pulito subito dopo saveEntry() o closeEntryModal()
    document.getElementById('entryPassword').value = entry.strings.Password?.value || '';
    document.getElementById('entryUrl').value      = entry.strings.URL?.value      || '';
    document.getElementById('entryNotes').value    = entry.strings.Notes?.value    || '';

    document.getElementById('customFieldsList').replaceChildren();
    customFieldsCount = 0;
    const std = ['Title','UserName','Password','URL','Notes'];
    Object.entries(entry.strings).forEach(([k, v]) => {
        if (!std.includes(k)) addCustomField(k, v.value, v.protected);
    });

    const attList = document.getElementById('attachmentsList');
    attList.replaceChildren();
    entry.binaries.forEach(b => {
        const item = el('div', { className: 'att-item' });
        const name = el('span'); name.textContent = '📎 ' + b.name; // PATCH: textContent
        item.appendChild(name);
        attList.appendChild(item);
    });

    updateSelect('entryFolder', vaultData.root, false);
    document.getElementById('entryModal').classList.add('active');
}

async function deleteEntry(id) {
    // PATCH: usa secureConfirm invece di window.confirm
    const ok = await secureConfirm('Elimina Entry', 'Questa azione è irreversibile. Continuare?');
    if (!ok) return;
    if (deleteEntryById(vaultData.root, id)) {
        selectedEntryId = null;
        renderFolderTree(); renderEntries();
        toast('🗑️ Entry eliminata');
    }
}

/* ══════════════════════════════════════════════════════════════
   UTILS: RICERCA & ALBERO
══════════════════════════════════════════════════════════════ */
function findGroupById(group, id) {
    if (group.uuid === id) return group;
    for (const s of group.groups) { const f = findGroupById(s, id); if (f) return f; }
    return null;
}
function findEntryById(group, id) {
    for (const e of group.entries) if (e.uuid === id) return e;
    for (const s of group.groups)  { const f = findEntryById(s, id); if (f) return f; }
    return null;
}
function findAndReplaceEntry(group, id, newEntry) {
    for (let i = 0; i < group.entries.length; i++) {
        if (group.entries[i].uuid === id) { group.entries[i] = newEntry; return true; }
    }
    for (const s of group.groups) if (findAndReplaceEntry(s, id, newEntry)) return true;
    return false;
}
function deleteEntryById(group, id) {
    const i = group.entries.findIndex(e => e.uuid === id);
    if (i !== -1) { group.entries.splice(i, 1); return true; }
    for (const s of group.groups) if (deleteEntryById(s, id)) return true;
    return false;
}
function searchAllEntries(group, q) {
    const lower = q.toLowerCase();
    let res = group.entries.filter(e =>
        (e.strings.Title?.value    || '').toLowerCase().includes(lower) ||
        (e.strings.UserName?.value || '').toLowerCase().includes(lower) ||
        (e.strings.URL?.value      || '').toLowerCase().includes(lower)
    );
    group.groups.forEach(s => { res = res.concat(searchAllEntries(s, q)); });
    return res;
}
function filterEntries(q) {
    searchQuery = q.trim(); selectedEntryId = null;
    renderFolderTree(); renderEntries();
}

/* ══════════════════════════════════════════════════════════════
   PASSWORD
══════════════════════════════════════════════════════════════ */
function generateSecurePassword(length = 20) {
    ensureWebCrypto();
    const lower   = 'abcdefghijklmnopqrstuvwxyz';
    const upper   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const digits  = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
    const charset = lower + upper + digits + symbols;
    const chars   = [
        lower[secureRandomInt(lower.length)],
        upper[secureRandomInt(upper.length)],
        digits[secureRandomInt(digits.length)],
        symbols[secureRandomInt(symbols.length)]
    ];
    while (chars.length < length) chars.push(charset[secureRandomInt(charset.length)]);
    return secureShuffle(chars).join('');
}

function generatePasswordStandalone() {
    const p = generateSecurePassword();
    copyToClipboard(p, 'Password', true);
}

function generatePasswordForEntry() {
    const p = generateSecurePassword();
    document.getElementById('entryPassword').value = p;
    checkPasswordStrength(p, 'entryStrengthBar');
}

function checkPasswordStrength(p, barId) {
    const bar = document.getElementById(barId);
    if (!bar) return;
    if (!p) { bar.className = 'strength-fill'; return; }
    let score = 0;
    if (p.length >= 14) score++;
    if (p.length >= 20) score++;
    if (/[a-z]/.test(p) && /[A-Z]/.test(p)) score++;
    if (/\d/.test(p)) score++;
    if (/[^a-zA-Z0-9]/.test(p)) score++;
    if (/^(password|qwerty|admin|letmein|welcome)/i.test(p)) score = 1;
    bar.className = 'strength-fill ' + (score <= 2 ? 's-weak' : score <= 4 ? 's-medium' : 's-strong');
}

// PATCH: la password viene mostrata solo nel DOM locale (textContent),
// non inviata da nessuna parte. L'elemento non è selezionabile da estensioni
// perché è un <span> (non input), il che riduce la superficie di attacco.
function togglePasswordView(entryId, btn) {
    const entry = findEntryById(vaultData.root, entryId);
    const span  = document.getElementById('pwd-' + entryId);
    if (!entry || !span) return;
    if (span.classList.contains('pwd-dot')) {
        span.classList.remove('pwd-dot');
        span.textContent = entry.strings.Password?.value || ''; // PATCH: textContent
        btn.textContent  = '🙈 Nascondi';
    } else {
        span.classList.add('pwd-dot');
        span.textContent = '••••••••';
        btn.textContent  = '👁️ Mostra';
    }
}

function copyField(entryId, field, sensitive = false) {
    const entry = findEntryById(vaultData.root, entryId);
    const val   = entry?.strings?.[field]?.value || '';
    copyToClipboard(val, field, sensitive);
}

async function copyToClipboard(text, label, sensitive = false) {
    try {
        await navigator.clipboard.writeText(text);
        toast(`📋 ${label} copiato${sensitive ? ' (auto-cancellazione 30s)' : ''}`);
        if (sensitive) scheduleClipboardClear(text);
    } catch {
        toast('❌ Impossibile copiare negli appunti', 'err');
    }
}

function scheduleClipboardClear(expected) {
    clearTimeout(clipboardClearTimer);
    clipboardClearTimer = setTimeout(async () => {
        try {
            const cur = await navigator.clipboard.readText();
            if (cur === expected) {
                await navigator.clipboard.writeText('');
                toast('🧹 Appunti cancellati');
            }
        } catch {
            // PATCH: fallisce silenziosamente — è un best-effort
        }
    }, CLIPBOARD_CLEAR_MS);
}

/* ══════════════════════════════════════════════════════════════
   HELPERS DOM
══════════════════════════════════════════════════════════════ */
// Funzione helper sicura: usa sempre textContent, mai innerHTML
function el(tag, attrs = {}, ...children) {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === 'className') node.className = v;
        else if (k === 'type') node.type = v;
        else if (k === 'id')   node.id   = v;
        // PATCH: nessuna assegnazione di innerHTML — solo attributi sicuri
        else node.setAttribute(k, v);
    }
    children.forEach(c => node.appendChild(c));
    return node;
}

function appendMeta(container, label, value) {
    const lbl = el('span', { className: 'meta-label' }); lbl.textContent = label;
    const val = el('span', { className: 'meta-value'  }); val.textContent = value; // PATCH: textContent
    container.append(lbl, val);
}

function appendUrlMeta(container, url) {
    const lbl = el('span', { className: 'meta-label' }); lbl.textContent = 'URL';
    const val = el('span', { className: 'meta-value'  });
    const safe = normalizeSafeUrl(url);
    if (safe) {
        const a = el('a'); a.textContent = url; // PATCH: textContent, non href-injection
        a.href = safe; a.target = '_blank'; a.rel = 'noopener noreferrer';
        val.appendChild(a);
    } else {
        val.textContent = url; // URL non http/https: mostra come testo
    }
    container.append(lbl, val);
}

function normalizeSafeUrl(url) {
    try {
        const p = new URL(url);
        return ['http:','https:'].includes(p.protocol) ? p.href : null;
    } catch { return null; }
}

function makeEmptyState() {
    const w = el('div', { className: 'empty' });
    const ic = el('div', { className: 'empty-icon' }); ic.textContent = '🔒';
    const h  = el('h3'); h.textContent = 'Nessuna entry';
    const p  = el('p');  p.textContent = 'Aggiungi la tua prima password';
    w.append(ic, h, p);
    return w;
}

function updateSelect(selectId, root, includeRoot) {
    const sel = document.getElementById(selectId);
    sel.replaceChildren();
    if (includeRoot) { const o = document.createElement('option'); o.value = ''; o.textContent = 'Root'; sel.appendChild(o); }
    else { const o = document.createElement('option'); o.value = ''; o.textContent = 'Root'; sel.appendChild(o); }
    addGroupOpts(root, sel, 0);
}
function addGroupOpts(group, sel, level) {
    group.groups.forEach(s => {
        const o = document.createElement('option');
        o.value = s.uuid;
        o.textContent = '\u00a0'.repeat(level * 3) + '📁 ' + s.name; // PATCH: textContent
        sel.appendChild(o);
        addGroupOpts(s, sel, level + 1);
    });
}

/* ══════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'ok') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg; // PATCH: textContent, mai innerHTML
    document.body.appendChild(t);
    setTimeout(() => {
        t.style.animation = 'toastOut .25s ease forwards';
        setTimeout(() => t.remove(), 260);
    }, 3200);
}

/* ══════════════════════════════════════════════════════════════
   FILE UTILS
══════════════════════════════════════════════════════════════ */
function downloadFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function sanitizeFileName(name) {
    // PATCH: rimuove anche i punti per prevenire path traversal e nomi ambigui
    return name.replace(/[^a-z0-9_-]+/gi, '_').replace(/^_+|_+$/g, '') || 'vault';
}

function escapeXml(s) {
    if (!s) return '';
    return String(s).replace(/[<>&'"]/g, c =>
        ({ '<':'&lt;', '>':'&gt;', '&':'&amp;', "'": '&apos;', '"':'&quot;' }[c])
    );
}

   FORM HELPERS
══════════════════════════════════════════════════════════════ */
function showCreateVault() { hideAllForms(); document.getElementById('createVaultForm').style.display = 'block'; }

function hideAllForms() {
    document.getElementById('createVaultForm').style.display = 'none';
    document.getElementById('loadVaultForm').style.display   = 'none';
}
