<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universe Sandbox - Mobile</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }

        canvas { display: block; cursor: crosshair; touch-action: none; }

        /* ── DESKTOP LAYOUT ── */
        @media (min-width: 601px) {
            body { display: flex; }
            canvas { flex-grow: 1; }
            #sidebar {
                width: 320px; flex-shrink: 0;
                background: rgba(10, 10, 20, 0.95);
                border-left: 1px solid #334; padding: 15px;
                box-shadow: -5px 0 20px rgba(0,0,0,0.8);
                overflow-y: auto; height: 100vh;
            }
            #bottom-bar { display: none; }
            #sidebar-toggle { display: none; }
        }

        /* ── MOBILE LAYOUT ── */
        @media (max-width: 600px) {
            body { flex-direction: column; }
            canvas { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

            #sidebar {
                position: fixed; bottom: 0; left: 0; right: 0;
                background: rgba(8, 8, 18, 0.97);
                border-top: 1px solid #445;
                padding: 12px 14px 20px;
                max-height: 65vh; overflow-y: auto;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                z-index: 100;
                border-radius: 18px 18px 0 0;
            }
            #sidebar.open { transform: translateY(0); }

            #sidebar-toggle {
                position: fixed; bottom: 16px; right: 16px; z-index: 200;
                width: 52px; height: 52px; border-radius: 50%;
                background: linear-gradient(135deg, #00ffcc, #0099aa);
                border: none; color: #000; font-size: 1.5em;
                box-shadow: 0 4px 18px rgba(0,255,204,0.45);
                cursor: pointer; display: flex; align-items: center; justify-content: center;
            }

            #bottom-bar {
                position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
                z-index: 150; display: flex; gap: 8px; pointer-events: none;
            }
        }

        .section { margin-bottom: 15px; border-bottom: 1px solid #223; padding-bottom: 10px; }
        h3 { color: #00ffcc; font-size: 0.95em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .preset-btn {
            background: #161625; border: 1px solid #334; color: #ccc;
            padding: 10px 4px; border-radius: 4px; cursor: pointer; font-size: 0.78em;
            transition: all 0.2s; text-align: center; touch-action: manipulation;
        }
        .preset-btn:hover, .preset-btn:active { border-color: #00ffcc; background: #1f1f35; color: white; }
        .preset-btn.active { background: #005544; border-color: #00ffcc; font-weight: bold; color: white; }

        .control-group { margin: 10px 0; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 6px; }
        label { display: block; font-size: 0.75em; color: #889; margin-bottom: 4px; }
        .val-display { float: right; color: #00ffcc; font-family: monospace; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; margin: 5px 0; height: 24px; }
        input[type=color] { width: 100%; height: 32px; cursor: pointer; border: none; border-radius: 4px; }

        .action-btn {
            width: 100%; padding: 12px; margin-top: 8px;
            color: white; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 0.85em;
            touch-action: manipulation;
        }
        .btn-solar { background: linear-gradient(45deg, #ff8800, #ffcc00); color: #000; }
        .btn-galaxy { background: #6633ff; }
        .btn-reset { background: #cc3333; margin-top: 12px; }

        #ui-top { position: fixed; top: 15px; left: 15px; pointer-events: none; z-index: 50; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; margin-bottom: 5px; font-size: 0.8em; font-family: monospace; border: 1px solid #223; }

        /* Istruzione touch visibile su mobile */
        #touch-hint {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,204,0.12); border: 1px solid rgba(0,255,204,0.3);
            padding: 6px 14px; border-radius: 20px; font-size: 0.7em; color: #00ffcc;
            pointer-events: none; z-index: 50; white-space: nowrap;
            opacity: 1; transition: opacity 2s;
        }
        #touch-hint.fade { opacity: 0; }
    </style>
</head>
<body>

<div id="ui-top">
    <div class="stat-card" id="camStatus">Visuale: Libera</div>
    <div class="stat-card" id="bodyCount">Entità: 0</div>
</div>

<div id="touch-hint" id="touchHint">👆 Tocca e trascina per lanciare un corpo · 2 dita per zoomare</div>

<canvas id="simCanvas"></canvas>

<!-- Mobile FAB toggle -->
<button id="sidebar-toggle" onclick="toggleSidebar()" title="Impostazioni">⚙️</button>

<div id="sidebar">
    <div class="section">
        <h3>Corpi Celesti</h3>
        <div class="preset-grid" id="presetMenu">
            <button class="preset-btn active" data-type="custom">🛠 Manuale</button>
            <button class="preset-btn" data-type="sun">☀️ Sole</button>
            <button class="preset-btn" data-type="mercury">🪨 Mercurio</button>
            <button class="preset-btn" data-type="venus">🟡 Venere</button>
            <button class="preset-btn" data-type="earth">🌍 Terra</button>
            <button class="preset-btn" data-type="mars">🔴 Marte</button>
            <button class="preset-btn" data-type="jupiter">🟠 Giove</button>
            <button class="preset-btn" data-type="saturn">💫 Saturno</button>
            <button class="preset-btn" data-type="uranus">🔵 Urano</button>
            <button class="preset-btn" data-type="neptune">🫧 Nettuno</button>
            <button class="preset-btn" data-type="blackhole">⚫ Buco Nero</button>
        </div>
    </div>

    <div class="section">
        <h3>Proprietà Attuali</h3>
        <div class="control-group">
            <label>Massa: <span class="val-display" id="massVal">1000</span></label>
            <input type="range" id="massRange" min="0.1" max="500000" step="0.1" value="1000">
        </div>
        <div class="control-group">
            <label>Raggio: <span class="val-display" id="radiusVal">10</span></label>
            <input type="range" id="radiusRange" min="1" max="200" value="10">
        </div>
        <div class="control-group">
            <label>Colore</label>
            <input type="color" id="colorPicker" value="#00ffcc">
        </div>
    </div>

    <div class="section">
        <h3>Generatori</h3>
        <button class="action-btn btn-solar" onclick="spawnSolarSystem()">Sistema Solare Reale</button>
        <button class="action-btn btn-galaxy" onclick="spawnGalaxy()">Galassia a Spirale</button>
        <button class="action-btn btn-reset" onclick="resetSim()">Pulisci Tutto</button>
    </div>
</div>

<script>
    // ─── MOBILE SIDEBAR ───────────────────────────────────────────────
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    // Chiudi sidebar toccando fuori (solo mobile)
    document.addEventListener('touchstart', e => {
        const sb = document.getElementById('sidebar');
        const toggle = document.getElementById('sidebar-toggle');
        if (sb.classList.contains('open') && !sb.contains(e.target) && e.target !== toggle) {
            sb.classList.remove('open');
        }
    }, { passive: true });

    // Nascondi hint dopo 4s
    setTimeout(() => {
        const h = document.getElementById('touch-hint');
        if (h) { h.classList.add('fade'); setTimeout(() => h && h.remove(), 2500); }
    }, 4000);

    // ─── CANVAS & CONTESTO ────────────────────────────────────────────
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    const mRange = document.getElementById('massRange');
    const rRange = document.getElementById('radiusRange');
    const mVal   = document.getElementById('massVal');
    const rVal   = document.getElementById('radiusVal');
    const cPicker = document.getElementById('colorPicker');

    const DATA = {
        custom:    { name: "Oggetto",  mass: 1000,    radius: 10, color: '#00ffcc' },
        sun:       { name: "Sole",     mass: 333000,  radius: 50, color: '#ffcc00' },
        mercury:   { name: "Mercurio", mass: 0.33,    radius: 3,  color: '#aaaaaa' },
        venus:     { name: "Venere",   mass: 4.87,    radius: 6,  color: '#e3bb76' },
        earth:     { name: "Terra",    mass: 5.97,    radius: 6.5,color: '#22aaff' },
        mars:      { name: "Marte",    mass: 0.64,    radius: 4,  color: '#ff5522' },
        jupiter:   { name: "Giove",    mass: 1898,    radius: 22, color: '#ffccaa' },
        saturn:    { name: "Saturno",  mass: 568,     radius: 19, color: '#eebb88' },
        uranus:    { name: "Urano",    mass: 86.8,    radius: 13, color: '#b2d8d8' },
        neptune:   { name: "Nettuno",  mass: 102,     radius: 13, color: '#3f54ba' },
        blackhole: { name: "Buco Nero",mass: 2000000, radius: 6,  color: '#000000' }
    };

    let selectedType = 'custom';
    let bodies = [];
    const G = 1.5;
    let zoom = 1.0, offsetX = 0, offsetY = 0, trackedBody = null;
    let isCreating = false, isPanning = false;
    let startMouse = {x:0, y:0}, currentMouse = {x:0, y:0};

    // ─── PINCH ZOOM STATE ─────────────────────────────────────────────
    let pinchActive = false;
    let pinchStartDist = 0;
    let pinchStartZoom = 1;
    let pinchMidWorld = {x:0, y:0};

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        // su desktop restringi la larghezza per lasciare spazio alla sidebar
        if (window.innerWidth > 600) {
            canvas.width = window.innerWidth - 320;
        }
    }
    window.addEventListener('resize', resize);
    resize();

    // ─── SLIDERS ──────────────────────────────────────────────────────
    mRange.addEventListener('input', () => mVal.innerText = mRange.value);
    rRange.addEventListener('input', () => rVal.innerText = rRange.value);

    document.getElementById('presetMenu').addEventListener('click', e => {
        const btn = e.target.closest('.preset-btn');
        if (!btn) return;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
        const d = DATA[selectedType];
        mRange.value = d.mass; rRange.value = d.radius;
        cPicker.value = d.color.startsWith('#') ? d.color : '#ffffff';
        mVal.innerText = d.mass; rVal.innerText = d.radius;
    });

    // ─── BODY CLASS ───────────────────────────────────────────────────
    class Body {
        constructor(x, y, vx, vy, mass, radius, color, name) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.mass = mass; this.radius = radius;
            this.color = color; this.name = name;
            this.trail = []; this.exists = true;
        }
        draw() {
            if (this.trail.length > 2) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = 0.2;
                ctx.lineWidth = Math.max(0.5, 1 / zoom);
                this.trail.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
                ctx.globalAlpha = 1.0;
                ctx.lineWidth = 1;
            }
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = this.radius * 0.5; ctx.shadowColor = this.color;
            ctx.fill(); ctx.shadowBlur = 0;

            if (this.name && (this.radius * zoom > 2 || trackedBody === this)) {
                ctx.fillStyle = "white";
                ctx.font = `${Math.max(10, 14 / zoom)}px Segoe UI`;
                ctx.textAlign = "left";
                ctx.fillText(this.name, this.x + this.radius + (5/zoom), this.y + (5/zoom));
            }
        }
        update() {
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 60) this.trail.shift();
            this.x += this.vx; this.y += this.vy;
        }
    }

    // ─── FISICA ───────────────────────────────────────────────────────
    function physics() {
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                let b1 = bodies[i], b2 = bodies[j];
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let d2 = dx*dx + dy*dy, d = Math.sqrt(d2);
                if (d < (b1.radius + b2.radius) * 0.85) {
                    let winner = b1.mass >= b2.mass ? b1 : b2;
                    let loser  = b1 === winner ? b2 : b1;
                    winner.vx = (b1.vx*b1.mass + b2.vx*b2.mass) / (b1.mass + b2.mass);
                    winner.vy = (b1.vy*b1.mass + b2.vy*b2.mass) / (b1.mass + b2.mass);
                    winner.mass += loser.mass;
                    winner.radius = Math.pow(Math.pow(b1.radius,3)+Math.pow(b2.radius,3), 1/3);
                    if (trackedBody === loser) trackedBody = winner;
                    loser.exists = false; continue;
                }
                let f = (G * b1.mass * b2.mass) / d2;
                b1.vx += f*(dx/d)/b1.mass; b1.vy += f*(dy/d)/b1.mass;
                b2.vx -= f*(dx/d)/b2.mass; b2.vy -= f*(dy/d)/b2.mass;
            }
        }
        bodies = bodies.filter(b => b.exists);
    }

    // ─── LOOP ─────────────────────────────────────────────────────────
    function loop() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (trackedBody) { offsetX = -trackedBody.x; offsetY = -trackedBody.y; }
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(zoom, zoom);
        ctx.translate(offsetX, offsetY);
        physics();
        bodies.forEach(b => { b.update(); b.draw(); });

        // Freccia di lancio (mouse & touch)
        if (isCreating) {
            const wS = screenToWorld(startMouse.x, startMouse.y);
            const wC = screenToWorld(currentMouse.x, currentMouse.y);
            ctx.beginPath(); ctx.moveTo(wS.x, wS.y); ctx.lineTo(wC.x, wC.y);
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 1/zoom; ctx.stroke();
            // pallino di anteprima
            ctx.beginPath();
            ctx.arc(wS.x, wS.y, parseFloat(rRange.value), 0, Math.PI*2);
            ctx.fillStyle = cPicker.value; ctx.globalAlpha = 0.5;
            ctx.fill(); ctx.globalAlpha = 1;
        }

        document.getElementById('bodyCount').innerText = `Entità: ${bodies.length}`;
        document.getElementById('camStatus').innerText  = trackedBody ? `📡 ${trackedBody.name}` : 'Visuale: Libera';
        requestAnimationFrame(loop);
    }

    // ─── UTILS ────────────────────────────────────────────────────────
    function screenToWorld(sx, sy) {
        return {
            x: (sx - canvas.width  / 2) / zoom - offsetX,
            y: (sy - canvas.height / 2) / zoom - offsetY
        };
    }
    function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function dist2D(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

    // ─── MOUSE EVENTS (Desktop) ───────────────────────────────────────
    canvas.addEventListener('mousedown', e => {
        const pos = getCanvasPos(e.clientX, e.clientY);
        const w   = screenToWorld(pos.x, pos.y);
        if (e.button === 0) {
            let target = bodies.find(b => dist2D(w, b) < b.radius + 15/zoom);
            if (target) { trackedBody = target; }
            else { isCreating = true; startMouse = pos; currentMouse = {...pos}; }
        } else {
            isPanning = true; trackedBody = null; startMouse = pos;
        }
    });

    canvas.addEventListener('mousemove', e => {
        const pos = getCanvasPos(e.clientX, e.clientY);
        currentMouse = pos;
        if (isPanning) {
            offsetX += (pos.x - startMouse.x) / zoom;
            offsetY += (pos.y - startMouse.y) / zoom;
            startMouse = {...pos};
        }
    });

    window.addEventListener('mouseup', e => {
        if (isCreating && e.button === 0) {
            const wS = screenToWorld(startMouse.x, startMouse.y);
            const wE = screenToWorld(currentMouse.x, currentMouse.y);
            const d  = DATA[selectedType];
            bodies.push(new Body(
                wS.x, wS.y,
                (wE.x - wS.x) * 0.05,
                (wE.y - wS.y) * 0.05,
                parseFloat(mRange.value), parseFloat(rRange.value),
                cPicker.value, d.name
            ));
        }
        isCreating = isPanning = false;
    });

    canvas.addEventListener('wheel', e => {
        const pos    = getCanvasPos(e.clientX, e.clientY);
        const before = screenToWorld(pos.x, pos.y);
        zoom *= e.deltaY > 0 ? 0.9 : 1.1;
        const after  = screenToWorld(pos.x, pos.y);
        offsetX += after.x - before.x;
        offsetY += after.y - before.y;
        e.preventDefault();
    }, { passive: false });

    canvas.oncontextmenu = e => e.preventDefault();

    // ─── TOUCH EVENTS (Mobile) ────────────────────────────────────────
    // Gestione unificata single-touch (crea / pan) e pinch-zoom

    canvas.addEventListener('touchstart', e => {
        // blocca scroll della pagina sul canvas
        e.preventDefault();

        if (e.touches.length === 1) {
            const t   = e.touches[0];
            const pos = getCanvasPos(t.clientX, t.clientY);
            const w   = screenToWorld(pos.x, pos.y);

            // Tap su un corpo → traccialo
            let target = bodies.find(b => dist2D(w, b) < b.radius + 20/zoom);
            if (target) {
                trackedBody = target;
                isCreating  = false;
            } else {
                isCreating  = true;
                isPanning   = false;
                startMouse  = pos;
                currentMouse = {...pos};
            }
        }

        if (e.touches.length === 2) {
            // Inizio pinch: annulla eventuali drag in corso
            isCreating  = false;
            isPanning   = false;
            pinchActive = true;
            pinchStartDist = dist2D(
                { x: e.touches[0].clientX, y: e.touches[0].clientY },
                { x: e.touches[1].clientX, y: e.touches[1].clientY }
            );
            pinchStartZoom = zoom;
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const midPos = getCanvasPos(midX, midY);
            pinchMidWorld = screenToWorld(midPos.x, midPos.y);
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();

        if (e.touches.length === 2 && pinchActive) {
            // ── PINCH ZOOM ──
            const newDist = dist2D(
                { x: e.touches[0].clientX, y: e.touches[0].clientY },
                { x: e.touches[1].clientX, y: e.touches[1].clientY }
            );
            zoom = Math.max(0.01, Math.min(50, pinchStartZoom * (newDist / pinchStartDist)));

            // Ancora lo zoom attorno al punto medio iniziale
            const midX   = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY   = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const midPos  = getCanvasPos(midX, midY);
            const nowWorld = screenToWorld(midPos.x, midPos.y);
            offsetX += nowWorld.x - pinchMidWorld.x;
            offsetY += nowWorld.y - pinchMidWorld.y;
            pinchMidWorld = screenToWorld(midPos.x, midPos.y);

            return;
        }

        if (e.touches.length === 1) {
            const t   = e.touches[0];
            const pos = getCanvasPos(t.clientX, t.clientY);

            if (isCreating) {
                // Aggiorna l'estremità della freccia di lancio
                currentMouse = pos;
            } else if (!isCreating) {
                // Pan con un solo dito (se non stiamo creando)
                if (startMouse.x !== undefined) {
                    offsetX += (pos.x - startMouse.x) / zoom;
                    offsetY += (pos.y - startMouse.y) / zoom;
                }
                startMouse = pos;
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();

        pinchActive = false;

        if (e.changedTouches.length >= 1 && e.touches.length === 0) {
            if (isCreating) {
                const wS = screenToWorld(startMouse.x, startMouse.y);
                const wE = screenToWorld(currentMouse.x, currentMouse.y);
                const dd = dist2D(wS, wE);
                const d  = DATA[selectedType];

                // Crea il corpo solo se c'è stato un vero trascinamento
                bodies.push(new Body(
                    wS.x, wS.y,
                    (wE.x - wS.x) * 0.05,
                    (wE.y - wS.y) * 0.05,
                    parseFloat(mRange.value), parseFloat(rRange.value),
                    cPicker.value, d.name
                ));
                isCreating = false;
            }
        }

        // Se rimane 1 dito dopo aver tolto il secondo, reinizializza il pan
        if (e.touches.length === 1) {
            const t   = e.touches[0];
            const pos = getCanvasPos(t.clientX, t.clientY);
            startMouse = pos;
        }
    }, { passive: false });

    // Previeni zoom accidentale del browser via doppio-tap su iOS
    let lastTap = 0;
    canvas.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
    }, { passive: false });

    // ─── GENERATORI ───────────────────────────────────────────────────
    function spawnSolarSystem() {
        resetSim(); zoom = window.innerWidth < 600 ? 0.08 : 0.15;
        const sun = new Body(0, 0, 0, 0, DATA.sun.mass, DATA.sun.radius, DATA.sun.color, "Sole");
        bodies.push(sun);
        const config = [
            { t:'mercury', d:110  }, { t:'venus',   d:180  }, { t:'earth',   d:260 },
            { t:'mars',    d:340  }, { t:'jupiter',  d:580  }, { t:'saturn',  d:820 },
            { t:'uranus',  d:1050 }, { t:'neptune',  d:1250 }
        ];
        config.forEach(c => {
            const p = DATA[c.t];
            const v = Math.sqrt(G * sun.mass / c.d);
            bodies.push(new Body(c.d, 0, 0, v, p.mass, p.radius, p.color, p.name));
        });
        trackedBody = sun;
        if (document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function spawnGalaxy() {
        resetSim(); zoom = window.innerWidth < 600 ? 0.03 : 0.05;
        const core = new Body(0, 0, 0, 0, 2000000, 8, "#111", "Centro Galattico");
        bodies.push(core);
        for (let i = 0; i < 300; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist  = 300 + Math.random() * 2000;
            const v     = Math.sqrt(G * core.mass / dist);
            bodies.push(new Body(
                Math.cos(angle)*dist, Math.sin(angle)*dist,
                -Math.sin(angle)*v,   Math.cos(angle)*v,
                10, 1.5, `hsl(${angle*60|0},70%,80%)`, ""
            ));
        }
        if (document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function resetSim() {
        bodies = []; trackedBody = null; offsetX = 0; offsetY = 0; zoom = 1;
    }

    // ─── START ────────────────────────────────────────────────────────
    loop();
</script>
</body>
</html>
