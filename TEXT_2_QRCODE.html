<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Secure Master - Offline Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Forza il bordo bianco per la leggibilità del QR */
        #qrcode { 
            padding: 20px; 
            background: white; 
            display: inline-block; 
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        canvas { display: block; margin: 0 auto; }
        #reader { border: none !important; border-radius: 16px; overflow: hidden; }
        #reader button {
            padding: 10px 20px !important;
            background-color: #4f46e5 !important;
            color: white !important;
            border-radius: 8px !important;
            border: none !important;
            font-weight: 600 !important;
            cursor: pointer !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-indigo-600">QR Secure Master</h1>
            <p class="text-slate-500 mt-3 font-medium">Generazione e scansione 100% privata e locale.</p>
        </header>

        <div class="grid gap-8">
            
            <section class="bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-2xl">✨</span>
                    <h2 class="text-xl font-bold">Crea QR Code</h2>
                </div>
                
                <textarea id="qr-input" placeholder="Inserisci testo, numeri o simboli..." 
                    class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all resize-none text-slate-700"></textarea>
                
                <button onclick="generateNow()" 
                    class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-95">
                    Genera Immagine
                </button>

                <div id="result-area" class="mt-8 text-center hidden border-t pt-8">
                    <div id="qrcode"></div>
                    <button onclick="downloadImage()" 
                        class="mt-6 flex items-center justify-center gap-2 w-full bg-slate-900 hover:bg-black text-white font-semibold py-3 rounded-xl transition-all">
                        💾 Scarica PNG (Alta Qualità)
                    </button>
                </div>
            </section>

            <section class="bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-2xl">🔍</span>
                    <h2 class="text-xl font-bold">Scanner & Lettura File</h2>
                </div>

                <div id="reader" class="bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200"></div>

                <div id="scan-output" class="mt-6 hidden">
                    <div class="p-5 bg-indigo-50 border border-indigo-100 rounded-2xl relative">
                        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-2">Contenuto Rilevato</p>
                        <div id="decoded-text" class="text-slate-800 font-mono break-all leading-relaxed bg-white p-4 rounded-xl border border-indigo-100 shadow-sm"></div>
                        <button onclick="copyContent()" class="mt-3 text-indigo-600 font-bold text-xs hover:underline flex items-center gap-1">
                            📋 Copia negli appunti
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            Nessun dato viene inviato a server esterni • <span class="text-green-500 font-semibold italic">Privacy Garantita</span>
        </footer>
    </div>

    <script>
        // --- LOGICA GENERATORE ---
        const qrContainer = document.getElementById("qrcode");
        // Inizializziamo QRCode.js (genererà un Canvas)
        const qrcode = new QRCode(qrContainer, {
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H // Massima ridondanza per facilitare lo scanner
        });

        function generateNow() {
            const val = document.getElementById("qr-input").value;
            if (!val.trim()) {
                alert("Inserisci del testo!");
                return;
            }
            document.getElementById("result-area").classList.remove("hidden");
            qrcode.clear();
            qrcode.makeCode(val);
        }

        function downloadImage() {
            const canvas = qrContainer.querySelector("canvas");
            if (canvas) {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "qrcode_sicuro.png";
                link.click();
            }
        }

        // --- LOGICA SCANNER (Corretta per evitare errori MultiFormat) ---
        function onScanSuccess(decodedText) {
            const outBox = document.getElementById("scan-output");
            outBox.classList.remove("hidden");
            document.getElementById("decoded-text").innerText = decodedText;
            
            // Scroll automatico al risultato
            outBox.scrollIntoView({ behavior: 'smooth' });
        }

        // Configurazione dello scanner (Camera + File)
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 280, height: 280},
            supportedScanTypes: [
                Html5QrcodeScanType.SCAN_TYPE_CAMERA,
                Html5QrcodeScanType.SCAN_TYPE_FILE
            ]
        }, false);

        html5QrcodeScanner.render(onScanSuccess, (err) => {
            // Ignoriamo gli errori di "mancata corrispondenza" durante la scansione continua
        });

        function copyContent() {
            const text = document.getElementById("decoded-text").innerText;
            navigator.clipboard.writeText(text);
            alert("Testo copiato!");
        }
    </script>
</body>
</html>
