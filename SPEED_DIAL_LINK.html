<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Dial Pro - Icon Search Edition</title>
    <style>
        :root {
            --bg-center: #1a1f2c;
            --bg-outer: #080a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-outer) 100%);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Overlay & Modali */
        #app-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 50; display: none;
        }
        #app-overlay.active { display: block; }

        #icon-picker {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; background: #1a1f2c; border: 1px solid var(--accent);
            border-radius: 20px; padding: 25px; z-index: 200; display: none;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        #icon-picker.active { display: block; }
        .picker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .picker-item { 
            background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; 
            border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center;
        }
        .picker-item:hover { border-color: var(--accent); transform: scale(1.1); background: rgba(0,242,255,0.1); }
        .picker-item img { width: 40px; height: 40px; object-fit: contain; }

        .header { width: 100%; max-width: 1100px; padding: 40px 20px; z-index: 100; }
        .search-bar {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 18px 25px; border-radius: 15px; color: white; font-size: 1.1rem;
            backdrop-filter: blur(10px); outline: none; transition: 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn-tool {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase; transition: 0.2s;
        }
        .btn-tool:hover { background: rgba(255,255,255,0.1); color: white; border-color: white; }

        #grid {
            display: grid; width: 95%; max-width: 1400px;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px; padding-bottom: 50px; z-index: 60;
        }

        .tile {
            aspect-ratio: 16 / 10; border-radius: 18px;
            background: var(--glass); border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
        }
        .tile:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.4); }
        .tile.search-match { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }

        .icon-wrap { width: 52px; height: 52px; position: relative; margin-bottom: 12px; }
        .icon-img { width: 100%; height: 100%; object-fit: contain; z-index: 2; position: relative; }
        .icon-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            filter: blur(18px); opacity: 0.7; z-index: 1; border-radius: 50%;
        }

        .label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #fff; opacity: 0.9; text-align: center; padding: 0 10px; }

        .folder-preview { display: grid; grid-template-columns: repeat(2, 22px); gap: 4px; margin-bottom: 10px; }
        .mini-icon { width: 22px; height: 22px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 4px; }

        .folder-open {
            grid-column: 1 / -1; background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 40px; display: grid; gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            backdrop-filter: blur(20px); animation: fadeIn 0.3s ease;
        }

        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 30; }
        .tile:hover .actions { opacity: 1; }
        .btn-act {
            width: 26px; height: 26px; border-radius: 6px; border: none;
            background: rgba(0,0,0,0.7); color: white; cursor: pointer; font-size: 12px;
        }
        .btn-act:hover { background: var(--accent); color: black; }

        .btn-add { border: 2px dashed var(--glass-border); clip-path: none; opacity: 0.5; }
        .btn-add:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="handleGlobalDrop(event)">

    <div id="app-overlay" onclick="closeModals()"></div>

    <!-- Icon Picker Modal -->
    <div id="icon-picker">
        <h3 style="margin-top:0; color:var(--accent)">Scegli Icona</h3>
        <input type="text" id="icon-search-input" class="search-bar" placeholder="Nome app o sito..." style="padding:10px; font-size:0.9rem">
        <div class="picker-grid" id="picker-results"></div>
        <button class="btn-tool" onclick="closeModals()" style="width:100%; margin-top:15px">Annulla</button>
    </div>

    <div class="header">
        <input type="text" class="search-bar" id="search" placeholder="Cerca link o gruppi (esplora anche l'interno)..." oninput="render()">
        <div class="toolbar">
            <button class="btn-tool" onclick="importData()">Importa JSON (+)</button>
            <button class="btn-tool" onclick="exportData()">Esporta Backup</button>
        </div>
    </div>

    <div id="grid"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('speed_dial_chroma')) || [];
        let openFolderId = null;
        let dragId = null;
        let dragSourceFolderId = null;
        let pendingIconTarget = null; // Memorizza quale item sta cambiando icona

        async function analyzeIcon(url, customIcon = null) {
            return new Promise(resolve => {
                const iconUrl = customIcon || `https://www.google.com/s2/favicons?sz=128&domain=${url}`;
                const proxyUrl = `https://images.weserv.nl/?url=${encodeURIComponent(iconUrl.replace(/^https?:\/\//, ''))}&w=50&h=50`;
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = proxyUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 50; canvas.height = 50;
                    ctx.drawImage(img, 0, 0);
                    const pixels = ctx.getImageData(0, 0, 50, 50).data;
                    let r = 0, g = 0, b = 0, count = 0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        if (pixels[i + 3] > 150) { r += pixels[i]; g += pixels[i+1]; b += pixels[i+2]; count++; }
                    }
                    if (count === 0) resolve({ icon: iconUrl, color: [100, 100, 100] });
                    resolve({ icon: iconUrl, color: [Math.round(r/count), Math.round(g/count), Math.round(b/count)] });
                };
                img.onerror = () => resolve({ icon: iconUrl, color: [120, 120, 120] });
            });
        }

        // --- ICON SEARCH ENGINE ---
        function openIconPicker(id, pId) {
            pendingIconTarget = { id, pId };
            document.getElementById('app-overlay').classList.add('active');
            document.getElementById('icon-picker').classList.add('active');
            const input = document.getElementById('icon-search-input');
            input.value = "";
            input.focus();
            
            input.oninput = () => {
                const q = input.value.toLowerCase();
                const results = document.getElementById('picker-results');
                results.innerHTML = "";
                if(q.length < 2) return;

                const domains = [
                    `${q}.com`, `${q}.it`, `${q}.org`, `${q}.net`,
                    `github.com/${q}`, `twitter.com/${q}`, `facebook.com/${q}`
                ];

                domains.forEach(d => {
                    const url = `https://www.google.com/s2/favicons?sz=128&domain=${d}`;
                    const item = document.createElement('div');
                    item.className = 'picker-item';
                    item.innerHTML = `<img src="${url}" onerror="this.parentElement.remove()">`;
                    item.onclick = () => selectIcon(url);
                    results.appendChild(item);
                });
            };
        }

        async function selectIcon(url) {
            const { id, pId } = pendingIconTarget;
            const list = pId ? db.find(f => f.id === pId).children : db;
            const item = list.find(x => x.id === id);
            
            const data = await analyzeIcon(item.url, url);
            item.icon = data.icon;
            item.color = data.color;
            
            if (pId) {
                const parent = db.find(f => f.id === pId);
                parent.color = getFolderAverageColor(parent.children);
            }
            save();
            closeModals();
        }

        function closeModals() {
            document.getElementById('app-overlay').classList.remove('active');
            document.getElementById('icon-picker').classList.remove('active');
            openFolderId = null;
            render();
        }

        function getFolderAverageColor(children) {
            if (!children.length) return [100, 100, 100];
            let r = 0, g = 0, b = 0;
            children.forEach(c => { r += c.color[0]; g += c.color[1]; b += c.color[2]; });
            return [Math.round(r/children.length), Math.round(g/children.length), Math.round(b/children.length)];
        }

        async function addItem() {
            let url = prompt("Inserisci URL:");
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            const name = new URL(url).hostname.replace('www.', '').split('.')[0].toUpperCase();
            const data = await analyzeIcon(url);
            const newItem = { id: 't' + Date.now(), type: 'link', name, url, icon: data.icon, color: data.color };
            db.push(newItem);
            save();
            
            if(confirm("Vuoi cercare un'icona personalizzata per questo link?")) {
                openIconPicker(newItem.id, null);
            }
        }

        async function editItem(id, pId) {
            const list = pId ? db.find(f => f.id === pId).children : db;
            const item = list.find(x => x.id === id);
            if (item.type === 'link') {
                const n = prompt("Nome:", item.name);
                const u = prompt("URL:", item.url);
                if (n) item.name = n.toUpperCase();
                if (u && u !== item.url) {
                    const data = await analyzeIcon(u);
                    item.url = u; item.icon = data.icon; item.color = data.color;
                }
            } else {
                const n = prompt("Nome Gruppo:", item.name);
                if (n) item.name = n.toUpperCase();
            }
            if (pId) {
                const parent = db.find(f => f.id === pId);
                parent.color = getFolderAverageColor(parent.children);
            }
            save();
        }

        function deleteItem(id, pId) {
            if (!confirm("Eliminare?")) return;
            if (pId) {
                const f = db.find(x => x.id === pId);
                f.children = f.children.filter(c => c.id !== id);
                if (!f.children.length) db = db.filter(x => x.id !== pId);
                else f.color = getFolderAverageColor(f.children);
            } else {
                db = db.filter(x => x.id !== id);
            }
            save();
        }

        function startDrag(id, pId) { dragId = id; dragSourceFolderId = pId; }

        function handleGlobalDrop(e) {
            if ((e.target.id === 'grid' || e.target.tagName === 'BODY') && dragId && dragSourceFolderId) {
                const folder = db.find(f => f.id === dragSourceFolderId);
                const idx = folder.children.findIndex(c => c.id === dragId);
                const item = folder.children.splice(idx, 1)[0];
                db.push(item);
                if (!folder.children.length) db = db.filter(f => f.id !== dragSourceFolderId);
                else folder.color = getFolderAverageColor(folder.children);
                save();
            }
        }

        async function dropOnTile(targetId) {
            if (!dragId || dragId === targetId) return;
            const findAndRemove = (list, id) => {
                for(let i=0; i<list.length; i++) {
                    if(list[i].id === id) return list.splice(i, 1)[0];
                    if(list[i].children) {
                        const res = findAndRemove(list[i].children, id);
                        if(res) return res;
                    }
                }
            };
            const item = findAndRemove(db, dragId);
            const targetIdx = db.findIndex(x => x.id === targetId);
            const target = db[targetIdx];
            if (target.type === 'link') {
                const newFolder = { id: 'f' + Date.now(), type: 'folder', name: 'NUOVO GRUPPO', children: [target, item] };
                newFolder.color = getFolderAverageColor(newFolder.children);
                db.splice(targetIdx, 1, newFolder);
            } else {
                target.children.push(item);
                target.color = getFolderAverageColor(target.children);
            }
            save();
        }

        function exportData() {
            const fileName = prompt("Nome del backup:", "my_speed_dial");
            if (!fileName) return;
            const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName + ".json";
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const data = JSON.parse(ev.target.result);
                    data.forEach(item => {
                        item.id = item.id + '_' + Math.random().toString(36).substr(2, 4);
                        db.push(item);
                    });
                    save();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        // --- UI ---
        function createTile(item, pId, isMatch) {
            const div = document.createElement('div');
            div.className = 'tile' + (isMatch ? ' search-match' : '');
            const rgb = item.color.join(',');
            div.style.background = `rgba(${rgb}, 0.08)`;
            div.style.borderColor = isMatch ? 'var(--accent)' : `rgba(${rgb}, 0.2)`;

            div.draggable = true;
            div.ondragstart = () => startDrag(item.id, pId);
            div.ondragover = e => { e.preventDefault(); div.classList.add('drag-over'); };
            div.ondragleave = () => div.classList.remove('drag-over');
            div.ondrop = e => { e.preventDefault(); e.stopPropagation(); dropOnTile(item.id); };

            div.onclick = () => {
                if (item.type === 'link') window.open(item.url, '_blank');
                else { openFolderId = (openFolderId === item.id ? null : item.id); render(); }
            };

            const acts = document.createElement('div');
            acts.className = 'actions';
            
            // Bottone Edit
            const eb = document.createElement('button'); eb.className = 'btn-act'; eb.innerHTML = '✎';
            eb.onclick = e => { e.stopPropagation(); editItem(item.id, pId); };
            
            // Bottone Search Icon (solo per link)
            if(item.type === 'link') {
                const ib = document.createElement('button'); ib.className = 'btn-act'; ib.innerHTML = '🖼️';
                ib.title = "Cambia icona";
                ib.onclick = e => { e.stopPropagation(); openIconPicker(item.id, pId); };
                acts.append(ib);
            }

            const delBtn = document.createElement('button'); delBtn.className = 'btn-act'; delBtn.innerHTML = '×';
            delBtn.onclick = e => { e.stopPropagation(); deleteItem(item.id, pId); };
            
            acts.prepend(eb);
            acts.append(delBtn);

            if (item.type === 'link') {
                div.innerHTML += `
                    <div class="icon-wrap">
                        <div class="icon-glow" style="background: rgb(${rgb})"></div>
                        <img src="${item.icon}" class="icon-img">
                    </div>
                    <div class="label">${item.name}</div>
                `;
            } else {
                let icons = '<div class="folder-preview">';
                item.children.slice(0, 4).forEach(c => icons += `<img src="${c.icon}" class="mini-icon">`);
                icons += '</div>';
                div.innerHTML += icons + `<div class="label">${item.name}</div>`;
            }
            div.appendChild(acts);
            return div;
        }

        function render() {
            const container = document.getElementById('grid');
            const query = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            
            const isPickerActive = document.getElementById('icon-picker').classList.contains('active');
            document.getElementById('app-overlay').classList.toggle('active', (openFolderId !== null && !query) || isPickerActive);

            db.forEach(item => {
                let shouldShow = false;
                let isMatch = false;
                let containsMatch = false;

                if (!query) {
                    shouldShow = true;
                } else {
                    if (item.name.toLowerCase().includes(query)) {
                        shouldShow = true;
                        isMatch = true;
                    }
                    if (item.type === 'folder') {
                        containsMatch = item.children.some(c => c.name.toLowerCase().includes(query));
                        if (containsMatch) shouldShow = true;
                    }
                }

                if (shouldShow) {
                    container.appendChild(createTile(item, null, isMatch));
                    if (item.id === openFolderId || (query && containsMatch)) {
                        const expanded = document.createElement('div');
                        expanded.className = 'folder-open';
                        item.children.forEach(c => {
                            const childMatch = query && c.name.toLowerCase().includes(query);
                            if (!query || childMatch || item.id === openFolderId) {
                                expanded.appendChild(createTile(c, item.id, childMatch));
                            }
                        });
                        container.appendChild(expanded);
                    }
                }
            });

            if (!query) {
                const add = document.createElement('div');
                add.className = 'tile btn-add'; add.innerHTML = '<b>+ AGGIUNGI</b>';
                add.onclick = addItem;
                container.appendChild(add);
            }
        }

        function save() { localStorage.setItem('speed_dial_chroma', JSON.stringify(db)); render(); }
        function closeFolder() { openFolderId = null; render(); }

        render();
    </script>
</body>
</html>
