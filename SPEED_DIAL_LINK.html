<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Dial Pro - Ultimate Edition</title>
    <style>
        :root {
            --bg-center: #1a1f2c;
            --bg-outer: #080a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-outer) 100%);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .header { width: 100%; max-width: 1100px; padding: 30px 20px; z-index: 100; }
        
        #grid {
            display: grid; width: 95%; max-width: 1400px;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px; padding-bottom: 80px; z-index: 60;
        }

        #app-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 1000; display: none;
        }
        #app-overlay.active { display: block; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; background: #161b26; border: 1px solid var(--accent);
            border-radius: 20px; padding: 25px; z-index: 1001; display: none;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
        }
        .modal.active { display: block; animation: modalIn 0.3s ease; }

        @keyframes modalIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        .input-text {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 8px; color: white; outline: none; transition: 0.3s;
        }
        .input-text:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .icon-preview-area {
            display: flex; align-items: center; gap: 15px; margin-top: 10px;
            padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px;
        }
        #current-icon-img { width: 50px; height: 50px; object-fit: contain; border-radius: 8px; background: #222; }

        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        
        .btn {
            flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: black; }
        .btn-primary:hover { filter: brightness(1.2); }
        .btn-secondary { background: var(--glass); color: white; border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        .tile {
            aspect-ratio: 16 / 10; border-radius: 18px;
            background: var(--glass); border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
            user-select: none;
        }
        .tile:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.4); }
        .tile.search-match { border-color: var(--accent) !important; box-shadow: 0 0 20px var(--accent); }
        .tile.drag-over { background: rgba(0, 242, 255, 0.15) !important; transform: scale(1.05); }

        .icon-wrap { width: 50px; height: 50px; position: relative; margin-bottom: 10px; }
        .icon-img { width: 100%; height: 100%; object-fit: contain; z-index: 2; position: relative; }
        .icon-glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: blur(16px); opacity: 0.6; z-index: 1; border-radius: 50%; }

        .label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; text-align: center; padding: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 90%; }

        .folder-preview { display: grid; grid-template-columns: repeat(2, 22px); gap: 4px; margin-bottom: 8px; }
        .mini-icon { width: 22px; height: 22px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 4px; }

        .folder-open {
            grid-column: 1 / -1; background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 35px; display: grid; gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            backdrop-filter: blur(20px); animation: fadeInNormal 0.4s ease;
        }

        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 30; }
        .tile:hover .actions { opacity: 1; }
        .btn-act { width: 26px; height: 26px; border-radius: 6px; border: none; background: rgba(0,0,0,0.8); color: white; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .btn-act:hover { background: var(--accent); color: black; }

        .btn-add { border: 2px dashed var(--glass-border); clip-path: none; opacity: 0.5; cursor: copy; }
        .btn-add:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

        .search-bar {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 15px 22px; border-radius: 12px; color: white; font-size: 1rem;
            backdrop-filter: blur(10px); outline: none; transition: 0.3s;
        }
        .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
        .btn-tool { background: var(--glass); border: 1px solid var(--glass-border); color: #ccc; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 600px) {
            #grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; }
            .folder-open { padding: 15px; grid-template-columns: repeat(2, 1fr); }
            .actions { opacity: 1; transform: scale(0.8); }
        }

        @keyframes fadeInNormal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="handleGlobalDrop(event)">

    <div id="app-overlay" onclick="closeModal()"></div>

    <div id="main-modal" class="modal">
        <h3 id="modal-title" style="margin:0 0 20px 0; color:var(--accent); text-transform: uppercase; font-size: 1.1rem;">Modifica Elemento</h3>
        
        <div class="form-group" id="group-url">
            <label>Link (URL)</label>
            <input type="text" id="field-url" class="input-text" placeholder="https://www.google.com" oninput="handleUrlInput(this.value)">
        </div>

        <div class="form-group">
            <label>Nome Visualizzato</label>
            <input type="text" id="field-name" class="input-text" placeholder="Esempio: GOOGLE">
        </div>

        <div class="form-group" id="group-desc">
            <label>Descrizione (Opzionale)</label>
            <input type="text" id="field-desc" class="input-text" placeholder="Note extra...">
        </div>

        <div id="group-icon-custom">
            <label style="font-size: 0.7rem; color: var(--accent); font-weight: bold;">ICONA</label>
            <div class="icon-preview-area">
                <img id="current-icon-img" src="" alt="Icon">
                <div style="display:flex; flex-direction:column; gap:5px; flex:1">
                    <button class="btn btn-secondary" style="padding:6px; font-size:0.6rem" onclick="searchOnGoogle()">Cerca su Google</button>
                    <button class="btn btn-secondary" style="padding:6px; font-size:0.6rem" onclick="pasteImage()">Incolla Immagine</button>
                </div>
            </div>
            <p style="font-size: 0.6rem; color: #888; margin-top: 5px;">* L'icona si aggiorna automaticamente inserendo l'URL.</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="saveModalData()">Salva</button>
        </div>
    </div>

    <div class="header">
        <input type="text" class="search-bar" id="search" placeholder="Cerca link, gruppi o descrizioni..." oninput="render()">
        <div class="toolbar">
            <button class="btn-tool" onclick="importData()">Importa</button>
            <button class="btn-tool" onclick="exportData()">Esporta</button>
        </div>
    </div>

    <div id="grid"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('speed_dial_v5')) || [];
        let openFolderId = null;
        let dragId = null;
        let dragSourceFolderId = null;
        let currentEditId = null;
        let currentParentId = null;
        let tempCustomIcon = null;
        let fetchTimeout = null;

        // --- AUTOMATIC FETCH LOGIC ---
        async function handleUrlInput(url) {
            if (!url || url.length < 5) return;
            if (document.getElementById('group-url').style.display === 'none') return; // Se è un folder

            clearTimeout(fetchTimeout);
            fetchTimeout = setTimeout(async () => {
                const titleElement = document.getElementById('modal-title');
                const originalTitle = titleElement.innerText;
                titleElement.innerText = "Recupero informazioni...";

                if (!url.startsWith('http')) url = 'https://' + url;
                
                try {
                    // Usiamo un servizio di analisi meta o semplicemente estraiamo il dominio per l'icona
                    const domain = new URL(url).hostname;
                    
                    // 1. Set Icona High Res via Google Favicon service
                    const iconUrl = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
                    tempCustomIcon = iconUrl;
                    document.getElementById('current-icon-img').src = iconUrl;

                    // 2. Se il nome è vuoto, proviamo a ricavare un nome pulito dal dominio
                    const nameField = document.getElementById('field-name');
                    if (!nameField.value) {
                        let guessedName = domain.replace('www.', '').split('.')[0];
                        nameField.value = guessedName.toUpperCase();
                    }

                    // 3. Proviamo a recuperare Title e Description via DuckDuckGo API (molto veloce e cors-friendly per metadata base)
                    const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(url)}&format=json`);
                    const data = await response.json();
                    
                    if (data.Heading && !nameField.value) nameField.value = data.Heading.toUpperCase();
                    if (data.AbstractText && !document.getElementById('field-desc').value) {
                        document.getElementById('field-desc').value = data.AbstractText.substring(0, 60) + "...";
                    }

                } catch (e) {
                    console.log("Errore fetch automatico:", e);
                } finally {
                    titleElement.innerText = originalTitle;
                }
            }, 600);
        }

        // --- CORE LOGIC ---
        async function analyzeIcon(url, customIcon = null) {
            return new Promise(resolve => {
                const iconUrl = customIcon || `https://www.google.com/s2/favicons?sz=128&domain=${url}`;
                const proxyUrl = iconUrl.startsWith('data:') ? iconUrl : `https://images.weserv.nl/?url=${encodeURIComponent(iconUrl.replace(/^https?:\/\//, ''))}&w=50&h=50`;
                
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = proxyUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 50; canvas.height = 50;
                    ctx.drawImage(img, 0, 0, 50, 50);
                    const pixels = ctx.getImageData(0, 0, 50, 50).data;
                    let r = 0, g = 0, b = 0, count = 0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        if (pixels[i + 3] > 150) { r += pixels[i]; g += pixels[i+1]; b += pixels[i+2]; count++; }
                    }
                    const finalColor = count === 0 ? [100, 100, 100] : [Math.round(r/count), Math.round(g/count), Math.round(b/count)];
                    resolve({ icon: iconUrl, color: finalColor });
                };
                img.onerror = () => resolve({ icon: iconUrl, color: [120, 120, 120] });
            });
        }

        function getFolderAverageColor(children) {
            if (!children || !children.length) return [100, 100, 100];
            let r = 0, g = 0, b = 0;
            children.forEach(c => { r += c.color[0]; g += c.color[1]; b += c.color[2]; });
            return [Math.round(r/children.length), Math.round(g/children.length), Math.round(b/children.length)];
        }

        // --- UI MODAL MANAGEMENT ---
        function openModal(id = null, pId = null, isFolder = false) {
            currentEditId = id;
            currentParentId = pId;
            tempCustomIcon = null;
            
            const modal = document.getElementById('main-modal');
            const overlay = document.getElementById('app-overlay');
            const title = document.getElementById('modal-title');
            
            document.getElementById('field-url').value = '';
            document.getElementById('field-name').value = '';
            document.getElementById('field-desc').value = '';
            document.getElementById('current-icon-img').src = 'https://www.google.com/s2/favicons?sz=128&domain=google.com';
            
            document.getElementById('group-url').style.display = isFolder ? 'none' : 'block';
            document.getElementById('group-desc').style.display = isFolder ? 'none' : 'block';
            document.getElementById('group-icon-custom').style.display = isFolder ? 'none' : 'block';

            if (id) {
                title.innerText = "Modifica Elemento";
                const list = pId ? db.find(f => f.id === pId).children : db;
                const item = list.find(x => x.id === id);
                document.getElementById('field-name').value = item.name;
                if (!isFolder) {
                    document.getElementById('field-url').value = item.url;
                    document.getElementById('field-desc').value = item.desc || '';
                    document.getElementById('current-icon-img').src = item.icon;
                    tempCustomIcon = item.icon;
                }
            } else {
                title.innerText = isFolder ? "Nuovo Gruppo" : "Nuovo Link";
            }

            modal.classList.add('active');
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('main-modal').classList.remove('active');
            document.getElementById('app-overlay').classList.remove('active');
        }

        async function saveModalData() {
            let url = document.getElementById('field-url').value;
            let name = document.getElementById('field-name').value.toUpperCase();
            let desc = document.getElementById('field-desc').value;
            const isFolder = document.getElementById('group-url').style.display === 'none';

            if (!name) { alert("Inserisci un nome!"); return; }
            if (!isFolder && !url) { alert("Inserisci un URL!"); return; }
            if (!isFolder && !url.startsWith('http')) url = 'https://' + url;

            let finalData;
            if (!isFolder) {
                const data = await analyzeIcon(url, tempCustomIcon);
                finalData = { ...data, name, url, desc };
            } else {
                finalData = { name };
            }

            if (currentEditId) {
                const list = currentParentId ? db.find(f => f.id === currentParentId).children : db;
                const item = list.find(x => x.id === currentEditId);
                Object.assign(item, finalData);
                if (currentParentId) {
                    const p = db.find(f => f.id === currentParentId);
                    p.color = getFolderAverageColor(p.children);
                }
            } else {
                const newItem = {
                    id: (isFolder ? 'f' : 't') + Date.now(),
                    type: isFolder ? 'folder' : 'link',
                    ...finalData,
                    children: isFolder ? [] : undefined
                };
                db.push(newItem);
            }

            save();
            closeModal();
        }

        function searchOnGoogle() {
            const name = document.getElementById('field-name').value || "App";
            window.open(`https://www.google.com/search?q=${encodeURIComponent(name)}+icon+logo+png&tbm=isch`, '_blank');
        }

        async function pasteImage() {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    if (item.types.includes('image/png') || item.types.includes('image/jpeg')) {
                        const blob = await item.getType(item.types.find(t => t.includes('image')));
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            tempCustomIcon = e.target.result;
                            document.getElementById('current-icon-img').src = tempCustomIcon;
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
                alert("Copia un'immagine da Google e riprova.");
            } catch (err) {
                alert("Errore accesso appunti.");
            }
        }

        function deleteItem(id, pId) {
            if (!confirm("Eliminare definitivamente?")) return;
            if (pId) {
                const f = db.find(x => x.id === pId);
                f.children = f.children.filter(c => c.id !== id);
                if (!f.children.length) db = db.filter(x => x.id !== pId);
                else f.color = getFolderAverageColor(f.children);
            } else db = db.filter(x => x.id !== id);
            save();
        }

        function save() { localStorage.setItem('speed_dial_v5', JSON.stringify(db)); render(); }

        function createTile(item, pId, isMatch) {
            const div = document.createElement('div');
            div.className = 'tile' + (isMatch ? ' search-match' : '');
            const rgb = item.color ? item.color.join(',') : '100,100,100';
            div.style.background = `rgba(${rgb}, 0.08)`;
            div.style.borderColor = isMatch ? 'var(--accent)' : `rgba(${rgb}, 0.2)`;

            div.draggable = true;
            div.ondragstart = () => { dragId = item.id; dragSourceFolderId = pId; };
            div.ondragover = e => { e.preventDefault(); div.classList.add('drag-over'); };
            div.ondragleave = () => div.classList.remove('drag-over');
            div.ondrop = e => { e.preventDefault(); e.stopPropagation(); div.classList.remove('drag-over'); dropOnTile(item.id); };

            div.onclick = () => {
                if (item.type === 'link') window.open(item.url, '_blank');
                else { openFolderId = (openFolderId === item.id ? null : item.id); render(); }
            };

            const acts = document.createElement('div');
            acts.className = 'actions';
            const editBtn = document.createElement('button'); editBtn.className = 'btn-act'; editBtn.innerHTML = '✎';
            editBtn.onclick = e => { e.stopPropagation(); openModal(item.id, pId, item.type === 'folder'); };
            const delBtn = document.createElement('button'); delBtn.className = 'btn-act'; delBtn.innerHTML = '×';
            delBtn.onclick = e => { e.stopPropagation(); deleteItem(item.id, pId); };
            acts.append(editBtn, delBtn);

            if (item.type === 'link') {
                div.innerHTML = `
                    <div class="icon-wrap">
                        <div class="icon-glow" style="background:rgb(${rgb})"></div>
                        <img src="${item.icon}" class="icon-img" loading="lazy">
                    </div>
                    <div class="label">${item.name}</div>
                `;
            } else {
                let icons = '<div class="folder-preview">';
                (item.children || []).slice(0, 4).forEach(c => icons += `<img src="${c.icon}" class="mini-icon">`);
                div.innerHTML = icons + `</div><div class="label">${item.name}</div>`;
            }
            div.appendChild(acts);
            return div;
        }

        function render() {
            const container = document.getElementById('grid');
            const query = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            
            db.forEach(item => {
                const matchMe = item.name.toLowerCase().includes(query) || (item.desc && item.desc.toLowerCase().includes(query));
                const matchChildren = item.type === 'folder' && item.children.some(c => c.name.toLowerCase().includes(query));
                if (!query || matchMe || matchChildren) {
                    container.appendChild(createTile(item, null, query && matchMe));
                    if (item.id === openFolderId || (query && matchChildren)) {
                        const exp = document.createElement('div');
                        exp.className = 'folder-open';
                        item.children.forEach(c => exp.appendChild(createTile(c, item.id, query && c.name.toLowerCase().includes(query))));
                        container.appendChild(exp);
                    }
                }
            });

            if (!query) {
                const addLink = document.createElement('div');
                addLink.className = 'tile btn-add'; addLink.innerHTML = '<b>+ LINK</b>';
                addLink.onclick = () => openModal(null, null, false);
                const addFolder = document.createElement('div');
                addFolder.className = 'tile btn-add'; addFolder.innerHTML = '<b>+ GRUPPO</b>';
                addFolder.onclick = () => openModal(null, null, true);
                container.append(addLink, addFolder);
            }
        }

        function handleGlobalDrop(e) {
            if ((e.target.id === 'grid' || e.target.tagName === 'BODY') && dragId && dragSourceFolderId) {
                const f = db.find(x => x.id === dragSourceFolderId);
                const idx = f.children.findIndex(c => c.id === dragId);
                db.push(f.children.splice(idx, 1)[0]);
                if (!f.children.length) db = db.filter(x => x.id !== dragSourceFolderId);
                else f.color = getFolderAverageColor(f.children);
                save();
            }
        }

        async function dropOnTile(targetId) {
            if (!dragId || dragId === targetId) return;
            const findAndRemove = (list, id) => {
                for(let i=0; i<list.length; i++) {
                    if(list[i].id === id) return list.splice(i, 1)[0];
                    if(list[i].children) { const r = findAndRemove(list[i].children, id); if(r) return r; }
                }
            };
            const item = findAndRemove(db, dragId);
            const tIdx = db.findIndex(x => x.id === targetId);
            const target = db[tIdx];
            if (target.type === 'link') {
                const newF = { id: 'f'+Date.now(), type: 'folder', name: 'NUOVO GRUPPO', children: [target, item] };
                newF.color = getFolderAverageColor(newF.children);
                db.splice(tIdx, 1, newF);
            } else {
                target.children.push(item);
                target.color = getFolderAverageColor(target.children);
            }
            save();
        }

async function exportData() {
    // Configurazione del selettore di file
    const options = {
        suggestedName: `speeddial_pro_${new Date().toISOString().slice(0,10)}.json`,
        types: [{
            description: 'JSON File',
            accept: {'application/json': ['.json']},
        }],
    };

    try {
        // 1. Chiede all'utente dove salvare e come chiamare il file
        // Questa riga apre la finestra di dialogo nativa
        const handle = await window.showSaveFilePicker(options);
        
        // 2. Crea uno stream di scrittura
        const writable = await handle.createWritable();
        
        // 3. Scrive i dati dal database
        await writable.write(JSON.stringify(db, null, 2));
        
        // 4. Chiude lo stream e salva fisicamente il file
        await writable.close();
        
        console.log("File salvato con successo!");
    } catch (err) {
        // Gestisce l'annullamento dell'utente o errori di permesso
        if (err.name !== 'AbortError') {
            console.error("Errore durante il salvataggio:", err);
            alert("Errore nel salvataggio del file.");
        }
    }
}
        function importData() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    try { const imported = JSON.parse(ev.target.result); if(Array.isArray(imported)) { db = imported; save(); } } 
                    catch(err) { alert("Errore file."); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        render();
    </script>
</body>
</html>
