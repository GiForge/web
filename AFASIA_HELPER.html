<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parla con Me - Assistente Protetto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfcfb; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // CHIAVE CIFRATA (La tua configurazione attuale)
        const ENCRYPTED_KEY = "U2FsdGVkX19nEQwFjkO574PnWoIWqp0AQ4bwWsSxG4WHMgrlCwF0rKqDtICSI6hJ2wSje8vpucowR6atmEzGAw=="; 

        const DEFAULT_CATEGORIES = [
            { id: 'casa', label: 'Casa', icon: 'home', color: 'bg-blue-100 text-blue-700' },
            { id: 'cibo', label: 'Cibo', icon: 'utensils', color: 'bg-orange-100 text-orange-700' },
            { id: 'dolore', label: 'Dolore', icon: 'heart-pulse', color: 'bg-red-100 text-red-700' },
            { id: 'emergenza', label: 'Emergenza', icon: 'alert-circle', color: 'bg-rose-100 text-rose-700 font-bold' },
        ];

        const AphasiaApp = () => {
            const [isListening, setIsListening] = useState(false);
            const [activeMode, setActiveMode] = useState(null);
            const [transcript, setTranscript] = useState("");
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [results, setResults] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isAddingCategory, setIsAddingCategory] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState("");
            const [fullscreenText, setFullscreenText] = useState(null);
            const [isUnlocked, setIsUnlocked] = useState(false);
            
            const recognitionRef = useRef(null);
            const transcriptRef = useRef("");

            const unlockApp = () => {
                const password = prompt("Inserisci la password di sblocco:");
                if (!password) return;
                try {
                    const bytes = CryptoJS.AES.decrypt(ENCRYPTED_KEY, password);
                    const originalKey = bytes.toString(CryptoJS.enc.Utf8);
                    if (!originalKey.startsWith("AIza")) throw new Error();
                    sessionStorage.setItem('aph_key', originalKey);
                    setIsUnlocked(true);
                } catch (e) {
                    alert("Password errata.");
                }
            };

            useEffect(() => {
                const storedKey = sessionStorage.getItem('aph_key');
                if (storedKey) setIsUnlocked(true);
                else unlockApp();

                const savedCustom = localStorage.getItem('aph_cust_cat');
                if (savedCustom) {
                    const custom = JSON.parse(savedCustom);
                    setCategories([...DEFAULT_CATEGORIES, ...custom.map(c => ({...c, isCustom: true}))]);
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'it-IT';
                    recognitionRef.current.onresult = (e) => {
                        let text = "";
                        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                        setTranscript(text);
                        transcriptRef.current = text;
                    };
                    recognitionRef.current.onend = () => { setIsListening(false); setActiveMode(null); };
                }
            }, []);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [categories, results, isListening, isAddingCategory, isUnlocked]);

            const handleProcessAI = async (text) => {
                if (!text.trim() || !window.GoogleGenerativeAI) return;
                const apiKey = sessionStorage.getItem('aph_key');
                if (!apiKey) return;

                setIsLoading(true);
                try {
                    const genAI = new window.GoogleGenerativeAI(apiKey);
                    // PATCH: Modello impostato correttamente con prefisso 'models/'
                    const model = genAI.getGenerativeModel({ model: "models/gemini-3-flash-preview" });
                    const catLabel = categories.find(c => c.id === selectedCategory)?.label || "generale";
                    
                    const prompt = `L'utente ha l'afasia. Ha provato a dire: "${text}". Contesto: ${catLabel}. Genera 3 frasi brevi (max 5 parole) in prima persona che vorrebbe dire. Rispondi SOLO in JSON: {"completions": ["f1", "f2", "f3"]}`;
                    
                    const result = await model.generateContent(prompt);
                    const responseText = result.response.text().replace(/```json|```/g, "").trim();
                    setResults(JSON.parse(responseText));
                } catch (e) { 
                    console.error(e);
                    setResults({ completions: ["Puoi ripetere?", "Ho bisogno di aiuto", "Mi sento stanco"] });
                }
                setIsLoading(false);
            };

            const startListening = (mode) => {
                if (isListening) return;
                setTranscript(""); transcriptRef.current = ""; setResults(null);
                setIsListening(true); setActiveMode(mode);
                try { recognitionRef.current?.start(); } catch (err) { setIsListening(false); }
            };

            const stopListening = () => {
                if (!isListening) return;
                recognitionRef.current?.stop();
                setIsListening(false); setActiveMode(null);
                setTimeout(() => handleProcessAI(transcriptRef.current), 500);
            };

            const addCategory = () => {
                if (!newCategoryName.trim()) return;
                const newCat = { id: Date.now().toString(), label: newCategoryName, icon: 'tag', color: 'bg-gray-100 text-gray-700', isCustom: true };
                const updated = [...categories, newCat];
                setCategories(updated);
                localStorage.setItem('aph_cust_cat', JSON.stringify(updated.filter(c => c.isCustom)));
                setNewCategoryName(""); setIsAddingCategory(false);
            };

            const deleteCategory = (id) => {
                const updated = categories.filter(c => c.id !== id);
                setCategories(updated);
                localStorage.setItem('aph_cust_cat', JSON.stringify(updated.filter(c => c.isCustom)));
            };

            const speak = (phrase) => {
                const u = new SpeechSynthesisUtterance(phrase);
                u.lang = 'it-IT'; u.rate = 0.9;
                window.speechSynthesis.speak(u);
                setFullscreenText(phrase);
            };

            return (
                <div className="min-h-screen pb-20 no-select bg-[#fdfcfb]">
                    <header className="p-6 bg-white border-b sticky top-0 z-20 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-serif font-bold text-gray-900">Parla con Me</h1>
                            <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest">{isUnlocked ? "● Sbloccato" : "○ Bloccato"}</p>
                        </div>
                        <button onClick={() => {sessionStorage.clear(); location.reload();}} className="p-2 bg-red-50 text-red-600 rounded-lg">
                            <i data-lucide="lock" className="w-4 h-4"></i>
                        </button>
                    </header>

                    <main className={`max-w-xl mx-auto p-6 space-y-8 ${!isUnlocked ? 'opacity-20 pointer-events-none' : ''}`}>
                        {/* Sezione Categorie */}
                        <section className="space-y-4">
                            <div className="flex justify-between items-center">
                                <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest">Argomento</label>
                                <button onClick={() => setIsAddingCategory(!isAddingCategory)} className="text-[11px] font-bold text-blue-600 uppercase bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide={isAddingCategory ? "x" : "plus"} className="w-3 h-3 inline mr-1"></i>
                                    {isAddingCategory ? "Chiudi" : "Aggiungi"}
                                </button>
                            </div>

                            {isAddingCategory && (
                                <div className="flex gap-2">
                                    <input value={newCategoryName} onChange={e=>setNewCategoryName(e.target.value)} placeholder="Esempio: Famiglia" className="flex-1 border rounded-xl px-4 py-2 text-sm"/>
                                    <button onClick={addCategory} className="bg-black text-white px-4 rounded-xl text-sm font-bold">OK</button>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-3">
                                {categories.map(cat => (
                                    <button key={cat.id} onClick={() => setSelectedCategory(selectedCategory === cat.id ? null : cat.id)} 
                                        className={`relative flex items-center gap-3 p-4 rounded-2xl border-2 transition-all ${selectedCategory === cat.id ? 'border-black bg-black text-white' : cat.color + ' border-transparent'}`}>
                                        <i data-lucide={cat.icon} className="w-5 h-5"></i>
                                        <span className="text-sm font-bold">{cat.label}</span>
                                        {cat.isCustom && <i data-lucide="trash-2" onClick={(e) => {e.stopPropagation(); deleteCategory(cat.id);}} className="w-3 h-3 ml-auto opacity-50 hover:text-red-500"></i>}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Pulsante Microfono */}
                        <section className="flex flex-col items-center gap-6 py-10 bg-white rounded-3xl border shadow-sm">
                            <button onClick={() => isListening ? stopListening() : startListening('toggle')}
                                className={`w-28 h-28 rounded-full shadow-xl flex flex-col items-center justify-center text-white transition-all ${isListening ? 'bg-red-500 animate-pulse' : 'bg-gray-900'}`}>
                                <i data-lucide={isListening ? "square" : "mic"} className="w-10 h-10 mb-1"></i>
                                <span className="text-[9px] font-black">{isListening ? 'STOP' : 'PARLA'}</span>
                            </button>
                            
                            <button onMouseDown={() => startListening('push')} onMouseUp={stopListening} onTouchStart={() => startListening('push')} onTouchEnd={stopListening}
                                className={`w-full max-w-xs py-4 rounded-2xl font-black text-xs tracking-widest transition-all ${activeMode === 'push' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-400'}`}>
                                TIENI PREMUTO PER PARLARE
                            </button>
                            
                            <div className="px-6 text-center text-lg font-medium">{transcript || <span className="text-gray-300">...</span>}</div>
                        </section>

                        {/* Risultati */}
                        <section className="space-y-3">
                            {isLoading && <div className="text-center text-blue-600 font-bold animate-bounce uppercase text-xs">Gemini sta scrivendo...</div>}
                            {results?.completions.map((phrase, i) => (
                                <button key={i} onClick={() => speak(phrase)} className="w-full bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-center hover:border-blue-500 transition-all">
                                    <span className="text-xl font-bold text-gray-800 leading-tight">{phrase}</span>
                                    <i data-lucide="volume-2" className="text-blue-500 shrink-0 ml-4"></i>
                                </button>
                            ))}
                        </section>
                    </main>

                    {/* Overlay Fullscreen */}
                    <AnimatePresence>
                        {fullscreenText && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="fixed inset-0 z-50 bg-white flex flex-col items-center justify-center p-8 text-center">
                                <h2 className="text-5xl font-serif font-bold mb-16">{fullscreenText}</h2>
                                <div className="flex gap-4">
                                    <button onClick={() => speak(fullscreenText)} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">RIPETI</button>
                                    <button onClick={() => setFullscreenText(null)} className="bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">CHIUDI</button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AphasiaApp />);
    </script>
</body>
</html>
