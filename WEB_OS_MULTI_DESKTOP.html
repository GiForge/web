<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise OS v8.5 - Auto-Unzip Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --accent: #0078d7; --taskbar: #1a1a1a; --win-bg: #f3f3f3; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #111; }
        #canvas { position: absolute; top: 0; left: 0; height: 100%; width: 5000px; transition: left 0.5s ease; }

        /* Window & Controls */
        .window { position: absolute; background: var(--win-bg); border-radius: 8px; display: flex; flex-direction: column; color: #000; min-width: 320px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; overflow: hidden; }
        .window.active { z-index: 500; border: 2px solid var(--accent); }
        .window.maximized { width: 100vw !important; height: calc(100vh - 48px) !important; top: 0 !important; left: 0 !important; border-radius: 0; }
        .win-header { height: 40px; background: #ddd; display: flex; align-items: center; justify-content: space-between; cursor: move; }
        .win-title { padding-left: 12px; font-weight: bold; flex-grow: 1; pointer-events: none; }
        .win-controls { display: flex; height: 100%; }
        .win-btn { width: 45px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .win-btn:hover { background: rgba(0,0,0,0.1); }
        .win-btn.close:hover { background: #e81123; color: white; }

        /* Icons */
        .desktop-icon { position: absolute; width: 85px; text-align: center; cursor: pointer; z-index: 10; }
        .icon-img { font-size: 35px; display: block; pointer-events: none; }
        .desktop-icon small { font-size: 11px; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        /* Setup Card */
        #overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .card { background: #222; padding: 20px; border-radius: 12px; text-align: center; width: 90%; max-width: 360px; border: 1px solid #444; }
        #qrcode { background: white; padding: 10px; margin: 15px auto; border-radius: 5px; width: 200px; height: 200px; }
        .setup-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        
        #taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background: var(--taskbar); display: flex; align-items: center; padding: 0 15px; z-index: 2000; }
        #dock { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="card">
        <h3>Enterprise OS v8.5</h3>
        <div id="setup-initial">
            <button class="setup-btn" onclick="boot('server')">MODALITÀ SERVER</button>
            <button class="setup-btn" style="background:#444" onclick="boot('client')">MODALITÀ CLIENT</button>
            <button class="setup-btn" style="background:#333" onclick="toggleFS()">FULLSCREEN IMMERSIVO</button>
        </div>
        <div id="setup-conn" style="display:none">
            <div id="qrcode"></div>
            <button class="setup-btn" style="background:#444" onclick="copySig()">COPIA CODICE ZIP</button>
            <button class="setup-btn" onclick="startScanner()">SCANSIONA DAL MONITOR</button>
            <textarea id="rSig" style="width:100%; height:40px; margin-top:10px; background:#000; color:#0f0; font-size:9px;" placeholder="Incolla codice compresso qui..."></textarea>
            <button class="setup-btn" style="background:#28a745" onclick="connect()">CONNETTI (AUTO-UNZIP)</button>
        </div>
    </div>
</div>

<div id="viewport"><div id="canvas"></div></div>
<div id="taskbar">
    <div onclick="toggleStart()" style="font-size:24px; cursor:pointer; margin-right:15px;">⊞</div>
    <div id="dock"></div>
    <div style="margin-left:auto; display:flex; gap:15px; font-size:12px;">
        <span onclick="toggleFS()" style="cursor:pointer">⛶</span>
        <span id="clock">00:00</span>
    </div>
</div>
<div id="start-menu" style="position:fixed; bottom:55px; left:10px; width:250px; background:#1e1e1e; display:none; border-radius:10px; padding:10px; z-index:3000; border:1px solid #444;"></div>

<script>
    let role, pc, dataChannel, state = { windows: [], icons: [], sW: window.innerWidth, activeWin: null };

    const apps = [
        { id: 'app_menu', name: 'Menu', icon: '🌉', url: 'MENU.html' },
        { id: 'app_cam', name: 'Scanner', icon: '📷', url: 'CAM_SCANNER.html' },
        { id: 'app_clock', name: 'Orologio', icon: '⏰', url: 'CLOCK_NIGHT_DAY.html' },
        { id: 'app_ebook', name: 'Ebook', icon: '📖', url: 'EBOOK_READER.html' },
        { id: 'app_invaders', name: 'Invaders', icon: '👾', url: 'GAME_SPACE_INVADERS.html' },
        { id: 'app_tetris', name: 'Tetris', icon: '🧱', url: 'GAME_TETRIS.html' },
        { id: 'app_agenda', name: 'Agenda', icon: '📅', url: 'LUXURY_AGENDA.html' },
        { id: 'app_word', name: 'Word', icon: '📄', url: 'WEB_OFFICE_WORD.html' },
        { id: 'app_pass', name: 'Passwd', icon: '🔑', url: 'PASSWORD_MANAGER.html' },
        { id: 'app_gantt', name: 'Gantt', icon: '📊', url: 'WORK_GANTT_PROJECT.html' }
    ];

    // --- LOGICA ZIP/UNZIP AUTOMATICA ---
    function zip(str) {
        const bin = new TextEncoder().encode(str);
        const cmp = pako.deflate(bin);
        return btoa(String.fromCharCode.apply(null, cmp));
    }

    function unzip(b64) {
        try {
            const str = atob(b64);
            const bin = new Uint8Array(str.length);
            for(let i=0; i<str.length; i++) bin[i] = str.charCodeAt(i);
            const raw = pako.inflate(bin);
            return new TextDecoder().decode(raw);
        } catch(e) { 
            console.error("Errore decompressione:", e);
            return b64; // Fallback se non è zippato
        }
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function boot(m) {
        role = m;
        document.getElementById('setup-initial').style.display = 'none';
        document.getElementById('setup-conn').style.display = 'block';
        initNetwork();
        if(role === 'server') {
            state.icons = apps.map((a, i) => ({ ...a, x: 20 + Math.floor(i/7)*90, y: 20 + (i%7)*90 }));
            initStartMenu();
        }
    }

    function initNetwork() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.onicecandidate = e => {
            if(!e.candidate) {
                // Sfoltimento SDP per compressione estrema
                let sdp = pc.localDescription.sdp.split('\r\n').filter(l => !l.startsWith('a=extmap') && !l.startsWith('a=rtcp')).join('\r\n');
                const compressed = zip(JSON.stringify({t: pc.localDescription.type, s: sdp}));
                window.localSig = compressed;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: compressed, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.L });
            }
        };
        if(role === 'server') {
            dataChannel = pc.createDataChannel("os");
            setupDC(dataChannel);
            pc.createOffer().then(d => pc.setLocalDescription(d));
        } else { pc.ondatachannel = e => setupDC(e.channel); }
    }

    async function connect() {
        try {
            const val = document.getElementById('rSig').value.trim();
            // UNZIP AUTOMATICO PRIMA DELL'USO
            const decompressed = unzip(val);
            const data = JSON.parse(decompressed);
            await pc.setRemoteDescription(new RTCSessionDescription({type: data.t, sdp: data.s}));
            if(role === 'client') {
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
            }
        } catch(e) { alert("Dati non validi. Assicurati di aver scansionato o incollato il codice ZIP."); }
    }

    function setupDC(chan) {
        dataChannel = chan;
        dataChannel.onopen = () => { document.getElementById('overlay').style.display = 'none'; sync(); };
        dataChannel.onmessage = e => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'SYNC') { state = msg.payload; updateDOM(); }
            if(msg.type === 'ACTION' && role === 'server') handleAction(msg.action);
        };
    }

    function handleAction(a) {
        let win = state.windows.find(w => w.id === a.id);
        switch(a.type) {
            case 'OPEN':
                const id = 'w' + Date.now();
                state.windows.push({ ...a.app, id, x: a.x, y: 60, w: 700, h: 450, max: false, min: false });
                state.activeWin = id; break;
            case 'MOVE': if(win) { win.x = a.x; win.y = a.y; state.activeWin = win.id; } break;
            case 'CLOSE': state.windows = state.windows.filter(w => w.id !== a.id); break;
            case 'MAX': if(win) { win.max = !win.max; state.activeWin = win.id; } break;
            case 'MIN': if(win) win.min = true; break;
            case 'RESTORE': if(win) { win.min = false; state.activeWin = win.id; } break;
            case 'FOCUS': state.activeWin = a.id; break;
        }
        sync();
    }

    function send(a) {
        if(role === 'server') handleAction(a);
        else if(dataChannel?.readyState === 'open') dataChannel.send(JSON.stringify({type:'ACTION', action: a}));
    }

    function sync() {
        if(role === 'server' && dataChannel?.readyState === 'open') {
            state.sW = window.innerWidth;
            dataChannel.send(JSON.stringify({type:'SYNC', payload: state}));
        }
        updateDOM();
    }

    function updateDOM() {
        const canvas = document.getElementById('canvas');
        canvas.style.left = role === 'client' ? `-${state.sW}px` : `0px`;

        state.icons.forEach(icon => {
            let el = document.getElementById(icon.id);
            if(!el) {
                el = document.createElement('div'); el.id = icon.id; el.className = 'desktop-icon';
                el.innerHTML = `<span class="icon-img">${icon.icon}</span><small>${icon.name}</small>`;
                el.onclick = () => send({type:'OPEN', app: icon, x: role==='client' ? state.sW + 50 : 50});
                canvas.appendChild(el);
            }
            el.style.transform = `translate(${icon.x}px, ${icon.y}px)`;
        });

        const currentIds = state.windows.map(w => w.id);
        document.querySelectorAll('.window').forEach(w => { if(!currentIds.includes(w.id)) w.remove(); });

        state.windows.forEach(win => {
            let el = document.getElementById(win.id);
            if(!el) {
                el = document.createElement('div'); el.id = win.id; el.className = 'window';
                el.innerHTML = `
                    <div class="win-header">
                        <div class="win-title">${win.name}</div>
                        <div class="win-controls">
                            <div class="win-btn" onclick="event.stopPropagation(); send({type:'MIN', id:'${win.id}'})">－</div>
                            <div class="win-btn" onclick="event.stopPropagation(); send({type:'MAX', id:'${win.id}'})">▢</div>
                            <div class="win-btn close" onclick="event.stopPropagation(); send({type:'CLOSE', id:'${win.id}'})">✕</div>
                        </div>
                    </div>
                    <div class="win-content"><iframe src="${win.url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
                
                el.onpointerdown = (e) => {
                    if(e.target.closest('.win-btn')) return;
                    send({type: 'FOCUS', id: win.id});
                    if(win.max) return;
                    let sX = e.clientX - win.x; let sY = e.clientY - win.y;
                    document.onpointermove = (ev) => {
                        send({type:'MOVE', id:win.id, x: ev.clientX - sX, y: ev.clientY - sY});
                    };
                    document.onpointerup = () => document.onpointermove = null;
                };
                canvas.appendChild(el);
            }
            el.classList.toggle('active', state.activeWin === win.id);
            el.classList.toggle('maximized', win.max);
            el.style.display = win.min ? 'none' : 'flex';
            if(!win.max) {
                el.style.transform = `translate(${win.x}px, ${win.y}px)`;
                el.style.width = win.w + 'px'; el.style.height = win.h + 'px';
            }
        });

        const dock = document.getElementById('dock'); dock.innerHTML = '';
        state.windows.forEach(win => {
            const item = document.createElement('div'); item.style.cursor="pointer";
            item.innerHTML = win.icon;
            item.onclick = () => send(win.min ? {type:'RESTORE', id:win.id} : {type:'FOCUS', id:win.id});
            dock.appendChild(item);
        });
    }

    function toggleStart() {
        const sm = document.getElementById('start-menu');
        sm.style.display = sm.style.display === 'block' ? 'none' : 'block';
    }

    function initStartMenu() {
        const sm = document.getElementById('start-menu');
        apps.forEach(a => {
            const d = document.createElement('div'); d.style.padding = "10px"; d.style.cursor="pointer";
            d.innerHTML = `${a.icon} ${a.name}`; d.style.borderBottom = "1px solid #333";
            d.onclick = () => { send({type:'OPEN', app: a, x: role==='client' ? state.sW + 50 : 50}); toggleStart(); };
            sm.appendChild(d);
        });
    }

    function startScanner() {
        const scanner = new Html5Qrcode("qrcode");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (text) => {
            document.getElementById('rSig').value = text;
            scanner.stop();
            connect();
        });
    }

    function copySig() { navigator.clipboard.writeText(window.localSig); alert("Copiato!"); }

    setInterval(() => {
        const d = new Date(); document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }, 1000);
</script>
</body>
</html>
