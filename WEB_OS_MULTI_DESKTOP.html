<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise OS v11.1 - Patched Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --accent: #0078d7; --taskbar-bg: rgba(20, 20, 20, 0.95); --win-bg: #f3f3f3; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; touch-action: none; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #1a1a1a; }
        #canvas { position: absolute; top: 0; left: 0; height: 100%; width: 5000px; transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        /* Window System */
        .window { position: absolute; background: var(--win-bg); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; color: #000; min-width: 300px; min-height: 200px; z-index: 100; overflow: hidden; border: 1px solid #444; }
        .window.active { z-index: 500; border: 2px solid var(--accent); }
        .window.maximized { border-radius: 0 !important; width: 100vw !important; height: calc(100vh - 48px) !important; top: 0 !important; left: 0 !important; transform: none !important; }
        .win-header { height: 40px; background: #e1e1e1; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ccc; }
        .win-drag { flex: 1; height: 100%; display: flex; align-items: center; padding-left: 12px; cursor: move; font-size: 13px; font-weight: bold; }
        .win-controls { display: flex; height: 100%; }
        .win-btn { width: 45px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .win-btn:hover { background: rgba(0,0,0,0.1); }
        .win-btn.close:hover { background: #e81123; color: white; }
        .win-content { flex: 1; background: white; position: relative; }

        /* Icons */
        .desktop-icon { position: absolute; width: 85px; padding: 10px; text-align: center; cursor: pointer; z-index: 5; user-select: none; border-radius: 6px; }
        .desktop-icon:hover { background: rgba(255,255,255,0.1); }
        .icon-img { font-size: 35px; display: block; margin-bottom: 5px; pointer-events: none; }
        .desktop-icon small { font-size: 11px; text-shadow: 1px 1px 2px #000; color: white; display: block; height: 1.2em; overflow: hidden; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background: var(--taskbar-bg); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 0 10px; z-index: 2000; border-top: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        #dock { display: flex; gap: 8px; margin-left: 15px; }
        .dock-item { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .dock-item.active { background: var(--accent); border-bottom: 2px solid #fff; }

        /* Overlay & QR */
        #overlay { position: fixed; inset: 0; background: #111; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .card { background: #222; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #444; }
        .qr-wrapper { background: white; padding: 10px; margin: 15px auto; border-radius: 8px; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
        .setup-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        .dots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; border: 1px solid #555; }
        .dot.active { background: #28a745; box-shadow: 0 0 10px #28a745; }
        .signal-area { width: 100%; height: 60px; background: #000; color: #0f0; font-size: 10px; border: 1px solid #444; margin: 10px 0; border-radius: 5px; padding: 5px; box-sizing: border-box; resize: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 3px solid var(--accent); border-top: 3px solid transparent; width: 25px; height: 25px; border-radius: 50%; animation: spin 1s linear infinite; }

        #scanner-container { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; flex-direction: column; }
        #reader { flex: 1; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="card">
        <h3>Enterprise OS v11.1</h3>
        <div id="setup-initial">
            <button class="setup-btn" onclick="boot('server')">SERVER MODE</button>
            <button class="setup-btn" style="background:#444" onclick="boot('client')">CLIENT MODE</button>
        </div>
        <div id="setup-conn" style="display:none">
            <div id="qrcode" class="qr-wrapper"><div class="spinner"></div></div>
            <div id="qr-label" style="font-size:12px; color:#aaa; margin-bottom:10px;">Generazione...</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="setup-btn" style="background:#444" onclick="changeQR(-1)">⬅</button>
                <button class="setup-btn" style="background:#444" onclick="changeQR(1)">➡</button>
            </div>
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <button class="setup-btn" onclick="openScanner()">📸 SCANNER (BEEP ON)</button>
            <button class="setup-btn" style="background:#444" onclick="copyFullCode()">📋 COPIA CODICE ZIP</button>
            <textarea id="rSig" class="signal-area" placeholder="Incolla codice qui..."></textarea>
            <button id="btn-connect" class="setup-btn" style="background:#28a745; display:none" onclick="connect()">⚡ CONNETTI</button>
        </div>
    </div>
</div>

<div id="scanner-container">
    <div id="reader"></div>
    <div style="height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#111;">
        <div id="scan-info" style="color:#28a745; font-size:12px; margin-bottom:5px;">Inquadra QR</div>
        <button class="setup-btn" style="width:200px; background:#e81123; padding:8px;" onclick="closeScanner()">ANNULLA</button>
    </div>
</div>

<div id="start-menu" style="position:fixed; bottom:55px; left:10px; width:260px; max-height:70vh; background:rgba(30,30,30,0.98); display:none; border-radius:12px; padding:10px; z-index:3000; border:1px solid #444; overflow-y:auto;"></div>

<div id="viewport"><div id="canvas"></div></div>

<div id="taskbar">
    <div onclick="toggleStart()" style="font-size:28px; cursor:pointer; color:var(--accent); padding:0 10px;">⊞</div>
    <div id="dock"></div>
    <div style="margin-left:auto; display:flex; gap:15px; font-size:12px; padding-right:10px; align-items:center;">
        <span onclick="document.documentElement.requestFullscreen()" style="cursor:pointer">⛶</span>
        <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    let role, pc, dataChannel, state = { windows: [], icons: [], sW: window.innerWidth, activeWin: null };
    let qrChunks = [], currentChunkIdx = 0, receivedChunks = new Array(4).fill(null), fullZippedCode = "";

    const apps = [
        { id: 'app_menu', name: 'Menu', icon: '🌉', url: 'MENU.html' },
        { id: 'app_cam', name: 'Scanner', icon: '📷', url: 'CAM_SCANNER.html' },
        { id: 'app_clock', name: 'Clock', icon: '⏰', url: 'CLOCK_NIGHT_DAY.html' },
        { id: 'app_ebook', name: 'Ebook', icon: '📖', url: 'EBOOK_READER.html' },
        { id: 'app_foto', name: 'Foto', icon: '🆔', url: 'FOTO_TESSERA.html' },
        { id: 'app_invaders', name: 'Invaders', icon: '👾', url: 'GAME_SPACE_INVADERS.html' },
        { id: 'app_tetris', name: 'Tetris', icon: '🧱', url: 'GAME_TETRIS.html' },
        { id: 'app_imgtext', name: 'OCR', icon: '🔍', url: 'IMG_TO_TEXT.html' },
        { id: 'app_agenda', name: 'Agenda', icon: '📅', url: 'LUXURY_AGENDA.html' },
        { id: 'app_metric', name: 'Metric', icon: '📏', url: 'METRIC_TOOLS.html' },
        { id: 'app_excel', name: 'Excel', icon: '📊', url: 'EXCEL_EXSTRATOR.html' },
        { id: 'app_pass', name: 'Passwd', icon: '🔑', url: 'PASSWORD_MANAGER.html' },
        { id: 'app_stock', name: 'Stock', icon: '📈', url: 'STOCK_CARD.html' },
        { id: 'app_word', name: 'Word', icon: '📄', url: 'WEB_OFFICE_WORD.html' },
        { id: 'app_multi', name: 'Multi', icon: '🖥️', url: 'WEB_OS_MULTI_DESKTOP.html' },
        { id: 'app_gantt', name: 'Gantt', icon: '📅', url: 'WORK_GANTT_PROJECT.html' },
        { id: 'app_calc', name: 'Calc', icon: '🧮', url: 'https://www.desmos.com/scientific' },
        { id: 'app_paint', name: 'Paint', icon: '🎨', url: 'https://jspaint.app' },
        { id: 'app_news', name: 'News', icon: '📰', url: 'JOURNAL_WORLD_NEWS.html' },
        { id: 'app_term', name: 'Terminal', icon: '🐚', url: 'TERMINAL.html' }
    ];

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    const zip = (s) => btoa(String.fromCharCode(...pako.deflate(new TextEncoder().encode(s))));
    const unzip = (b) => { try { return new TextDecoder().decode(pako.inflate(Uint8Array.from(atob(b), c => c.charCodeAt(0)))); } catch(e) { return null; } };

    document.getElementById('rSig').addEventListener('input', function() { 
        document.getElementById('btn-connect').style.display = this.value.length > 50 ? 'block' : 'none'; 
    });

    function boot(m) {
        role = m;
        document.getElementById('setup-initial').style.display = 'none';
        document.getElementById('setup-conn').style.display = 'block';
        initNetwork();
        if(role === 'server') {
            state.icons = apps.map((a, i) => ({ ...a, x: 20 + Math.floor(i/7)*90, y: 20 + (i%7)*95 }));
            initStartMenu();
        }
    }

    function initNetwork() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.onicecandidate = e => {
            if(!e.candidate) {
                let sdp = pc.localDescription.sdp.split('\r\n').filter(l => !l.startsWith('a=extmap') && !l.startsWith('a=rtcp')).join('\r\n');
                fullZippedCode = zip(JSON.stringify({t: pc.localDescription.type, s: sdp}));
                const size = Math.ceil(fullZippedCode.length / 4);
                qrChunks = [];
                for(let i=0; i<4; i++) qrChunks.push(`F${i+1}|${fullZippedCode.substring(i*size, (i+1)*size)}`);
                updateQRDisplay();
            }
        };
        if(role === 'server') { dataChannel = pc.createDataChannel("os"); setupDC(dataChannel); pc.createOffer().then(d => pc.setLocalDescription(d)); }
        else { pc.ondatachannel = e => setupDC(e.channel); }
    }

    function updateQRDisplay() {
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: qrChunks[currentChunkIdx], width: 180, height: 180, correctLevel: QRCode.CorrectLevel.L });
        document.getElementById('qr-label').innerText = `FRAMMENTO ${currentChunkIdx+1} DI 4`;
    }

    function changeQR(dir) { currentChunkIdx = (currentChunkIdx + dir + 4) % 4; updateQRDisplay(); }

    let scanner;
    async function openScanner() {
        const container = document.getElementById('scanner-container');
        container.style.display = 'flex';
        if (scanner) { try { await scanner.stop(); } catch(e) {} }
        scanner = new Html5Qrcode("reader");
        const config = { fps: 25, qrbox: (vw, vh) => { const s = Math.min(vw, vh); return { width: s*0.8, height: s*0.8 }; } };
        
        scanner.start({ facingMode: "environment" }, config, (text) => {
            if(text.includes("|")) {
                const parts = text.split("|");
                const n = parseInt(parts[0].replace("F", "")) - 1;
                if(!isNaN(n) && n >= 0 && n < 4 && !receivedChunks[n]) {
                    receivedChunks[n] = parts[1];
                    document.querySelectorAll('.dot')[n].classList.add('active');
                    playBeep();
                    if(receivedChunks.every(c => c !== null)) { 
                        document.getElementById('rSig').value = receivedChunks.join(""); 
                        document.getElementById('btn-connect').style.display = 'block';
                        closeScanner();
                    }
                }
            }
        });
    }

    function closeScanner() {
        if(scanner) {
            scanner.stop().then(() => {
                document.getElementById('scanner-container').style.display = 'none';
                scanner = null;
            }).catch(() => document.getElementById('scanner-container').style.display = 'none');
        }
    }

    function copyFullCode() { navigator.clipboard.writeText(fullZippedCode); alert("Copiato!"); }

    async function connect() {
        try {
            const data = JSON.parse(unzip(document.getElementById('rSig').value.trim()));
            await pc.setRemoteDescription(new RTCSessionDescription({type: data.t, sdp: data.s}));
            if(role === 'client') { const ans = await pc.createAnswer(); await pc.setLocalDescription(ans); }
            else { document.getElementById('overlay').style.display = 'none'; }
        } catch(e) { alert("Errore connessione."); }
    }

    function setupDC(chan) {
        dataChannel = chan;
        dataChannel.onopen = () => { document.getElementById('overlay').style.display = 'none'; sync(); };
        dataChannel.onmessage = e => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'SYNC') { state = msg.payload; updateDOM(); }
            if(msg.type === 'ACTION' && role === 'server') handleAction(msg.action);
        };
    }

    function handleAction(a) {
        let win = state.windows.find(w => w.id === a.id);
        switch(a.type) {
            case 'OPEN':
                const id = 'w' + Date.now();
                state.windows.push({ ...a.app, id, x: a.x, y: 60, w: 750, h: 500, max: false, min: false });
                state.activeWin = id; break;
            case 'MOVE': if(win) { win.x = a.x; win.y = a.y; state.activeWin = win.id; } break;
            case 'CLOSE': state.windows = state.windows.filter(w => w.id !== a.id); break;
            case 'MAX': if(win) { win.max = !win.max; state.activeWin = win.id; } break;
            case 'MIN': if(win) win.min = true; break;
            case 'RESTORE': if(win) { win.min = false; state.activeWin = win.id; } break;
            case 'FOCUS': state.activeWin = a.id; break;
        }
        sync();
    }

    function send(a) { if(role === 'server') handleAction(a); else if(dataChannel?.readyState === 'open') dataChannel.send(JSON.stringify({type:'ACTION', action: a})); }
    function sync() { if(role === 'server' && dataChannel?.readyState === 'open') { state.sW = window.innerWidth; dataChannel.send(JSON.stringify({type:'SYNC', payload: state})); } updateDOM(); }

    function updateDOM() {
        const canvas = document.getElementById('canvas');
        canvas.style.left = role === 'client' ? `-${state.sW}px` : `0px`;

        state.icons.forEach(icon => {
            let el = document.getElementById(icon.id);
            if(!el) {
                el = document.createElement('div'); el.id = icon.id; el.className = 'desktop-icon';
                el.innerHTML = `<span class="icon-img">${icon.icon}</span><small>${icon.name}</small>`;
                el.onclick = () => send({type:'OPEN', app: icon, x: role==='client' ? state.sW + 50 : 50});
                canvas.appendChild(el);
            }
            el.style.transform = `translate(${icon.x}px, ${icon.y}px)`;
        });

        const currentIds = state.windows.map(w => w.id);
        document.querySelectorAll('.window').forEach(w => { if(!currentIds.includes(w.id)) w.remove(); });

        state.windows.forEach(win => {
            let el = document.getElementById(win.id);
            if(!el) {
                el = document.createElement('div'); el.id = win.id; el.className = 'window';
                el.innerHTML = `<div class="win-header"><div class="win-drag">${win.icon} ${win.name}</div><div class="win-controls">
                    <div class="win-btn" onclick="event.stopPropagation(); send({type:'MIN', id:'${win.id}'})">－</div>
                    <div class="win-btn" onclick="event.stopPropagation(); send({type:'MAX', id:'${win.id}'})">▢</div>
                    <div class="win-btn close" onclick="event.stopPropagation(); send({type:'CLOSE', id:'${win.id}'})">✕</div>
                </div></div><div class="win-content"><iframe src="${win.url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
                el.onpointerdown = (e) => {
                    if(e.target.closest('.win-btn')) return;
                    send({type: 'FOCUS', id: win.id});
                    if(win.max) return;
                    let sX = e.clientX - win.x; let sY = e.clientY - win.y;
                    document.onpointermove = (ev) => send({type:'MOVE', id:win.id, x: ev.clientX - sX, y: ev.clientY - sY});
                    document.onpointerup = () => document.onpointermove = null;
                };
                canvas.appendChild(el);
            }
            el.classList.toggle('active', state.activeWin === win.id);
            el.classList.toggle('maximized', win.max);
            el.style.display = win.min ? 'none' : 'flex';
            if(!win.max) { el.style.transform = `translate(${win.x}px, ${win.y}px)`; el.style.width = win.w + 'px'; el.style.height = win.h + 'px'; }
        });

        const dock = document.getElementById('dock'); dock.innerHTML = '';
        state.windows.forEach(win => {
            const item = document.createElement('div'); item.className = 'dock-item' + (state.activeWin === win.id ? ' active' : ''); 
            item.innerHTML = win.icon;
            item.onclick = () => send(win.min ? {type:'RESTORE', id:win.id} : {type:'FOCUS', id:win.id});
            dock.appendChild(item);
        });
    }

    function toggleStart() { const sm = document.getElementById('start-menu'); sm.style.display = sm.style.display === 'block' ? 'none' : 'block'; }
    function initStartMenu() {
        const sm = document.getElementById('start-menu');
        apps.forEach(a => {
            const d = document.createElement('div'); 
            d.style.cssText = "padding:12px; cursor:pointer; border-bottom:1px solid #444; display:flex; gap:10px; align-items:center;";
            d.innerHTML = `<span>${a.icon}</span><span>${a.name}</span>`;
            d.onclick = () => { send({type:'OPEN', app: a, x: role==='client' ? state.sW + 50 : 50}); toggleStart(); };
            sm.appendChild(d);
        });
    }

    setInterval(() => { 
        const d = new Date(); 
        document.getElementById('clock').innerText = d.toLocaleTimeString(); 
    }, 1000);
</script>
</body>
</html>
