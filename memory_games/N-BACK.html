<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Number Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06090f;
            --surface: #0c1220;
            --panel: #0f1729;
            --card: #151f35;
            --border: rgba(255,255,255,0.06);
            --text: #e2e8f0;
            --muted: #475569;
            --accent: #00e5a0;
            --accent-dim: rgba(0,229,160,0.15);
            --accent-glow: rgba(0,229,160,0.5);
            --gold: #f59e0b;
            --gold-glow: rgba(245,158,11,0.4);
            --wrong: #ef4444;
            --wrong-glow: rgba(239,68,68,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh; height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            display: flex; flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* Sfondo atmosferico */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,160,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 80% 90%, rgba(245,158,11,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 10% 70%, rgba(99,102,241,0.02) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        /* Griglia sottile di sfondo */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }

        .game-container {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center;
            width: 100%; max-width: 500px;
            height: 100vh; height: 100dvh;
            padding: 2vh 4vw;
        }

        /* Header stats */
        #stats-panel {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 12px 18px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            flex-shrink: 0;
        }

        .stat-block { text-align: center; flex: 1; }

        .stat-label {
            font-size: 0.6rem; text-transform: uppercase;
            letter-spacing: 0.14em; color: var(--muted); font-weight: 300;
        }

        .stat-num {
            font-size: 1.4rem; font-weight: 800;
            color: var(--text);
            transition: transform 0.15s, color 0.25s;
        }

        .stat-num.pop { transform: scale(1.35); }
        .stat-num.accent { color: var(--accent); }
        .stat-num.gold { color: var(--gold); }

        .stat-divider {
            width: 1px; height: 30px;
            background: var(--border);
        }

        /* Display numero centrale */
        #display-wrapper {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%; min-height: 0;
            position: relative;
        }

        #display-area {
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            line-height: 1;
            position: relative;
            transition: color 0.3s;
            min-height: 1.2em;
            display: flex; align-items: center; justify-content: center;
        }

        #display-area.glow {
            text-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(0,229,160,0.2);
        }

        #display-area.gold { color: var(--gold); text-shadow: 0 0 40px var(--gold-glow); }
        #display-area.wrong { color: var(--wrong); text-shadow: 0 0 40px var(--wrong-glow); }
        #display-area.muted-text { color: var(--muted); text-shadow: none; font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 500; }

        /* Animazione entrata numero */
        @keyframes numIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        #display-area.anim-in { animation: numIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Shake errore */
        @keyframes shakeDisplay {
            0%, 100% { translate: 0 0; }
            15% { translate: -8px 0; }
            30% { translate: 8px 0; }
            45% { translate: -6px 0; }
            60% { translate: 6px 0; }
            75% { translate: -3px 0; }
        }

        #display-area.shake { animation: shakeDisplay 0.5s ease; }

        /* Barra sequenza input */
        #seq-bar {
            display: flex; gap: 6px; justify-content: center;
            margin-top: 2vh; min-height: 16px;
            flex-wrap: wrap; max-width: 90%;
        }

        .seq-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--muted); opacity: 0.25;
            transition: all 0.25s ease;
        }

        .seq-dot.active { opacity: 1; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); transform: scale(1.3); }
        .seq-dot.done { opacity: 0.8; background: var(--accent); }
        .seq-dot.fail { opacity: 1; background: var(--wrong); box-shadow: 0 0 6px var(--wrong-glow); }

        /* Mini sequenza mostrata */
        #mini-seq {
            display: flex; gap: 4px; justify-content: center;
            margin-top: 1vh; min-height: 28px;
        }

        .mini-num {
            width: 26px; height: 26px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700;
            background: var(--card); border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.3s;
        }

        .mini-num.filled { color: var(--accent); border-color: rgba(0,229,160,0.3); background: var(--accent-dim); }
        .mini-num.current { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); transform: scale(1.15); }
        .mini-num.error { color: var(--wrong); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); }

        /* Tastierino */
        #keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 2vmin, 14px);
            width: min(85vw, 360px);
            padding-bottom: 3vh;
            flex-shrink: 0;
        }

        .num-btn {
            aspect-ratio: 1.4 / 1;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            font-family: inherit;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 14px;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.12s, background 0.2s, border-color 0.2s, box-shadow 0.25s;
            -webkit-tap-highlight-color: transparent;
        }

        .num-btn:hover { background: #1c2944; border-color: rgba(255,255,255,0.1); }

        .num-btn:active { transform: scale(0.93); }

        .num-btn.highlight {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0,229,160,0.15);
            transform: scale(0.94);
        }

        .num-btn.correct-flash {
            background: rgba(0,229,160,0.2);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .num-btn.wrong-flash {
            background: rgba(239,68,68,0.15);
            border-color: var(--wrong);
            box-shadow: 0 0 12px var(--wrong-glow);
        }

        /* Ripple */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(3); opacity: 0; }
        }

        .num-btn.locked { pointer-events: none; opacity: 0.5; }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(6,9,15,0.95);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2.5vh;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 6vw;
        }

        #overlay.visible { opacity: 1; pointer-events: auto; }

        #overlay h2 {
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 800; letter-spacing: -0.04em;
            text-align: center;
        }

        #overlay h2.title-accent { color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); }
        #overlay h2.title-wrong { color: var(--wrong); text-shadow: 0 0 30px var(--wrong-glow); }

        #overlay p {
            color: var(--muted); font-size: 0.9rem;
            max-width: 320px; text-align: center; line-height: 1.6;
        }

        .overlay-stats {
            display: flex; gap: 5vw; margin: 1vh 0;
        }

        .overlay-stat { text-align: center; }
        .overlay-stat-val { font-size: 2rem; font-weight: 800; color: var(--text); }
        .overlay-stat-label {
            font-size: 0.6rem; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--muted);
        }

        .btn-main {
            padding: 16px 48px; border: none; border-radius: 14px;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            background: var(--accent); color: #06090f;
            box-shadow: 0 4px 24px var(--accent-glow);
            margin-top: 1vh;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,160,0.5); }
        .btn-main:active { transform: scale(0.97); }

        /* Countdown */
        .countdown-num {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 800; color: var(--accent);
            text-shadow: 0 0 50px var(--accent-glow);
            animation: countPulse 0.6s ease;
        }

        @keyframes countPulse {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Particelle */
        .particle {
            position: fixed; pointer-events: none; z-index: 50;
            border-radius: 50%;
            animation: pFly 0.7s ease-out forwards;
        }

        @keyframes pFly {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
        }

        .particle-ring {
            position: fixed; pointer-events: none; z-index: 49;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: ringExpand 0.6s ease-out forwards;
        }

        @keyframes ringExpand {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* Livello up flash */
        @keyframes lvlFlash {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .lvl-flash {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            animation: lvlFlash 1.2s ease forwards;
            white-space: nowrap; z-index: 10;
            pointer-events: none;
        }

        /* Combo text */
        @keyframes comboIn {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            40% { transform: translateX(-50%) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0; }
        }

        .combo-text {
            position: absolute; bottom: 20%; left: 50%;
            font-size: 0.9rem; font-weight: 700; color: var(--gold);
            animation: comboIn 1s ease forwards;
            white-space: nowrap; z-index: 10;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-height: 600px) {
            .game-container { padding: 1vh 4vw; }
            #display-area { font-size: clamp(3.5rem, 14vw, 6rem); }
            .stat-num { font-size: 1.1rem; }
            #seq-bar { margin-top: 1vh; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="stats-panel">
            <div class="stat-block">
                <div class="stat-label">Punteggio</div>
                <div class="stat-num" id="score-display">0</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-label">Livello</div>
                <div class="stat-num accent" id="level-display">1</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-label">Sequenza</div>
                <div class="stat-num" id="seq-len-display">3</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-label">Record</div>
                <div class="stat-num gold" id="best-display">0</div>
            </div>
        </div>

        <div id="display-wrapper">
            <div id="display-area" class="muted-text">PRONTO?</div>
            <div id="seq-bar"></div>
            <div id="mini-seq"></div>
        </div>

        <div id="keyboard"></div>
    </div>

    <!-- Overlay iniziale -->
    <div id="overlay" class="visible">
        <h2 class="title-accent">Memory Number</h2>
        <p>Memorizza la sequenza di numeri mostrata e riproducila toccando i tasti nell'ordine corretto. Ogni livello la sequenza si allunga.</p>
        <button class="btn-main" id="play-btn">Gioca</button>
    </div>

    <script>
        /* ============================
           STATO
        ============================ */
        let audioCtx = null;
        let sequence = [];
        let playerInput = [];
        let level = 1;
        let seqLength = 3;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('numMemBest') || '0');
        let gameActive = false;
        let inputLocked = false;
        let combo = 0;

        /* Frequenze per ogni tasto (scala pentatonica estesa) */
        const NOTES = [261.6, 293.7, 329.6, 392.0, 440.0, 493.9, 523.3, 587.3, 659.3];

        /* ============================
           DOM
        ============================ */
        const display = document.getElementById('display-area');
        const scoreEl = document.getElementById('score-display');
        const levelEl = document.getElementById('level-display');
        const seqLenEl = document.getElementById('seq-len-display');
        const bestEl = document.getElementById('best-display');
        const seqBar = document.getElementById('seq-bar');
        const miniSeq = document.getElementById('mini-seq');
        const keyboard = document.getElementById('keyboard');
        const overlay = document.getElementById('overlay');
        const playBtn = document.getElementById('play-btn');

        /* ============================
           AUDIO
        ============================ */
        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(num, dur = 0.35, vol = 0.2) {
            if (!audioCtx) return;
            try {
                const freq = NOTES[num - 1];
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                /* Leggero vibrato per ricchezza */
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(5, audioCtx.currentTime);
                lfoGain.gain.setValueAtTime(3, audioCtx.currentTime);
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                lfo.start();
                lfo.stop(audioCtx.currentTime + dur);
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + dur + 0.05);
            } catch(e) {}
        }

        function playSuccessChord() {
            [0, 4, 7].forEach((semi, i) => {
                setTimeout(() => {
                    if (!audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.3 * Math.pow(2, semi/12), audioCtx.currentTime);
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    osc.connect(g); g.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.45);
                }, i * 80);
            });
        }

        function playErrorSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.45);
        }

        function playCountdownBeep(high = false) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(high ? 880 : 440, audioCtx.currentTime);
            g.gain.setValueAtTime(0.12, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        /* ============================
           COSTRUZIONE TASTIERINO
        ============================ */
        function buildKeyboard() {
            keyboard.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn locked';
                btn.textContent = i;
                btn.dataset.num = i;
                btn.setAttribute('aria-label', `Tasto ${i}`);
                btn.addEventListener('click', (e) => {
                    createRipple(e, btn);
                    handleInput(i);
                });
                keyboard.appendChild(btn);
            }
        }

        function createRipple(e, btn) {
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        }

        function setKeyboardLocked(locked) {
            keyboard.querySelectorAll('.num-btn').forEach(b => {
                if (locked) b.classList.add('locked');
                else b.classList.remove('locked');
            });
        }

        function highlightBtn(num, cls = 'highlight') {
            const btn = keyboard.querySelector(`[data-num="${num}"]`);
            if (!btn) return;
            btn.classList.add(cls);
            setTimeout(() => btn.classList.remove(cls), 300);
        }

        /* ============================
           DISPLAY
        ============================ */
        function setDisplay(text, cls = '') {
            display.className = cls;
            display.textContent = text;
            /* Forza re-trigger animazione */
            void display.offsetWidth;
            display.classList.add('anim-in');
        }

        function updateStats() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            seqLenEl.textContent = seqLength;
            bestEl.textContent = highScore;
        }

        function popStat(el) {
            el.classList.add('pop');
            setTimeout(() => el.classList.remove('pop'), 200);
        }

        /* ============================
           INDICATORI SEQUENZA
        ============================ */
        function buildSeqBar() {
            seqBar.innerHTML = '';
            for (let i = 0; i < seqLength; i++) {
                const dot = document.createElement('div');
                dot.className = 'seq-dot';
                seqBar.appendChild(dot);
            }
        }

        function buildMiniSeq() {
            miniSeq.innerHTML = '';
            for (let i = 0; i < seqLength; i++) {
                const el = document.createElement('div');
                el.className = 'mini-num';
                el.textContent = '?';
                miniSeq.appendChild(el);
            }
        }

        function updateMiniSeq(index, num, state = 'filled') {
            const items = miniSeq.children;
            if (!items[index]) return;
            items[index].textContent = num;
            items[index].className = 'mini-num ' + state;
            /* Rimuovi current dal precedente */
            if (index > 0 && state === 'current') {
                items[index - 1].classList.remove('current');
                items[index - 1].classList.add('filled');
            }
        }

        function markSeqFail(index) {
            const items = miniSeq.children;
            if (items[index]) items[index].className = 'mini-num error';
        }

        function resetSeqIndicators() {
            seqBar.querySelectorAll('.seq-dot').forEach((d, i) => d.className = 'seq-dot');
            miniSeq.querySelectorAll('.mini-num').forEach(m => { m.textContent = '?'; m.className = 'mini-num'; });
        }

        /* ============================
           EFFETTI VISIVI
        ============================ */
        function spawnParticles(x, y, color, count = 14) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 3 + Math.random() * 6;
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 100;
                p.style.cssText = `
                    left:${x - size/2}px; top:${y - size/2}px;
                    width:${size}px; height:${size}px;
                    background:${color};
                    --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 750);
            }
        }

        function spawnRing(x, y) {
            const ring = document.createElement('div');
            ring.className = 'particle-ring';
            ring.style.cssText = `left:${x-20}px; top:${y-20}px; width:40px; height:40px;`;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), 650);
        }

        function showLevelFlash(text) {
            const flash = document.createElement('div');
            flash.className = 'lvl-flash';
            flash.textContent = text;
            document.getElementById('display-wrapper').appendChild(flash);
            setTimeout(() => flash.remove(), 1300);
        }

        function showCombo(text) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.textContent = text;
            document.getElementById('display-wrapper').appendChild(el);
            setTimeout(() => el.remove(), 1100);
        }

        /* ============================
           LOGICA DI GIOCO
        ============================ */
        function startGame() {
            ensureAudio();
            overlay.classList.remove('visible');
            level = 1;
            seqLength = 3;
            score = 0;
            combo = 0;
            gameActive = true;
            updateStats();
            buildKeyboard();
            startLevel();
        }

        async function startLevel() {
            inputLocked = true;
            setKeyboardLocked(true);
            playerInput = [];

            /* Genera sequenza */
            sequence = [];
            for (let i = 0; i < seqLength; i++) {
                sequence.push(Math.floor(Math.random() * 9) + 1);
            }

            buildSeqBar();
            buildMiniSeq();

            /* Countdown */
            for (let c = 3; c >= 1; c--) {
                display.className = '';
                display.innerHTML = `<span class="countdown-num">${c}</span>`;
                playCountdownBeep(c === 1);
                await wait(650);
            }

            /* Mostra sequenza */
            const showTime = Math.max(400, 700 - (level - 1) * 15);

            setDisplay('...', 'muted-text');
            await wait(300);

            for (let i = 0; i < sequence.length; i++) {
                const num = sequence[i];
                setDisplay(num, 'glow');
                highlightBtn(num, 'highlight');
                playTone(num, showTime / 1000 + 0.1);
                seqBar.children[i].classList.add('active');

                await wait(showTime);

                seqBar.children[i].classList.remove('active');
                seqBar.children[i].classList.add('done');

                if (i < sequence.length - 1) await wait(120);
            }

            /* Passa al giocatore */
            setDisplay('?', 'glow');
            await wait(200);
            resetSeqIndicators();
            if (miniSeq.children[0]) miniSeq.children[0].classList.add('current');
            inputLocked = false;
            setKeyboardLocked(false);
        }

        function handleInput(num) {
            if (inputLocked || !gameActive) return;

            const idx = playerInput.length;
            playerInput.push(num);

            playTone(num, 0.2, 0.15);
            highlightBtn(num, 'correct-flash');
            setDisplay(num, 'glow');

            /* Aggiorna mini sequenza */
            updateMiniSeq(idx, num, idx < seqLength - 1 ? 'filled' : 'filled');

            if (playerInput[idx] !== sequence[idx]) {
                /* ERRORE */
                inputLocked = true;
                setKeyboardLocked(true);
                playErrorSound();

                setDisplay('ERRORE', 'wrong shake');
                highlightBtn(num, 'wrong-flash');
                markSeqFail(idx);

                /* Mostra la sequenza corretta nei mini-num */
                for (let i = idx + 1; i < seqLength; i++) {
                    miniSeq.children[i].textContent = sequence[i];
                    miniSeq.children[i].className = 'mini-num';
                }

                combo = 0;

                setTimeout(() => showGameOver(), 1200);
                return;
            }

            /* Segna dot come done */
            if (seqBar.children[idx]) {
                seqBar.children[idx].classList.add('done');
            }

            /* Segna prossimo come current */
            if (idx + 1 < seqLength && miniSeq.children[idx + 1]) {
                miniSeq.children[idx].classList.remove('current');
                miniSeq.children[idx + 1].classList.add('current');
            }

            /* Sequenza completata? */
            if (playerInput.length === sequence.length) {
                inputLocked = true;
                setKeyboardLocked(true);

                /* Punteggio: base + bonus velocità + combo */
                combo++;
                const basePoints = seqLength * 10;
                const comboBonus = combo > 1 ? (combo - 1) * 15 : 0;
                const levelBonus = level * 5;
                const gained = basePoints + comboBonus + levelBonus;
                score += gained;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('numMemBest', highScore.toString());
                }

                updateStats();
                popStat(scoreEl);
                if (combo > 1) popStat(levelEl);

                /* Feedback */
                setDisplay('BRAVO', 'gold');
                playSuccessChord();

                /* Particelle dal display */
                const rect = display.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnParticles(cx, cy, '#00e5a0', 18);
                spawnRing(cx, cy);

                if (combo > 1) showCombo(`COMBO x${combo}  +${comboBonus}`);
                showLevelFlash(`+${gained} punti`);

                /* Prossimo livello */
                level++;
                seqLength = Math.min(12, 3 + level - 1);

                setTimeout(() => startLevel(), 1400);
            }
        }

        function showGameOver() {
            gameActive = false;
            stopTimer();

            const reachedLevel = level;
            const reachedSeq = seqLength;

            overlay.innerHTML = `
                <h2 class="title-wrong">Game Over</h2>
                <p>Hai sbagliato al livello ${reachedLevel} con una sequenza di ${reachedSeq} numeri.</p>
                <div class="overlay-stats">
                    <div class="overlay-stat">
                        <div class="overlay-stat-val">${score}</div>
                        <div class="overlay-stat-label">Punteggio</div>
                    </div>
                    <div class="overlay-stat">
                        <div class="overlay-stat-val">${reachedLevel}</div>
                        <div class="overlay-stat-label">Livello</div>
                    </div>
                    <div class="overlay-stat">
                        <div class="overlay-stat-val" style="color:var(--gold)">${highScore}</div>
                        <div class="overlay-stat-label">Record</div>
                    </div>
                </div>
                <button class="btn-main" id="retry-btn">Riprova</button>
            `;

            overlay.classList.add('visible');
            document.getElementById('retry-btn').addEventListener('click', startGame);
        }

        function stopTimer() {} /* Placeholder per futuro timer */

        /* ============================
           UTILITÀ
        ============================ */
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        /* ============================
           AVVIO
        ============================ */
        updateStats();
        playBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
