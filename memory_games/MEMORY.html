<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Grid Pro</title>
    <style>
        :root { --bg: #0f172a; --cell: #1e293b; --highlight: #22c55e; --wrong: #ef4444; --text: #f8fafc; }
        
        body { 
            margin: 0; height: 100vh; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            font-family: system-ui, sans-serif; overflow: hidden; touch-action: manipulation;
            padding: 2vh 0; box-sizing: border-box;
        }

        #header { text-align: center; width: 100%; }
        #stats { display: flex; justify-content: space-around; width: 100%; font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        
        #grid { 
            display: grid; gap: 10px; width: 90vmin; height: 90vmin; 
            max-width: 450px; max-height: 450px;
        }
        
        .cell { background: var(--cell); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .cell.active { background: var(--highlight); transform: scale(0.95); }
        .cell.wrong { background: var(--wrong); }
        
        #info { font-size: 1.5rem;
