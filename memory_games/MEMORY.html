<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c16;
            --surface: #0f1629;
            --card-bg: #151d33;
            --card-border: rgba(255,255,255,0.05);
            --card-pattern: rgba(255,255,255,0.025);
            --text: #e8ecf4;
            --muted: #4e5d78;
            --accent: #22c55e;
            --accent-glow: rgba(34,197,94,0.4);
            --wrong: #ef4444;
            --wrong-glow: rgba(239,68,68,0.3);
            --gold: #facc15;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh; height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 50% 30% at 50% 0%, rgba(34,197,94,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 90% 100%, rgba(6,182,212,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 30% 50% at 5% 80%, rgba(168,85,247,0.025) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .game-wrapper {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 1.8vh;
            width: 100%; max-width: 540px;
            padding: 1.2vh 3vw;
        }

        #header { text-align: center; width: 100%; }

        #header h1 {
            font-size: clamp(1.2rem, 3.8vw, 1.6rem);
            font-weight: 700; letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text) 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #stats {
            display: flex; justify-content: center; gap: 4vw;
            margin-top: 0.8vh;
            font-size: clamp(0.75rem, 2vw, 0.85rem); font-weight: 500;
        }

        .stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }

        .stat-label {
            font-size: 0.58rem; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--muted); font-weight: 300;
        }

        .stat-value {
            font-size: 1.15rem; font-weight: 700; color: var(--text);
            transition: transform 0.15s, color 0.2s;
        }

        .stat-value.bump { transform: scale(1.3); color: var(--accent); }

        /* Griglia */
        #grid-container {
            position: relative;
            width: min(92vmin, 460px);
            aspect-ratio: var(--grid-aspect, 1);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(var(--cols, 4), 1fr);
            gap: clamp(5px, 1.2vmin, 9px);
            width: 100%; height: 100%;
        }

        /* Carta */
        .card {
            perspective: 800px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.15, 1);
            border-radius: clamp(8px, 2vmin, 14px);
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: inherit;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Fronte coperto */
        .card-front {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
        }

        .card-front::before {
            content: '';
            position: absolute; inset: 0;
            background:
                repeating-linear-gradient(45deg, transparent, transparent 7px, var(--card-pattern) 7px, var(--card-pattern) 8px),
                repeating-linear-gradient(-45deg, transparent, transparent 7px, var(--card-pattern) 7px, var(--card-pattern) 8px);
            border-radius: inherit;
        }

        .card-front::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.045), transparent 55%);
            border-radius: inherit;
        }

        .card-front-icon {
            position: relative; z-index: 1;
            font-size: clamp(0.9rem, 2.8vmin, 1.3rem);
            color: rgba(255,255,255,0.07);
            font-weight: 700;
        }

        .card:not(.flipped):not(.matched):not(.locked):hover .card-front {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.12);
        }

        .card:not(.flipped):not(.matched):not(.locked):active .card-front {
            transform: scale(0.96);
        }

        /* Retro con simbolo */
        .card-back {
            transform: rotateY(180deg);
            background: var(--surface);
            border: 2px solid var(--sym-color, rgba(255,255,255,0.1));
            position: relative;
        }

        .card-back::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse 70% 70% at 50% 50%, var(--sym-color, transparent), transparent);
            opacity: 0.13;
        }

        .card-back::after {
            content: '';
            position: absolute; inset: 15%;
            border-radius: 50%;
            background: var(--sym-color, transparent);
            opacity: 0.09;
            filter: blur(15px);
        }

        .symbol {
            position: relative; z-index: 2;
            font-size: clamp(2.2rem, 9vmin, 3.6rem);
            line-height: 1;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 12px var(--sym-color, transparent))
                    drop-shadow(0 2px 6px rgba(0,0,0,0.6));
        }

        /* Match trovato */
        .card.matched .card-back {
            border-color: var(--sym-color, var(--accent));
            box-shadow:
                0 0 22px color-mix(in srgb, var(--sym-color, var(--accent)) 30%, transparent),
                0 0 44px color-mix(in srgb, var(--sym-color, var(--accent)) 12%, transparent),
                inset 0 0 22px color-mix(in srgb, var(--sym-color, var(--accent)) 8%, transparent);
        }

        .card.matched .card-back::before { opacity: 0.22; }

        .card.matched .symbol {
            animation: symbolPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes symbolPop {
            0%   { transform: scale(1) rotate(0deg); }
            40%  { transform: scale(1.45) rotate(-8deg); }
            70%  { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Errore */
        .card.wrong .card-back {
            border-color: var(--wrong) !important;
            box-shadow: 0 0 18px var(--wrong-glow) !important;
        }

        .card.wrong .card-inner { animation: cardShake 0.45s ease; }

        @keyframes cardShake {
            0%, 100% { translate: 0 0; }
            15%  { translate: -4px 2px; }
            30%  { translate: 4px -2px; }
            45%  { translate: -3px 1px; }
            60%  { translate: 3px -1px; }
            75%  { translate: -2px 1px; }
        }

        .card.locked { pointer-events: none; }

        /* Info */
        #info {
            font-size: clamp(0.82rem, 2.4vw, 0.95rem);
            font-weight: 500; min-height: 1.5em;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: var(--muted);
            transition: color 0.3s;
        }
        #info.highlight { color: var(--accent); }
        #info.error { color: var(--wrong); }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(8,12,22,0.94);
            backdrop-filter: blur(16px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2.2vh; padding: 4vw;
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #overlay.visible { opacity: 1; pointer-events: auto; }

        #overlay h2 {
            font-size: clamp(1.7rem, 5.5vw, 2.5rem);
            font-weight: 700; letter-spacing: -0.04em; text-align: center;
        }
        #overlay h2.win {
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #overlay p {
            color: var(--muted); font-size: 0.88rem;
            max-width: 310px; text-align: center; line-height: 1.55;
        }

        .difficulty-selector { display: flex; gap: 8px; margin: 0.3vh 0; }
        .diff-btn {
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; background: var(--surface);
            color: var(--muted); font-family: inherit;
            font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .diff-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
        .diff-btn.selected {
            border-color: var(--accent); color: var(--accent);
            background: rgba(34,197,94,0.07);
            box-shadow: 0 0 12px rgba(34,197,94,0.08);
        }

        .final-stats { display: flex; gap: 4vw; margin: 0.3vh 0; }
        .final-stat { text-align: center; }
        .final-stat-val { font-size: 1.5rem; font-weight: 700; color: var(--text); }
        .final-stat-label {
            font-size: 0.62rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
        }

        .stars-row { display: flex; gap: 10px; font-size: 1.8rem; }
        .star { color: #1e293b; transition: color 0.4s, transform 0.4s; }
        .star.earned {
            color: var(--gold); transform: scale(1.15);
            filter: drop-shadow(0 0 6px rgba(250,204,21,0.5));
        }

        .preview-icons {
            display: flex; flex-wrap: wrap; gap: 5px;
            justify-content: center; max-width: 280px; margin: 0.5vh 0;
        }
        .preview-icon {
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            padding: 13px 38px; border: none; border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; margin-top: 0.3vh;
        }
        .btn-primary {
            background: var(--accent); color: #080c16;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(34,197,94,0.5); }
        .btn-primary:active { transform: scale(0.97); }

        /* Particelle */
        .particle {
            position: fixed; pointer-events: none; z-index: 50;
            border-radius: 50%;
            animation: particleFly 0.7s ease-out forwards;
        }
        @keyframes particleFly {
            0%   { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
        }

        .particle-star {
            position: fixed; pointer-events: none; z-index: 50;
            animation: particleStar 0.8s ease-out forwards;
        }
        @keyframes particleStar {
            0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0) rotate(180deg); }
        }

        #toast {
            position: fixed; top: 3vh; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 200; background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 9px 20px; border-radius: 10px;
            font-size: 0.82rem; color: var(--text);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        @media (max-height: 580px) {
            .game-wrapper { gap: 0.8vh; padding: 0.3vh 3vw; }
            #header h1 { font-size: 1rem; }
            .stat-value { font-size: 0.95rem; }
            #info { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <header id="header">
            <h1>Memory Match</h1>
            <div id="stats">
                <div class="stat">
                    <span class="stat-label">Mosse</span>
                    <span class="stat-value" id="moves-val">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Coppie</span>
                    <span class="stat-value" id="pairs-val">0/8</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Tempo</span>
                    <span class="stat-value" id="time-val">0:00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Record</span>
                    <span class="stat-value" id="best-val" style="color:var(--gold)">--</span>
                </div>
            </div>
        </header>
        <div id="grid-container"><div id="grid"></div></div>
        <div id="info">Scegli la difficolta e gioca</div>
    </div>

    <div id="overlay" class="visible">
        <h2>Memory Match</h2>
        <p>Scopri le carte e trova tutte le coppie di simboli uguali con il minor numero di mosse possibile.</p>
        <div class="difficulty-selector" id="diff-selector">
            <button class="diff-btn" data-diff="easy">Facile</button>
            <button class="diff-btn selected" data-diff="medium">Medio</button>
            <button class="diff-btn" data-diff="hard">Difficile</button>
        </div>
        <button class="btn btn-primary" id="start-btn">Gioca</button>
    </div>

    <div id="toast"></div>

    <script>
        /* ============================
           SIMBOLI — caratteri Unicode multicolore
           Ogni simbolo ha forma, colore e nome unici
        ============================ */
        const ALL_SYMBOLS = [
            { char: '★',  color: '#FBBF24', name: 'Stella' },
            { char: '♥',  color: '#F43F5E', name: 'Cuore' },
            { char: '⚡', color: '#38BDF8', name: 'Fulmine' },
            { char: '☾',  color: '#C084FC', name: 'Luna' },
            { char: '🔥', color: '#FB923C', name: 'Fuoco' },
            { char: '◆',  color: '#2DD4BF', name: 'Diamante' },
            { char: '♛',  color: '#FACC15', name: 'Regina' },
            { char: '☀',  color: '#FCD34D', name: 'Sole' },
            { char: '❄',  color: '#67E8F9', name: 'Fiocco' },
            { char: '☘',  color: '#4ADE80', name: 'Trifoglio' },
            { char: '♫',  color: '#F472B6', name: 'Nota' },
            { char: '⚓',  color: '#94A3B8', name: 'Ancora' },
        ];

        /* ============================
           DIFFICOLTÀ
        ============================ */
        const DIFFICULTIES = {
            easy:   { cols: 4, rows: 3, pairs: 6,  label: 'Facile',    starThresholds: [8, 13, 22] },
            medium: { cols: 4, rows: 4, pairs: 8,  label: 'Medio',     starThresholds: [12, 18, 30] },
            hard:   { cols: 5, rows: 4, pairs: 10, label: 'Difficile', starThresholds: [16, 24, 40] },
        };

        /* ============================
           STATO
        ============================ */
        let currentDiff = 'medium';
        let cards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let totalPairs = 8;
        let moves = 0;
        let timerSeconds = 0;
        let timerInterval = null;
        let timerStarted = false;
        let isLocked = false;
        let gameActive = false;

        /* ============================
           DOM
        ============================ */
        const gridEl = document.getElementById('grid');
        const gridContainer = document.getElementById('grid-container');
        const infoEl = document.getElementById('info');
        const overlayEl = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const diffSelector = document.getElementById('diff-selector');
        const movesVal = document.getElementById('moves-val');
        const pairsVal = document.getElementById('pairs-val');
        const timeVal = document.getElementById('time-val');
        const bestVal = document.getElementById('best-val');
        const toastEl = document.getElementById('toast');

        /* ============================
           AUDIO
        ============================ */
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, dur = 0.15, type = 'sine', vol = 0.08) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur + 0.05);
            } catch(e) {}
        }

        const NOTES = [523, 587, 659, 698, 784, 880, 988, 1047, 1175, 1319, 1397, 1568];

        function playFlipSound(si) { playTone(NOTES[si % NOTES.length], 0.18, 'sine', 0.07); }

        function playMatchSound(si) {
            const b = NOTES[si % NOTES.length];
            playTone(b, 0.12, 'sine', 0.09);
            setTimeout(() => playTone(b * 1.25, 0.12, 'sine', 0.09), 80);
            setTimeout(() => playTone(b * 1.5, 0.2, 'sine', 0.09), 160);
        }

        function playMismatchSound() {
            playTone(200, 0.22, 'triangle', 0.07);
            setTimeout(() => playTone(155, 0.3, 'triangle', 0.05), 110);
        }

        function playWinSound() {
            [523, 587, 659, 784, 880, 1047].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.22, 'sine', 0.08), i * 90);
            });
        }

        /* ============================
           SELETTORE DIFFICOLTÀ
        ============================ */
        diffSelector.addEventListener('click', (e) => {
            const btn = e.target.closest('.diff-btn');
            if (!btn) return;
            diffSelector.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentDiff = btn.dataset.diff;
        });

        /* ============================
           UTILITÀ
        ============================ */
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function fmtTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

        /* ============================
           TIMER
        ============================ */
        function startTimer() {
            if (timerStarted) return;
            timerStarted = true;
            timerInterval = setInterval(() => { timerSeconds++; timeVal.textContent = fmtTime(timerSeconds); }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
        function resetTimer() { stopTimer(); timerSeconds = 0; timerStarted = false; timeVal.textContent = '0:00'; }

        /* ============================
           DISPLAY
        ============================ */
        function updateDisplay() {
            movesVal.textContent = moves;
            pairsVal.textContent = `${matchedCount}/${totalPairs}`;
            updateBestDisplay();
        }
        function bumpStat(el) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 220); }
        function getBestKey() { return `memmatch_best_${currentDiff}`; }
        function getBest() { const v = localStorage.getItem(getBestKey()); return v ? parseInt(v) : null; }
        function setBest(v) { localStorage.setItem(getBestKey(), v.toString()); }
        function updateBestDisplay() { const b = getBest(); bestVal.textContent = b !== null ? b : '--'; }

        /* ============================
           GRIGLIA
        ============================ */
        function buildGrid() {
            const diff = DIFFICULTIES[currentDiff];
            const { cols, rows, pairs } = diff;
            totalPairs = pairs;

            gridContainer.style.setProperty('--grid-aspect', `${cols}/${rows}`);
            gridContainer.style.setProperty('--cols', cols);
            gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const chosen = shuffle(ALL_SYMBOLS).slice(0, pairs);
            let deck = [];
            chosen.forEach((sym, idx) => {
                deck.push({ symbolIndex: idx, ...sym });
                deck.push({ symbolIndex: idx, ...sym });
            });
            deck = shuffle(deck);

            gridEl.innerHTML = '';
            cards = [];
            flippedCards = [];

            deck.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'card locked';
                card.dataset.id = i;
                card.dataset.symbolIndex = item.symbolIndex;
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `Carta ${i + 1}, coperta`);
                card.setAttribute('tabindex', '0');
                card.style.setProperty('--sym-color', item.color);

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front">
                            <span class="card-front-icon">?</span>
                        </div>
                        <div class="card-face card-back">
                            <span class="symbol" style="color:${item.color}">${item.char}</span>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => handleCardClick(card));
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCardClick(card); }
                });

                gridEl.appendChild(card);
                cards.push({
                    id: i, symbolIndex: item.symbolIndex,
                    element: card, color: item.color,
                    name: item.name, char: item.char,
                });
            });
        }

        /* ============================
           GIOCO
        ============================ */
        function startGame() {
            ensureAudio();
            overlayEl.classList.remove('visible');
            matchedCount = 0; moves = 0; flippedCards = [];
            isLocked = false; gameActive = true;
            resetTimer(); buildGrid(); updateDisplay();

            infoEl.className = 'highlight';
            infoEl.textContent = 'Memorizza...';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    /* Scopri a cascata */
                    cards.forEach((c, i) => {
                        setTimeout(() => { c.element.classList.add('flipped'); playFlipSound(c.symbolIndex); }, i * 45);
                    });

                    /* Rigira tutto */
                    const flipBack = cards.length * 45 + 1300;
                    setTimeout(() => {
                        cards.forEach((c, i) => {
                            setTimeout(() => c.element.classList.remove('flipped'), i * 30);
                        });
                        setTimeout(() => {
                            cards.forEach(c => c.element.classList.remove('locked'));
                            infoEl.className = '';
                            infoEl.textContent = 'Tocca due carte';
                        }, cards.length * 30 + 400);
                    }, flipBack);
                });
            });
        }

        function handleCardClick(cardEl) {
            if (isLocked || !gameActive) return;
            const cardData = cards.find(c => c.element === cardEl);
            if (!cardData) return;
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

            startTimer();
            cardEl.classList.add('flipped');
            playFlipSound(cardData.symbolIndex);
            cardEl.setAttribute('aria-label', `Carta ${cardData.id + 1}, ${cardData.name}`);
            flippedCards.push(cardData);

            if (flippedCards.length === 2) {
                moves++;
                bumpStat(movesVal);
                updateDisplay();
                checkMatch();
            }
        }

        async function checkMatch() {
            isLocked = true;
            const [a, b] = flippedCards;

            if (a.symbolIndex === b.symbolIndex) {
                await wait(350);
                a.element.classList.add('matched');
                b.element.classList.add('matched');
                playMatchSound(a.symbolIndex);
                spawnParticles(a.element, a.color);
                spawnParticles(b.element, b.color);
                spawnStarParticles(a.element, a.color);

                matchedCount++;
                updateDisplay();
                bumpStat(pairsVal);
                infoEl.className = 'highlight';
                infoEl.textContent = 'Coppia trovata!';

                flippedCards = [];
                isLocked = false;

                if (matchedCount === totalPairs) {
                    gameActive = false;
                    stopTimer();
                    setTimeout(() => showWin(), 700);
                }
            } else {
                a.element.classList.add('wrong');
                b.element.classList.add('wrong');
                playMismatchSound();
                infoEl.className = 'error';
                infoEl.textContent = 'Riprova';

                await wait(850);
                a.element.classList.remove('flipped', 'wrong');
                b.element.classList.remove('flipped', 'wrong');
                a.element.setAttribute('aria-label', `Carta ${a.id + 1}, coperta`);
                b.element.setAttribute('aria-label', `Carta ${b.id + 1}, coperta`);
                infoEl.className = '';
                infoEl.textContent = 'Tocca due carte';
                flippedCards = [];
                isLocked = false;
            }
        }

        /* ============================
           VITTORIA
        ============================ */
        function showWin() {
            playWinSound();
            const th = DIFFICULTIES[currentDiff].starThresholds;
            let stars = 1;
            if (moves <= th[0]) stars = 3;
            else if (moves <= th[1]) stars = 2;

            const prevBest = getBest();
            let newRecord = false;
            if (prevBest === null || moves < prevBest) { setBest(moves); newRecord = true; }
            updateBestDisplay();

            const starsHTML = [1,2,3].map(i =>
                `<span class="star ${i <= stars ? 'earned' : ''}">&#9733;</span>`
            ).join('');

            /* Anteprima dei simboli usati */
            const seen = new Set();
            const previewHTML = cards.filter(c => c.element.classList.contains('matched'))
                .filter(c => { if (seen.has(c.symbolIndex)) return false; seen.add(c.symbolIndex); return true; })
                .map(c => `<div class="preview-icon" style="color:${c.color}">${c.char}</div>`)
                .join('');

            overlayEl.innerHTML = `
                <h2 class="win">Completato!</h2>
                <div class="stars-row">${starsHTML}</div>
                <div class="preview-icons">${previewHTML}</div>
                <div class="final-stats">
                    <div class="final-stat">
                        <div class="final-stat-val">${moves}</div>
                        <div class="final-stat-label">Mosse</div>
                    </div>
                    <div class="final-stat">
                        <div class="final-stat-val">${fmtTime(timerSeconds)}</div>
                        <div class="final-stat-label">Tempo</div>
                    </div>
                    <div class="final-stat">
                        <div class="final-stat-val">${getBest()}</div>
                        <div class="final-stat-label">Record</div>
                    </div>
                </div>
                ${newRecord ? '<p style="color:var(--gold);font-weight:600;">Nuovo record!</p>' : '<p>Riprova per migliorare il tuo punteggio</p>'}
                <div class="difficulty-selector" id="diff-selector-end">
                    <button class="diff-btn ${currentDiff==='easy'?'selected':''}" data-diff="easy">Facile</button>
                    <button class="diff-btn ${currentDiff==='medium'?'selected':''}" data-diff="medium">Medio</button>
                    <button class="diff-btn ${currentDiff==='hard'?'selected':''}" data-diff="hard">Difficile</button>
                </div>
                <button class="btn btn-primary" id="replay-btn">Rigioca</button>
            `;

            overlayEl.classList.add('visible');

            document.getElementById('diff-selector-end').addEventListener('click', (e) => {
                const btn = e.target.closest('.diff-btn');
                if (!btn) return;
                document.querySelectorAll('#diff-selector-end .diff-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentDiff = btn.dataset.diff;
                diffSelector.querySelectorAll('.diff-btn').forEach(b =>
                    b.classList.toggle('selected', b.dataset.diff === currentDiff)
                );
            });

            document.getElementById('replay-btn').addEventListener('click', startGame);
        }

        /* ============================
           PARTICELLE
        ============================ */
        function spawnParticles(fromEl, color) {
            const rect = fromEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 4 + Math.random() * 7;
                const angle = Math.random() * Math.PI * 2;
                const dist = 35 + Math.random() * 80;
                p.style.cssText = `
                    left:${cx-size/2}px; top:${cy-size/2}px;
                    width:${size}px; height:${size}px;
                    background:${color};
                    --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 750);
            }
        }

        function spawnStarParticles(fromEl, color) {
            const rect = fromEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < 5; i++) {
                const s = document.createElement('div');
                s.className = 'particle-star';
                const size = 10 + Math.random() * 8;
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 60;
                s.style.cssText = `
                    left:${cx-size/2}px; top:${cy-size/2}px;
                    width:${size}px; height:${size}px;
                    color:${color}; font-size:${size}px;
                    --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
                `;
                s.innerHTML = '&#9733;';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 850);
            }
        }

        /* ============================
           AVVIO
        ============================ */
        updateBestDisplay();
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
