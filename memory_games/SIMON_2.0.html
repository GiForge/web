<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Grid Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --cell: #1a2236;
            --cell-hover: #243049;
            --text: #e8ecf4;
            --muted: #5a6a85;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.5);
            --wrong: #ef4444;
            --wrong-glow: rgba(239, 68, 68, 0.4);
            --gold: #facc15;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh; height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* Sfondo atmosferico */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(34,197,94,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 80% 100%, rgba(59,130,246,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 10% 80%, rgba(168,85,247,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .game-wrapper {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 2.5vh;
            width: 100%; max-width: 500px;
            padding: 2vh 4vw;
        }

        /* Header */
        #header {
            text-align: center; width: 100%;
        }

        #header h1 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text) 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #stats {
            display: flex; justify-content: center; gap: 6vw;
            margin-top: 1.2vh;
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            font-weight: 500;
        }

        .stat {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }

        .stat-label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--muted); font-weight: 300;
        }

        .stat-value {
            font-size: 1.3rem; font-weight: 700;
            color: var(--text);
            transition: transform 0.15s, color 0.2s;
        }

        .stat-value.bump {
            transform: scale(1.25);
            color: var(--accent);
        }

        .stat-value.gold { color: var(--gold); }

        /* Griglia */
        #grid-container {
            position: relative;
            width: min(85vmin, 420px);
            height: min(85vmin, 420px);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: clamp(6px, 1.5vmin, 12px);
            width: 100%; height: 100%;
        }

        .cell {
            background: var(--cell);
            border-radius: clamp(8px, 2vmin, 14px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.12s ease, background 0.2s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .cell::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.06), transparent 60%);
            pointer-events: none;
        }

        .cell:hover:not(.disabled) {
            background: var(--cell-hover);
            transform: scale(1.03);
        }

        .cell:active:not(.disabled) {
            transform: scale(0.96);
        }

        .cell.disabled {
            cursor: default;
            pointer-events: none;
        }

        /* Stato attivo - sequenza */
        .cell.active {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(34,197,94,0.2), inset 0 0 15px rgba(255,255,255,0.15);
            transform: scale(0.93);
            border-color: rgba(34,197,94,0.3);
        }

        .cell.active::after {
            background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.3), transparent 60%);
        }

        /* Click giocatore corretto */
        .cell.player-hit {
            background: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
            transform: scale(0.95);
        }

        /* Errore */
        .cell.wrong {
            background: var(--wrong);
            box-shadow: 0 0 20px var(--wrong-glow), 0 0 40px rgba(239,68,68,0.15);
            transform: scale(0.93);
            animation: shake 0.4s ease;
            border-color: rgba(239,68,68,0.3);
        }

        @keyframes shake {
            0%, 100% { translate: 0 0; }
            20% { translate: -4px 2px; }
            40% { translate: 4px -2px; }
            60% { translate: -3px 1px; }
            80% { translate: 3px -1px; }
        }

        /* Flash di completamento livello */
        .cell.level-clear {
            animation: cellClear 0.5s ease forwards;
        }

        @keyframes cellClear {
            0% { background: var(--cell); }
            40% { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
            100% { background: var(--cell); box-shadow: none; }
        }

        /* Messaggio info */
        #info {
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 500;
            min-height: 2em;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            color: var(--muted);
            transition: color 0.3s;
        }

        #info.highlight { color: var(--accent); }
        #info.error { color: var(--wrong); }
        #info.gold { color: var(--gold); }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(10,14,26,0.92);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2vh;
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #overlay.visible {
            opacity: 1; pointer-events: auto;
        }

        #overlay h2 {
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 700; letter-spacing: -0.04em;
        }

        #overlay h2.win {
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #overlay h2.lose {
            color: var(--wrong);
        }

        #overlay p {
            color: var(--muted); font-size: 1rem;
            max-width: 280px; text-align: center;
            line-height: 1.5;
        }

        #overlay .final-stats {
            display: flex; gap: 3vw; margin: 1vh 0;
        }

        #overlay .final-stat {
            text-align: center;
        }

        #overlay .final-stat-val {
            font-size: 1.8rem; font-weight: 700; color: var(--text);
        }

        #overlay .final-stat-label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
        }

        .btn {
            padding: 14px 40px;
            border: none; border-radius: 12px;
            font-family: inherit; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            margin-top: 1vh;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0e1a;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(34,197,94,0.6);
        }

        .btn-primary:active { transform: scale(0.97); }

        /* Indicatore sequenza */
        #seq-dots {
            display: flex; gap: 6px; justify-content: center;
            min-height: 14px; flex-wrap: wrap;
            max-width: 90%;
        }

        .seq-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
            opacity: 0.3;
            transition: all 0.25s ease;
        }

        .seq-dot.shown { opacity: 0.7; background: var(--accent); }
        .seq-dot.current { opacity: 1; background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); transform: scale(1.3); }
        .seq-dot.done { opacity: 1; background: var(--accent); }
        .seq-dot.fail { opacity: 1; background: var(--wrong); }

        /* Particelle */
        .particle {
            position: fixed; pointer-events: none; z-index: 50;
            border-radius: 50%;
            animation: particleFly 0.7s ease-out forwards;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
        }

        /* Toast */
        #toast {
            position: fixed; top: 3vh; left: 50%; transform: translateX(-50%) translateY(-20px);
            z-index: 200;
            background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 22px; border-radius: 10px;
            font-size: 0.85rem; color: var(--text);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        #toast.show {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }

        /* Riduzione movimento */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <header id="header">
            <h1>Memory Grid Pro</h1>
            <div id="stats">
                <div class="stat">
                    <span class="stat-label">Livello</span>
                    <span class="stat-value" id="level-val">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Punteggio</span>
                    <span class="stat-value" id="score-val">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Record</span>
                    <span class="stat-value gold" id="best-val">0</span>
                </div>
            </div>
        </header>

        <div id="seq-dots"></div>

        <div id="grid-container">
            <div id="grid"></div>
        </div>

        <div id="info" class="highlight">Premi per iniziare</div>
    </div>

    <!-- Overlay iniziale / game over -->
    <div id="overlay" class="visible">
        <h2>Memory Grid</h2>
        <p>Memorizza la sequenza di celle illuminate e riproducila nell'ordine corretto. Ogni livello aggiunge un passo.</p>
        <button class="btn btn-primary" id="start-btn">Gioca</button>
    </div>

    <div id="toast"></div>

    <script>
        /* ============================
           CONFIGURAZIONE
        ============================ */
        const GRID_SIZE = 4;
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        const BASE_SHOW_TIME = 500;   // ms per cella nella sequenza (livello 1)
        const MIN_SHOW_TIME = 200;    // tempo minimo ad alte velocitŕ
        const SHOW_TIME_DECAY = 15;   // riduzione per livello
        const GAP_BETWEEN_CELLS = 150; // pausa tra una cella e l'altra
        const LEVEL_SCORE_BASE = 100;

        /* ============================
           STATO DEL GIOCO
        ============================ */
        let sequence = [];
        let playerIndex = 0;
        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('memorygrid_best') || '0');
        let gameState = 'idle'; // idle | showing | playing | gameover
        let cells = [];

        /* ============================
           RIFERIMENTI DOM
        ============================ */
        const gridEl = document.getElementById('grid');
        const infoEl = document.getElementById('info');
        const overlayEl = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const levelVal = document.getElementById('level-val');
        const scoreVal = document.getElementById('score-val');
        const bestVal = document.getElementById('best-val');
        const seqDotsEl = document.getElementById('seq-dots');
        const toastEl = document.getElementById('toast');

        /* ============================
           AUDIO (Web Audio API)
        ============================ */
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Ogni cella ha una frequenza unica (scala pentatonica estesa)
        const CELL_FREQS = [
            261.6, 293.7, 329.6, 392.0,
            440.0, 523.3, 587.3, 659.3,
            784.0, 880.0, 1047, 1175,
            1319, 1568, 1760, 2093
        ];

        function playTone(cellIndex, duration = 0.18, type = 'sine') {
            if (!audioCtx) return;
            const freq = CELL_FREQS[cellIndex % CELL_FREQS.length];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playErrorSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        function playLevelUpSound() {
            if (!audioCtx) return;
            [0, 100, 200].forEach((delay, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime([523, 659, 784][i], audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }, delay);
            });
        }

        /* ============================
           CREAZIONE GRIGLIA
        ============================ */
        function buildGrid() {
            gridEl.innerHTML = '';
            cells = [];
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.dataset.index = i;
                cell.setAttribute('role', 'button');
                cell.setAttribute('aria-label', `Cella ${i + 1}`);
                cell.setAttribute('tabindex', '0');
                cell.addEventListener('click', () => handleCellClick(i));
                cell.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleCellClick(i);
                    }
                });
                gridEl.appendChild(cell);
                cells.push(cell);
            }
        }

        /* ============================
           PUNTEGGI A DISPLAY
        ============================ */
        function updateDisplay() {
            levelVal.textContent = level;
            scoreVal.textContent = score;
            bestVal.textContent = bestScore;
        }

        function bumpStat(el) {
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 200);
        }

        /* ============================
           SEQUENZA DOT INDICATOR
        ============================ */
        function buildDots() {
            seqDotsEl.innerHTML = '';
            for (let i = 0; i < sequence.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'seq-dot';
                seqDotsEl.appendChild(dot);
            }
        }

        function updateDot(index, state) {
            const dots = seqDotsEl.children;
            if (dots[index]) {
                dots[index].className = 'seq-dot ' + state;
            }
        }

        function resetDots() {
            const dots = seqDotsEl.children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].className = 'seq-dot';
            }
        }

        /* ============================
           LOGICA DI GIOCO
        ============================ */
        function startGame() {
            ensureAudio();
            sequence = [];
            playerIndex = 0;
            level = 1;
            score = 0;
            gameState = 'idle';
            updateDisplay();
            overlayEl.classList.remove('visible');
            nextLevel();
        }

        function nextLevel() {
            // Aggiunge un passo alla sequenza (senza ripetere l'ultimo aggiunto, se possibile)
            let next;
            do {
                next = Math.floor(Math.random() * TOTAL_CELLS);
            } while (sequence.length > 0 && next === sequence[sequence.length - 1] && TOTAL_CELLS > 1);
            sequence.push(next);
            playerIndex = 0;

            updateDisplay();
            bumpStat(levelVal);
            buildDots();

            infoEl.className = '';
            infoEl.textContent = 'Osserva...';
            infoEl.classList.add('highlight');

            // Piccola pausa prima di mostrare la sequenza
            setTimeout(() => showSequence(), 600);
        }

        function getShowTime() {
            return Math.max(MIN_SHOW_TIME, BASE_SHOW_TIME - (level - 1) * SHOW_TIME_DECAY);
        }

        async function showSequence() {
            gameState = 'showing';
            setCellsDisabled(true);

            const showTime = getShowTime();

            for (let i = 0; i < sequence.length; i++) {
                if (gameState !== 'showing') return; // sicurezza

                const cellIdx = sequence[i];
                updateDot(i, 'current');
                activateCell(cellIdx, showTime);
                playTone(cellIdx, showTime / 1000 + 0.05);

                await wait(showTime);

                updateDot(i, 'shown');

                // Pausa tra celle
                if (i < sequence.length - 1) {
                    await wait(GAP_BETWEEN_CELLS);
                }
            }

            // Passa al turno del giocatore
            await wait(300);
            resetDots();
            gameState = 'playing';
            setCellsDisabled(false);
            infoEl.className = '';
            infoEl.textContent = 'Tocca la sequenza';
        }

        function activateCell(index, duration) {
            const cell = cells[index];
            cell.classList.add('active');
            setTimeout(() => {
                cell.classList.remove('active');
            }, duration);
        }

        function handleCellClick(index) {
            if (gameState !== 'playing') return;

            const expected = sequence[playerIndex];

            if (index === expected) {
                // Corretto
                cells[index].classList.add('player-hit');
                playTone(index, 0.15);
                updateDot(playerIndex, 'done');

                setTimeout(() => {
                    cells[index].classList.remove('player-hit');
                }, 200);

                playerIndex++;

                // Controlla se ha completato la sequenza
                if (playerIndex === sequence.length) {
                    gameState = 'idle';
                    setCellsDisabled(true);

                    // Punteggio: base + bonus velocitŕ livello
                    const levelScore = LEVEL_SCORE_BASE + (level - 1) * 25;
                    score += levelScore;
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('memorygrid_best', bestScore.toString());
                        bumpStat(bestVal);
                    }
                    updateDisplay();
                    bumpStat(scoreVal);

                    // Feedback visivo
                    infoEl.className = '';
                    infoEl.textContent = 'Esatto!';
                    infoEl.classList.add('highlight');

                    // Animazione onda sulla griglia
                    gridWaveClear();

                    playLevelUpSound();
                    spawnParticles(cells[index]);

                    // Livello successivo
                    setTimeout(() => {
                        level++;
                        nextLevel();
                    }, 1200);
                }
            } else {
                // Sbagliato
                gameState = 'gameover';
                setCellsDisabled(true);

                cells[index].classList.add('wrong');
                playErrorSound();

                // Segna tutti i dot rimanenti come falliti
                for (let i = playerIndex; i < sequence.length; i++) {
                    updateDot(i, 'fail');
                }

                infoEl.className = '';
                infoEl.textContent = 'Sbagliato!';
                infoEl.classList.add('error');

                // Mostra quale era quella corretta
                setTimeout(() => {
                    cells[index].classList.remove('wrong');
                    cells[expected].classList.add('active');
                    playTone(expected, 0.3);
                    setTimeout(() => {
                        cells[expected].classList.remove('active');
                        showGameOver();
                    }, 600);
                }, 700);
            }
        }

        function showGameOver() {
            const overlay = overlayEl;
            overlay.innerHTML = `
                <h2 class="lose">Game Over</h2>
                <p>Hai raggiunto il livello ${level} con ${score} punti</p>
                <div class="final-stats">
                    <div class="final-stat">
                        <div class="final-stat-val">${level}</div>
                        <div class="final-stat-label">Livello</div>
                    </div>
                    <div class="final-stat">
                        <div class="final-stat-val">${score}</div>
                        <div class="final-stat-label">Punteggio</div>
                    </div>
                    <div class="final-stat">
                        <div class="final-stat-val">${bestScore}</div>
                        <div class="final-stat-label">Record</div>
                    </div>
                </div>
                <button class="btn btn-primary" id="restart-btn">Riprova</button>
            `;
            overlay.classList.add('visible');
            document.getElementById('restart-btn').addEventListener('click', startGame);
        }

        /* ============================
           EFFETTI VISIVI
        ============================ */
        function setCellsDisabled(disabled) {
            cells.forEach(c => {
                if (disabled) c.classList.add('disabled');
                else c.classList.remove('disabled');
            });
        }

        function gridWaveClear() {
            cells.forEach((cell, i) => {
                const row = Math.floor(i / GRID_SIZE);
                const col = i % GRID_SIZE;
                const delay = (row + col) * 60;
                setTimeout(() => {
                    cell.classList.add('level-clear');
                    setTimeout(() => cell.classList.remove('level-clear'), 500);
                }, delay);
            });
        }

        function spawnParticles(fromEl) {
            const rect = fromEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const colors = ['#22c55e', '#4ade80', '#86efac', '#facc15', '#f8fafc'];

            for (let i = 0; i < 14; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 4 + Math.random() * 6;
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 80;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                p.style.cssText = `
                    left: ${cx - size/2}px; top: ${cy - size/2}px;
                    width: ${size}px; height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --dx: ${dx}px; --dy: ${dy}px;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 750);
            }
        }

        function showToast(msg, duration = 2000) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        /* ============================
           UTILITŔ
        ============================ */
        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        /* ============================
           AVVIO
        ============================ */
        buildGrid();
        updateDisplay();
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
