<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Grid - Statistiche</title>
    <style>
        :root { --bg: #1a1a2e; --cell: #0f3460; --highlight: #e94560; --wrong: #f39c12; --text: #ffffff; }
        body { margin: 0; height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        #stats-bar { display: flex; gap: 20px; margin-bottom: 10px; font-size: 1rem; color: #aaa; }
        #info { margin-bottom: 10px; font-size: 1.4rem; font-weight: bold; }
        #grid { display: grid; gap: 8px; width: 90vmin; height: 90vmin; max-width: 500px; max-height: 500px; }
        .cell { background: var(--cell); border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .cell.active { background: var(--highlight); }
        .cell.wrong { background: var(--wrong); }
    </style>
</head>
<body>

    <div id="stats-bar">
        <span>Best: <span id="best-score">0</span></span>
        <span>Media: <span id="avg-score">0.0</span></span>
    </div>
    <div id="info">Tocca per iniziare</div>
    <div id="grid"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gridEl = document.getElementById('grid');
        const info = document.getElementById('info');
        const bestEl = document.getElementById('best-score');
        const avgEl = document.getElementById('avg-score');
        
        let size = 4, level = 1, sequence = [], canClick = false;
        let totalLevelsCompleted = 0, gamesPlayed = 0, bestLevel = 0;

        function updateStats(lastLevel) {
            gamesPlayed++;
            totalLevelsCompleted += (lastLevel - 1);
            let avg = (totalLevelsCompleted / gamesPlayed).toFixed(1);
            if (lastLevel - 1 > bestLevel) bestLevel = lastLevel - 1;
            
            bestEl.innerText = bestLevel;
            avgEl.innerText = avg;
        }

        function playTone(idx) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(200 + (idx * 40), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function initGrid() {
            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.innerHTML = '';
            for(let i=0; i<size*size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => checkCell(i, cell);
                gridEl.appendChild(cell);
            }
        }

        async function startLevel() {
            canClick = false;
            info.innerText = "Livello " + level;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.className = 'cell');
            
            sequence = [];
            while(sequence.length < level + 2) {
                let r = Math.floor(Math.random() * (size * size));
                if(!sequence.includes(r)) sequence.push(r);
            }

            for(let idx of sequence) {
                cells[idx].classList.add('active');
                playTone(idx);
                await new Promise(r => setTimeout(r, 600));
                cells[idx].classList.remove('active');
                await new Promise(r => setTimeout(r, 200));
            }
            info.innerText = "Tocca!";
            canClick = true;
        }

        let clickedCount = 0;
        function checkCell(idx, el) {
            if(!canClick) return;
            playTone(idx);
            
            if(idx === sequence[clickedCount]) {
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 200);
                clickedCount++;
                if(clickedCount === sequence.length) {
                    level++;
                    clickedCount = 0;
                    startLevel();
                }
            } else {
                el.classList.add('wrong');
                canClick = false;
                updateStats(level);
                info.innerText = "Errore! Riprova";
                setTimeout(() => { level = 1; clickedCount = 0; startLevel(); }, 1500);
            }
        }

        document.body.onclick = () => { if(sequence.length === 0) { initGrid(); startLevel(); } };
    </script>
</body>
</html>
