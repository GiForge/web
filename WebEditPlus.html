<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudEdit Plus | Pro Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --toolbar-bg: #2d2d2d;
            --accent: #007acc;
            --text-color: #cccccc;
            --border: #444;
            --input-bg: #3c3c3c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #toolbar {
            height: 55px;
            background-color: var(--toolbar-bg);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            box-sizing: border-box;
            z-index: 10;
        }

        #search-bar {
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 8px 15px;
            display: none; 
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .search-group { display: flex; gap: 5px; align-items: center; }

        input[type="text"] {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        .actions { display: flex; gap: 8px; align-items: center; }

        button, select {
            background: #3c3c3c;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        button:hover { background: #505050; }
        button.primary { background: var(--accent); border: none; }
        
        select {
            background: var(--accent);
            border: none;
            outline: none;
            font-weight: bold;
        }

        .file-info {
            margin-left: auto;
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        #editor-container {
            height: calc(100% - 55px);
            width: 100%;
        }

        @media (max-width: 768px) {
            #toolbar { height: auto; padding: 10px; flex-wrap: wrap; justify-content: center; }
            .actions { width: 100%; justify-content: space-around; }
            button span { display: none; } 
            #editor-container { height: calc(100% - 95px); }
            #search-bar { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="actions">
        <button onclick="newFile()" title="Nuovo"><i class="fas fa-file"></i><span>Nuovo</span></button>
        <button onclick="openFile()" title="Apri"><i class="fas fa-folder-open"></i><span>Apri</span></button>
        <button onclick="saveFile()" title="Salva"><i class="fas fa-save"></i><span>Salva</span></button>
        <button onclick="toggleSearchBar()" title="Cerca (Ctrl+F)"><i class="fas fa-search"></i><span>Cerca</span></button>
        
        <select id="languageSelector" onchange="changeLanguage()">
            <option value="plaintext">Testo (.txt)</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="cpp">C++</option>
            <option value="json">JSON</option>
            <option value="sql">SQL</option>
            <option value="markdown">Markdown</option>
        </select>
    </div>
    <div class="file-info" id="fileNameDisplay">Senza nome.txt</div>
</div>

<div id="search-bar">
    <div class="search-group">
        <input type="text" id="searchInput" placeholder="Cerca (Invio per prossimo)...">
        <input type="text" id="replaceInput" placeholder="Sostituisci con...">
    </div>
    <div class="search-group">
        <button onclick="findNext()" title="Trova Prossimo (Invio)"><i class="fas fa-arrow-down"></i> Trova</button>
        <button onclick="replaceOnce()" title="Sostituisci selezionato"><i class="fas fa-exchange-alt"></i> Sostituisci</button>
        <button onclick="replaceAll()" class="primary" title="Sostituisci tutti"><i class="fas fa-clone"></i> Tutti</button>
        <button onclick="toggleSearchBar()" style="background:none; border:none; padding:5px;"><i class="fas fa-times"></i></button>
    </div>
</div>

<div id="editor-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

<script>
    let editor;
    let currentFileHandle = null;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "",
            language: 'plaintext',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: window.innerWidth < 600 ? 12 : 14,
            lineNumbers: "on",
            wordWrap: "on",
            minimap: { enabled: window.innerWidth > 600 },
            scrollBeyondLastLine: false,
            smoothScrolling: true,
            cursorBlinking: "smooth"
        });

        // Gestione tasto Invio nell'input di ricerca
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                findNext(e.shiftKey); // Shift+Invio cerca all'indietro
            }
        });

        window.addEventListener('resize', () => editor.layout());
    });

    // --- LOGICA SEARCH & REPLACE ---

    function toggleSearchBar() {
        const bar = document.getElementById('search-bar');
        const isVisible = bar.style.display === 'flex';
        bar.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) {
            const input = document.getElementById('searchInput');
            input.focus();
            input.select();
        }
        editor.layout();
    }

    function findNext(backwards = false) {
        const searchText = document.getElementById('searchInput').value;
        if (!searchText) return;

        const model = editor.getModel();
        const currentPos = editor.getPosition();
        
        let match;
        if (backwards) {
            // Ricerca all'indietro (Shift + Invio)
            match = model.findPreviousMatch(searchText, currentPos, false, false, null, true);
            if (!match || match.range.endLineNumber > currentPos.lineNumber) {
                const lastLine = model.getLineCount();
                const lastCol = model.getLineMaxColumn(lastLine);
                match = model.findPreviousMatch(searchText, new monaco.Position(lastLine, lastCol), false, false, null, true);
            }
        } else {
            // Ricerca in avanti (Invio)
            match = model.findNextMatch(searchText, currentPos, false, false, null, true);
            if (!match || match.range.startLineNumber < currentPos.lineNumber) {
                match = model.findNextMatch(searchText, new monaco.Position(1, 1), false, false, null, true);
            }
        }

        if (match) {
            editor.setSelection(match.range);
            editor.revealRangeInCenter(match.range, monaco.editor.ScrollType.Smooth);
            editor.focus();
        }
    }

    function replaceOnce() {
        const searchText = document.getElementById('searchInput').value;
        const replaceText = document.getElementById('replaceInput').value;
        if (!searchText) return;

        const selection = editor.getSelection();
        const model = editor.getModel();
        const selectedText = model.getValueInRange(selection);

        if (selectedText.toLowerCase() === searchText.toLowerCase()) {
            editor.executeEdits("search", [{
                range: selection,
                text: replaceText,
                forceMoveMarkers: true
            }]);
            findNext(); 
        } else {
            findNext();
        }
    }

    function replaceAll() {
        const searchText = document.getElementById('searchInput').value;
        const replaceText = document.getElementById('replaceInput').value;
        if (!searchText) return;

        const model = editor.getModel();
        const matches = model.findMatches(searchText, true, false, false, null, true);

        if (matches.length > 0) {
            const edits = matches.map(m => ({ range: m.range, text: replaceText }));
            editor.executeEdits("search", edits);
            showStatus(`Sostituite ${matches.length} occorrenze`);
        }
    }

    // --- FILE SYSTEM (Standard Web API) ---

    async function newFile() {
        if (confirm("Creare un nuovo file?")) {
            editor.setValue("");
            currentFileHandle = null;
            updateUI("Senza nome.txt", "plaintext");
        }
    }

    async function openFile() {
        try {
            [currentFileHandle] = await window.showOpenFilePicker();
            const file = await currentFileHandle.getFile();
            const contents = await file.text();
            editor.setValue(contents);
            updateUI(file.name, getLanguageFromExt(file.name.split('.').pop().toLowerCase()));
        } catch (e) {}
    }

    async function saveFile() {
        if (!currentFileHandle) return saveFileAs();
        try {
            const writable = await currentFileHandle.createWritable();
            await writable.write(editor.getValue());
            await writable.close();
            showStatus("Salvato");
        } catch (e) { alert(e.message); }
    }

    async function saveFileAs() {
        try {
            currentFileHandle = await window.showSaveFilePicker({
                suggestedName: document.getElementById('fileNameDisplay').innerText
            });
            await saveFile();
            const file = await currentFileHandle.getFile();
            updateUI(file.name, getLanguageFromExt(file.name.split('.').pop()));
        } catch (e) {}
    }

    function getLanguageFromExt(ext) {
        const map = { 'js': 'javascript', 'py': 'python', 'html': 'html', 'css': 'css', 'json': 'json', 'md': 'markdown', 'cpp': 'cpp' };
        return map[ext] || 'plaintext';
    }

    function changeLanguage() {
        monaco.editor.setModelLanguage(editor.getModel(), document.getElementById('languageSelector').value);
    }

    function updateUI(name, lang) {
        document.getElementById('fileNameDisplay').innerText = name;
        document.getElementById('languageSelector').value = lang;
        monaco.editor.setModelLanguage(editor.getModel(), lang);
    }

    function showStatus(msg) {
        const info = document.getElementById('fileNameDisplay');
        const old = info.innerText;
        info.innerText = "✓ " + msg;
        setTimeout(() => info.innerText = old, 2000);
    }
</script>
</body>
</html>
