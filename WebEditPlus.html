<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudEdit Plus | Pro Editor</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
    --bg-dark:#1e1e1e;
    --toolbar-bg:#2d2d2d;
    --accent:#007acc;
    --text-color:#ccc;
    --border:#444;
    --input-bg:#3c3c3c;
    --menu-bg:#252526;
}

html,body{
    margin:0;height:100%;
    background:var(--bg-dark);
    color:var(--text-color);
    font-family:'Segoe UI',Tahoma,sans-serif;
    overflow:hidden;
}

/* ===== TOOLBAR ===== */
#toolbar{
    height:48px;
    background:var(--toolbar-bg);
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 15px;
    border-bottom:1px solid var(--border);
}

.actions{display:flex;gap:6px;align-items:center}

button,select{
    background:#3c3c3c;
    color:white;
    border:1px solid var(--border);
    border-radius:4px;
    padding:6px 10px;
    font-size:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background .15s, border-color .15s;
}

button:hover{background:#505050}
select{background:var(--accent);border:none;font-weight:bold}

button.toggle-on{
    background:var(--accent);
    border-color:var(--accent);
}

.file-info{
    margin-left:auto;
    font-size:12px;
    color:#888;
    max-width:220px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

/* ===== MENU DROPDOWN ===== */
.menu-wrapper{
    position:relative;
}

.menu-btn{
    background:var(--accent) !important;
    border-color:var(--accent) !important;
    font-weight:bold;
    border-radius:4px;
}

.menu-btn:hover{
    filter:brightness(1.15);
    background:var(--accent) !important;
}

.menu-panel{
    display:none;
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    min-width:240px;
    background:var(--menu-bg);
    border:1px solid var(--border);
    border-radius:6px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);
    z-index:1000;
    padding:6px 0;
    animation:menuIn .12s ease-out;
}

@keyframes menuIn{
    from{opacity:0;transform:translateY(-6px)}
    to{opacity:1;transform:translateY(0)}
}

.menu-panel.open{display:block}

.menu-panel button{
    width:100%;
    background:transparent;
    border:none;
    border-radius:0;
    padding:9px 16px;
    justify-content:flex-start;
    font-size:13px;
    gap:10px;
}

.menu-panel button:hover{
    background:var(--accent);
}

.menu-panel button i{
    width:16px;
    text-align:center;
    color:#888;
    font-size:13px;
}

.menu-panel button:hover i{
    color:white;
}

.menu-separator{
    height:1px;
    background:var(--border);
    margin:4px 12px;
}

.menu-lang{
    padding:8px 16px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.menu-lang label{
    font-size:11px;
    color:#888;
    text-transform:uppercase;
    letter-spacing:.5px;
}

.menu-lang select{
    width:100%;
    border-radius:4px;
}

/* ===== TABS ===== */
#tabs{
    height:34px;
    display:flex;
    align-items:center;
    background:#252526;
    border-bottom:1px solid var(--border);
    overflow-x:auto;
}

.tab{
    padding:6px 12px;
    display:flex;
    gap:8px;
    align-items:center;
    cursor:pointer;
    border-right:1px solid var(--border);
}

.tab.active{background:#1e1e1e;color:white}
.tab i{font-size:12px;color:#aaa}
.tab i:hover{color:#ff5c5c}
.tab input{
    background:#1e1e1e;
    color:white;
    border:1px solid var(--accent);
    width:150px;
}

/* ===== SEARCH ===== */
#search-bar{
    display:none;
    background:var(--toolbar-bg);
    border-bottom:1px solid var(--border);
    padding:8px 15px;
    align-items:center;
    gap:8px;
}

#search-bar.visible{display:flex}
#search-bar input{flex:1;min-width:0}

/* ===== EDITOR ===== */
#editor-container{
    height:calc(100% - 48px - 34px);
}

/* ===== SEPARATORE TOOLBAR ===== */
.toolbar-sep{
    width:1px;
    height:24px;
    background:var(--border);
    margin:0 4px;
}

@media(max-width:768px){
    button span{display:none}
    .menu-panel{min-width:200px}
}
</style>
</head>

<body>

<div id="toolbar">
    <div class="actions">

        <!-- MENU PRINCIPALE -->
        <div class="menu-wrapper">
            <button class="menu-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i><span>Menu</span>
            </button>
            <div id="menuPanel" class="menu-panel">

                <button onclick="newFile(); closeMenu()">
                    <i class="fas fa-file"></i> Nuovo file
                </button>
                <button onclick="openFile(); closeMenu()">
                    <i class="fas fa-folder-open"></i> Apri file
                </button>

                <div class="menu-separator"></div>

                <button onclick="saveFile(); closeMenu()">
                    <i class="fas fa-save"></i> Salva
                </button>
                <button onclick="saveFileAs(); closeMenu()">
                    <i class="fas fa-file-export"></i> Salva con nome
                </button>

                <div class="menu-separator"></div>

                <button onclick="toggleSearchBar(); closeMenu()">
                    <i class="fas fa-search"></i> Cerca e sostituisci
                </button>

                <div class="menu-separator"></div>

                <div class="menu-lang">
                    <label>Linguaggio</label>
                    <select id="languageSelector" onchange="changeLanguage()">
                        <option value="plaintext">Testo</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="python">Python</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="json">JSON</option>
                        <option value="cpp">C++</option>
                        <option value="markdown">Markdown</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="toolbar-sep"></div>

        <!-- FONT E WRAP -->
        <button onclick="decreaseFont()" title="Riduci font">A−</button>
        <button onclick="increaseFont()" title="Aumenta font">A+</button>

        <div class="toolbar-sep"></div>

        <button id="wrapBtn" onclick="toggleWrap()" title="A capo automatico">
            <i class="fas fa-text-width"></i><span>Wrap</span>
        </button>

        <div class="toolbar-sep"></div>

        <!-- MENU CONTESTUALE EDITOR (MOBILE) -->
        <button onclick="openEditorContextMenu()" title="Menu contestuale editor">
            <i class="fas fa-ellipsis-vertical"></i>
        </button>
    </div>

    <div class="file-info" id="fileNameDisplay">Senza nome</div>
</div>

<div id="tabs"></div>

<div id="search-bar">
    <input id="searchInput" placeholder="Cerca…">
    <input id="replaceInput" placeholder="Sostituisci…">
    <button onclick="findNext()">↓</button>
    <button onclick="replaceOnce()">⤾</button>
    <button onclick="replaceAll()">⧉</button>
</div>

<div id="editor-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

<script>
let editor, tabs=[], activeTab=null, untitledCount=1;
let fontSize = 14;
let searchBarVisible = false;
let wordWrapEnabled = false;
let menuOpen = false;

/* ===== MONACO INIT ===== */
require.config({paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs'}});
require(['vs/editor/editor.main'],()=>{
    editor = monaco.editor.create(document.getElementById('editor-container'),{
        theme:'vs-dark',
        language:'plaintext',
        automaticLayout:true,
        fontSize,
        wordWrap:'off'
    });

    /* Select All nel menu contestuale */
    editor.addAction({
        id:'context-select-all',
        label:'Select All',
        keybindings:[monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyA],
        contextMenuGroupId:'3_cutcopypaste',
        contextMenuOrder:3.5,
        run:function(ed){
            ed.setSelection(ed.getModel().getFullModelRange());
        }
    });

    newFile();

    document.getElementById('searchInput').addEventListener('keydown',function(e){
        if(e.key==='Enter'){
            e.preventDefault();
            e.shiftKey ? findPrevious() : findNext();
        }
    });

    /* Chiudi menu cliccando fuori */
    document.addEventListener('click',function(e){
        if(menuOpen && !e.target.closest('.menu-wrapper')){
            closeMenu();
        }
    });
});

/* ===== MENU ===== */
function toggleMenu(){
    menuOpen = !menuOpen;
    document.getElementById('menuPanel').classList.toggle('open', menuOpen);
}

function closeMenu(){
    menuOpen = false;
    document.getElementById('menuPanel').classList.remove('open');
}

/* ===== CONTEXT MENU EDITOR (MOBILE) ===== */
function openEditorContextMenu(){
    if(!editor) return;
    closeMenu();
    editor.focus();
    const contrib = editor.getContribution('editor.contrib.contextmenu');
    if(contrib && contrib.showContextMenu){
        contrib.showContextMenu();
    }
}

/* ===== WRAP TOGGLE ===== */
function toggleWrap(){
    wordWrapEnabled = !wordWrapEnabled;
    editor.updateOptions({wordWrap: wordWrapEnabled ? 'on' : 'off'});
    document.getElementById('wrapBtn').classList.toggle('toggle-on', wordWrapEnabled);
}

/* ===== SEARCH BAR TOGGLE ===== */
function toggleSearchBar(){
    const bar = document.getElementById('search-bar');
    searchBarVisible = !searchBarVisible;
    bar.classList.toggle('visible', searchBarVisible);
    if(searchBarVisible){
        document.getElementById('searchInput').focus();
    } else {
        editor.focus();
    }
}

/* ===== FONT SIZE ===== */
function increaseFont(){
    fontSize++;
    editor.updateOptions({fontSize});
}
function decreaseFont(){
    if(fontSize>8){fontSize--;}
    editor.updateOptions({fontSize});
}

/* ===== CORE ===== */
function createTab(name,content='',lang='plaintext',handle=null){
    const id='tab-'+Date.now()+Math.random();
    const model=monaco.editor.createModel(content,lang);
    const tab={id,name,model,handle};
    tabs.push(tab);

    const el=document.createElement('div');
    el.className='tab'; el.dataset.id=id;

    const title=document.createElement('span');
    title.textContent=name;

    title.ondblclick=()=>{
        const inp=document.createElement('input');
        inp.value=tab.name;
        el.replaceChild(inp,title);
        inp.focus();
        inp.onkeydown=e=>{
            if(e.key==='Enter'){
                tab.name=inp.value;
                title.textContent=tab.name;
                el.replaceChild(title,inp);
                fileNameDisplay.textContent=tab.name;
            }
        };
    };

    const close=document.createElement('i');
    close.className='fas fa-times';
    close.onclick=e=>{
        e.stopPropagation();
        closeTab(id);
    };

    el.onclick=()=>switchTab(id);
    el.append(title,close);
    document.getElementById('tabs').appendChild(el);
    switchTab(id);
}

function switchTab(id){
    activeTab=tabs.find(t=>t.id===id);
    editor.setModel(activeTab.model);
    document.querySelectorAll('.tab')
        .forEach(t=>t.classList.toggle('active',t.dataset.id===id));
    fileNameDisplay.textContent=activeTab.name;
    languageSelector.value=activeTab.model.getLanguageId();
}

function closeTab(id){
    const i=tabs.findIndex(t=>t.id===id);
    if(i>=0){
        tabs[i].model.dispose();
        document.querySelector(`.tab[data-id="${id}"]`).remove();
        tabs.splice(i,1);
        if(tabs.length) switchTab(tabs[0].id);
    }
}

function newFile(){createTab(`Senza nome ${untitledCount++}.txt`);}

async function openFile(){
    try{
        const [h]=await window.showOpenFilePicker();
        const f=await h.getFile();
        createTab(f.name,await f.text(),getLang(f.name),h);
    }catch(e){}
}

async function saveFile(){
    if(!activeTab.handle){
        return saveFileAs();
    }
    try{
        const w=await activeTab.handle.createWritable();
        await w.write(editor.getValue());
        await w.close();
    }catch(e){}
}

async function saveFileAs(){
    try{
        const handle=await window.showSaveFilePicker({suggestedName:activeTab.name});
        const w=await handle.createWritable();
        await w.write(editor.getValue());
        await w.close();
        activeTab.handle=handle;
        const newName=handle.name;
        activeTab.name=newName;
        const tabEl=document.querySelector(`.tab[data-id="${activeTab.id}"] span`);
        if(tabEl) tabEl.textContent=newName;
        fileNameDisplay.textContent=newName;
        const newLang=getLang(newName);
        if(newLang!==activeTab.model.getLanguageId()){
            monaco.editor.setModelLanguage(activeTab.model,newLang);
            languageSelector.value=newLang;
        }
    }catch(e){}
}

/* ===== SEARCH ===== */
function findNext(){
    const term=document.getElementById('searchInput').value;
    if(!term) return;
    const r=editor.getModel()
        .findNextMatch(term,editor.getPosition(),false,false,null,true);
    if(r){
        editor.setSelection(r.range);
        editor.revealRangeInCenter(r.range);
    }
}

function findPrevious(){
    const term=document.getElementById('searchInput').value;
    if(!term) return;
    const r=editor.getModel()
        .findPreviousMatch(term,editor.getPosition(),false,false,null,true);
    if(r){
        editor.setSelection(r.range);
        editor.revealRangeInCenter(r.range);
    }
}

function replaceOnce(){
    const term=document.getElementById('searchInput').value;
    const replacement=document.getElementById('replaceInput').value;
    if(!term) return;
    const sel=editor.getSelection();
    if(!sel.isEmpty() && editor.getModel().getValueInRange(sel)===term){
        editor.executeEdits("",[{range:sel,text:replacement}]);
    }
    findNext();
}

function replaceAll(){
    const term=document.getElementById('searchInput').value;
    const replacement=document.getElementById('replaceInput').value;
    if(!term) return;
    const m=editor.getModel();
    const ms=m.findMatches(term,true,false,false,null,true);
    editor.executeEdits("",ms.map(x=>({range:x.range,text:replacement})));
}

/* ===== UTILS ===== */
function getLang(name){
    return{
        js:'javascript',java:'java',py:'python',
        html:'html',css:'css',json:'json',
        cpp:'cpp',md:'markdown',txt:'plaintext'
    }[name.split('.').pop()]||'plaintext';
}

function changeLanguage(){
    monaco.editor.setModelLanguage(activeTab.model,languageSelector.value);
}
</script>

</body>
</html>
