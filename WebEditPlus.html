<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CloudEdit Plus | Pro Editor</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
    --bg-dark:#1e1e1e;
    --toolbar-bg:#2d2d2d;
    --accent:#007acc;
    --text-color:#ccc;
    --border:#444;
    --input-bg:#3c3c3c;
}

html,body{
    margin:0;
    height:100%;
    background:var(--bg-dark);
    color:var(--text-color);
    font-family:'Segoe UI',Tahoma,sans-serif;
    overflow:hidden;
}

/* TOOLBAR */
#toolbar{
    height:55px;
    background:var(--toolbar-bg);
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 15px;
    border-bottom:1px solid var(--border);
}

.actions{display:flex;gap:8px}

button,select{
    background:#3c3c3c;
    color:#fff;
    border:1px solid var(--border);
    border-radius:4px;
    padding:6px 12px;
    cursor:pointer;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:6px;
}
button:hover{background:#505050}
button.primary{background:var(--accent);border:none}
select{background:var(--accent);border:none;font-weight:bold}

.file-info{
    margin-left:auto;
    font-size:12px;
    color:#888;
    max-width:200px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* TAB BAR */
#tabs{
    height:34px;
    display:flex;
    align-items:center;
    background:#252526;
    border-bottom:1px solid var(--border);
    overflow-x:auto;
}

.tab{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 12px;
    cursor:pointer;
    border-right:1px solid var(--border);
    font-size:13px;
    white-space:nowrap;
}
.tab.active{
    background:#1e1e1e;
    color:#fff;
}
.tab i{
    font-size:12px;
    color:#999;
}
.tab i:hover{color:#ff5c5c}

/* SEARCH BAR */
#search-bar{
    display:none;
    background:var(--toolbar-bg);
    border-bottom:1px solid var(--border);
    padding:8px 15px;
    gap:8px;
    flex-wrap:wrap;
}
input[type=text]{
    background:var(--input-bg);
    border:1px solid var(--border);
    color:#fff;
    padding:6px 10px;
    border-radius:4px;
}

/* EDITOR */
#editor-container{
    height:calc(100% - 55px - 34px);
}
@media(max-width:768px){
    button span{display:none}
    #editor-container{height:calc(100% - 95px - 34px)}
}
</style>
</head>

<body>

<div id="toolbar">
    <div class="actions">
        <button onclick="newFile()"><i class="fas fa-file"></i><span>Nuovo</span></button>
        <button onclick="openFile()"><i class="fas fa-folder-open"></i><span>Apri</span></button>
        <button onclick="saveFile()"><i class="fas fa-save"></i><span>Salva</span></button>
        <button onclick="toggleSearchBar()"><i class="fas fa-search"></i><span>Cerca</span></button>

        <select id="languageSelector" onchange="changeLanguage()">
            <option value="plaintext">Testo</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="json">JSON</option>
            <option value="cpp">C++</option>
            <option value="markdown">Markdown</option>
        </select>
    </div>
    <div class="file-info" id="fileNameDisplay">Senza nome</div>
</div>

<div id="tabs"></div>

<div id="search-bar">
    <input id="searchInput" placeholder="Cerca...">
    <input id="replaceInput" placeholder="Sostituisci...">
    <button onclick="findNext()"><i class="fas fa-arrow-down"></i></button>
    <button onclick="replaceOnce()"><i class="fas fa-exchange-alt"></i></button>
    <button onclick="replaceAll()" class="primary"><i class="fas fa-clone"></i></button>
</div>

<div id="editor-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

<script>
let editor;
let tabs=[];
let activeTab=null;
let untitledCount=1;

require.config({paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs'}});
require(['vs/editor/editor.main'],()=>{
    editor=monaco.editor.create(document.getElementById('editor-container'),{
        value:'',
        language:'plaintext',
        theme:'vs-dark',
        automaticLayout:true,
        wordWrap:'on',
        minimap:{enabled:true}
    });
    newFile();
});

/* TAB SYSTEM */

function createTab(name,value='',lang='plaintext',handle=null){
    const id='tab-'+Date.now()+Math.random();
    const model=monaco.editor.createModel(value,lang);
    const tab={id,name,model,handle};
    tabs.push(tab);

    const el=document.createElement('div');
    el.className='tab';
    el.dataset.id=id;
    el.innerHTML=`<span>${name}</span><i class="fas fa-times"></i>`;
    el.onclick=()=>switchTab(id);
    el.querySelector('i').onclick=e=>{
        e.stopPropagation();
        closeTab(id);
    };
    document.getElementById('tabs').appendChild(el);
    switchTab(id);
}

function switchTab(id){
    const tab=tabs.find(t=>t.id===id);
    if(!tab)return;
    activeTab=tab;
    editor.setModel(tab.model);
    document.querySelectorAll('.tab').forEach(t=>{
        t.classList.toggle('active',t.dataset.id===id);
    });
    updateUI(tab.name,tab.model.getLanguageId());
}

function closeTab(id){
    const i=tabs.findIndex(t=>t.id===id);
    if(i===-1)return;
    tabs[i].model.dispose();
    document.querySelector(`.tab[data-id="${id}"]`).remove();
    tabs.splice(i,1);
    if(activeTab?.id===id && tabs.length) switchTab(tabs[Math.max(0,i-1)].id);
}

/* FILE OPERATIONS */

function newFile(){
    createTab(`Senza nome ${untitledCount++}.txt`);
}

async function openFile(){
    const [h]=await window.showOpenFilePicker();
    const f=await h.getFile();
    createTab(f.name,await f.text(),getLang(f.name),h);
}

async function saveFile(){
    if(!activeTab)return;
    if(!activeTab.handle){
        activeTab.handle=await window.showSaveFilePicker({suggestedName:activeTab.name});
    }
    const w=await activeTab.handle.createWritable();
    await w.write(activeTab.model.getValue());
    await w.close();
    showStatus("Salvato");
}

/* SEARCH & REPLACE */

function toggleSearchBar(){
    const b=document.getElementById('search-bar');
    b.style.display=b.style.display==='flex'?'none':'flex';
}

function findNext(){
    const t=searchInput.value;
    if(!t)return;
    const m=editor.getModel();
    const p=editor.getPosition();
    const r=m.findNextMatch(t,p,false,false,null,true);
    if(r){editor.setSelection(r.range);editor.revealRangeInCenter(r.range);}
}

function replaceOnce(){
    const s=editor.getSelection();
    editor.executeEdits("",[{range:s,text:replaceInput.value}]);
    findNext();
}

function replaceAll(){
    const t=searchInput.value;
    const m=editor.getModel();
    const ms=m.findMatches(t,true,false,false,null,true);
    editor.executeEdits("",ms.map(x=>({range:x.range,text:replaceInput.value})));
}

/* UTILS */

function getLang(n){
    const e=n.split('.').pop();
    return {js:'javascript',py:'python',html:'html',css:'css',json:'json',md:'markdown',cpp:'cpp'}[e]||'plaintext';
}

function changeLanguage(){
    if(activeTab) monaco.editor.setModelLanguage(activeTab.model,languageSelector.value);
}

function updateUI(n,l){
    fileNameDisplay.innerText=n;
    languageSelector.value=l;
}

function showStatus(t){
    const el=fileNameDisplay;
    const o=el.innerText;
    el.innerText='✓ '+t;
    setTimeout(()=>el.innerText=o,2000);
}
</script>

</body>
</html>
