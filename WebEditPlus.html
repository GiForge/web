<!DOCTYPE html>
<html>
<head>
    <title>Web Edit Plus</title>
    <script>
        function openModal() {
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        function replaceSingle() {
            const caseSensitive = document.getElementById('caseSensitive').checked;
            const findText = document.getElementById('findText').value;
            const replaceText = document.getElementById('replaceText').value;
            const editor = document.getElementById('editor');
            const regex = new RegExp(findText, caseSensitive ? 'g' : 'gi');
            editor.value = editor.value.replace(regex, replaceText);
            closeModal();
        }
        function replaceAll() {
            const caseSensitive = document.getElementById('caseSensitive').checked;
            const findText = document.getElementById('findText').value;
            const replaceText = document.getElementById('replaceText').value;
            const editor = document.getElementById('editor');
            const regex = new RegExp(findText, caseSensitive ? 'g' : 'gi');
            editor.value = editor.value.replace(regex, replaceText);
            closeModal();
        }
    </script>
</head>
<body>
    <h1>Web Edit Plus</h1>
    <textarea id="editor" rows="20" cols="80"></textarea><br>
    <button onclick="openModal()">Find and Replace</button>

    <div id="modal" style="display:none;">
        <h2>Find and Replace</h2>
        <label for="findText">Find:</label>
        <input type="text" id="findText"><br>
        <label for="replaceText">Replace with:</label>
        <input type="text" id="replaceText"><br>
        <input type="checkbox" id="caseSensitive"> Case Sensitive<br>
        <button onclick="replaceSingle()">Replace Single</button>
        <button onclick="replaceAll()">Replace All</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</body>
</html>
