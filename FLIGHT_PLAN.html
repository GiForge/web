<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Flight Planner Pro - Combat Cyber-Grid Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CORE STYLE: COMBAT GAMING DEEP DARK & NEON BLUE --- */
        body { 
            font-family: 'Consolas', 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #060913; 
            color: #00f0ff;
            overflow: hidden; 
        }

        /* --- FILTRO MAPPA RADAR MILITARE TATTICO COBALTO --- */
        .leaflet-container {
            background: #02050e !important;
        }
.leaflet-tile-layer {
    /* Filtro rimosso per accogliere la Dark Mode nativa */
}
        /* --- STRUTTURE COSTRUZIONE CORAZZATA E HUD --- */
        #top-panel { 
            background: linear-gradient(180deg, #0b1122 0%, #050814 100%); 
            color: #ffffff; 
            padding: 14px 24px; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; 
            border-bottom: 2px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
        }
        
        .controls { display: flex; gap: 14px; align-items: center; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%; }
        #map { flex: 1; min-width: 200px; z-index: 1; cursor: crosshair; }
        
        #resizer { 
            width: 8px; 
            cursor: col-resize; 
            background: #0b1428; 
            z-index: 1000; 
            transition: background 0.2s;
            border-left: 1px solid #00f0ff;
            border-right: 1px solid #00f0ff;
        }
        #resizer:hover { background: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
        
        #sidebar { 
            width: 420px; 
            min-width: 300px; 
            background: #050814; 
            padding: 20px; 
            overflow-y: auto; 
            border-left: 2px solid #00f0ff; 
            display: flex; 
            flex-direction: column; 
            z-index: 2; 
            box-shadow: -5px 0 25px rgba(0, 5, 15, 0.9);
        }
        
        #mouse-coords { 
            position: absolute; 
            bottom: 25px; 
            left: 10px; 
            background: rgba(4, 7, 16, 0.9); 
            color: #00f0ff; 
            padding: 10px 16px; 
            border: 1px solid #005588;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 8px rgba(0, 240, 255, 0.1);
            font-family: 'Consolas', monospace; 
            font-size: 11px; 
            z-index: 1000; 
            pointer-events: none; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* --- ELEMENTI DI INPUT CYBER NEON --- */
        input[type="text"], input[type="number"], select {
            background: #091224;
            border: 1px solid #005588;
            color: #ffffff;
            padding: 8px 12px;
            font-family: 'Consolas', monospace;
            border-radius: 0px; 
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00f0ff;
            background: #0d1b36;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            color: #00f0ff;
        }

        /* --- PULSANTI COMBAT NEON MODE --- */
        button { 
            cursor: pointer; 
            padding: 9px 16px; 
            border: 1px solid #005588; 
            background: #091224;
            color: #00f0ff;
            border-radius: 0px; 
            font-weight: bold; 
            font-family: 'Consolas', monospace;
            text-transform: uppercase;
            font-size: 11px; 
            transition: all 0.2s ease;
            box-shadow: inset 0 0 4px rgba(0, 240, 255, 0.2);
        }
        button:hover {
            background: #00f0ff;
            color: #02050e;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
        
        .btn-import { 
            background: transparent; 
            color: #00f0ff; 
            border: 1px solid #00f0ff;
            text-transform: uppercase;
            box-shadow: inset 0 0 6px rgba(0, 240, 255, 0.2);
        }
        .btn-import:hover {
            background: rgba(0, 240, 255, 0.15);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        
        .btn-reset-all { 
            background: transparent; 
            color: #ff2255; 
            border: 1px solid #ff2255;
            box-shadow: inset 0 0 6px rgba(255, 34, 85, 0.2);
        }
        .btn-reset-all:hover {
            background: #ff2255;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 34, 85, 0.5);
        }
        
        .btn-copy { 
            background: #0d1b36; 
            color: #00f0ff; 
            border: 1px solid #00f0ff;
            width: 100%; 
            margin-bottom: 15px; 
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 12px;
        }
        .btn-copy:hover {
            background: #00f0ff;
            color: #050814;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }
        
        /* --- BARRA DI INTERCETTAZIONE TATTICA --- */
        .search-bar { 
            background: #050814; 
            padding: 12px 24px; 
            display: flex; 
            gap: 14px; 
            align-items: center; 
            color: #5588aa; 
            font-size: 12px; 
            flex-shrink: 0; 
            border-bottom: 1px solid #005588;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .search-bar span { font-weight: bold; color: #00f0ff; text-transform: uppercase; letter-spacing: 0.5px;}

        /* --- BLOCCHI DI GESTIONE TRAIETTORIE --- */
        .route-manager { 
            background: #091224; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid #005588; 
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }
        .route-select-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .route-select-row select { flex: 1; }
        
        .airport-input-group { display: flex; align-items: center; gap: 8px; flex: 1; }
        .airport-input-group label { color: #00f0ff; font-weight: bold; text-shadow: 0 0 5px rgba(0,240,255,0.4); }
        .airport-input-group input { width: 100%; text-transform: uppercase; }
        
        .param-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
            background: #091224; 
            padding: 14px; 
            border: 1px solid #005588; 
            font-size: 11px; 
        }
        .param-grid label { color: #5588aa; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .param-grid input { width: 100%; box-sizing: border-box; }
        
        /* --- OUTPUT DI SISTEMA TERMINALE CYBER --- */
        pre { 
            background: #02050a; 
            color: #33ff66; 
            padding: 15px; 
            font-size: 11px; 
            font-family: 'Consolas', monospace; 
            flex-grow: 1; 
            overflow: auto; 
            border: 1px solid #005588; 
            margin-top: 10px; 
            min-height: 150px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 0 10px rgba(51, 255, 102, 0.1);
        }
        
        #file-input, #project-input { display: none; }
        
        /* --- ETICHETTE E NOTIFICHE HUD --- */
        .custom-marker-tag { 
            background: #ffaa00; 
            color: #02050e; 
            padding: 2px 6px; 
            font-size: 9px; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 8px; 
            box-shadow: 0 0 8px #ffaa00;
        }
        .legend-indicator { font-size: 11px; margin-left: 20px; display: flex; gap: 20px; align-items: center; color: #5588aa; text-transform: uppercase; }
        
        /* --- RETICOLI POPUP (HUD TACTICAL SCREEN) --- */
        .leaflet-popup-content-wrapper {
            background: rgba(5, 10, 25, 0.95) !important;
            color: #ffffff !important;
            border: 1px solid #00f0ff;
            border-radius: 0px !important;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4) !important;
        }
        .leaflet-popup-content {
            margin: 14px;
        }
        .leaflet-popup-tip {
            background: #050a19 !important;
            border: 1px solid #00f0ff;
        }
        .popup-action-btn { 
            margin-top: 10px; 
            width: 100%; 
            border: 1px solid #005588; 
            padding: 9px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 10px; 
            background: #091224;
            color: #fff;
        }
        .btn-add { border-color: #00f0ff; color: #00f0ff; box-shadow: inset 0 0 5px rgba(0,240,255,0.2); }
        .btn-add:hover { background: #00f0ff; color: #02050e; box-shadow: 0 0 10px #00f0ff; }
        .btn-remove { border-color: #ffaa00; color: #ffaa00; box-shadow: inset 0 0 5px rgba(255,170,0,0.2); }
        .btn-remove:hover { background: #ffaa00; color: #02050e; box-shadow: 0 0 10px #ffaa00; }
        .btn-delete-fix { background: #ff2255; color: #fff; border: 1px solid #ffffff; }
        .btn-delete-fix:hover { background: #ff5588; box-shadow: 0 0 10px #ff2255; }

        .storage-box { background: #02050e; padding: 12px; border: 1px solid #005588; margin-top: auto; display: flex; gap: 10px; }
        .btn-save-proj { background: transparent; border: 1px solid #00ffaa; color: #00ffaa; flex: 1; box-shadow: inset 0 0 5px rgba(0,255,170,0.1); }
        .btn-save-proj:hover { background: #00ffaa; color: #02050e; box-shadow: 0 0 15px rgba(0,255,170,0.4); }
        .btn-load-proj { background: transparent; border: 1px solid #ad66ff; color: #ad66ff; flex: 1; display: inline-block; text-align: center; line-height: 28px; font-weight: bold; font-size: 11px; cursor: pointer; box-shadow: inset 0 0 5px rgba(173,102,255,0.1);}
        .btn-load-proj:hover { background: #ad66ff; color: #02050e; box-shadow: 0 0 15px rgba(173,102,255,0.4); }

        /* --- GLOW RADAR VECTOR GRAPHICS --- */
        .fix-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: visible !important;
        }

        .fix-label {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 0px 0px 4px #00f0ff, 2px 2px 2px #000;
            white-space: nowrap;
            margin-top: 6px;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        /* --- RETICOLI NEON (CYAN HUD) --- */
        .triangle-marker {
            width: 14px;
            height: 14px;
            background-color: #00f0ff;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            flex-shrink: 0;
            filter: drop-shadow(0px 0px 5px #00f0ff);
        }

        .diamond-container {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .diamond-marker {
            width: 10px;
            height: 10px;
            transform: rotate(45deg);
            border: 1.5px solid #ffaa00;
            background-color: #ffaa00;
            box-sizing: border-box;
            filter: drop-shadow(0px 0px 5px #ffaa00);
        }
    </style>
</head>

            </div>
            <div class="route-select-row">
                <label style="font-size:11px; color:#5588aa; text-transform: uppercase; font-weight: bold;">Attiva:</label>
                <select id="active-route-select" style="width: 100%;"></select>
            </div>
            
            <div class="route-select-row" style="margin-top: 15px; background: #050a14; padding: 12px; border: 1px dashed #005588; display: flex; gap: 10px;">
                <div class="airport-input-group">
                    <label style="font-size:11px; font-weight:bold;">DEP:</label>
                    <input type="text" id="route-dep" list="aeroporti-italiani" placeholder="Es: LIRF" oninput="updateActiveRouteAirports()">
                </div>
                <div class="airport-input-group">
                    <label style="font-size:11px; font-weight:bold;">DES:</label>
                    <input type="text" id="route-des" list="aeroporti-italiani" placeholder="Es: LIFE" oninput="updateActiveRouteAirports()">
                </div>
            </div>
        </div>

        <div class="param-grid">
            <div>
                <label>LVL</label>
                <input type="number" id="p-level" value="350">
            </div>
            <div>
                <label>HSP</label>
                <input type="number" id="p-hspeed" value="400">
            </div>
            <div>
                <label>VSP</label>
                <input type="number" id="p-vspeed" value="0">
            </div>
        </div>
        
        <button class="btn-copy" onclick="copyToClipboard()">COPIA JSON MULTI-ROTTA</button>
        <pre id="export-log">JSON_DATA = []</pre>

        <div class="storage-box">
            <button class="btn-save-proj" onclick="saveProject()">💾 SALVA PROGETTO</button>
            <label class="btn-load-proj">
                📂 RICARICA PROGETTO <input type="file" id="project-input" accept=".json" onchange="loadProject(this)">
            </label>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- INIZIALIZZAZIONE MAPPA ---
const map = L.map('map').setView([45.0, 11.0], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

    let allPoints = []; 
    let markersLayer = L.layerGroup().addTo(map);
    let backgroundLinesLayer = L.layerGroup().addTo(map); 
    let customFixCounter = 1; 
    
    let routes = [{ id: "r1", name: "Traiettoria 1", DEP: "LIRF", DES: "LIFE", waypoints: [], polyline: null, color: "#00f0ff" }];
    let activeRouteId = "r1";
    routes[0].polyline = L.polyline([], {color: routes[0].color, weight: 3, opacity: 0.9}).addTo(map);

    // --- RESIZE ORIZZONTALE SIDEBAR ---
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let offsetRight = document.body.offsetWidth - e.clientX;
        if (offsetRight > 250 && offsetRight < window.innerWidth * 0.8) { 
            sidebar.style.width = offsetRight + 'px'; 
            map.invalidateSize(); 
        }
    });
    document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; map.invalidateSize(); });

    // --- TRASFORMAZIONI COORDINATE DEC/DMS ---
    function decToDms(val, isLat) {
        const absVal = Math.abs(val);
        const g = Math.floor(absVal);
        const m = Math.floor((absVal - g) * 60);
        const s = Math.round((absVal - g - (m / 60)) * 3600);
        let dir = isLat ? (val >= 0 ? "N" : "S") : (val >= 0 ? "E" : "W");
        return [g, m, s, dir];
    }

    function formatDmsString(dmsArray) {
        return `${dmsArray[0]}° ${dmsArray[1]}' ${dmsArray[2]}" ${dmsArray[3]}`;
    }

    map.on('mousemove', function(e) {
        const lat = e.latlng.lat; const lon = e.latlng.lng;
        document.getElementById('mouse-coords').innerHTML = 
            `DEC: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>` +
            `DMS: ${formatDmsString(decToDms(lat, true))} | ${formatDmsString(decToDms(lon, false))}`;
    });

    // --- CLICK SULLA MAPPA PER CREAZIONE PUNTI MANUALI ---
    map.on('click', function(e) {
        if (e.originalEvent.target.id !== 'map' && !e.originalEvent.target.classList.contains('leaflet-container')) return;
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;
        
        const defaultName = `WP_${customFixCounter++}`;
        const nomePunto = prompt("Inserisci il nome per questo punto inserito a mano:", defaultName);
        
        if (nomePunto === null) return; 
        const nomeFinale = nomePunto.trim() || defaultName;

        registerAndBuildMarker(nomeFinale, lat, lon, true);
    });

    function registerAndBuildMarker(nome, lat, lon, isCustom) {
        const p = {
            id: Date.now() + Math.random(),
            nome: nome, lat: lat, lon: lon,
            isCustom: isCustom,
            dmsLat: decToDms(lat, true), dmsLon: decToDms(lon, false)
        };
        allPoints.push(p);
        buildMarkerGraphic(p);
    }

    // --- GENERAZIONE GRAFICA DIVICON CON ICONA E TESTO ---
    function buildMarkerGraphic(p) {
        let htmlContent = "";

        if (p.isCustom) {
            htmlContent = `
                <div class="diamond-container">
                    <div class="diamond-marker"></div>
                </div>
                <div class="fix-label">${p.nome}</div>
            `;
        } else {
            htmlContent = `
                <div class="triangle-marker"></div>
                <div class="fix-label">${p.nome}</div>
            `;
        }

        const combinedIcon = L.divIcon({
            className: 'fix-container',
            html: htmlContent,
            iconSize: [60, 32],      
            iconAnchor: [30, 7],     
            popupAnchor: [0, -10]
        });

        const m = L.marker([p.lat, p.lon], { icon: combinedIcon }).addTo(markersLayer);
        p.marker = m;

        m.on('click', function() { m.setPopupContent(generatePopupContent(p)); });
        m.bindPopup(generatePopupContent(p));
        
        document.getElementById('points-count').textContent = `Fix totali: ${allPoints.length}`;
        updateRouteSelectOptions();
    }

    function generatePopupContent(p) {
        const currentRoute = routes.find(r => r.id === activeRouteId);
        const isAlreadyInRoute = currentRoute ? currentRoute.waypoints.some(w => w.globalPointId === p.id) : false;
        
        const tagIcon = p.isCustom ? '🔸' : '🔺';
        const tagCustom = p.isCustom ? `<span class="custom-marker-tag">MANUALE</span><br>` : '';
        
        let actionButton = isAlreadyInRoute 
            ? `<button onclick="removeFromRoute(${p.id})" class="popup-action-btn btn-remove">➖ RIMUOVI DA TRAIETTORIA</button>`
            : `<button onclick="addToRoute(${p.id})" class="popup-action-btn btn-add">➕ AGGIUNGI ALLA TRAIETTORIA</button>`;

        let deleteFixButton = p.isCustom 
            ? `<button onclick="deleteFixDefinitively(${p.id})" class="popup-action-btn btn-delete-fix">🗑️ ELIMINA DA MAPPA</button>` 
            : '';

        return `
            <div>
                ${tagCustom}
                <b style="font-size:13px; color:#ffffff;">${tagIcon} Fix: ${p.nome}</b><br><hr style="margin:6px 0; border:0; border-top:1px solid #005588;">
                <small style="color:#5588aa; font-family:monospace;">DEC: ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}</small><br>
                <small style="color:#5588aa; font-family:monospace;">LAT: ${formatDmsString(p.dmsLat)}</small><br>
                <small style="color:#5588aa; font-family:monospace;">LON: ${formatDmsString(p.dmsLon)}</small><br>
                ${actionButton}
                ${deleteFixButton}
            </div>
        `;
    }

    window.deleteFixDefinitively = function(uniqueId) {
        const index = allPoints.findIndex(x => x.id === uniqueId);
        if (index !== -1) {
            const p = allPoints[index];
            if(confirm(`Vuoi cancellare definitivamente "${p.nome}" da tutta la mappa e da tutte le traiettorie?`)) {
                if(p.marker) map.removeLayer(p.marker);
                
                routes.forEach(r => {
                    r.waypoints = r.waypoints.filter(w => w.globalPointId !== uniqueId);
                });

                allPoints.splice(index, 1);
                
                updateRouteSelectOptions();
                updateUI();
                document.getElementById('points-count').textContent = `Fix totali: ${allPoints.length}`;
            }
        }
    }

    window.addToRoute = function(uniqueId) {
        const p = allPoints.find(x => x.id === uniqueId);
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (p && currentRoute) {
            currentRoute.waypoints.push({
                globalPointId: p.id,
                name: p.nome, lat: p.dmsLat, lon: p.dmsLon,
                params: {
                    level: parseInt(document.getElementById('p-level').value),
                    hspeed: parseInt(document.getElementById('p-hspeed').value),
                    vspeed: parseInt(document.getElementById('p-vspeed').value)
                },
                _mapCoords: [p.lat, p.lon]
            });
            p.marker.closePopup();
            updateRouteSelectOptions();
            updateUI();
        }
    }

    window.removeFromRoute = function(uniqueId) {
        const p = allPoints.find(x => x.id === uniqueId);
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (p && currentRoute) {
            currentRoute.waypoints = currentRoute.waypoints.filter(w => w.globalPointId !== uniqueId);
            p.marker.closePopup(); 
            updateRouteSelectOptions();
            updateUI();
        }
    }

    function updateActiveRouteAirports() {
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (currentRoute) {
            currentRoute.DEP = document.getElementById('route-dep').value.trim().toUpperCase() || "LIRF";
            currentRoute.DES = document.getElementById('route-des').value.trim().toUpperCase() || "LIFE";
            updateUI();
        }
    }

    function updateRouteSelectOptions() {
        const select = document.getElementById('active-route-select');
        const currentVal = select.value || activeRouteId;
        select.innerHTML = "";
        routes.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = `${r.name} (${r.waypoints.length} WP) [${r.DEP}->${r.DES}]`;
            if(r.id === currentVal) opt.selected = true;
            select.appendChild(opt);
        });
    }

    document.getElementById('active-route-select').addEventListener('change', function(e) {
        activeRouteId = e.target.value;
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (currentRoute) {
            document.getElementById('route-dep').value = currentRoute.DEP;
            document.getElementById('route-des').value = currentRoute.DES;
        }
        updateUI();
    });

    function createNewRoute() {
        const nameInput = document.getElementById('new-route-name');
        const name = nameInput.value.trim() || `Traiettoria ${routes.length + 1}`;
        const id = "r_" + Date.now();
        const colors = ["#00f0ff", "#00ffaa", "#ad66ff", "#ffaa00", "#ff2255"];
        const randomColor = colors[routes.length % colors.length];

        const newR = { id: id, name: name, DEP: "LIRF", DES: "LIFE", waypoints: [], polyline: null, color: randomColor };
        newR.polyline = L.polyline([], {color: newR.color, weight: 3, opacity: 0.9}).addTo(map);
        
        routes.push(newR);
        activeRouteId = id;
        nameInput.value = "";
        
        document.getElementById('route-dep').value = newR.DEP;
        document.getElementById('route-des').value = newR.DES;

        updateRouteSelectOptions();
        updateUI();
    }

    function deleteActiveRoute() {
        if(routes.length <= 1) {
            alert("Impossibile eliminare l'ultima traiettoria di sistema.");
            return;
        }
        if(!confirm("Eliminare la traiettoria attiva corrente?")) return;

        const idx = routes.findIndex(r => r.id === activeRouteId);
        if(idx !== -1) {
            if(routes[idx].polyline) map.removeLayer(routes[idx].polyline);
            routes.splice(idx, 1);
            activeRouteId = routes[0].id;
            
            document.getElementById('route-dep').value = routes[0].DEP;
            document.getElementById('route-des').value = routes[0].DES;

            updateRouteSelectOptions();
            updateUI();
        }
    }

    function searchPoint() {
        const query = document.getElementById('search-name').value.trim().toUpperCase();
        allPoints.forEach(p => {
            if(p.nome.toUpperCase().includes(query)) {
                if(p.marker) p.marker.addTo(markersLayer);
            } else {
                if(p.marker) map.removeLayer(p.marker);
            }
        });
    }

    function goToCoords() {
        const lat = parseFloat(document.getElementById('goto-lat').value);
        const lon = parseFloat(document.getElementById('goto-lon').value);
        if(!isNaN(lat) && !isNaN(lon)) {
            map.setView([lat, lon], 9);
        } else {
            alert("Coordinate inserite non valide.");
        }
    }

    function resetAll() {
        if(!confirm("Vuoi cancellare ogni dato memorizzato e resettare l'HUD?")) return;
        allPoints.forEach(p => { if(p.marker) map.removeLayer(p.marker); });
        backgroundLinesLayer.clearLayers();
        routes.forEach(r => { if(r.polyline) map.removeLayer(r.polyline); });

        allPoints = [];
        customFixCounter = 1;
        routes = [{ id: "r1", name: "Traiettoria 1", DEP: "LIRF", DES: "LIFE", waypoints: [], polyline: null, color: "#00f0ff" }];
        activeRouteId = "r1";
        routes[0].polyline = L.polyline([], {color: routes[0].color, weight: 3, opacity: 0.9}).addTo(map);

        document.getElementById('route-dep').value = "LIRF";
        document.getElementById('route-des').value = "LIFE";
        document.getElementById('points-count').textContent = "Fix totali: 0";

        updateRouteSelectOptions();
        updateUI();
    }

    // --- AGGIORNAMENTO DINAMICO SINTASSI OUTPUT (RIENTRO FILTRATO SELETTIVO) ---
    function updateUI() {
        routes.forEach(r => {
            const coords = r.waypoints.map(w => w._mapCoords);
            if(r.polyline) {
                r.polyline.setLatLngs(coords);
                if(r.id === activeRouteId) {
                    r.polyline.setStyle({ weight: 5, opacity: 1.0 });
                } else {
                    r.polyline.setStyle({ weight: 2, opacity: 0.4 });
                }
            }
        });

        // Generazione stringa con formattazione custom per indentare solo i nodi radice dell'array
        let customJsonStr = "[\n";
        routes.forEach((r, idx) => {
            const wpsCompattati = r.waypoints.map(w => {
                return `\n	{"name":"${w.name}","lat":${JSON.stringify(w.lat)},"lon":${JSON.stringify(w.lon)},"params":${JSON.stringify(w.params)}}`;
            }).join(", ");

            customJsonStr += `  {\n`;
            customJsonStr += `    "id": "${r.id}", `;
            customJsonStr += `"name": "${r.name}",\n`;
            customJsonStr += `    "DEP": "${r.DEP}", `;
            customJsonStr += `"DES": "${r.DES}",\n`;
            customJsonStr += `    "waypoints": [${wpsCompattati}]\n`;
            customJsonStr += `  }${idx < routes.length - 1 ? "," : ""}\n`;
        });
        customJsonStr += "]";

        document.getElementById('export-log').textContent = "JSON_DATA = " + customJsonStr;
    }

    function copyToClipboard() {
        const logText = document.getElementById('export-log').textContent;
        navigator.clipboard.writeText(logText).then(() => {
            alert("Configurazione Multi-Rotta copiata negli appunti di sistema.");
        });
    }

    // --- MECCANICA DI PERSISTENZA FILE DI PROGETTO (JSON) ---
    function saveProject() {
        const projectData = {
            allPoints: allPoints.map(p => ({ nome: p.nome, lat: p.lat, lon: p.lon, isCustom: p.isCustom })),
            routes: routes.map(r => ({
                id: r.id, name: r.name, DEP: r.DEP, DES: r.DES, color: r.color,
                waypoints: r.waypoints.map(w => ({ globalPointId: w.globalPointId, name: w.name, params: w.params, _mapCoords: w._mapCoords }))
            })),
            activeRouteId: activeRouteId,
            customFixCounter: customFixCounter
        };
        const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `tactical_flight_project_${Date.now()}.json`;
        a.click();
    }

    function loadProject(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                allPoints.forEach(p => { if(p.marker) map.removeLayer(p.marker); });
                backgroundLinesLayer.clearLayers();
                routes.forEach(r => { if(r.polyline) map.removeLayer(r.polyline); });

                allPoints = [];
                customFixCounter = data.customFixCounter || 1;
                activeRouteId = data.activeRouteId;

                data.allPoints.forEach(p => {
                    registerAndBuildMarker(p.nome, p.lat, p.lon, p.isCustom);
                });

                routes = data.routes.map(r => {
                    const poly = L.polyline([], {color: r.color, weight: 3, opacity: 0.9}).addTo(map);
                    return {
                        id: r.id, name: r.name, DEP: r.DEP, DES: r.DES, color: r.color, polyline: poly,
                        waypoints: r.waypoints.map(w => {
                            const matchedGlobal = allPoints.find(ap => ap.nome === w.name);
                            return {
                                globalPointId: matchedGlobal ? matchedGlobal.id : w.globalPointId,
                                name: w.name,
                                lat: matchedGlobal ? matchedGlobal.dmsLat : decToDms(w._mapCoords[0], true),
                                lon: matchedGlobal ? matchedGlobal.dmsLon : decToDms(w._mapCoords[1], false),
                                params: w.params,
                                _mapCoords: w._mapCoords
                            };
                        })
                    };
                });

                const activeR = routes.find(r => r.id === activeRouteId);
                if(activeR) {
                    document.getElementById('route-dep').value = activeR.DEP;
                    document.getElementById('route-des').value = activeR.DES;
                }

                updateRouteSelectOptions();
                updateUI();
                alert("Progetto tattico caricato correttamente.");
            } catch(err) {
                alert("Errore critico nel parsing del file JSON: " + err.message);
            }
        };
        reader.readAsText(file);
    }

    // --- INTERCETTAZIONE E PARSING DEL FILE STRUTTURATO (XML/SVG) ---
    function importText4f(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawText = e.target.result;
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rawText, "text/xml");

            // Parsing tracciati di sfondo (Linee SVG)
            const lines = xmlDoc.getElementsByTagName("line");
            let countLines = 0;
            if(lines.length > 0) {
                backgroundLinesLayer.clearLayers();
                for (let i = 0; i < lines.length; i++) {
                    const x1 = parseFloat(lines[i].getAttribute("x1"));
                    const y1 = parseFloat(lines[i].getAttribute("y1"));
                    const x2 = parseFloat(lines[i].getAttribute("x2"));
                    const y2 = parseFloat(lines[i].getAttribute("y2"));
                    if(!isNaN(x1) && !isNaN(y1) && !isNaN(x2) && !isNaN(y2)) {
                        L.polyline([[y1, x1], [y2, x2]], {color: "#0b1428", weight: 1, opacity: 0.6, pointerEvents: 'none'}).addTo(backgroundLinesLayer);
                        countLines++;
                    }
                }
            }

            // Parsing Nodi Geometrici (Punti XML)
            const points = xmlDoc.getElementsByTagName("point");
            let importedCount = 0;
            if(points.length > 0) {
                for (let i = 0; i < points.length; i++) {
                    const name = points[i].getAttribute("name") || `XML_WP_${i}`;
                    const lat = parseFloat(points[i].getAttribute("lat"));
                    const lon = parseFloat(points[i].getAttribute("lon"));
                    if (!isNaN(lat) && !isNaN(lon)) {
                        if(!allPoints.some(ap => ap.nome.toUpperCase() === name.toUpperCase())) {
                            registerAndBuildMarker(name, lat, lon, false);
                            importedCount++;
                        }
                    }
                }
            }
            
            alert(`Processo completato.\nElementi Lineari Griglia caricate: ${countLines}\nNuovi Fix Strutturati inseriti: ${importedCount}`);
            updateUI();
        };
        reader.readAsText(file);
    }
</script>
