<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Flight Planner Pro - Cyber Combat Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-metal-dark: #12181f;
            --bg-metal-medium: #1a242f;
            --bg-metal-light: #243142;
            --neon-blue: #00f3ff;
            --neon-blue-dim: rgba(0, 243, 247, 0.3);
            --neon-orange: #ff9f43;
            --neon-red: #ff4757;
            --neon-green: #2ed573;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-glow: 1px solid rgba(0, 243, 247, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: var(--bg-metal-dark); 
            color: var(--text-main);
            overflow: hidden; 
        }

        #top-panel { 
            background: linear-gradient(145deg, #151f2c, #0e141b);
            color: var(--text-main); 
            padding: 12px 20px; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; 
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 4px 20px rgba(0, 243, 247, 0.15);
        }

		/* Filtro CSS per forzare la mappa satellitare in scala di grigi */
		.grayscale-map-layer {
			filter: grayscale(100%) brightness(90%) contrast(110%);
		}

        .controls { display: flex; gap: 12px; align-items: center; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%; }
        
        #map { 
            flex: 1; 
            min-width: 200px; 
            z-index: 1; 
            cursor: crosshair; 
            background: #111;
        }
        
        #resizer { 
            width: 6px; 
            cursor: col-resize; 
            background: linear-gradient(to right, #1a242f, #00f3ff, #1a242f); 
            z-index: 1000; 
            transition: opacity 0.2s;
            opacity: 0.7;
        }
        #resizer:hover { opacity: 1; }
        
        #sidebar { 
            width: 420px; 
            min-width: 320px; 
            background: linear-gradient(180deg, #161f2b 0%, #101622 100%); 
            padding: 20px; 
            overflow-y: auto; 
            border-left: 2px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            z-index: 2; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }
        
        #mouse-coords { 
            position: absolute; 
            bottom: 25px; 
            left: 10px; 
            background: rgba(18, 24, 31, 0.85); 
            color: var(--neon-blue); 
            padding: 10px 14px; 
            border-radius: 4px; 
            border: var(--border-glow);
            backdrop-filter: blur(4px);
            font-family: 'Consolas', monospace; 
            font-size: 11px; 
            z-index: 1000; 
            pointer-events: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* UI Elements & Buttons */
        button { 
            cursor: pointer; 
            padding: 8px 14px; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase;
            transition: all 0.2s ease;
            color: #fff;
            background: #243142;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        button:active { transform: translateY(1px); }

        .btn-import { 
            background: linear-gradient(135deg, #2c3a4e, #1a2432); 
            color: var(--neon-blue); 
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue-dim);
        }
        .btn-import:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        
        .btn-reset-all { 
            background: linear-gradient(135deg, #421c24, #291015); 
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }
        .btn-reset-all:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 12px rgba(255,71,87,0.6); }

        .btn-copy { 
            background: linear-gradient(135deg, #0f3647, #061f2b); 
            color: #fff; 
            border: 1px solid var(--neon-blue);
            width: 100%; 
            margin-bottom: 15px; 
            padding: 10px;
            letter-spacing: 0.5px;
        }
        .btn-copy:hover { background: var(--neon-blue); color: #12181f; box-shadow: 0 0 15px var(--neon-blue); }
        
        .route-manager { 
            background: var(--bg-metal-medium); 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            border: 1px solid #283747; 
        }
        .route-select-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        
        select, input[type="text"], input[type="number"] { 
            background: var(--bg-metal-dark); 
            color: var(--text-main); 
            border: 1px solid #334155; 
            padding: 8px; 
            border-radius: 4px;
            font-size: 11px;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue-dim);
        }
        .route-select-row select { flex: 1; }
        .route-select-row input { flex: 1; }
        
        .airport-input-group { display: flex; align-items: center; gap: 6px; flex: 1; }
        .airport-input-group input { width: 100%; text-transform: uppercase; font-weight: bold; color: var(--neon-blue); }
        
        .param-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
            background: var(--bg-metal-medium); 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #283747; 
            font-size: 11px; 
        }
        .param-grid div { display: flex; flex-direction: column; gap: 4px; }
        .param-grid label { color: var(--text-muted); font-weight: bold; font-size: 10px; }
        
        .search-bar { 
            background: #16202c; 
            padding: 10px 20px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            color: var(--text-main); 
            font-size: 12px; 
            flex-shrink: 0;
            border-bottom: 1px solid #233143;
        }
        
        pre { 
            background: #090d13; 
            color: #a5e7f7; 
            padding: 14px; 
            font-size: 11px; 
            font-family: 'Consolas', 'Courier New', monospace; 
            border-radius: 5px; 
            flex-grow: 1; 
            overflow: auto; 
            border: 1px solid #1a2636; 
            margin-top: 10px; 
            min-height: 150px; 
        }

        #file-input, #project-input { display: none; }
        
        .custom-marker-tag { background: var(--neon-orange); color: #000; padding: 2px 6px; font-size: 9px; border-radius: 3px; font-weight: bold; display: inline-block; margin-bottom: 6px; }
        .legend-indicator { font-size: 11px; margin-left: 15px; display: flex; gap: 16px; align-items: center; color: var(--text-muted); }
        .legend-indicator span { display: flex; align-items: center; gap: 4px; }
        
        /* Popups */
        .leaflet-popup-content-wrapper {
            background: linear-gradient(145deg, #16202c, #101721) !important;
            color: var(--text-main) !important;
            border: var(--border-glow);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6) !important;
            border-radius: 6px !important;
        }
        .leaflet-popup-tip { background: #101721 !important; border: 1px solid rgba(0, 243, 247, 0.4); }
        .popup-action-btn { margin-top: 8px; width: 100%; border: none; padding: 7px; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; font-size: 10px; }
        .btn-add { background: var(--neon-green); color: #052411; }
        .btn-add:hover { background: #32ff7e; }
        .btn-remove { background: var(--neon-orange); color: #281402; }
        .btn-remove:hover { background: #ffaf5e; }
        .btn-delete-fix { background: var(--neon-red); }
        .btn-delete-fix:hover { background: #ff6b81; }

        .storage-box { background: var(--bg-metal-medium); padding: 12px; border-radius: 6px; border: 1px solid #283747; margin-top: auto; display: flex; gap: 10px; }
        .btn-save-proj { background: linear-gradient(135deg, #1e4620, #112912); color: #63ff69; border: 1px solid #2ebd34; flex: 1; }
        .btn-save-proj:hover { background: #2ebd34; color: #000; }
        .btn-load-proj { background: linear-gradient(135deg, #3b2054, #211030); color: #ca8eff; border: 1px solid #8e44ad; flex: 1; display: inline-block; text-align: center; line-height: 28px; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer;}
        .btn-load-proj:hover { background: #8e44ad; color: #fff; }

        /* Map Engine Layer Controls Widget styling custom alignment */
        .map-theme-selector {
            background: var(--bg-metal-medium);
            border: var(--border-glow);
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            gap: 5px;
        }
        .map-theme-btn {
            padding: 4px 8px;
            font-size: 10px;
            background: var(--bg-metal-dark);
            border: 1px solid #334155;
        }
        .map-theme-btn.active {
            background: var(--neon-blue);
            color: #000;
            border-color: var(--neon-blue);
        }

        /* --- CONTENITORE COMPLESSIVO DEL COSTRUTTO FIX + TESTO --- */
        .fix-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: visible !important;
        }

        /* --- STILI PER LE ETICHETTE DI TESTO SULLA MAPPA --- */
        .fix-label {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 4px #000;
            white-space: nowrap;
            margin-top: 5px;
            pointer-events: none;
        }

        /* --- VARIANTI GEOMETRICHE MODIFICATE CON LOOK NEON --- */
        .triangle-marker {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 14px solid var(--neon-blue);
            filter: drop-shadow(0 0 5px var(--neon-blue));
            flex-shrink: 0;
        }

        .diamond-container {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .diamond-marker {
            width: 11px;
            height: 11px;
            transform: rotate(45deg);
            border: 2px solid var(--neon-orange);
            background-color: rgba(230, 126, 34, 0.4);
            filter: drop-shadow(0 0 5px var(--neon-orange));
            box-sizing: border-box;
        }
    </style>
</head>

    <div class="controls">
		<div class="map-theme-selector">
            <button class="map-theme-btn active" id="theme-dark-btn" onclick="setMapTheme('dark')">DARK MAP</button>
            <button class="map-theme-btn" id="theme-light-btn" onclick="setMapTheme('light')">LIGHT MAP</button>
            <button class="map-theme-btn" id="theme-satellite-btn" onclick="setMapTheme('satellite')">SATELLITE</button>
            <button class="map-theme-btn" id="theme-grey_sat-btn" onclick="setMapTheme('grey_sat')">GREY SAT</button>
        </div>
        <label class="btn-import" style="cursor:pointer; padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid var(--neon-blue)">
            IMPORTA XML/SVG <input type="file" id="file-input" accept=".svg,.xml" onchange="importText4f(this)">
        </label>
        <button class="btn-reset-all" onclick="resetAll()">RESET MASTER</button>
    </div>
</div>

<div class="search-bar">
    <span>CERCA FIX:</span> <input type="text" id="search-name" placeholder="Es: TNT" onkeyup="searchPoint()" style="width: 140px;">
    <span style="margin-left: 15px;">VAI A:</span> 
    <input type="text" id="goto-lat" placeholder="Lat" style="width:70px">
    <input type="text" id="goto-lon" placeholder="Lon" style="width:70px">
    <button style="background:linear-gradient(135deg, #1e5335, #0f2b1b); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 5px 12px;" onclick="goToCoords()">EXEC</button>
    <span style="margin-left: auto; font-style: italic; font-size: 11px; color: var(--neon-orange);">* Interazione diretta: fai click sulla mappa per iniettare nodi waypoint manuali</span>
</div>

<div id="main-container">
    <div id="map"></div>
    <div id="resizer"></div>
    <div id="mouse-coords">Mouse: --.----, --.----</div>
    <div id="sidebar">
        
        <div class="route-manager">
            <div style="font-weight: bold; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Matrice Traiettorie</div>
            <div class="route-select-row">
                <input type="text" id="new-route-name" placeholder="Nome nuova rotta..." style="width: 120px;">
                <button style="background: var(--neon-green); color: #052411; font-size: 14px; padding: 4px 12px;" onclick="createNewRoute()">+</button>
                <button style="background: #3a161c; border-color: var(--neon-red); color: var(--neon-red);" onclick="deleteActiveRoute()">Elimina</button>
            </div>
            <div class="route-select-row" style="margin-top: 12px;">
                <label style="font-size:11px; color: var(--text-muted);">Vettore Attivo:</label>
                <select id="active-route-select"></select>
            </div>
            
            <div class="route-select-row" style="margin-top: 12px; background: var(--bg-metal-light); padding: 8px; border-radius: 4px; display: flex; gap: 10px; border: 1px solid #2d3d52;">
                <div class="airport-input-group">
                    <label style="font-size:10px; font-weight:bold; color: var(--text-muted);">DEP:</label>
                    <input type="text" id="route-dep" list="aeroporti-italiani" placeholder="Es: LIRF" oninput="updateActiveRouteAirports()">
                </div>
                <div class="airport-input-group">
                    <label style="font-size:10px; font-weight:bold; color: var(--text-muted);">DES:</label>
                    <input type="text" id="route-des" list="aeroporti-italiani" placeholder="Es: LIFE" oninput="updateActiveRouteAirports()">
                </div>
            </div>
        </div>

        <div class="param-grid">
            <div><label>CRZ LVL (FL)</label><input type="number" id="p-level" value="350"></div>
            <div><label>H-SPEED (KT)</label><input type="number" id="p-hspeed" value="400"></div>
            <div><label>V-SPEED (FPM)</label><input type="number" id="p-vspeed" value="0"></div>
        </div>
        
        <button class="btn-copy" onclick="copyToClipboard()">TELEMETRIA JSON - COPIA NEGLI APPUNTI</button>
        <pre id="export-log">JSON_DATA = []</pre>

        <div class="storage-box">
            <button class="btn-save-proj" onclick="saveProject()">💾 SALVA DATA-CELL</button>
            <label class="btn-load-proj">
                📂 PURGE & LOAD CORE <input type="file" id="project-input" accept=".json" onchange="loadProject(this)">
            </label>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { attributionControl: false }).setView([45.0, 11.0], 7);
    
const mapLayers = {
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }),
        light: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19
        }),
        // AGGIORNATO: Aggiungiamo una classe specifica alle opzioni del livello
        grey_sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            className: 'grayscale-map-layer' // <-- Dice a Leaflet di iniettare la classe CSS a TUTTI i tasselli di questo livello
        })
    };
    
    let currentTheme = 'dark';
    mapLayers[currentTheme].addTo(map);

    function setMapTheme(theme) {
        if (theme === currentTheme || !mapLayers[theme]) return;
        
        // Rimuove il livello precedente e inserisce il nuovo
        map.removeLayer(mapLayers[currentTheme]);
        mapLayers[theme].addTo(map);
        currentTheme = theme;
        
        // Aggiorna lo stato "active" su tutti i bottoni del selettore temi
        document.querySelectorAll('.map-theme-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        
        const activeBtn = document.getElementById(`theme-${theme}-btn`);
        if (activeBtn) activeBtn.classList.add('active');
    }

    let allPoints = []; 
    let markersLayer = L.layerGroup().addTo(map);
    let backgroundLinesLayer = L.layerGroup().addTo(map); 
    let customFixCounter = 1; 
    
    let routes = [{ id: "r1", name: "Traiettoria Alpha", DEP: "LIRF", DES: "LIFE", waypoints: [], polyline: null, color: "#00f3ff" }];
    let activeRouteId = "r1";
    routes[0].polyline = L.polyline([], {color: routes[0].color, weight: 4, shadowColor: '#000', shadowBlur: 5}).addTo(map);

    // --- RESIZE ORIZZONTALE STRUTTURALE ---
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let offsetRight = document.body.offsetWidth - e.clientX;
        if (offsetRight > 300 && offsetRight < window.innerWidth * 0.8) { sidebar.style.width = offsetRight + 'px'; map.invalidateSize(); }
    });
    document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; map.invalidateSize(); });

    // --- UTILS COORDINATE LOGISTICA ---
    function decToDms(val, isLat) {
        const absVal = Math.abs(val);
        const g = Math.floor(absVal);
        const m = Math.floor((absVal - g) * 60);
        const s = Math.round((absVal - g - (m / 60)) * 3600);
        let dir = isLat ? (val >= 0 ? "N" : "S") : (val >= 0 ? "E" : "W");
        return [g, m, s, dir];
    }

    function formatDmsString(dmsArray) {
        return `${dmsArray[0]}° ${dmsArray[1]}' ${dmsArray[2]}" ${dmsArray[3]}`;
    }

    map.on('mousemove', function(e) {
        const lat = e.latlng.lat; const lon = e.latlng.lng;
        document.getElementById('mouse-coords').innerHTML = 
            `DEC: ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>` +
            `DMS: ${formatDmsString(decToDms(lat, true))} | ${formatDmsString(decToDms(lon, false))}`;
    });

    // --- MANUALE INJECTION DI WAYPOINTS ---
    map.on('click', function(e) {
        if (e.originalEvent.target.id !== 'map' && !e.originalEvent.target.classList.contains('leaflet-container')) return;
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;
        
        const defaultName = `WP_${customFixCounter++}`;
        const nomePunto = prompt("Identificativo Fix Manuale:", defaultName);
        
        if (nomePunto === null) return; 
        const nomeFinale = nomePunto.trim() || defaultName;

        registerAndBuildMarker(nomeFinale, lat, lon, true);
    });

    function registerAndBuildMarker(nome, lat, lon, isCustom) {
        const p = {
            id: Date.now() + Math.random(),
            nome: nome, lat: lat, lon: lon,
            isCustom: isCustom,
            dmsLat: decToDms(lat, true), dmsLon: decToDms(lon, false)
        };
        allPoints.push(p);
        buildMarkerGraphic(p);
    }

    // --- DIVICON GENERATION CON GLOW NEON ED ETICHETTA DI CONTRASTO ---
    function buildMarkerGraphic(p) {
        let htmlContent = "";

        if (p.isCustom) {
            htmlContent = `
                <div class="diamond-container">
                    <div class="diamond-marker"></div>
                </div>
                <div class="fix-label">${p.nome}</div>
            `;
        } else {
            htmlContent = `
                <div class="triangle-marker"></div>
                <div class="fix-label">${p.nome}</div>
            `;
        }

        const combinedIcon = L.divIcon({
            className: 'fix-container',
            html: htmlContent,
            iconSize: [80, 36],      
            iconAnchor: [40, 7],     
            popupAnchor: [0, -10]
        });

        const m = L.marker([p.lat, p.lon], { icon: combinedIcon }).addTo(markersLayer);
        p.marker = m;

        m.on('click', function() { m.setPopupContent(generatePopupContent(p)); });
        m.bindPopup(generatePopupContent(p));
        
        document.getElementById('points-count').textContent = `Fix totali: ${allPoints.length}`;
        updateRouteSelectOptions();
    }

    function generatePopupContent(p) {
        const currentRoute = routes.find(r => r.id === activeRouteId);
        const isAlreadyInRoute = currentRoute ? currentRoute.waypoints.some(w => w.globalPointId === p.id) : false;
        
        const tagIcon = p.isCustom ? '🔸' : '🔺';
        const tagCustom = p.isCustom ? `<span class="custom-marker-tag">MANUAL FIX</span><br>` : '';
        
        let actionButton = isAlreadyInRoute 
            ? `<button onclick="removeFromRoute(${p.id})" class="popup-action-btn btn-remove">➖ COUPLING DISCONNECT</button>`
            : `<button onclick="addToRoute(${p.id})" class="popup-action-btn btn-add">➕ ENGAGE VIA VECTOR</button>`;

        let deleteFixButton = p.isCustom 
            ? `<button onclick="deleteFixDefinitively(${p.id})" class="popup-action-btn btn-delete-fix">🗑️ PURGE FROM SECTOR</button>` 
            : '';

        return `
            <div style="min-width:180px; font-family: 'Segoe UI',sans-serif;">
                ${tagCustom}
                <b style="font-size:13px; color:#fff;">${tagIcon} CORE IDENT: ${p.nome}</b><br><hr style="margin:6px 0; border:0; border-top:1px solid #2d3d52;">
                <small style="color:var(--text-muted)">DEC: ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}</small><br>
                <small style="color:var(--neon-blue)">LAT DMS: ${formatDmsString(p.dmsLat)}</small><br>
                <small style="color:var(--neon-blue)">LON DMS: ${formatDmsString(p.dmsLon)}</small><br>
                ${actionButton}
                ${deleteFixButton}
            </div>
        `;
    }

    window.deleteFixDefinitively = function(uniqueId) {
        const index = allPoints.findIndex(x => x.id === uniqueId);
        if (index !== -1) {
            const p = allPoints[index];
            if(confirm(`Eliminare definitivamente "${p.nome}" dal database di sessione?`)) {
                if(p.marker) map.removeLayer(p.marker);
                
                routes.forEach(r => {
                    r.waypoints = r.waypoints.filter(w => w.globalPointId !== uniqueId);
                });

                allPoints.splice(index, 1);
                
                updateRouteSelectOptions();
                updateUI();
                document.getElementById('points-count').textContent = `Fix totali: ${allPoints.length}`;
            }
        }
    }

    window.addToRoute = function(uniqueId) {
        const p = allPoints.find(x => x.id === uniqueId);
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (p && currentRoute) {
            currentRoute.waypoints.push({
                globalPointId: p.id,
                name: p.nome, lat: p.dmsLat, lon: p.dmsLon,
                params: {
                    level: parseInt(document.getElementById('p-level').value),
                    hspeed: parseInt(document.getElementById('p-hspeed').value),
                    vspeed: parseInt(document.getElementById('p-vspeed').value)
                },
                _mapCoords: [p.lat, p.lon]
            });
            p.marker.closePopup();
            updateRouteSelectOptions();
            updateUI();
        }
    }

    window.removeFromRoute = function(uniqueId) {
        const p = allPoints.find(x => x.id === uniqueId);
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (p && currentRoute) {
            currentRoute.waypoints = currentRoute.waypoints.filter(w => w.globalPointId !== uniqueId);
            p.marker.closePopup(); 
            updateRouteSelectOptions();
            updateUI();
        }
    }

    function updateActiveRouteAirports() {
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (currentRoute) {
            currentRoute.DEP = document.getElementById('route-dep').value.trim().toUpperCase() || "LIRF";
            currentRoute.DES = document.getElementById('route-des').value.trim().toUpperCase() || "LIFE";
            updateUI();
        }
    }

    async function saveProject() {
        const structuralProject = {
            customFixCounter: customFixCounter,
            activeRouteId: activeRouteId,
            points: allPoints.map(p => ({
                id: p.id, nome: p.nome, lat: p.lat, lon: p.lon, isCustom: p.isCustom, dmsLat: p.dmsLat, dmsLon: p.dmsLon
            })),
            routes: routes.map(r => ({
                id: r.id, name: r.name, color: r.color, DEP: r.DEP || "LIRF", DES: r.DES || "LIFE", waypoints: r.waypoints
            }))
        };

        const jsonString = JSON.stringify(structuralProject, null, 2);
        const defaultFilename = `flight-matrix-cell-${Date.now()}.json`;

        if ('showSaveFilePicker' in window) {
            try {
                const options = {
                    suggestName: defaultFilename,
                    types: [{ description: 'Core JSON Config', accept: { 'application/json': ['.json'] } }]
                };
                const handle = await window.showSaveFilePicker(options);
                const writable = await handle.createWritable();
                await writable.write(jsonString);
                await writable.close();
                alert("Data-cell salvata nell'archivio locale.");
            } catch (err) {
                if (err.name !== 'AbortError') alert("Errore I/O: " + err.message);
            }
        } else {
            const userFilename = prompt("Nome del pacchetto:", defaultFilename);
            if (userFilename === null) return;
            let finalName = userFilename.trim() || defaultFilename;
            if (!finalName.endsWith('.json')) finalName += '.json';

            const blob = new Blob([jsonString], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = finalName;
            link.click();
        }
    }

    function loadProject(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(!data.points || !data.routes) throw new Error("Dataset non integro o errato.");

                allPoints = [];
                routes.forEach(r => { if(r.polyline) map.removeLayer(r.polyline); });
                markersLayer.clearLayers();
                backgroundLinesLayer.clearLayers(); 

                customFixCounter = data.customFixCounter || 1;
                activeRouteId = data.activeRouteId;

                data.points.forEach(savedP => {
                    const p = { ...savedP };
                    allPoints.push(p);
                    buildMarkerGraphic(p); 
                });

                routes = data.routes.map(savedR => {
                    const r = { ...savedR };
                    r.DEP = savedR.DEP || "LIRF";
                    r.DES = savedR.DES || "LIFE";
                    r.polyline = L.polyline([], {color: r.color, weight: 4}).addTo(map);
                    return r;
                });

                updateRouteSelectOptions();
                switchRouteFields();
                updateUI();
                alert("Core Matrix ripristinata con successo!");
            } catch(err) {
                alert("Load Failure Corrotto: " + err.message);
            }
            input.value = "";
        };
        reader.readAsText(file);
    }

    function updateRouteSelectOptions() {
        const select = document.getElementById('active-route-select');
        select.innerHTML = "";
        routes.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = `${r.name} [n. ${r.waypoints.length} Fix]`;
            if(r.id === activeRouteId) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function createNewRoute() {
        const nameInput = document.getElementById('new-route-name');
        const name = nameInput.value.trim() || `Traiettoria ${routes.length + 1}`;
        
        // Colori vividi e fluorescenti adatti al tema combat neon
        const neonColors = ['#00f3ff', '#ff007f', '#32ff7e', '#ff9f43', '#9b59b6', '#ffff33'];
        const randomColor = neonColors[routes.length % neonColors.length];
        const newId = 'r_' + Date.now();
        
        routes.push({
            id: newId, name: name, DEP: "LIRF", DES: "LIFE", waypoints: [],
            polyline: L.polyline([], {color: randomColor, weight: 4}).addTo(map), color: randomColor
        });
        activeRouteId = newId;
        nameInput.value = "";
        updateRouteSelectOptions();
        switchRouteFields();
        updateUI();
    }

    document.getElementById('active-route-select').addEventListener('change', switchRoute);

    function switchRoute() { 
        activeRouteId = document.getElementById('active-route-select').value; 
        switchRouteFields();
        updateUI(); 
    }

    function switchRouteFields() {
        const currentRoute = routes.find(r => r.id === activeRouteId);
        if (currentRoute) {
            document.getElementById('route-dep').value = currentRoute.DEP || "LIRF";
            document.getElementById('route-des').value = currentRoute.DES || "LIFE";
        }
    }

    function deleteActiveRoute() {
        if(routes.length <= 1) { alert("Impossibile procedere: Conservare almeno un vettore operativo."); return; }
        const idx = routes.findIndex(r => r.id === activeRouteId);
        if(idx !== -1) {
            map.removeLayer(routes[idx].polyline);
            routes.splice(idx, 1);
            activeRouteId = routes[0].id; 
            updateRouteSelectOptions();
            switchRouteFields();
            updateUI();
        }
    }

    function importText4f(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            const textTags = xmlDoc.getElementsByTagName("text4f");
            for (let i = 0; i < textTags.length; i++) {
                const tag = textTags[i];
                const nome = tag.textContent.trim() || `P-${allPoints.length}`;
                const lat = parseFloat(tag.getAttribute("point-lat"));
                const lon = parseFloat(tag.getAttribute("point-lon"));
                if (!isNaN(lat) && !isNaN(lon)) { registerAndBuildMarker(nome, lat, lon, false); }
            }

            const lineTags = xmlDoc.getElementsByTagName("line4f");
            for (let j = 0; j < lineTags.length; j++) {
                const line = lineTags[j];
                const startLat = parseFloat(line.getAttribute("start-lat"));
                const startLon = parseFloat(line.getAttribute("start-lon"));
                const endLat = parseFloat(line.getAttribute("end-lat"));
                const endLon = parseFloat(line.getAttribute("end-lon"));

                if (!isNaN(startLat) && !isNaN(startLon) && !isNaN(endLat) && !isNaN(endLon)) {
                    // Colore grigio scuro neutro per non disturbare le linee di traiettoria principali
                    const strokeColor = "#334155"; 
                    const fileWidth = parseFloat(line.getAttribute("stroke-width")) || 1.5;
                    const strokeWidth = Math.max(fileWidth * 1.8, 2.0); 
                    const dashArray = line.getAttribute("stroke-dasharray") || "";

                    L.polyline([[startLat, startLon], [endLat, endLon]], {
                        color: strokeColor, weight: strokeWidth, dashArray: dashArray, interactive: false, pane: 'tilePane' 
                    }).addTo(backgroundLinesLayer);
                }
            }
            input.value = ""; 
        };
        reader.readAsText(file);
    }

    function updateUI() {
        routes.forEach(r => { if(r.polyline) r.polyline.setLatLngs(r.waypoints.map(w => w._mapCoords)); });

        let output = "JSON_DATA = [\n";
        routes.forEach((r, idx) => {
            output += `  {\n    "route_name": "${r.name}",\n    "DEP": "${r.DEP || 'LIRF'}",\n    "DES": "${r.DES || 'LIFE'}",\n    "waypoints": [`;
            r.waypoints.forEach((w, wIdx) => {
                const line = `{"name": "${w.name}", "lat": ${JSON.stringify(w.lat)}, "lon": ${JSON.stringify(w.lon)}, "params": ${JSON.stringify(w.params)}}`;
                output += (wIdx === 0 ? "" : ",\n                  ") + line;
            });
            output += `]\n  }${idx < routes.length - 1 ? ',\n' : ''}`;
        });
        output += "\n]";
        document.getElementById('export-log').textContent = output;
    }

    function searchPoint() {
        const val = document.getElementById('search-name').value.toUpperCase();
        const found = allPoints.find(p => p.nome.toUpperCase().includes(val));
        if (found) { map.setView([found.lat, found.lon], 11); found.marker.openPopup(); }
    }

    function goToCoords() {
        const lat = parseFloat(document.getElementById('goto-lat').value);
        const lon = parseFloat(document.getElementById('goto-lon').value);
        if (!isNaN(lat) && !isNaN(lon)) map.setView([lat, lon], 10);
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('export-log').textContent);
        alert("Flusso JSON copiato nel buffer temporaneo.");
    }

    function resetAll() {
        if(confirm("Eseguire un reset generale? Tutti i vettori e i nodi non salvati verranno distrutti.")) {
            allPoints = [];
            customFixCounter = 1;
            routes.forEach(r => { if(r.polyline) map.removeLayer(r.polyline); });
            routes = [{ id: "r1", name: "Traiettoria Alpha", DEP: "LIRF", DES: "LIFE", waypoints: [], polyline: null, color: "#00f3ff" }];
            routes[0].polyline = L.polyline([], {color: routes[0].color, weight: 4}).addTo(map);
            activeRouteId = "r1";
            markersLayer.clearLayers();
            backgroundLinesLayer.clearLayers(); 
            updateRouteSelectOptions();
            switchRouteFields();
            updateUI();
            document.getElementById('points-count').textContent = "Fix totali: 0";
        }
    }

    // Init Core
    updateRouteSelectOptions();
    switchRouteFields();
    updateUI();
</script>
</body>
</html>
