<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VirtualDesk – Monitor 2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');
:root{
  --bg:#0e140d;--surface:#13201f;--surface2:#1a2e1a;--border:#2a4530;
  --accent:#4fc87a;--accent2:#78fac0;--text:#e2f0e4;--text2:#8aad90;
  --wh:#1e3520;--tb:#0f1810f0;--red:#f04f5d;--green:#4fc87a;--yellow:#f0c04f;
  --glass:rgba(14,30,16,0.88);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);width:100vw;height:100vh;overflow:hidden;touch-action:none;}

#wp{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 80% 20%,#0a3a1a,transparent 55%),
             radial-gradient(ellipse at 20% 80%,#0a2a0a,transparent 55%),#0e140d;}
#wp canvas{width:100%;height:100%;}

#desktop{position:fixed;inset:0;bottom:48px;z-index:1;overflow:hidden;}

#icon-grid{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:8px;z-index:2;}
.dicon{display:flex;flex-direction:column;align-items:center;gap:4px;width:68px;cursor:pointer;padding:6px;border-radius:10px;transition:background .15s;}
.dicon:hover{background:rgba(79,200,122,.18);}
.dicon .ii{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(0,0,0,.55);}
.dicon span{font-size:10px;color:#fff;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.9);line-height:1.2;}

.window{position:absolute;min-width:220px;min-height:150px;background:var(--glass);backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;z-index:10;transition:box-shadow .15s;}
.window.focused{box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1.5px var(--accent);z-index:20;}
.window.minimized{display:none!important;}

.wh{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--wh);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0;touch-action:none;}
.wctrl{display:flex;gap:6px;}
.wb{width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;}
.wb.cl{background:var(--red);}.wb.mn{background:var(--yellow);}.wb.mx{background:var(--green);}
.wt{font-size:12px;color:var(--text2);font-weight:600;flex:1;overflow:hidden;white-space:nowrap;}
.we{font-size:14px;}
.wbody{flex:1;overflow:hidden;position:relative;}
.app-content{width:100%;height:100%;padding:14px;overflow-y:auto;font-size:13px;line-height:1.6;color:var(--text);}
.wrs{position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:se-resize;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px;opacity:.35;touch-action:none;}
.wrs svg{width:12px;height:12px;fill:var(--text2);}

/* left-edge crossing visual (window going to M1) */
#edge-line{position:fixed;top:0;left:0;bottom:48px;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));z-index:50;opacity:.4;pointer-events:none;transition:opacity .3s;}
#edge-tip{position:fixed;top:50%;left:5px;transform:translateY(-50%);font-size:9px;color:var(--accent2);writing-mode:vertical-rl;letter-spacing:.12em;font-weight:700;z-index:51;pointer-events:none;opacity:.6;}

#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--tb);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 8px;z-index:100;}
#start-btn{height:36px;padding:0 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;color:#0e140d;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
#start-btn:active{transform:scale(.95);}
#tbwins{display:flex;gap:4px;overflow:hidden;flex:1;min-width:0;}
.tbw{height:36px;padding:0 10px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;max-width:110px;white-space:nowrap;overflow:hidden;flex-shrink:0;}
.tbw.active{background:rgba(79,200,122,.25);border-color:var(--accent);color:var(--text);}
#tbright{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
#peer-btn{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;background:rgba(240,79,93,.15);color:var(--red);border:1px solid rgba(240,79,93,.3);cursor:pointer;white-space:nowrap;}
#peer-btn.on{background:rgba(79,200,122,.15);color:var(--green);border-color:rgba(79,200,122,.3);}

#smenu{position:fixed;bottom:52px;left:8px;width:265px;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;box-shadow:0 -20px 60px rgba(0,0,0,.5);z-index:200;overflow:hidden;display:none;}
#smenu.open{display:block;animation:mIn .15s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.mhdr{padding:13px 16px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.msec{padding:7px 16px 2px;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-weight:700;}
.mitem{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;}
.mitem:hover{background:rgba(79,200,122,.15);}
.mii{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.min2{flex:1;}.mn{font-weight:600;font-size:13px;}.md{font-size:11px;color:var(--text2);}

#cpanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:295px;max-height:90vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;z-index:500;box-shadow:0 30px 80px rgba(0,0,0,.7);display:none;}
#cpanel h2{font-size:16px;margin-bottom:5px;}
.pbtn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#0e140d;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;display:block;}
.pbtn.ghost{background:rgba(255,255,255,.08);color:var(--text);}

#mbadge{position:fixed;top:10px;right:10px;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:10px;font-weight:700;color:var(--text2);z-index:50;display:flex;align-items:center;gap:5px;}
.bd{width:8px;height:8px;border-radius:2px;}.bd1{background:var(--border);transition:background .3s;}.bd1.on{background:#5d6af0;}.bd2{background:var(--accent);}

#rcursor{position:fixed;width:14px;height:14px;border-radius:50%;background:#5d6af0;opacity:.7;pointer-events:none;z-index:999;display:none;transform:translate(-50%,-50%);box-shadow:0 0 0 3px rgba(93,106,240,.25);}

#notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:9px 18px;font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
#notif.show{opacity:1;}
</style>
</head>
<body>
<div id="wp"><canvas id="stars"></canvas></div>
<div id="desktop"><div id="icon-grid"></div></div>
<div id="edge-line"></div>
<div id="edge-tip">← M1</div>
<div id="mbadge"><div class="bd bd1" id="bd1"></div><div class="bd bd2"></div><span>Monitor 2</span></div>
<div id="rcursor"></div>

<div id="taskbar">
  <button id="start-btn" onclick="toggleMenu()">⊞ Start</button>
  <div id="tbwins"></div>
  <div id="tbright">
    <div id="peer-btn" onclick="openCP()">⬡ M1 offline</div>
    <div id="clock"></div>
  </div>
</div>

<div id="smenu">
  <div class="mhdr">🖥 VirtualDesk · Monitor 2</div>
  <div class="msec">App</div>
  <div id="menu-apps"></div>
  <div class="msec">Desktop</div>
  <div class="mitem" onclick="openCP();closeMenu()">
    <div class="mii" style="background:linear-gradient(135deg,#4fc87a,#78fac0)">📡</div>
    <div class="min2"><div class="mn">Connetti Monitor 1</div><div class="md">Unisci i due schermi</div></div>
  </div>
</div>

<div id="cpanel">
  <h2>📡 Connetti Monitor 1</h2>
  <p style="font-size:11px;color:var(--text2);margin:5px 0 10px;line-height:1.5">📱 Scansiona il QR del Monitor 1<br>🖥 oppure incolla il testo JSON</p>
  <button class="pbtn" onclick="startScanOffer()">📷 Scansiona QR Monitor 1</button>
  <div style="text-align:center;font-size:11px;color:var(--text2);margin:8px 0 3px">oppure</div>
  <textarea id="offer-paste" placeholder='{"type":"offer","sdp":"v=0..."}' style="width:100%;height:55px;font-size:7px;font-family:monospace;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px;resize:none"></textarea>
  <button class="pbtn" onclick="connectWithText()" style="font-size:12px">✅ Connetti con testo</button>
  <div id="cpbody" style="margin-top:10px"></div>
  <div id="cpst" style="font-size:11px;color:var(--text2);margin-top:6px;min-height:16px"></div>
  <button class="pbtn ghost" onclick="closeCP()" style="margin-top:8px;font-size:12px">✕ Chiudi</button>
</div>

<div id="notif"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  VIRTUALDESK — MONITOR 2
//
//  COORDINATE SYSTEM (same as Monitor 1):
//    Global X:  0..SW-1   = Monitor 1
//               SW..2SW-1 = Monitor 2  ← this screen
//
//  Monitor 2 renders the portion: globalX SW..2*SW
//  A window at globalX=gx is positioned at CSS left = gx - SW
//  So a window at gx=SW appears at CSS left=0 (left edge of M2)
//  A window at gx=SW-100 appears at CSS left=-100 (partially visible, crossing from M1)
// ═══════════════════════════════════════════════════════════════

let SW = window.innerWidth;
let SH = window.innerHeight - 48;
window.addEventListener('resize', () => { SW=window.innerWidth; SH=window.innerHeight-48; renderAll(); });

// ── STARFIELD ─────────────────────────────────────────────────
(()=>{
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let stars=[];
  const rsz=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
  const mk=()=>{stars=[];for(let i=0;i<110;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.2,a:Math.random(),s:(Math.random()*.004+.001)*(Math.random()<.5?1:-1)});};
  const draw=()=>{ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.a+=s.s;if(s.a>1||s.a<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,255,220,${Math.max(0,s.a)*.6})`;ctx.fill();});requestAnimationFrame(draw);};
  window.addEventListener('resize',()=>{rsz();mk();});rsz();mk();draw();
})();

// ── CLOCK ─────────────────────────────────────────────────────
const clkEl=document.getElementById('clock');
const updClk=()=>{clkEl.textContent=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});};
setInterval(updClk,1000);updClk();

// ── APPS ──────────────────────────────────────────────────────
const APPS=[
  {id:'calc', name:'Calcolatrice',icon:'🧮',bg:'linear-gradient(135deg,#f04f5d,#f0904f)'},
  {id:'notes',name:'Note',        icon:'📝',bg:'linear-gradient(135deg,#f0c04f,#e8944f)'},
  {id:'files',name:'File',        icon:'📁',bg:'linear-gradient(135deg,#4fc87a,#4ff0c4)'},
  {id:'clock',name:'Orologio',    icon:'🕐',bg:'linear-gradient(135deg,#a78bfa,#5d6af0)'},
  {id:'term', name:'Terminale',   icon:'⌨️', bg:'linear-gradient(135deg,#1a2535,#2a3a55)'},
  {id:'music',name:'Musica',      icon:'🎵',bg:'linear-gradient(135deg,#f05d9f,#f04f5d)'},
];

const iconGrid=document.getElementById('icon-grid');
const menuApps=document.getElementById('menu-apps');
APPS.forEach(app=>{
  const d=document.createElement('div');
  d.className='dicon';
  d.innerHTML=`<div class="ii" style="background:${app.bg}">${app.icon}</div><span>${app.name}</span>`;
  d.ondblclick=()=>{openApp(app);closeMenu();};
  d.addEventListener('touchend',e=>{if(e.changedTouches.length===1){openApp(app);closeMenu();}},{passive:true});
  iconGrid.appendChild(d);
  const m=document.createElement('div');
  m.className='mitem';
  m.innerHTML=`<div class="mii" style="background:${app.bg}">${app.icon}</div><div class="min2"><div class="mn">${app.name}</div></div>`;
  m.onclick=()=>{openApp(app);closeMenu();};
  menuApps.appendChild(m);
});

// ═══════════════════════════════════════════════════════════════
//  WINDOW MANAGER — global coordinate system
//  Key difference from Monitor 1:
//    CSS left = win.gx - SW   (subtract SW to get local coords)
// ═══════════════════════════════════════════════════════════════
let wins={};
let wSeq=0, zTop=10;

function openApp(app, gx, gy, forcedId){
  wSeq++;
  const id = forcedId || ('m2w'+wSeq);
  // Default position: on Monitor2 side (gx starts at SW)
  gx = gx!==undefined ? gx : SW + 30+(wSeq%7)*25;
  gy = gy!==undefined ? gy : 40+(wSeq%7)*25;
  const w=300,h=230;

  const el=document.createElement('div');
  el.className='window';el.id=id;
  el.innerHTML=`
    <div class="wh">
      <div class="wctrl">
        <button class="wb cl" onclick="closeWin('${id}')"></button>
        <button class="wb mn" onclick="minWin('${id}')"></button>
        <button class="wb mx" onclick="maxWin('${id}')"></button>
      </div>
      <span class="we">${app.icon}</span>
      <span class="wt">${app.name}</span>
    </div>
    <div class="wbody" id="wb-${id}">${buildContent(app,id)}</div>
    <div class="wrs" id="rs-${id}"><svg viewBox="0 0 12 12"><path d="M12 0L0 12h4L12 4V0zm0 8l-4 4h4V8z"/></svg></div>`;

  document.getElementById('desktop').appendChild(el);
  wins[id]={app,gx,gy,w,h,minimized:false,maxed:false,el,savedMax:null};
  applyPos(id);
  focusWin(id);
  addTB(id,app);
  makeDraggable(el,id);
  makeResizable(el,id);
  return id;
}

function applyPos(id){
  const win=wins[id]; if(!win)return;
  const el=win.el;
  // Convert global X to local X for Monitor 2
  const localX = win.gx - SW;
  el.style.left  = localX+'px';
  el.style.top   = win.gy+'px';
  el.style.width = win.w+'px';
  el.style.height= win.h+'px';

  // Fully on Monitor 1 side → not visible here
  const onM1 = (win.gx + win.w) <= SW;
  el.style.display = (win.minimized || onM1) ? 'none' : 'flex';

  // Update edge indicator
  const anyCross=Object.values(wins).some(w=>!w.minimized&&w.gx<SW&&(w.gx+w.w)>SW);
  document.getElementById('edge-line').style.opacity=anyCross?'0.9':'0.4';
}

function renderAll(){ Object.keys(wins).forEach(applyPos); }

// ── APP CONTENT ───────────────────────────────────────────────
let cBuf='',cOp='',cPrev='';
function buildContent(app,id){
  switch(app.id){
    case 'calc': return `<div class="app-content" style="padding:8px;display:flex;flex-direction:column;gap:3px">
      <input id="cd-${id}" readonly style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:20px;padding:8px 10px;text-align:right;margin-bottom:3px" value="0">
      ${[['7','8','9','÷'],['4','5','6','×'],['1','2','3','−'],['C','0','.','+'],[null,'=',null,null]]
        .map(row=>`<div style="display:flex;gap:3px">${row.map(k=>k?
          `<button onclick="ck(this,'${id}')" data-k="${k}" style="flex:1;padding:9px 0;background:${k==='='?'linear-gradient(135deg,var(--accent),var(--accent2))':'rgba(255,255,255,.07)'};border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;cursor:pointer">${k}</button>`
          :`<div style="flex:1"></div>`).join('')}</div>`).join('')}
    </div>`;
    case 'notes': return `<textarea style="width:100%;height:100%;background:transparent;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:12px;resize:none;line-height:1.6;outline:none" placeholder="Scrivi note..."></textarea>`;
    case 'files':{
      const items=['📁 Documenti','📁 Immagini','📁 Download','📁 Desktop','📄 report.pdf','🎵 music.mp3','🖼 photo.jpg'];
      return `<div class="app-content">${items.map(i=>`<div style="padding:7px 6px;border-radius:6px;cursor:pointer;font-size:13px" onmouseenter="this.style.background='rgba(79,200,122,.15)'" onmouseleave="this.style.background=''">${i}</div>`).join('')}</div>`;
    }
    case 'clock':{
      setTimeout(()=>{const el=document.getElementById('ck-'+id);if(!el)return;const t=()=>{el.textContent=new Date().toLocaleTimeString('it-IT');};t();setInterval(t,1000);},50);
      return `<div class="app-content" style="display:flex;align-items:center;justify-content:center;height:100%"><div id="ck-${id}" style="font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;color:var(--accent2)"></div></div>`;
    }
    case 'term':{
      const oid='to-'+id,iid='ti-'+id;
      const cmds={'ls':'documenti  immagini  download  note.txt','pwd':'/home/monitor2','date':new Date().toString(),'whoami':'utente','help':'ls, pwd, date, whoami, clear, echo'};
      setTimeout(()=>{
        const inp=document.getElementById(iid);if(!inp)return;
        inp.onkeydown=e=>{
          if(e.key!=='Enter')return;
          const out=document.getElementById(oid);
          const cmd=inp.value.trim();inp.value='';if(!cmd)return;
          const l=document.createElement('div');l.innerHTML=`<span style="color:var(--accent)">$ ${cmd}</span>`;out.appendChild(l);
          if(cmd==='clear'){out.innerHTML='';}else{const r=document.createElement('div');r.textContent=cmds[cmd]||(cmd.startsWith('echo ')?cmd.slice(5):`bash: ${cmd}: not found`);out.appendChild(r);}
          out.scrollTop=out.scrollHeight;
        };
      },50);
      return `<div style="height:100%;display:flex;flex-direction:column;padding:8px;gap:4px">
        <div id="${oid}" style="flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4fc87a;overflow-y:auto;line-height:1.6"><div>VirtualDesk Terminal</div></div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px">$</span>
          <input id="${iid}" style="flex:1;background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none" placeholder="cmd...">
        </div>
      </div>`;
    }
    case 'music': return `<div class="app-content" style="text-align:center;padding:18px"><div style="font-size:54px;margin-bottom:10px">🎵</div><div style="font-weight:700;font-size:15px">Nothing Playing</div><div style="color:var(--text2);font-size:12px;margin-bottom:18px">Apri un file audio</div><div style="display:flex;justify-content:center;gap:14px"><button style="background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;color:var(--text)">⏮</button><button style="background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;color:#0e140d">▶</button><button style="background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;color:var(--text)">⏭</button></div></div>`;
    default: return `<div class="app-content">${app.name}</div>`;
  }
}

function ck(btn,id){
  const d=document.getElementById('cd-'+id),k=btn.dataset.k;
  if(k==='C'){cBuf='0';cOp='';cPrev='';d.value='0';return;}
  if(k==='='){try{d.value=String(eval(cPrev+cOp.replace('÷','/').replace('×','*').replace('−','-')+cBuf));cBuf=d.value;}catch{d.value='Err';}cOp='';cPrev='';return;}
  if('÷×−+'.includes(k)){cPrev=cBuf;cOp=k;cBuf='';return;}
  if(cBuf==='0'&&k!=='.')cBuf='';cBuf+=k;d.value=cBuf;
}

// ── FOCUS / CLOSE / MIN / MAX ─────────────────────────────────
function focusWin(id){
  Object.values(wins).forEach(w=>w.el.classList.remove('focused'));
  const win=wins[id];if(win){win.el.classList.add('focused');win.el.style.zIndex=++zTop;}
  updateTB();
}

function closeWin(id){
  const win=wins[id];if(!win)return;
  win.el.remove();delete wins[id];
  const tb=document.getElementById('tb-'+id);if(tb)tb.remove();
  sendPeer({type:'WIN_CLOSE',id});
}

function minWin(id){
  const win=wins[id];if(!win)return;
  win.minimized=!win.minimized;
  applyPos(id);updateTB();
  syncWin(id);
}

function maxWin(id){
  const win=wins[id];if(!win)return;
  if(!win.maxed){
    win.savedMax={gx:win.gx,gy:win.gy,w:win.w,h:win.h};
    // Maximise on Monitor2: global coords SW..SW+SW
    win.gx=SW;win.gy=0;win.w=SW;win.h=SH;win.maxed=true;
    win.el.style.borderRadius='0';
  } else {
    Object.assign(win,win.savedMax);win.maxed=false;
    win.el.style.borderRadius='14px';
  }
  applyPos(id);syncWin(id);
}

// ── TASKBAR ──────────────────────────────────────────────────
function addTB(id,app){
  const tb=document.getElementById('tbwins');
  const el=document.createElement('div');
  el.className='tbw';el.id='tb-'+id;
  el.innerHTML=`${app.icon} ${app.name}`;
  el.onclick=()=>{const w=wins[id];if(!w)return;if(w.minimized){w.minimized=false;applyPos(id);}focusWin(id);};
  tb.appendChild(el);
}

function updateTB(){
  Object.keys(wins).forEach(id=>{
    const tb=document.getElementById('tb-'+id);
    if(tb)tb.classList.toggle('active',wins[id].el.classList.contains('focused')&&!wins[id].minimized);
  });
}

// ── DRAG — global space, cursor sent as global X ─────────────
function makeDraggable(el,id){
  const hdr=el.querySelector('.wh');
  let drag=false,sx,sy,ogx,ogy;
  const start=e=>{
    drag=true;el.style.transition='none';
    const p=e.touches?e.touches[0]:e;
    sx=p.clientX;sy=p.clientY;
    const w=wins[id];ogx=w.gx;ogy=w.gy;
    focusWin(id);e.preventDefault();
  };
  const move=e=>{
    if(!drag)return;
    const p=e.touches?e.touches[0]:e;
    const win=wins[id];
    win.gx=ogx+(p.clientX-sx);
    win.gy=Math.max(0,ogy+(p.clientY-sy));
    applyPos(id);
    syncWin(id);
    // Cursor in global coords: Monitor2 clientX + SW = global X
    sendPeer({type:'CURSOR',gx:p.clientX+SW,gy:p.clientY});
    e.preventDefault();
  };
  const end=()=>{drag=false;el.style.transition='';};
  hdr.addEventListener('mousedown',start);
  hdr.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);
}

// ── RESIZE ────────────────────────────────────────────────────
function makeResizable(el,id){
  const rs=el.querySelector('.wrs');
  let resz=false,sx,sy,ow,oh;
  const start=e=>{resz=true;const p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;const w=wins[id];ow=w.w;oh=w.h;e.preventDefault();};
  const move=e=>{if(!resz)return;const p=e.touches?e.touches[0]:e;const w=wins[id];w.w=Math.max(220,ow+(p.clientX-sx));w.h=Math.max(150,oh+(p.clientY-sy));applyPos(id);syncWin(id);};
  const end=()=>resz=false;
  rs.addEventListener('mousedown',start);rs.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',move);window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end);window.addEventListener('touchend',end);
}

// ── MENUS ────────────────────────────────────────────────────
function toggleMenu(){document.getElementById('smenu').classList.toggle('open');}
function closeMenu(){document.getElementById('smenu').classList.remove('open');}
document.getElementById('desktop').addEventListener('click',()=>closeMenu());
function openCP(){document.getElementById('cpanel').style.display='block';}
function closeCP(){document.getElementById('cpanel').style.display='none';}

// ═══════════════════════════════════════════════════════════════
//  WEBRTC — QR scan + paste dual mode
// ═══════════════════════════════════════════════════════════════
let pc=null,dc=null,scanning=false,scanTimer=null;
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function startScanOffer(){
  const body=document.getElementById('cpbody');
  body.innerHTML=`
    <p style="font-size:10px;color:var(--text2);margin-bottom:6px">Punta la fotocamera al QR del Monitor 1</p>
    <video id="scanvid" style="width:100%;border-radius:8px;background:#000" autoplay playsinline muted></video>
    <canvas id="scancv" style="display:none"></canvas>
    <div id="scanst" style="font-size:10px;color:var(--text2);margin-top:5px;text-align:center">🔍 Ricerca QR...</div>`;
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});}
  catch(e){document.getElementById('scanst').textContent='❌ Fotocamera: '+e.message;return;}
  const vid=document.getElementById('scanvid'),cv=document.getElementById('scancv'),st=document.getElementById('scanst');
  vid.srcObject=stream;scanning=true;
  function tick(){
    if(!scanning)return;
    if(vid.readyState===vid.HAVE_ENOUGH_DATA){
      cv.width=vid.videoWidth;cv.height=vid.videoHeight;
      const ctx=cv.getContext('2d');ctx.drawImage(vid,0,0);
      const img=ctx.getImageData(0,0,cv.width,cv.height);
      const r=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(r){scanning=false;stream.getTracks().forEach(t=>t.stop());st.textContent='✅ QR rilevato!';createAnswer(r.data);return;}
    }
    scanTimer=requestAnimationFrame(tick);
  }
  scanTimer=requestAnimationFrame(tick);
}

async function connectWithText(){
  const raw=document.getElementById('offer-paste').value.trim();
  if(!raw){notify('⚠ Incolla prima il testo!');return;}
  await createAnswer(raw);
}

function dbg(msg){
  const el=document.getElementById('cpst');
  if(el) el.innerHTML=(el.innerHTML?el.innerHTML+'<br>':'')+msg;
  console.log('[M2]',msg);
}

async function createAnswer(offerRaw){
  const body=document.getElementById('cpbody');
  const cst=document.getElementById('cpst');
  cst.innerHTML='';
  try{
    dbg('⏳ Parsing offerta...');
    let offer;
    try{ offer=JSON.parse(offerRaw.trim()); }
    catch(e){ throw new Error('JSON non valido: '+e.message); }
    dbg('✓ type='+typeof offer.type+' sdp='+typeof offer.sdp+(typeof offer.sdp==='string'?' starts='+offer.sdp.substring(0,4):''));
    if(typeof offer.type!=='string') throw new Error('"type" non è stringa');
    if(typeof offer.sdp!=='string')  throw new Error('"sdp" non è stringa, è '+typeof offer.sdp);
    if(!offer.sdp.startsWith('v=')) throw new Error('SDP non inizia con v=');

    if(pc){try{pc.close();}catch(e){}}
    pc=new RTCPeerConnection(ICE);
    pc.ondatachannel=e=>{console.log('[M2] ondatachannel');dc=e.channel;setupDC(dc);};
    pc.oniceconnectionstatechange=()=>{
      const s=pc.iceConnectionState;
      console.log('[M2] ICE state:',s);
      dbg('ICE: '+s);
      if(s==='failed') dbg('❌ ICE failed — stessa rete WiFi?');
    };
    pc.onconnectionstatechange=()=>console.log('[M2] Connection:',pc.connectionState);

    dbg('⏳ setRemoteDescription...');
    await new Promise(async resolve=>{
      pc.onicecandidate=e=>{
        console.log('[M2] ICE candidate:',e.candidate?e.candidate.type:'null');
        if(!e.candidate)resolve();
      };
      pc.onicegatheringstatechange=()=>{
        console.log('[M2] ICE gathering:',pc.iceGatheringState);
        if(pc.iceGatheringState==='complete')resolve();
      };
      await pc.setRemoteDescription(new RTCSessionDescription({type:offer.type,sdp:offer.sdp}));
      dbg('✓ RemoteDescription OK');
      const ans=await pc.createAnswer();
      dbg('✓ Answer creata type='+ans.type);
      await pc.setLocalDescription(ans);
      dbg('⏳ ICE gathering risposta...');
      setTimeout(()=>{console.log('[M2] timeout fallback');resolve();},5000);
    });
    dbg('✓ SDP risposta pronta ('+pc.localDescription.sdp.length+' chars)');

    const aj=JSON.stringify({type:pc.localDescription.type,sdp:pc.localDescription.sdp});

    body.innerHTML=`
      <p style="font-size:10px;color:var(--text2);margin-bottom:5px">📱 Fai scansionare al Monitor 1:</p>
      <div id="qra" style="background:#fff;padding:7px;border-radius:8px;display:inline-block;margin-bottom:8px"></div>
      <p style="font-size:10px;color:var(--text2);margin:5px 0 3px">🖥 oppure copia il testo:</p>
      <textarea id="atxt" readonly style="width:100%;height:52px;font-size:7px;font-family:monospace;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px;resize:none">${aj}</textarea>
      <button class="pbtn" onclick="doCopy('atxt')" style="font-size:11px;margin-top:4px">📋 Copia risposta</button>
      <div style="font-size:10px;color:var(--text2);margin-top:8px">⏳ Attendo Monitor 1...</div>`;

    new QRCode(document.getElementById('qra'),{text:aj,width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    cst.textContent='';
  }catch(e){cst.textContent='❌ '+e.message;notify('❌ '+e.message);}
}

function doCopy(id){
  const ta=document.getElementById(id);if(!ta)return;
  navigator.clipboard.writeText(ta.value).then(()=>notify('📋 Copiato!')).catch(()=>{ta.select();document.execCommand('copy');notify('📋 Copiato!');});
}

// ── DATA CHANNEL ─────────────────────────────────────────────
function setupDC(ch){
  console.log('[M2] setupDC called, state:',ch.readyState);
  ch.onopen=()=>{
    console.log('[M2] DataChannel OPEN');
    document.getElementById('peer-btn').textContent='⬡ M1 online';
    document.getElementById('peer-btn').classList.add('on');
    document.getElementById('bd1').classList.add('on');
    closeCP();
    notify('✅ Monitor 1 connesso — desktop unificato!');
  };
  ch.onclose=()=>{
    console.log('[M2] DataChannel CLOSED');
    document.getElementById('peer-btn').textContent='⬡ M1 offline';
    document.getElementById('peer-btn').classList.remove('on');
    document.getElementById('bd1').classList.remove('on');
    notify('⚠ Monitor 1 disconnesso');
  };
  ch.onerror=e=>console.error('[M2] DC error',e);
  ch.onmessage=e=>handleMsg(JSON.parse(e.data));
}

function sendPeer(msg){
  if(dc&&dc.readyState==='open')dc.send(JSON.stringify(msg));
}

function syncWin(id){
  const w=wins[id];if(!w)return;
  sendPeer({
    type:'WIN_UPDATE',
    id,gx:w.gx,gy:w.gy,w:w.w,h:w.h,
    minimized:w.minimized,
    appId:w.app.id,appName:w.app.name,appIcon:w.app.icon,appBg:w.app.bg
  });
}

// ── RECEIVE FROM PEER ────────────────────────────────────────
function handleMsg(msg){
  switch(msg.type){

    case 'WIN_UPDATE':{
      const id=msg.id;
      if(!wins[id]&&msg.appId){
        const app={id:msg.appId,name:msg.appName,icon:msg.appIcon||'🪟',bg:msg.appBg||'#333'};
        openApp(app,msg.gx,msg.gy,id);
      }
      const win=wins[id];if(!win)break;
      win.gx=msg.gx;win.gy=msg.gy;win.w=msg.w;win.h=msg.h;
      win.minimized=msg.minimized||false;
      applyPos(id);
      const tb=document.getElementById('tb-'+id);
      if(tb)tb.style.opacity=(win.gx+win.w)<=SW?'0.5':'1';
      break;
    }

    case 'WIN_CLOSE':{
      const win=wins[msg.id];if(!win)break;
      win.el.remove();delete wins[msg.id];
      const tb=document.getElementById('tb-'+msg.id);if(tb)tb.remove();
      break;
    }

    case 'CURSOR':{
      // msg.gx = global X from Monitor1 (Monitor1 cursor: gx = clientX, no offset)
      // Convert to Monitor2 local: localX = gx - SW
      const localX=msg.gx-SW;
      const cur=document.getElementById('rcursor');
      if(localX>=-20&&localX<=SW+20){
        cur.style.display='block';
        cur.style.left=localX+'px';
        cur.style.top=msg.gy+'px';
      } else {
        cur.style.display='none';
      }
      break;
    }
  }
}

// ── NOTIFY ───────────────────────────────────────────────────
let ntmr;
function notify(txt){
  const el=document.getElementById('notif');
  el.textContent=txt;el.classList.add('show');
  clearTimeout(ntmr);ntmr=setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
