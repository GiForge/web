<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calc-Colonna Subtotals</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0b0c10;
    --panel: #1a1c23;
    --border: #303443;
    --accent: #e8f027;
    --accent2: #27f0b4;
    --danger: #f06060;
    --text: #e0e4f0;
    --muted: #4a4f5d;
    --subtotal-bg: #13151a;
    --cell-w: 42px;
    --cell-h: 45px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; }

  .calc-container {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    overflow-x: auto;
    max-width: 95vw;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    margin-bottom: 20px;
  }

  #grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .cell {
    width: var(--cell-w);
    height: var(--cell-h);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel);
    font-size: 1.1rem;
    cursor: pointer;
  }

  .cell.index-cell { width: 35px; background: #13151a; color: var(--muted); font-size: 0.7rem; font-weight: bold; cursor: default; }
  .cell.header { background: #13151a; color: var(--muted); font-size: 0.6rem; cursor: default; }
  .cell.op-cell { width: 45px; color: var(--accent2); font-weight: 800; }
  
  /* Stile Risultati Parziali */
  .cell.subtotal-cell { 
    width: 100px; 
    background: var(--subtotal-bg); 
    color: var(--accent2); 
    font-size: 0.9rem; 
    justify-content: flex-end; 
    padding-right: 10px;
    border-left: 2px solid var(--border);
    cursor: default;
    opacity: 0.8;
  }

  .cell.selected { 
    background: #252936; 
    box-shadow: inset 0 0 0 2px var(--accent); 
    color: var(--accent); 
    z-index: 5;
  }

  .cell.result-val { color: var(--accent2); background: #0f1115; font-weight: bold; border-top: 2px solid var(--accent2); }
  .cell.result-label { background: #0f1115; border-top: 2px solid var(--accent2); color: var(--accent2); }
  .cell.total-final { width: 100px; background: #0f1115; color: var(--accent2); font-weight: bold; border-top: 2px solid var(--accent2); justify-content: flex-end; padding-right: 10px; }

  .sidebar { width: 340px; display: flex; flex-direction: column; gap: 10px; }
  .numpad-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto repeat(5, 55px);
    gap: 8px;
    background: var(--panel);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .btn-reset-total { grid-column: span 4; background: #2d161a; color: var(--danger); border: 1px solid #4a2025; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; height: 40px; margin-bottom: 5px; }
  button { font-family: 'Syne', sans-serif; background: #232731; border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; }
  button:active { background: var(--accent); color: #000; }
  .btn-op { color: var(--accent2) !important; background: #1c2029 !important; }
  .btn-danger { color: var(--danger) !important; }
  .btn-tall { grid-row: span 2; }
  .btn-wide { grid-column: span 2; }

  @media (max-width: 800px) { :root { --cell-w: 28px; --cell-h: 38px; } .cell.subtotal-cell, .cell.total-final { width: 70px; font-size: 0.7rem; } .sidebar { width: 100%; } }
</style>
</head>
<body>

<h2 style="color: var(--accent); margin-bottom: 10px; font-family: 'Syne'; letter-spacing: 1px;">CALC_REGISTER_SUBTOTALS</h2>

<div class="calc-container">
  <div id="grid"></div>
</div>

<div class="sidebar">
  <div class="numpad-grid">
    <button class="btn-reset-total" onclick="fullReset()">⚠ RESET WORKSPACE</button>
    <button class="btn-danger" onclick="clearCurrentRow()">CLR</button>
    <button class="btn-op" onclick="handleOp('/')">/</button>
    <button class="btn-op" onclick="handleOp('*')">*</button>
    <button class="btn-danger" onclick="deleteSingleDigit()">⌫</button>
    <button onclick="inputAction('7')">7</button><button onclick="inputAction('8')">8</button><button onclick="inputAction('9')">9</button>
    <button class="btn-op" onclick="handleOp('-')">-</button>
    <button onclick="inputAction('4')">4</button><button onclick="inputAction('5')">5</button><button onclick="inputAction('6')">6</button>
    <button class="btn-op" onclick="handleOp('+')">+</button>
    <button onclick="inputAction('1')">1</button><button onclick="inputAction('2')">2</button><button onclick="inputAction('3')">3</button>
    <button class="btn-op btn-tall" onclick="handleOp('+')">ENT</button>
    <button class="btn-wide" onclick="inputAction('0')">0</button><button onclick="inputAction('.')">.</button>
  </div>
</div>

<script>
const MAX_DIGITS = 12;
let rows = [{ digits: Array(MAX_DIGITS).fill(''), op: '' }];
let sel = { r: 0, c: MAX_DIGITS - 1 };

function render() {
    const grid = document.getElementById('grid');
    // Colonne: ID(35) + OP(45) + Digits(12*w) + SUBTOTAL(100)
    grid.style.gridTemplateColumns = `35px 45px repeat(${MAX_DIGITS}, var(--cell-w)) 100px`;
    grid.innerHTML = '';

    // Headers
    grid.appendChild(createCell('ID', 'header'));
    grid.appendChild(createCell('OP', 'header'));
    for(let i=1; i<=MAX_DIGITS; i++) grid.appendChild(createCell('C'+i, 'header'));
    grid.appendChild(createCell('SUBTOTAL', 'header'));

    let runningTotal = 0;

    rows.forEach((row, ri) => {
        // Logica calcolo parziale
        let val = parseFloat(row.digits.join('')) || 0;
        if(ri === 0) runningTotal = val;
        else {
            if(row.op === '+') runningTotal += val;
            if(row.op === '-') runningTotal -= val;
            if(row.op === '*') runningTotal *= val;
            if(row.op === '/' && val !== 0) runningTotal /= val;
        }
        
        // Render riga
        grid.appendChild(createCell((ri + 1).toString().padStart(2, '0'), 'index-cell'));
        const opCell = createCell(ri === 0 ? 'START' : row.op, 'op-cell');
        opCell.style.fontSize = ri === 0 ? '0.5rem' : '1.1rem';
        opCell.onclick = () => removeFullRow(ri);
        grid.appendChild(opCell);

        for(let ci=0; ci<MAX_DIGITS; ci++) {
            const isSel = (sel.r === ri && sel.c === ci);
            const cell = createCell(row.digits[ci], 'digit' + (isSel ? ' selected' : ''));
            cell.onclick = () => { sel = {r: ri, c: ci}; render(); };
            grid.appendChild(cell);
        }

        // Cella Risultato Parziale
        const subCell = createCell(formatResult(runningTotal), 'subtotal-cell');
        grid.appendChild(subCell);
    });

    // Riga Totale Finale
    grid.appendChild(createCell('TOT', 'result-label'));
    grid.appendChild(createCell('=', 'result-label'));
    
    const finalVal = runningTotal;
    const resChars = finalVal.toString().split('');
    let resDisplay = Array(MAX_DIGITS).fill('');
    for(let i = 0; i < resChars.length && i < MAX_DIGITS; i++) {
        resDisplay[MAX_DIGITS - 1 - i] = resChars[resChars.length - 1 - i];
    }
    resDisplay.forEach(val => grid.appendChild(createCell(val, 'result-val')));
    grid.appendChild(createCell(formatResult(finalVal), 'total-final'));
}

function formatResult(num) {
    return Number(Math.round(num + "e+2") + "e-2").toLocaleString('it-IT');
}

function createCell(txt, cls) {
    const d = document.createElement('div');
    d.className = 'cell ' + cls;
    d.textContent = txt;
    return d;
}

// Funzioni di calcolo e input (invariate rispetto a prima)
function inputAction(char) {
    let row = rows[sel.r];
    if (sel.c === MAX_DIGITS - 1) {
        if (row.digits[sel.c] !== '') for(let i=0; i<MAX_DIGITS-1; i++) row.digits[i] = row.digits[i+1];
        row.digits[MAX_DIGITS-1] = char;
    } else {
        row.digits[sel.c] = char;
        sel.c = Math.min(MAX_DIGITS - 1, sel.c + 1);
    }
    render();
}

function deleteSingleDigit() {
    let row = rows[sel.r];
    if (sel.c === MAX_DIGITS - 1) {
        for(let i=MAX_DIGITS-1; i>0; i--) row.digits[i] = row.digits[i-1];
        row.digits[0] = '';
    } else row.digits[sel.c] = '';
    render();
}

function handleOp(op) {
    if (rows[sel.r].digits.join('').trim() !== "") {
        rows.push({ digits: Array(MAX_DIGITS).fill(''), op: op });
        sel.r = rows.length - 1; sel.c = MAX_DIGITS - 1;
        render();
    }
}

function clearCurrentRow() { rows[sel.r].digits = Array(MAX_DIGITS).fill(''); sel.c = MAX_DIGITS - 1; render(); }
function removeFullRow(idx) { if(rows.length > 1) { rows.splice(idx, 1); sel.r = Math.min(rows.length - 1, sel.r); render(); } else clearCurrentRow(); }
function fullReset() { if (confirm("Reset totale?")) { rows = [{ digits: Array(MAX_DIGITS).fill(''), op: '' }]; sel = { r: 0, c: MAX_DIGITS - 1 }; render(); } }

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') fullReset();
    else if (e.key >= '0' && e.key <= '9' || e.key === '.') inputAction(e.key);
    else if (e.key === 'Backspace') { e.preventDefault(); deleteSingleDigit(); }
    else if (e.key === 'Delete') { e.preventDefault(); e.shiftKey ? removeFullRow(sel.r) : clearCurrentRow(); }
    else if (['+', '-', '*', '/'].includes(e.key)) { e.preventDefault(); handleOp(e.key); }
    else if (e.key === 'Enter') { e.preventDefault(); handleOp('+'); }
    else if (e.key.startsWith('Arrow')) {
        const dir = e.key.replace('Arrow','').toLowerCase();
        if(dir==='up' && sel.r>0) sel.r--; if(dir==='down' && sel.r<rows.length-1) sel.r++;
        if(dir==='left' && sel.c>0) sel.c--; if(dir==='right' && sel.c<MAX_DIGITS-1) sel.c++;
        render();
    }
});

render();
</script>
</body>
</html>
