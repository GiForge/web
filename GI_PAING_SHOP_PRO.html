<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Paint Shop Pro 7 - Web Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --face: #d4d0c8;
    --face-light: #ece9d8;
    --face-dark: #aca899;
    --shadow: #808080;
    --shadow-dark: #404040;
    --hl: #ffffff;
    --text: #000000;
    --text-dis: #808080;
    --accent: #316ac5;
    --accent-l: #c1d2ee;
    --title-grad1: #0a246a;
    --title-grad2: #a6caf0;
  }
  html, body {
    font-family: 'Tahoma', 'Verdana', sans-serif;
    font-size: 11px;
    background: var(--face);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* === Title Bar === */
  .title-bar {
    background: linear-gradient(90deg, var(--title-grad1), var(--title-grad2));
    color: white;
    padding: 3px 6px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.4);
  }
  .title-bar .win-controls span {
    display: inline-block;
    width: 16px; height: 14px;
    background: var(--face);
    color: var(--text);
    text-align: center;
    line-height: 14px;
    margin-left: 2px;
    border: 1px solid var(--face);
    box-shadow: inset 1px 1px 0 var(--hl), inset -1px -1px 0 var(--shadow);
    font-weight: normal;
    cursor: pointer;
  }

  /* === Menu Bar === */
  .menu-bar {
    display: flex;
    background: var(--face);
    padding: 1px 2px;
    border-bottom: 1px solid var(--shadow);
  }
  .menu-item {
    padding: 3px 8px;
    cursor: pointer;
    position: relative;
  }
  .menu-item:hover, .menu-item.open {
    background: var(--accent);
    color: white;
  }
  .menu-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    background: var(--face);
    border: 1px solid var(--shadow-dark);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    min-width: 220px;
    z-index: 1000;
    display: none;
    padding: 2px;
  }
  .menu-item.open .menu-dropdown { display: block; }
  .menu-entry {
    padding: 4px 22px 4px 24px;
    cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .menu-entry:hover { background: var(--accent); color: white; }
  .menu-entry.disabled { color: var(--text-dis); cursor: default; }
  .menu-entry.disabled:hover { background: transparent; color: var(--text-dis); }
  .menu-entry .shortcut { position: absolute; right: 8px; opacity: 0.7; }
  .menu-sep { height: 1px; background: var(--shadow); margin: 3px 2px; border-bottom: 1px solid var(--hl); }
  .menu-entry .check { position: absolute; left: 8px; }

  /* === Toolbar === */
  .toolbar {
    display: flex;
    background: var(--face);
    padding: 2px;
    border-bottom: 1px solid var(--shadow);
    gap: 1px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tb-group { display: flex; gap: 1px; padding: 0 2px; border-right: 1px solid var(--shadow); }
  .tb-group:last-child { border-right: none; }
  .tb-btn {
    width: 22px; height: 22px;
    background: var(--face);
    border: 1px solid var(--face);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .tb-btn:hover {
    border: 1px solid var(--accent);
    background: var(--accent-l);
  }
  .tb-btn:active, .tb-btn.active {
    border: 1px solid var(--shadow-dark);
    background: var(--face-light);
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3);
  }
  .tb-btn.disabled { color: var(--text-dis); cursor: default; }
  .tb-btn.disabled:hover { border: 1px solid var(--face); background: var(--face); }
  .tb-sep { width: 1px; height: 18px; background: var(--shadow); margin: 0 3px; }

  /* === Main Area === */
  .main-area { display: flex; flex: 1; overflow: hidden; }

  /* === Tool Palette (left) === */
  .tool-palette {
    width: 34px;
    background: var(--face);
    border-right: 1px solid var(--shadow);
    padding: 2px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow-y: auto;
  }
  .tool-btn {
    width: 28px; height: 28px;
    background: var(--face);
    border: 1px solid var(--face);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .tool-btn:hover {
    border: 1px solid var(--accent);
    background: var(--accent-l);
  }
  .tool-btn.active {
    border: 1px solid var(--shadow-dark);
    background: var(--face-light);
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3);
  }
  .tool-btn svg { width: 18px; height: 18px; pointer-events: none; }
  .tool-btn .tooltip {
    position: absolute;
    left: 36px;
    top: 0;
    background: #ffffe1;
    border: 1px solid var(--text);
    padding: 3px 6px;
    z-index: 2000;
    white-space: nowrap;
    display: none;
    pointer-events: none;
    font-size: 11px;
  }
  .tool-btn:hover .tooltip { display: block; }

  /* === Canvas Area === */
  .canvas-area {
    flex: 1;
    background: #7a7a7a;
    overflow: hidden;
    position: relative;
    background-image:
      linear-gradient(45deg, #888 25%, transparent 25%),
      linear-gradient(-45deg, #888 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #888 75%),
      linear-gradient(-45deg, transparent 75%, #888 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  }
  .canvas-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .canvas-wrapper {
    position: absolute;
    transform-origin: 0 0;
    box-shadow: 0 0 0 1px var(--text), 0 4px 16px rgba(0,0,0,0.5);
  }
  .canvas-wrapper canvas {
    display: block;
    image-rendering: pixelated;
  }
  .canvas-wrapper canvas.layer-canvas {
    position: absolute;
    top: 0; left: 0;
  }
  .selection-overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  /* === Right Panel === */
  .right-panel {
    width: 220px;
    background: var(--face);
    border-left: 1px solid var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    border-bottom: 1px solid var(--shadow);
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    background: linear-gradient(180deg, var(--face-light), var(--face));
    padding: 3px 6px;
    font-weight: bold;
    border-bottom: 1px solid var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 4px; overflow: auto; }

  /* Layers */
  .layer-list { max-height: 200px; overflow-y: auto; }
  .layer-item {
    display: flex;
    align-items: center;
    padding: 3px 4px;
    gap: 4px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .layer-item:hover { background: var(--accent-l); }
  .layer-item.active {
    border: 1px solid var(--accent);
    background: var(--accent-l);
  }
  .layer-item .vis {
    width: 16px; height: 16px;
    border: 1px solid var(--shadow);
    background: var(--face-light);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .layer-item .thumb {
    width: 32px; height: 24px;
    border: 1px solid var(--shadow);
    background: white;
    background-image:
      linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 6px 6px;
    background-position: 0 0, 0 3px, 3px -3px, -3px 0;
    overflow: hidden;
    flex-shrink: 0;
  }
  .layer-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-item .ops button {
    width: 16px; height: 16px;
    border: 1px solid var(--shadow);
    background: var(--face);
    cursor: pointer;
    font-size: 10px;
    padding: 0;
  }

  /* === Color Palette === */
  .color-palette-bar {
    background: var(--face);
    border-top: 1px solid var(--shadow);
    padding: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .color-swatch-pair {
    display: flex;
    width: 40px;
    height: 40px;
    position: relative;
    flex-shrink: 0;
  }
  .color-swatch {
    width: 26px; height: 26px;
    border: 1px solid var(--shadow-dark);
    box-shadow: inset 1px 1px 0 var(--hl);
    position: absolute;
    cursor: pointer;
  }
  .color-swatch.fg { top: 0; left: 0; z-index: 2; }
  .color-swatch.bg { bottom: 0; right: 0; z-index: 1; }
  .color-swatches-grid {
    display: grid;
    grid-template-columns: repeat(10, 14px);
    grid-auto-rows: 14px;
    gap: 1px;
    flex: 1;
    overflow: auto;
    max-height: 60px;
    padding: 2px;
    background: var(--face-light);
    border: 1px solid var(--shadow);
  }
  .swatch-cell {
    width: 14px; height: 14px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.2);
  }
  .swatch-cell:hover { border: 1px solid white; box-shadow: 0 0 0 1px black; transform: scale(1.2); z-index: 5; position: relative; }
  .palette-tools { display: flex; flex-direction: column; gap: 2px; }
  .palette-tools button {
    width: 22px; height: 22px;
    border: 1px solid var(--shadow);
    background: var(--face);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .palette-tools button:hover { background: var(--accent-l); }

  /* === Status Bar === */
  .status-bar {
    background: var(--face);
    border-top: 1px solid var(--shadow);
    padding: 2px 6px;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
  }
  .status-cell {
    padding: 1px 6px;
    border-left: 1px solid var(--shadow);
  }
  .status-cell:first-child { border-left: none; }

  /* === Tool Options Bar === */
  .tool-options {
    background: var(--face-light);
    border-bottom: 1px solid var(--shadow);
    padding: 3px 6px;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 11px;
    min-height: 26px;
  }
  .tool-options label { display: flex; align-items: center; gap: 4px; }
  .tool-options input[type=range] { width: 80px; vertical-align: middle; }
  .tool-options input[type=number], .tool-options select {
    width: 50px;
    border: 1px solid var(--shadow);
    background: white;
    padding: 1px 2px;
    font-family: inherit;
    font-size: 11px;
  }
  .tool-options select { width: auto; }

  /* === Tabs === */
  .tabs-bar {
    background: var(--face);
    border-bottom: 1px solid var(--shadow);
    display: flex;
    padding: 2px 2px 0 2px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .tab {
    background: var(--face);
    border: 1px solid var(--shadow);
    border-bottom: none;
    padding: 3px 8px 3px 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 1px;
    border-radius: 3px 3px 0 0;
    max-width: 200px;
    flex-shrink: 0;
  }
  .tab.active {
    background: var(--face-light);
    font-weight: bold;
    padding-bottom: 4px;
    margin-top: -1px;
  }
  .tab .close {
    width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
  }
  .tab .close:hover { border: 1px solid var(--shadow); background: var(--face); }
  .tab .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* === Dialog === */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 5000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .dialog-overlay.show { display: flex; }
  .dialog {
    background: var(--face);
    border: 2px solid;
    border-color: var(--hl) var(--shadow-dark) var(--shadow-dark) var(--hl);
    box-shadow: 4px 4px 8px rgba(0,0,0,0.4);
    min-width: 300px;
    max-width: 90vw;
  }
  .dialog-title {
    background: linear-gradient(90deg, var(--title-grad1), var(--title-grad2));
    color: white;
    padding: 3px 6px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dialog-title .close {
    width: 16px; height: 14px;
    background: var(--face);
    color: var(--text);
    border: 1px solid var(--face);
    text-align: center;
    line-height: 14px;
    cursor: pointer;
    font-weight: normal;
  }
  .dialog-body { padding: 12px; }
  .dialog-footer {
    padding: 6px 12px;
    border-top: 1px solid var(--shadow);
    display: flex;
    justify-content: flex-end;
    gap: 4px;
  }
  .btn {
    background: var(--face);
    border: 1px solid;
    border-color: var(--hl) var(--shadow-dark) var(--shadow-dark) var(--hl);
    padding: 4px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    min-width: 70px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { border-color: var(--shadow-dark) var(--hl) var(--hl) var(--shadow-dark); }
  .btn.primary { font-weight: bold; }

  .form-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
  .form-row label { width: 90px; text-align: right; }
  .form-row input, .form-row select {
    border: 1px solid var(--shadow);
    background: white;
    padding: 2px;
    font-family: inherit;
    font-size: 11px;
    flex: 1;
    min-width: 0;
  }
  .form-row input[type=number] { max-width: 80px; }

  /* Color picker dialog */
  .cp-main {
    display: flex;
    gap: 8px;
  }
  .cp-sv {
    width: 200px; height: 200px;
    position: relative;
    border: 1px solid var(--shadow-dark);
    cursor: crosshair;
    overflow: hidden;
  }
  .cp-sv-cursor {
    position: absolute;
    width: 9px; height: 9px;
    border: 1px solid white;
    box-shadow: 0 0 0 1px black, 0 0 2px black;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .cp-hue {
    width: 20px; height: 200px;
    position: relative;
    border: 1px solid var(--shadow-dark);
    cursor: ns-resize;
    background: linear-gradient(to bottom,
      #ff0000 0%, #ffff00 17%, #00ff00 33%,
      #00ffff 50%, #0000ff 67%, #ff00ff 83%, #ff0000 100%);
  }
  .cp-hue-cursor {
    position: absolute;
    left: -2px;
    width: 24px; height: 4px;
    border: 1px solid black;
    background: white;
    pointer-events: none;
    transform: translateY(-50%);
  }
  .cp-info { display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
  .cp-info input { width: 60px; padding: 1px 2px; border: 1px solid var(--shadow); font-family: inherit; font-size: 11px; }
  .cp-preview {
    width: 60px; height: 40px;
    border: 1px solid var(--shadow-dark);
  }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { background: var(--face); border: 1px solid var(--face); }
  ::-webkit-scrollbar-thumb {
    background: var(--face);
    border: 1px solid var(--shadow-dark);
    box-shadow: inset 1px 1px 0 var(--hl), inset -1px -1px 0 var(--shadow);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--face-light); }
  ::-webkit-scrollbar-corner { background: var(--face); }

  /* Selection marquee animation */
  @keyframes marquee {
    0% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 16; }
  }
  .marquee-rect {
    fill: none;
    stroke: black;
    stroke-width: 1;
    stroke-dasharray: 4 4;
    vector-effect: non-scaling-stroke;
    animation: marquee 0.5s linear infinite;
  }

  /* Cursor crosshair on canvas */
  .canvas-wrapper.tool-brush { cursor: crosshair; }
  .canvas-wrapper.tool-pencil { cursor: crosshair; }
  .canvas-wrapper.tool-eraser { cursor: crosshair; }
  .canvas-wrapper.tool-fill { cursor: crosshair; }
  .canvas-wrapper.tool-eyedropper { cursor: crosshair; }
  .canvas-wrapper.tool-zoom { cursor: zoom-in; }
  .canvas-wrapper.tool-hand { cursor: grab; }
  .canvas-wrapper.tool-hand.panning { cursor: grabbing; }
  .canvas-wrapper.tool-text { cursor: text; }
  .canvas-wrapper.tool-selection { cursor: crosshair; }
  .canvas-wrapper.tool-crop { cursor: crosshair; }
  .canvas-wrapper.tool-move { cursor: move; }
  .canvas-wrapper.tool-line, .canvas-wrapper.tool-shape { cursor: crosshair; }
  .canvas-wrapper.tool-spray { cursor: crosshair; }
  .canvas-wrapper.tool-clone { cursor: crosshair; }

  .hidden-input { position: absolute; left: -9999px; }
</style>
</head>
<body>
<div id="app">
  <!-- Title Bar -->
  <div class="title-bar">
    <span>Paint Shop Pro 7 - Web Edition</span>
    <div class="win-controls">
      <span id="winMin">_</span>
      <span id="winMax">▢</span>
      <span id="winClose">×</span>
    </div>
  </div>

  <!-- Menu Bar -->
  <div class="menu-bar" id="menuBar"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="mainToolbar"></div>

  <!-- Tool Options Bar -->
  <div class="tool-options" id="toolOptions"></div>

  <!-- Tabs Bar -->
  <div class="tabs-bar" id="tabsBar"></div>

  <!-- Main Area -->
  <div class="main-area">
    <!-- Tool Palette -->
    <div class="tool-palette" id="toolPalette"></div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-viewport" id="canvasViewport">
        <!-- Canvas wrappers are dynamically inserted here -->
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="panel-section" style="flex: 1;">
        <div class="panel-header">
          <span>Livelli</span>
          <div style="display:flex; gap:2px;">
            <button class="btn" style="min-width:auto; padding:1px 6px;" id="btnAddLayer" title="Nuovo livello">＋</button>
            <button class="btn" style="min-width:auto; padding:1px 6px;" id="btnDelLayer" title="Elimina livello">－</button>
            <button class="btn" style="min-width:auto; padding:1px 6px;" id="btnDupLayer" title="Duplica livello">⧉</button>
            <button class="btn" style="min-width:auto; padding:1px 6px;" id="btnMergeLayer" title="Unisci giù">▼</button>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="layer-list" id="layerList"></div>
        </div>
      </div>

      <div class="panel-section" style="flex: 1;">
        <div class="panel-header"><span>Cronologia</span></div>
        <div class="panel-body" style="padding:0;">
          <div class="layer-list" id="historyList"></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-header"><span>Informazioni</span></div>
        <div class="panel-body" id="imageInfo" style="font-size:11px;">
          <div>Nessuna immagine</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Color Palette Bar -->
  <div class="color-palette-bar">
    <div class="color-swatch-pair" id="colorSwatchPair">
      <div class="color-swatch fg" id="fgSwatch" title="Colore primo piano"></div>
      <div class="color-swatch bg" id="bgSwatch" title="Colore sfondo"></div>
    </div>
    <div class="palette-tools">
      <button id="btnSwapColors" title="Scambia colori (X)">⇄</button>
      <button id="btnResetColors" title="Ripristina colori (D)">●</button>
    </div>
    <div class="color-swatches-grid" id="swatchesGrid"></div>
    <div class="palette-tools">
      <button id="btnPickColor" title="Selettore colori...">⊕</button>
      <button id="btnAddSwatch" title="Aggiungi campione">★</button>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-cell" id="stDim">Dimensioni: —</div>
    <div class="status-cell" id="stZoom">Zoom: 100%</div>
    <div class="status-cell" id="stPos">Pos: —, —</div>
    <div class="status-cell" id="stColor">RGB: —</div>
    <div class="status-cell" id="stTool">Strumento: Pennello</div>
    <div class="status-cell" style="flex:1"></div>
    <div class="status-cell" id="stMem">Memoria: 0 KB</div>
  </div>
</div>

<!-- File input -->
<input type="file" id="fileInput" class="hidden-input" accept="image/*" multiple>
<input type="file" id="fileInputSingle" class="hidden-input" accept="image/*">

<!-- Dialog container -->
<div class="dialog-overlay" id="dialogOverlay"></div>

<script>
/* ==========================================================================
   PAINT SHOP PRO 7 - WEB EDITION
   Implementazione completa in singolo file HTML
   ========================================================================== */

// ===== Icone SVG =====
const ICONS = {
  new: '<svg viewBox="0 0 16 16"><path fill="none" stroke="currentColor" stroke-width="1.2" d="M3 2h7l3 3v9H3z"/><path d="M10 2v3h3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>',

// ===== Classe Layer =====
class Layer {
  constructor(width, height, name = 'Livello') {
    this.name = name;
    this.width = width;
    this.height = height;
    this.canvas = document.createElement('canvas');
    this.canvas.width = width;
    this.canvas.height = height;
    this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
    this.visible = true;
    this.opacity = 100;
    this.blendMode = 'source-over';
    this.mask = null;
    this.maskEnabled = false;
  }
  clone() {
    const l = new Layer(this.width, this.height, this.name + ' copia');
    l.ctx.drawImage(this.canvas, 0, 0);
    l.visible = this.visible;
    l.opacity = this.opacity;
    l.blendMode = this.blendMode;
    return l;
  }
}

// ===== Classe PaintImage =====
class PaintImage {
  constructor(width, height, name, bg = '#ffffff') {
    this.name = name || 'Senza titolo';
    this.width = width;
    this.height = height;
    this.layers = [];
    this.activeLayerIdx = 0;
    this.zoom = 1;
    this.panX = 0;
    this.panY = 0;
    this.selection = null; // {x, y, w, h}
    this.selectionPath = null;
    this.id = 'img_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    
    // Crea livello sfondo
    const bgLayer = new Layer(width, height, 'Sfondo');
    bgLayer.ctx.fillStyle = bg;
    bgLayer.ctx.fillRect(0, 0, width, height);
    this.layers.push(bgLayer);
    
    this.history = [];
    this.historyIdx = -1;
    this.saveHistory('Apri');
  }
  
  get activeLayer() { return this.layers[this.activeLayerIdx]; }
  
  saveHistory(label) {
    // Tronca il futuro
    this.history = this.history.slice(0, this.historyIdx + 1);
    // Salva stato corrente (semplificato: solo layer attivo)
    const snapshot = {
      label,
      layers: this.layers.map(l => {
        const c = document.createElement('canvas');
        c.width = l.width; c.height = l.height;
        c.getContext('2d').drawImage(l.canvas, 0, 0);
        return { name: l.name, canvas: c, visible: l.visible, opacity: l.opacity, blendMode: l.blendMode };
      }),
      activeLayerIdx: this.activeLayerIdx,
      width: this.width,
      height: this.height
    };
    this.history.push(snapshot);
    if (this.history.length > 30) this.history.shift();
    this.historyIdx = this.history.length - 1;
  }
  
  undo() {
    if (this.historyIdx > 0) {
      this.historyIdx--;
      this.restoreSnapshot(this.history[this.historyIdx]);
      return true;
    }
    return false;
  }
  redo() {
    if (this.historyIdx < this.history.length - 1) {
      this.historyIdx++;
      this.restoreSnapshot(this.history[this.historyIdx]);
      return true;
    }
    return false;
  }
  restoreSnapshot(snap) {
    this.layers = snap.layers.map(l => {
      const layer = new Layer(snap.width, snap.height, l.name);
      layer.ctx.drawImage(l.canvas, 0, 0);
      layer.visible = l.visible;
      layer.opacity = l.opacity;
      layer.blendMode = l.blendMode;
      return layer;
    });
    this.activeLayerIdx = Math.min(snap.activeLayerIdx, this.layers.length - 1);
    this.width = snap.width;
    this.height = snap.height;
  }
  
  // Renderizza tutti i layer su un canvas di destinazione
  renderTo(targetCtx, forExport = false) {
    targetCtx.clearRect(0, 0, this.width, this.height);
    for (const layer of this.layers) {
      if (!layer.visible) continue;
      targetCtx.globalAlpha = layer.opacity / 100;
      targetCtx.globalCompositeOperation = layer.blendMode;
      // Apply mask if enabled
      if (layer.maskEnabled && layer.mask) {
        const tmp = document.createElement('canvas');
        tmp.width = this.width; tmp.height = this.height;
        const tctx = tmp.getContext('2d');
        tctx.drawImage(layer.canvas, 0, 0);
        tctx.globalCompositeOperation = 'destination-in';
        tctx.drawImage(layer.mask, 0, 0);
        targetCtx.drawImage(tmp, 0, 0);
      } else {
        targetCtx.drawImage(layer.canvas, 0, 0);
      }
    }
    targetCtx.globalAlpha = 1;
    targetCtx.globalCompositeOperation = 'source-over';
  }
  
  flatten() {
    const flat = new Layer(this.width, this.height, 'Sfondo');
    this.renderTo(flat.ctx);
    this.layers = [flat];
    this.activeLayerIdx = 0;
  }
  
  // Operazioni su pixel del layer attivo
  getImageData() {
    return this.activeLayer.ctx.getImageData(0, 0, this.width, this.height);
  }
  putImageData(data) {
    this.activeLayer.ctx.putImageData(data, 0, 0);
  }
  // Solo dentro selezione
  getSelectedImageData() {
    if (this.selection) {
      const s = this.selection;
      return this.activeLayer.ctx.getImageData(s.x, s.y, s.w, s.h);
    }
    return this.getImageData();
  }
  putSelectedImageData(data) {
    if (this.selection) {
      const s = this.selection;
      this.activeLayer.ctx.putImageData(data, s.x, s.y);
    } else {
      this.putImageData(data);
    }
  }
}

  get activeImage() { return this.images[this.activeImageIdx]; }
  
  init() {
    this.buildMenus();
    this.buildToolbar();
    this.buildToolPalette();
    this.buildSwatches();
    this.bindEvents();
    this.updateToolOptions();
    this.updateColorSwatches();
    this.updateUI();
  }
  
  // ===== Build UI =====
  buildMenus() {
    const mb = document.getElementById('menuBar');
    mb.innerHTML = '';
    MENUS.forEach((m, mi) => {
      const it = document.createElement('div');
      it.className = 'menu-item';
      it.innerHTML = `<span>${m.label}</span>`;
      if (m.items) {
        const dd = document.createElement('div');
        dd.className = 'menu-dropdown';
        m.items.forEach(itm => {
          if (itm.sep) {
            const s = document.createElement('div');
            s.className = 'menu-sep';
            dd.appendChild(s);
          } else if (itm.submenu) {
            const e = document.createElement('div');
            e.className = 'menu-entry';
            e.innerHTML = `${itm.label} <span style="float:right">▶</span>`;
            const sub = document.createElement('div');
            sub.className = 'menu-dropdown';
            sub.style.left = '100%'; sub.style.top = '0';
            itm.submenu.forEach(si => {
              if (si.sep) {
                const s = document.createElement('div'); s.className = 'menu-sep'; sub.appendChild(s);
              } else {
                const se = document.createElement('div');
                se.className = 'menu-entry';
                se.innerHTML = `${si.label}${si.shortcut ? `<span class="shortcut">${si.shortcut}</span>` : ''}`;
                se.onclick = (ev) => { ev.stopPropagation(); this.handleAction(si.action); this.closeMenus(); };
                sub.appendChild(se);
              }
            });
            e.appendChild(sub);
            e.onmouseenter = () => {
              sub.style.display = 'block';
            };
            e.onmouseleave = () => {
              sub.style.display = 'none';
            };
            dd.appendChild(e);
          } else {
            const e = document.createElement('div');
            e.className = 'menu-entry';
            e.innerHTML = `${itm.check ? '<span class="check">✓</span>' : ''}${itm.label}${itm.shortcut ? `<span class="shortcut">${itm.shortcut}</span>` : ''}`;
            e.onclick = (ev) => { ev.stopPropagation(); this.handleAction(itm.action); this.closeMenus(); };
            dd.appendChild(e);
          }
        });
        it.appendChild(dd);
      }
      it.onclick = (e) => {
        const wasOpen = it.classList.contains('open');
        this.closeMenus();
        if (!wasOpen) it.classList.add('open');
      };
      it.onmouseenter = (e) => {
        if (document.querySelector('.menu-item.open')) {
          this.closeMenus();
          it.classList.add('open');
        }
      };
      mb.appendChild(it);
    });
  }
  closeMenus() {
    document.querySelectorAll('.menu-item.open').forEach(m => m.classList.remove('open'));
  }
  
  buildToolbar() {
    const tb = document.getElementById('mainToolbar');
    const groups = [
      [
        { icon: 'new', action: 'new', title: 'Nuovo' },
        { icon: 'open', action: 'open', title: 'Apri' },
        { icon: 'save', action: 'save', title: 'Salva' },
        { icon: 'print', action: 'print', title: 'Stampa' },
      ],
      [
        { icon: 'undo', action: 'undo', title: 'Annulla' },
        { icon: 'redo', action: 'redo', title: 'Ripristina' },
      ],
      [
        { icon: 'cut', action: 'cut', title: 'Taglia' },
        { icon: 'copy', action: 'copy', title: 'Copia' },
        { icon: 'paste', action: 'paste', title: 'Incolla' },
      ],
      [
        { custom: '<input type="number" id="zoomInput" value="100" min="1" max="3200" style="width:50px;padding:1px;border:1px solid #808080;">', action: 'setZoom', title: 'Zoom %' },
      ],
    ];
    tb.innerHTML = '';
    groups.forEach((g, gi) => {

      grp.className = 'tb-group';

        if (b.custom) btn.innerHTML = b.custom;
        btn.onclick = () => {

          this.handleAction(b.action);
        };

      });
      tb.appendChild(grp);

  buildToolPalette() {
    const tp = document.getElementById('toolPalette');
    tp.innerHTML = '';
    TOOLS.forEach(t => {
      const b = document.createElement('div');
      b.className = 'tool-btn' + (t.id === this.currentTool ? ' active' : '');
      b.dataset.tool = t.id;
      b.innerHTML = ICONS[t.icon] || '';
      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = t.name;
      b.appendChild(tip);
      b.onclick = () => this.selectTool(t.id);
      tp.appendChild(b);
    });
  }
  
  buildSwatches() {
    const grid = document.getElementById('swatchesGrid');
    grid.innerHTML = '';
    this.swatches.forEach(c => {
      const s = document.createElement('div');
      s.className = 'swatch-cell';
      s.style.background = c;
      s.title = c;
      s.onclick = (e) => {
        if (e.button === 2 || e.shiftKey) this.bgColor = c;
        else this.fgColor = c;
        this.updateColorSwatches();
      };
      s.oncontextmenu = (e) => { e.preventDefault(); this.bgColor = c; this.updateColorSwatches(); };
      grid.appendChild(s);
    });
  }
  
  updateColorSwatches() {
    document.getElementById('fgSwatch').style.background = this.fgColor;
    document.getElementById('bgSwatch').style.background = this.bgColor;
    document.getElementById('stColor').textContent = 'RGB: ' + this.hexToRgbStr(this.fgColor);
  }
  
  hexToRgbStr(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r}, ${g}, ${b}`;
  }
  hexToRgb(hex) {
    return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
  }
  rgbToHex(r,g,b) {
    return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
  }
  
  // ===== Event Binding =====
  bindEvents() {
    // Global
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.menu-item')) this.closeMenus();
    });
    document.addEventListener('keydown', (e) => this.handleKey(e));
    document.addEventListener('keyup', (e) => {
      if (e.key === ' ') { this.spaceDown = false; }
    });
    
    // File inputs
    document.getElementById('fileInput').addEventListener('change', (e) => this.openFiles(e.target.files));
    document.getElementById('fileInputSingle').addEventListener('change', (e) => this.openFiles(e.target.files));
    
    // Window controls
    document.getElementById('winClose').onclick = () => { if (confirm('Chiudere Paint Shop Pro? Le modifiche non salvate andranno perse.')) window.close(); };
    
    // Color swatches
    document.getElementById('fgSwatch').onclick = () => this.openColorPicker('fg');
    document.getElementById('bgSwatch').onclick = () => this.openColorPicker('bg');
    document.getElementById('btnSwapColors').onclick = () => { const t = this.fgColor; this.fgColor = this.bgColor; this.bgColor = t; this.updateColorSwatches(); };
    document.getElementById('btnResetColors').onclick = () => { this.fgColor = '#000000'; this.bgColor = '#ffffff'; this.updateColorSwatches(); };
    document.getElementById('btnPickColor').onclick = () => this.openColorPicker('fg');
    document.getElementById('btnAddSwatch').onclick = () => { this.swatches.push(this.fgColor); this.buildSwatches(); };
    
    // Layers panel
    document.getElementById('btnAddLayer').onclick = () => this.handleAction('newLayer');
    document.getElementById('btnDelLayer').onclick = () => this.handleAction('deleteLayer');
    document.getElementById('btnDupLayer').onclick = () => this.handleAction('duplicateLayer');
    document.getElementById('btnMergeLayer').onclick = () => this.handleAction('mergeDown');
    
    // Canvas area
    const ca = document.getElementById('canvasArea');
    ca.addEventListener('wheel', (e) => this.handleWheel(e), { passive: false });
    ca.addEventListener('mousedown', (e) => this.handleCanvasMouseDown(e));
    ca.addEventListener('mousemove', (e) => this.handleCanvasMouseMove(e));
    ca.addEventListener('mouseup', (e) => this.handleCanvasMouseUp(e));
    ca.addEventListener('mouseleave', (e) => this.handleCanvasMouseUp(e));
    ca.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Paste from clipboard
    window.addEventListener('paste', (e) => this.handlePaste(e));
    
    // Drag drop files
    ca.addEventListener('dragover', (e) => { e.preventDefault(); });
    ca.addEventListener('drop', (e) => {
      e.preventDefault();
      this.openFiles(e.dataTransfer.files);
    });
  }
  
  handleKey(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const k = e.key;
    const ctrl = e.ctrlKey || e.metaKey;
    const shift = e.shiftKey;
    
    if (ctrl && k.toLowerCase() === 'z' && !shift) { e.preventDefault(); this.handleAction('undo'); }
    else if (ctrl && (k.toLowerCase() === 'y' || (k.toLowerCase() === 'z' && shift))) { e.preventDefault(); this.handleAction('redo'); }
    else if (ctrl && k.toLowerCase() === 'n') { e.preventDefault(); this.handleAction('new'); }
    else if (ctrl && k.toLowerCase() === 'o') { e.preventDefault(); this.handleAction('open'); }
    else if (ctrl && k.toLowerCase() === 's') { e.preventDefault(); this.handleAction('save'); }
    else if (ctrl && k.toLowerCase() === 'p') { e.preventDefault(); this.handleAction('print'); }
    else if (ctrl && k.toLowerCase() === 'c') { e.preventDefault(); this.handleAction('copy'); }
    else if (ctrl && k.toLowerCase() === 'x') { e.preventDefault(); this.handleAction('cut'); }
    else if (ctrl && k.toLowerCase() === 'v') { e.preventDefault(); this.handleAction('paste'); }
    else if (ctrl && k.toLowerCase() === 'a') { e.preventDefault(); this.handleAction('selectAll'); }
    else if (ctrl && k.toLowerCase() === 'd') { e.preventDefault(); this.handleAction('deselect'); }
    else if (ctrl && k.toLowerCase() === 'l' && !shift) { e.preventDefault(); this.handleAction('pasteAsLayer'); }
    else if (ctrl && k.toLowerCase() === 'v' && shift) { e.preventDefault(); this.handleAction('pasteAsNew'); }
    else if (ctrl && k === '0') { e.preventDefault(); this.handleAction('zoomFit'); }
    else if (ctrl && k === '1') { e.preventDefault(); this.handleAction('zoomActual'); }
    else if (ctrl && shift && k.toLowerCase() === 'i') { e.preventDefault(); this.handleAction('invertSelection'); }
    else if (k === ' ') { e.preventDefault(); this.spaceDown = true; }
    else if (k === '+' || k === '=') { this.zoomIn(); }
    else if (k === '-' || k === '_') { this.zoomOut(); }
    else if (k === 'Delete') { this.handleAction('clear'); }
    else if (k === 'Escape') { this.handleAction('deselect'); }
    else if (k === 'X' || k === 'x') { const t = this.fgColor; this.fgColor = this.bgColor; this.bgColor = t; this.updateColorSwatches(); }
    else if (k === 'D' || k === 'd') { this.fgColor = '#000000'; this.bgColor = '#ffffff'; this.updateColorSwatches(); }
    else {
      const map = { b:'brush', p:'pencil', e:'eraser', f:'fill', s:'selection', c:'crop', t:'text', l:'line', r:'shape', i:'eyedropper', z:'zoom', h:'hand', a:'spray', m:'mover', w:'wand', u:'clone', n:'freehand', o:'retouch' };
      if (map[k.toLowerCase()]) { this.selectTool(map[k.toLowerCase()]); }
    }
  }
  
  handlePaste(e) {
    const items = e.clipboardData.items;
    for (const it of items) {
      if (it.type.startsWith('image/')) {
        const blob = it.getAsFile();
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          this.pasteImage(img);
          URL.revokeObjectURL(url);
        };
        img.src = url;
        e.preventDefault();
        return;
      }
    }
  }
  
  // ===== Action Handler =====
  handleAction(action) {
    if (!action) return;
    const img = this.activeImage;
    switch (action) {
      case 'new': this.newImageDialog(); break;
      case 'open': document.getElementById('fileInput').click(); break;
      case 'save': this.saveImage(); break;
      case 'saveAs': this.saveImage(true); break;
      case 'export': this.exportImage(); break;
      case 'print': window.print(); break;
      case 'printPreview': window.print(); break;
      case 'exit': if (confirm('Chiudere? Le modifiche non salvate andranno perse.')) window.close(); break;
      case 'undo': if (img && img.undo()) { this.renderActiveImage(); this.updateUI(); } break;
      case 'redo': if (img && img.redo()) { this.renderActiveImage(); this.updateUI(); } break;
      case 'cut': this.cut(); break;
      case 'copy': this.copy(); break;
      case 'copyMerge': this.copy(true); break;
      case 'paste': this.paste(); break;
      case 'pasteAsLayer': this.paste(true); break;
      case 'pasteAsNew': this.pasteAsNew(); break;
      case 'clear': this.clearSelection(); break;
      case 'fillDialog': this.openFillDialog(); break;
      case 'emptyClipboard': this.clipboard = null; break;
      case 'zoomIn': this.zoomIn(); break;
      case 'zoomOut': this.zoomOut(); break;
      case 'zoomFit': this.zoomFit(); break;
      case 'zoomActual': this.setZoom(1); break;
      case 'flipH': if (img) { img.activeLayer.ctx.save(); img.activeLayer.ctx.scale(-1,1); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, -img.width, 0); img.activeLayer.ctx.restore(); img.saveHistory('Capovolgi H'); this.renderActiveImage(); } break;
      case 'flipV': if (img) { img.activeLayer.ctx.save(); img.activeLayer.ctx.scale(1,-1); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, 0, -img.height); img.activeLayer.ctx.restore(); img.saveHistory('Capovolgi V'); this.renderActiveImage(); } break;
      case 'mirrorH': if (img) { img.activeLayer.ctx.save(); img.activeLayer.ctx.scale(-1,1); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, -img.width*2, 0); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, -img.width, 0, img.width, img.height); img.activeLayer.ctx.restore(); img.saveHistory('Rifletti H'); this.renderActiveImage(); } break;
      case 'mirrorV': if (img) { img.activeLayer.ctx.save(); img.activeLayer.ctx.scale(1,-1); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, 0, -img.height*2); img.activeLayer.ctx.drawImage(img.activeLayer.canvas, 0, -img.height, img.width, img.height); img.activeLayer.ctx.restore(); img.saveHistory('Rifletti V'); this.renderActiveImage(); } break;
      case 'rotate': this.rotateDialog(); break;
      case 'resize': this.resizeDialog(); break;
      case 'canvasSize': this.canvasSizeDialog(); break;
      case 'cropToSelection': this.cropToSelection(); break;
      case 'addBorders': this.addBordersDialog(); break;
      case 'enlargeCanvas': this.canvasSizeDialog(); break;
      case 'imageInfo': this.imageInfoDialog(); break;
      case 'colorBalance': this.colorAdjustDialog('balance'); break;
      case 'brightnessContrast': this.colorAdjustDialog('bc'); break;
      case 'hueSaturation': this.colorAdjustDialog('hs'); break;
      case 'levels': this.colorAdjustDialog('levels'); break;
      case 'curves': this.colorAdjustDialog('curves'); break;
      case 'negative': this.applyFilter('negative'); break;
      case 'grayscale': this.applyFilter('grayscale'); break;
      case 'sepia': this.applyFilter('sepia'); break;
      case 'posterize': this.posterizeDialog(); break;
      case 'threshold': this.thresholdDialog(); break;
      case 'adjust': this.colorAdjustDialog('adjust'); break;
      case 'colorize': this.colorAdjustDialog('colorize'); break;
      case 'newLayer': this.newLayer(); break;
      case 'deleteLayer': this.deleteLayer(); break;
      case 'duplicateLayer': this.duplicateLayer(); break;
      case 'mergeDown': this.mergeDown(); break;
      case 'mergeVisible': this.mergeVisible(); break;
      case 'flatten': if (img) { img.flatten(); img.saveHistory('Appiattisci'); this.renderActiveImage(); this.updateUI(); } break;
      case 'layerProperties': this.layerPropertiesDialog(); break;
      case 'selectAll': if (img) { img.selection = {x:0,y:0,w:img.width,h:img.height}; this.renderActiveImage(); } break;
      case 'deselect': if (img) { img.selection = null; this.renderActiveImage(); } break;
      case 'invertSelection': if (img && img.selection) { /* semplificato */ this.applyFilter('invertSelectionVis'); } break;
      case 'maskShowAll': this.addMask(true); break;
      case 'maskHideAll': this.addMask(false); break;
      case 'maskFromImage': this.addMask(true); break;
      // Effetti
      case 'effectBlur': this.applyFilter('blur'); break;
      case 'effectGaussian': this.gaussianDialog(); break;
      case 'effectSharpen': this.applyFilter('sharpen'); break;
      case 'effectSharpenSoft': this.applyFilter('sharpenSoft'); break;
      case 'effectNoise': this.noiseDialog(); break;
      case 'effectDespeckle': this.applyFilter('despeckle'); break;
      case 'effectMosaic': this.mosaicDialog(); break;
      case 'effectDiffuse': this.applyFilter('diffuse'); break;
      case 'effectPixelate': this.pixelateDialog(); break;
      case 'effectSolarize': this.solarizeDialog(); break;
      case 'effectFindEdges': this.applyFilter('findEdges'); break;
      case 'effectTrace': this.applyFilter('traceContour'); break;

      case 'effectEmboss': this.applyFilter('emboss'); break;
      case 'effectBevel': this.bevelDialog(); break;

      case 'effectWave': this.waveDialog(); break;
      case 'effectTwirl': this.twirlDialog(); break;
      case 'effectRipple': this.rippleDialog(); break;

      case 'closeAll': this.closeAllImages(); break;
      case 'help': this.aboutDialog(true); break;
      case 'about': this.aboutDialog(); break;
      case 'toggleToolbar': document.getElementById('mainToolbar').style.display = document.getElementById('mainToolbar').style.display === 'none' ? '' : 'none'; break;
      case 'toggleStatusbar': document.getElementById('statusBar').style.display = document.getElementById('statusBar').style.display === 'none' ? '' : 'none'; break;
      case 'toggleRulers': this.showRulers = !this.showRulers; this.renderActiveImage(); break;
      case 'toggleGrid': this.showGrid = !this.showGrid; this.renderActiveImage(); break;
      case 'refresh': this.renderActiveImage(); break;
    }
  }
  
  // ===== Tool Selection =====
  selectTool(id) {
    this.currentTool = id;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === id));
    const tool = TOOLS.find(t => t.id === id);
    document.getElementById('stTool').textContent = 'Strumento: ' + (tool ? tool.name : id);
    this.updateToolOptions();
    const wrapper = document.querySelector('.canvas-wrapper');
    if (wrapper) {
      wrapper.className = 'canvas-wrapper tool-' + id;
    }
  }
  
  updateToolOptions() {
    const opt = document.getElementById('toolOptions');
    const s = this.toolSettings;
    let html = '';
    const t = this.currentTool;
    if (t === 'brush' || t === 'pencil' || t === 'eraser') {
      const sizeKey = t === 'eraser' ? 'eraserSize' : t === 'pencil' ? 'pencilSize' : 'brushSize';
      html = `
        <label>Dimensione: <input type="range" min="1" max="200" value="${s[sizeKey]}" oninput="app.toolSettings.${sizeKey}=+this.value;document.getElementById('szVal').textContent=this.value"> <span id="szVal">${s[sizeKey]}</span>px</label>
        ${t === 'brush' ? `<label>Durezza: <input type="range" min="0" max="100" value="${s.brushHardness}" oninput="app.toolSettings.brushHardness=+this.value;document.getElementById('hdVal').textContent=this.value"> <span id="hdVal">${s.brushHardness}</span>%</label>` : ''}
        ${t !== 'pencil' ? `<label>Opacità: <input type="range" min="1" max="100" value="${s.brushOpacity}" oninput="app.toolSettings.brushOpacity=+this.value;document.getElementById('opVal').textContent=this.value"> <span id="opVal">${s.brushOpacity}</span>%</label>` : ''}
        ${t === 'brush' ? `<label>Passo: <input type="range" min="1" max="100" value="${s.brushStep}" oninput="app.toolSettings.brushStep=+this.value"></label>` : ''}
        ${t === 'brush' ? `<label>Forma: <select onchange="app.toolSettings.brushShape=this.value"><option value="round" ${s.brushShape==='round'?'selected':''}>Tonda</option><option value="square" ${s.brushShape==='square'?'selected':''}>Quadrata</option><option value="calligraphic" ${s.brushShape==='calligraphic'?'selected':''}>Calligrafica</option></select></label>` : ''}
        ${t === 'eraser' ? `<label>Modalità: <select onchange="app.toolSettings.eraserMode=this.value"><option value="bg">Colore sfondo</option><option value="transparent">Trasparenza</option></select></label>` : ''}
      `;
    } else if (t === 'spray') {
      html = `
        <label>Dimensione: <input type="range" min="1" max="100" value="${s.spraySize}" oninput="app.toolSettings.spraySize=+this.value"> ${s.spraySize}px</label>
        <label>Densità: <input type="range" min="1" max="100" value="${s.sprayDensity}" oninput="app.toolSettings.sprayDensity=+this.value"></label>
        <label>Velocità: <input type="range" min="1" max="100" value="${s.sprayRate}" oninput="app.toolSettings.sprayRate=+this.value"></label>
      `;
