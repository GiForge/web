<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Night Vision Real-Time Fix</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .viewer { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        canvas { background: #000; border: 2px solid #333; max-width: 45%; height: auto; border-radius: 8px; }
        .controls { background: #222; padding: 20px; border-radius: 10px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%; }
        .ctrl { display: flex; flex-direction: column; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; }
        label { font-size: 0.8em; color: #888; margin-bottom: 5px; }
        span { color: #3498db; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <h2>Night Vision Enhancer</h2>
    
    <div>
        <input type="file" id="upload" accept="image/*" hidden>
        <button onclick="document.getElementById('upload').click()">CARICA FOTO</button>
        <button onclick="startCamera()" style="background:#27ae60">AVVIA CAMERA</button>
    </div>

    <div class="viewer">
        <canvas id="cOrig"></canvas>
        <canvas id="cFilt"></canvas>
    </div>

    <div class="controls">
        <div class="ctrl">
            <label>ESPOSIZIONE (GAMMA) <span id="v-gamma">1.8</span></label>
            <input type="range" id="gamma" min="0.1" max="4.0" step="0.1" value="1.8">
        </div>
        <div class="ctrl">
            <label>LUMINOSITÀ <span id="v-bright">0</span></label>
            <input type="range" id="bright" min="-100" max="100" step="1" value="0">
        </div>
        <div class="ctrl">
            <label>CONTRASTO <span id="v-contrast">1.0</span></label>
            <input type="range" id="contrast" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="ctrl">
            <label>SATURAZIONE <span id="v-sat">1.0</span></label>
            <input type="range" id="sat" min="0.0" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <video id="vid" style="display:none" autoplay playsinline></video>

<script>
    const cOrig = document.getElementById('cOrig');
    const cFilt = document.getElementById('cFilt');
    const ctxO = cOrig.getContext('2d', {willReadFrequently: true});
    const ctxF = cFilt.getContext('2d', {willReadFrequently: true});
    const vid = document.getElementById('vid');
    let source = null;
    let isVideo = false;

    // --- LOGICA DI CARICAMENTO ---
    document.getElementById('upload').onchange = (e) => {
        const img = new Image();
        img.onload = () => {
            source = img; isVideo = false;
            cOrig.width = cFilt.width = img.width;
            cOrig.height = cFilt.height = img.height;
            render();
        };
        img.src = URL.createObjectURL(e.target.files[0]);
    };

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            source = vid; isVideo = true;
            cOrig.width = cFilt.width = vid.videoWidth;
            cOrig.height = cFilt.height = vid.videoHeight;
            requestAnimationFrame(loop);
        };
    }

    function loop() { if(isVideo) { render(); requestAnimationFrame(loop); } }

    // --- IL MOTORE DEL FILTRO ---
    function render() {
        if(!source) return;
        ctxO.drawImage(source, 0, 0);
        let imgData = ctxO.getImageData(0, 0, cOrig.width, cOrig.height);
        let pix = imgData.data;

        // Recupero parametri in tempo reale
        const g = parseFloat(document.getElementById('gamma').value);
        const b = parseFloat(document.getElementById('bright').value);
        const c = parseFloat(document.getElementById('contrast').value);
        const s = parseFloat(document.getElementById('sat').value);

        // Aggiorna etichette testo
        document.getElementById('v-gamma').innerText = g;
        document.getElementById('v-bright').innerText = b;
        document.getElementById('v-contrast').innerText = c;
        document.getElementById('v-sat').innerText = s;

        // Pre-calcolo Gamma
        const gTable = new Uint8Array(256);
        for(let i=0; i<256; i++) gTable[i] = Math.pow(i/255, 1/g) * 255;

        for (let i = 0; i < pix.length; i += 4) {
            let r = gTable[pix[i]];
            let g1 = gTable[pix[i+1]];
            let b1 = gTable[pix[i+2]];

            // Luminosità e Contrasto
            r = (r - 128) * c + 128 + b;
            g1 = (g1 - 128) * c + 128 + b;
            b1 = (b1 - 128) * c + 128 + b;

            // Saturazione (Formula Luma Rec.709)
            const luma = 0.2126 * r + 0.7152 * g1 + 0.0722 * b1;
            pix[i]   = Math.max(0, Math.min(255, luma + s * (r - luma)));
            pix[i+1] = Math.max(0, Math.min(255, luma + s * (g1 - luma)));
            pix[i+2] = Math.max(0, Math.min(255, luma + s * (b1 - luma)));
        }
        ctxF.putImageData(imgData, 0, 0);
    }

    // Forza il refresh quando si muovono gli slider (per le foto)
    document.querySelectorAll('input').forEach(inp => {
        inp.oninput = () => { if(!isVideo) render(); };
    });
</script>
</body>
</html>
