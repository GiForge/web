<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universe Sandbox - Curvatura Spaziotemporale</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; cursor: crosshair; touch-action: none; }

        @media (min-width: 601px) {
            body { display: flex; }
            canvas { flex-grow: 1; }
            #sidebar { width: 320px; flex-shrink: 0; background: rgba(10,10,20,0.95); border-left: 1px solid #334; padding: 15px; box-shadow: -5px 0 20px rgba(0,0,0,0.8); overflow-y: auto; height: 100vh; }
            #sidebar-toggle { display: none; }
        }

        @media (max-width: 600px) {
            canvas { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
            #sidebar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,18,0.97); border-top: 1px solid #445; padding: 12px 14px 20px; max-height: 65vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; z-index: 100; border-radius: 18px 18px 0 0; }
            #sidebar.open { transform: translateY(0); }
            #sidebar-toggle { position: fixed; bottom: 16px; right: 16px; z-index: 200; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #00ffcc, #0099aa); border: none; color: #000; font-size: 1.5em; box-shadow: 0 4px 18px rgba(0,255,204,0.45); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        }

        .section { margin-bottom: 15px; border-bottom: 1px solid #223; padding-bottom: 10px; }
        h3 { color: #00ffcc; font-size: 0.95em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .preset-btn { background: #161625; border: 1px solid #334; color: #ccc; padding: 10px 4px; border-radius: 4px; cursor: pointer; font-size: 0.78em; transition: all 0.2s; text-align: center; touch-action: manipulation; }
        .preset-btn:hover, .preset-btn:active { border-color: #00ffcc; background: #1f1f35; color: white; }
        .preset-btn.active { background: #005544; border-color: #00ffcc; font-weight: bold; color: white; }
        .control-group { margin: 10px 0; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 6px; }
        label { display: block; font-size: 0.75em; color: #889; margin-bottom: 4px; }
        .val-display { float: right; color: #00ffcc; font-family: monospace; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; margin: 5px 0; height: 24px; }
        input[type=color] { width: 100%; height: 32px; cursor: pointer; border: none; border-radius: 4px; }
        .action-btn { width: 100%; padding: 12px; margin-top: 8px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; touch-action: manipulation; }
        .btn-solar { background: linear-gradient(45deg, #ff8800, #ffcc00); color: #000; }
        .btn-galaxy { background: #6633ff; }
        .btn-reset { background: #cc3333; margin-top: 12px; }

        /* Toggle curvatura */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; margin: 8px 0; }
        .toggle-label { font-size: 0.78em; color: #aab; }
        .toggle-switch { position: relative; width: 38px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: #334; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .toggle-slider { background: #00aa88; }
        input:checked + .toggle-slider:before { transform: translateX(18px); }

        #ui-top { position: fixed; top: 15px; left: 15px; pointer-events: none; z-index: 50; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; margin-bottom: 5px; font-size: 0.8em; font-family: monospace; border: 1px solid #223; }
        #touch-hint { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,255,204,0.12); border: 1px solid rgba(0,255,204,0.3); padding: 6px 14px; border-radius: 20px; font-size: 0.7em; color: #00ffcc; pointer-events: none; z-index: 50; white-space: nowrap; opacity: 1; transition: opacity 2s; }
        #touch-hint.fade { opacity: 0; }
    </style>
</head>
<body>

<div id="ui-top">
    <div class="stat-card" id="camStatus">Visuale: Libera</div>
    <div class="stat-card" id="bodyCount">Entità: 0</div>
</div>
<div id="touch-hint">👆 Tocca e trascina per lanciare · 2 dita per zoom</div>
<canvas id="simCanvas"></canvas>
<button id="sidebar-toggle" onclick="toggleSidebar()">⚙️</button>

<div id="sidebar">
    <div class="section">
        <h3>Corpi Celesti</h3>
        <div class="preset-grid" id="presetMenu">
            <button class="preset-btn active" data-type="custom">🛠 Manuale</button>
            <button class="preset-btn" data-type="sun">☀️ Sole</button>
            <button class="preset-btn" data-type="mercury">🪨 Mercurio</button>
            <button class="preset-btn" data-type="venus">🟡 Venere</button>
            <button class="preset-btn" data-type="earth">🌍 Terra</button>
            <button class="preset-btn" data-type="mars">🔴 Marte</button>
            <button class="preset-btn" data-type="jupiter">🟠 Giove</button>
            <button class="preset-btn" data-type="saturn">💫 Saturno</button>
            <button class="preset-btn" data-type="uranus">🔵 Urano</button>
            <button class="preset-btn" data-type="neptune">🫧 Nettuno</button>
            <button class="preset-btn" data-type="blackhole">⚫ Buco Nero</button>
        </div>
    </div>

    <div class="section">
        <h3>Proprietà Attuali</h3>
        <div class="control-group">
            <label>Massa: <span class="val-display" id="massVal">1000</span></label>
            <input type="range" id="massRange" min="0.1" max="500000" step="0.1" value="1000">
        </div>
        <div class="control-group">
            <label>Raggio: <span class="val-display" id="radiusVal">10</span></label>
            <input type="range" id="radiusRange" min="1" max="200" value="10">
        </div>
        <div class="control-group">
            <label>Colore</label>
            <input type="color" id="colorPicker" value="#00ffcc">
        </div>
    </div>

    <div class="section">
        <h3>Curvatura Spaziotemporale</h3>
        <div class="toggle-row">
            <span class="toggle-label">Mostra deformazione</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleCurvature" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="control-group">
            <label>Intensità: <span class="val-display" id="curvIntVal">60</span></label>
            <input type="range" id="curvIntRange" min="10" max="200" value="60">
        </div>
        <div class="control-group">
            <label>Raggio griglia: <span class="val-display" id="curvRadVal">4.0</span>×</label>
            <input type="range" id="curvRadRange" min="10" max="80" step="1" value="40">
        </div>
        <div class="control-group">
            <label>Anelli: <span class="val-display" id="curvRingsVal">6</span></label>
            <input type="range" id="curvRingsRange" min="2" max="12" step="1" value="6">
        </div>
        <div class="control-group">
            <label>Raggi: <span class="val-display" id="curvSpokesVal">16</span></label>
            <input type="range" id="curvSpokesRange" min="4" max="32" step="1" value="16">
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Solo corpi massivi (massa &gt; 10)</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleMassFilter" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <h3>Generatori</h3>
        <button class="action-btn btn-solar" onclick="spawnSolarSystem()">Sistema Solare Reale</button>
        <button class="action-btn btn-galaxy" onclick="spawnGalaxy()">Galassia a Spirale</button>
        <button class="action-btn btn-reset" onclick="resetSim()">Pulisci Tutto</button>
    </div>
</div>

<script>
    // ── SIDEBAR MOBILE ─────────────────────────────────────────────────
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    document.addEventListener('touchstart', e => {
        const sb = document.getElementById('sidebar'), tg = document.getElementById('sidebar-toggle');
        if (sb.classList.contains('open') && !sb.contains(e.target) && e.target !== tg) sb.classList.remove('open');
    }, { passive: true });
    setTimeout(() => { const h = document.getElementById('touch-hint'); if(h){h.classList.add('fade'); setTimeout(()=>h&&h.remove(),2500);} }, 4000);

    // ── CANVAS ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('simCanvas');
    const ctx    = canvas.getContext('2d');
    const mRange = document.getElementById('massRange');
    const rRange = document.getElementById('radiusRange');
    const mVal   = document.getElementById('massVal');
    const rVal   = document.getElementById('radiusVal');
    const cPicker = document.getElementById('colorPicker');

    // curvatura controls
    const toggleCurv    = document.getElementById('toggleCurvature');
    const curvIntRange  = document.getElementById('curvIntRange');
    const curvRadRange  = document.getElementById('curvRadRange');
    const curvRingsRange= document.getElementById('curvRingsRange');
    const curvSpokesRange=document.getElementById('curvSpokesRange');
    const toggleMassFilter=document.getElementById('toggleMassFilter');
    const curvIntVal    = document.getElementById('curvIntVal');
    const curvRadVal    = document.getElementById('curvRadVal');
    const curvRingsVal  = document.getElementById('curvRingsVal');
    const curvSpokesVal = document.getElementById('curvSpokesVal');

    curvIntRange.addEventListener('input',   ()=>curvIntVal.innerText   = curvIntRange.value);
    curvRadRange.addEventListener('input',   ()=>curvRadVal.innerText   = (curvRadRange.value/10).toFixed(1)+'×');
    curvRingsRange.addEventListener('input', ()=>curvRingsVal.innerText = curvRingsRange.value);
    curvSpokesRange.addEventListener('input',()=>curvSpokesVal.innerText= curvSpokesRange.value);

    const DATA = {
        custom:    { name: "Oggetto",   mass: 1000,    radius: 10,  color: '#00ffcc' },
        sun:       { name: "Sole",      mass: 333000,  radius: 50,  color: '#ffcc00' },
        mercury:   { name: "Mercurio",  mass: 0.33,    radius: 3,   color: '#aaaaaa' },
        venus:     { name: "Venere",    mass: 4.87,    radius: 6,   color: '#e3bb76' },
        earth:     { name: "Terra",     mass: 5.97,    radius: 6.5, color: '#22aaff' },
        mars:      { name: "Marte",     mass: 0.64,    radius: 4,   color: '#ff5522' },
        jupiter:   { name: "Giove",     mass: 1898,    radius: 22,  color: '#ffccaa' },
        saturn:    { name: "Saturno",   mass: 568,     radius: 19,  color: '#eebb88' },
        uranus:    { name: "Urano",     mass: 86.8,    radius: 13,  color: '#b2d8d8' },
        neptune:   { name: "Nettuno",   mass: 102,     radius: 13,  color: '#3f54ba' },
        blackhole: { name: "Buco Nero", mass: 2000000, radius: 6,   color: '#000000' }
    };

    let selectedType = 'custom';
    let bodies = [];
    const G = 1.5;
    let zoom = 1.0, offsetX = 0, offsetY = 0, trackedBody = null;
    let isCreating = false, isPanning = false;
    let startMouse = {x:0,y:0}, currentMouse = {x:0,y:0};
    let pinchActive = false, pinchStartDist = 0, pinchStartZoom = 1, pinchMidWorld = {x:0,y:0};

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        if (window.innerWidth > 600) canvas.width = window.innerWidth - 320;
    }
    window.addEventListener('resize', resize); resize();

    mRange.addEventListener('input', ()=>mVal.innerText = mRange.value);
    rRange.addEventListener('input', ()=>rVal.innerText = rRange.value);
    document.getElementById('presetMenu').addEventListener('click', e => {
        const btn = e.target.closest('.preset-btn');
        if(!btn) return;
        document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
        const d = DATA[selectedType];
        mRange.value = d.mass; rRange.value = d.radius;
        cPicker.value = d.color.startsWith('#') ? d.color : '#ffffff';
        mVal.innerText = d.mass; rVal.innerText = d.radius;
    });

    // ── BODY CLASS ─────────────────────────────────────────────────────
    class Body {
        constructor(x,y,vx,vy,mass,radius,color,name) {
            this.x=x; this.y=y; this.vx=vx; this.vy=vy;
            this.mass=mass; this.radius=radius;
            this.color=color; this.name=name;
            this.trail=[]; this.exists=true;
        }

        drawSpacetime() {
            if (!toggleCurv.checked) return;
            if (toggleMassFilter.checked && this.mass < 10) return;

            const intensity  = parseFloat(curvIntRange.value);
            const radiusMult = parseFloat(curvRadRange.value) / 10;   // 1.0 – 8.0
            const rings      = parseInt(curvRingsRange.value);
            const spokes     = parseInt(curvSpokesRange.value);

            // Forza di curvatura: logaritmica sulla massa, scalata dall'intensità
            const strength = Math.log10(Math.max(this.mass, 1)) * intensity;
            const maxR     = this.radius * radiusMult + strength * 0.8;

            ctx.save();
            ctx.lineWidth = Math.max(0.3, 0.6 / zoom);

            // ── RAGGI radiali (spokes) ──────────────────────────────────
            for (let s = 0; s < spokes; s++) {
                const angle = (s / spokes) * Math.PI * 2;
                ctx.beginPath();
                for (let t = 0; t <= 60; t++) {
                    const frac = t / 60;
                    const r    = this.radius + frac * maxR;
                    // deformazione: curvatura esponenziale verso il centro
                    const warp = 1 - Math.exp(-frac * 3);       // 0 → 1
                    const pull = strength * (1 - warp) * 0.15;  // attrazione verso il centro
                    const px   = this.x + Math.cos(angle) * (r - pull);
                    const py   = this.y + Math.sin(angle) * (r - pull);
                    t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                const alpha = 0.08 + 0.12 * (1 - 1/rings);
                ctx.strokeStyle = this.color.replace(/^#/, '') === '000000'
                    ? `rgba(180,120,255,${alpha})`
                    : hexToRgba(this.color, alpha);
                ctx.stroke();
            }

            // ── ANELLI (rings) ─────────────────────────────────────────
            for (let ri = 1; ri <= rings; ri++) {
                const frac = ri / rings;
                // spacing logaritmico: più compresso vicino al corpo
                const logFrac = Math.log(1 + frac * (Math.E - 1));
                const baseR   = this.radius + logFrac * maxR;

                // opacità: più intensa vicino al corpo
                const alpha = 0.05 + 0.25 * (1 - frac);
                const lw    = Math.max(0.2, (0.8 * (1 - frac * 0.7)) / zoom);

                ctx.beginPath();
                ctx.lineWidth = lw;

                for (let a = 0; a <= 361; a++) {
                    const angle = (a / 360) * Math.PI * 2;
                    // l'anello "affonda" verso il corpo: ellisse compressa radialmente
                    const comprX = 1.0;
                    const comprY = 1.0 - 0.08 * (1 - frac); // leggera ellitticità verso il centro
                    // deformazione ortogonale: ogni punto viene tirato verso il centro
                    const pull = strength * (1 - logFrac) * 0.12;
                    const r    = baseR - pull;
                    const px   = this.x + Math.cos(angle) * r * comprX;
                    const py   = this.y + Math.sin(angle) * r * comprY;
                    a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }

                ctx.strokeStyle = this.color.replace(/^#/, '') === '000000'
                    ? `rgba(180,120,255,${alpha})`
                    : hexToRgba(this.color, alpha);
                ctx.stroke();
            }

            ctx.restore();
        }

        draw() {
            // trail
            if (this.trail.length > 2) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = 0.2;
                ctx.lineWidth = Math.max(0.5, 1/zoom);
                this.trail.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
                ctx.stroke();
                ctx.globalAlpha = 1.0; ctx.lineWidth = 1;
            }
            // corpo
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = this.radius*0.5; ctx.shadowColor = this.color;
            ctx.fill(); ctx.shadowBlur = 0;
            // nome
            if (this.name && (this.radius*zoom > 2 || trackedBody === this)) {
                ctx.fillStyle = "white";
                ctx.font = `${Math.max(10,14/zoom)}px Segoe UI`;
                ctx.textAlign = "left";
                ctx.fillText(this.name, this.x + this.radius + 5/zoom, this.y + 5/zoom);
            }
        }

        update() {
            this.trail.push({x:this.x, y:this.y});
            if(this.trail.length > 60) this.trail.shift();
            this.x += this.vx; this.y += this.vy;
        }
    }

    // ── HELPER colore ──────────────────────────────────────────────────
    function hexToRgba(hex, alpha) {
        hex = hex.replace('#','');
        if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
        const r = parseInt(hex.slice(0,2),16);
        const g = parseInt(hex.slice(2,4),16);
        const b = parseInt(hex.slice(4,6),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ── FISICA ─────────────────────────────────────────────────────────
    function physics() {
        for (let i=0; i<bodies.length; i++) {
            for (let j=i+1; j<bodies.length; j++) {
                let b1=bodies[i], b2=bodies[j];
                let dx=b2.x-b1.x, dy=b2.y-b1.y;
                let d2=dx*dx+dy*dy, d=Math.sqrt(d2);
                if (d < (b1.radius+b2.radius)*0.85) {
                    let w=b1.mass>=b2.mass?b1:b2, l=b1===w?b2:b1;
                    w.vx=(b1.vx*b1.mass+b2.vx*b2.mass)/(b1.mass+b2.mass);
                    w.vy=(b1.vy*b1.mass+b2.vy*b2.mass)/(b1.mass+b2.mass);
                    w.mass+=l.mass;
                    w.radius=Math.pow(Math.pow(b1.radius,3)+Math.pow(b2.radius,3),1/3);
                    if(trackedBody===l) trackedBody=w;
                    l.exists=false; continue;
                }
                let f=(G*b1.mass*b2.mass)/d2;
                b1.vx+=f*(dx/d)/b1.mass; b1.vy+=f*(dy/d)/b1.mass;
                b2.vx-=f*(dx/d)/b2.mass; b2.vy-=f*(dy/d)/b2.mass;
            }
        }
        bodies = bodies.filter(b=>b.exists);
    }

    // ── LOOP ──────────────────────────────────────────────────────────
    function loop() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle='#010103'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if(trackedBody){ offsetX=-trackedBody.x; offsetY=-trackedBody.y; }
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(zoom, zoom);
        ctx.translate(offsetX, offsetY);

        physics();

        // Prima i campi spaziotemporali (sotto i corpi)
        bodies.forEach(b => b.drawSpacetime());
        // Poi trail + corpo + nome
        bodies.forEach(b => { b.update(); b.draw(); });

        // freccia di lancio
        if (isCreating) {
            const wS=screenToWorld(startMouse.x,startMouse.y);
            const wC=screenToWorld(currentMouse.x,currentMouse.y);
            ctx.beginPath(); ctx.moveTo(wS.x,wS.y); ctx.lineTo(wC.x,wC.y);
            ctx.strokeStyle="#00ffcc"; ctx.lineWidth=1/zoom; ctx.stroke();
            ctx.beginPath(); ctx.arc(wS.x,wS.y,parseFloat(rRange.value),0,Math.PI*2);
            ctx.fillStyle=cPicker.value; ctx.globalAlpha=0.5; ctx.fill(); ctx.globalAlpha=1;
        }

        document.getElementById('bodyCount').innerText = `Entità: ${bodies.length}`;
        document.getElementById('camStatus').innerText = trackedBody ? `📡 ${trackedBody.name}` : 'Visuale: Libera';
        requestAnimationFrame(loop);
    }

    // ── UTILS ─────────────────────────────────────────────────────────
    function screenToWorld(sx,sy) { return { x:(sx-canvas.width/2)/zoom-offsetX, y:(sy-canvas.height/2)/zoom-offsetY }; }
    function getCanvasPos(cx,cy) { const r=canvas.getBoundingClientRect(); return {x:cx-r.left,y:cy-r.top}; }
    function dist2D(a,b) { return Math.hypot(a.x-b.x,a.y-b.y); }

    // ── MOUSE ─────────────────────────────────────────────────────────
    canvas.addEventListener('mousedown', e => {
        const pos=getCanvasPos(e.clientX,e.clientY), w=screenToWorld(pos.x,pos.y);
        if(e.button===0){
            let t=bodies.find(b=>dist2D(w,b)<b.radius+15/zoom);
            if(t){ trackedBody=t; } else { isCreating=true; startMouse=pos; currentMouse={...pos}; }
        } else { isPanning=true; trackedBody=null; startMouse=pos; }
    });
    canvas.addEventListener('mousemove', e => {
        const pos=getCanvasPos(e.clientX,e.clientY); currentMouse=pos;
        if(isPanning){ offsetX+=(pos.x-startMouse.x)/zoom; offsetY+=(pos.y-startMouse.y)/zoom; startMouse={...pos}; }
    });
    window.addEventListener('mouseup', e => {
        if(isCreating&&e.button===0){
            const wS=screenToWorld(startMouse.x,startMouse.y), wE=screenToWorld(currentMouse.x,currentMouse.y);
            const d=DATA[selectedType];
            bodies.push(new Body(wS.x,wS.y,(wE.x-wS.x)*0.05,(wE.y-wS.y)*0.05,parseFloat(mRange.value),parseFloat(rRange.value),cPicker.value,d.name));
        }
        isCreating=isPanning=false;
    });
    canvas.addEventListener('wheel', e => {
        const pos=getCanvasPos(e.clientX,e.clientY), before=screenToWorld(pos.x,pos.y);
        zoom*=e.deltaY>0?0.9:1.1;
        const after=screenToWorld(pos.x,pos.y);
        offsetX+=after.x-before.x; offsetY+=after.y-before.y;
        e.preventDefault();
    },{passive:false});
    canvas.oncontextmenu=e=>e.preventDefault();

    // ── TOUCH ─────────────────────────────────────────────────────────
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if(e.touches.length===1){
            const t=e.touches[0], pos=getCanvasPos(t.clientX,t.clientY), w=screenToWorld(pos.x,pos.y);
            let target=bodies.find(b=>dist2D(w,b)<b.radius+20/zoom);
            if(target){ trackedBody=target; isCreating=false; }
            else { isCreating=true; isPanning=false; startMouse=pos; currentMouse={...pos}; }
        }
        if(e.touches.length===2){
            isCreating=isPanning=false; pinchActive=true;
            pinchStartDist=dist2D({x:e.touches[0].clientX,y:e.touches[0].clientY},{x:e.touches[1].clientX,y:e.touches[1].clientY});
            pinchStartZoom=zoom;
            const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2;
            pinchMidWorld=screenToWorld(...Object.values(getCanvasPos(mx,my)));
        }
    },{passive:false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length===2&&pinchActive){
            const nd=dist2D({x:e.touches[0].clientX,y:e.touches[0].clientY},{x:e.touches[1].clientX,y:e.touches[1].clientY});
            zoom=Math.max(0.01,Math.min(50,pinchStartZoom*(nd/pinchStartDist)));
            const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2;
            const mp=getCanvasPos(mx,my), nw=screenToWorld(mp.x,mp.y);
            offsetX+=nw.x-pinchMidWorld.x; offsetY+=nw.y-pinchMidWorld.y;
            pinchMidWorld=screenToWorld(mp.x,mp.y);
            return;
        }
        if(e.touches.length===1){
            const t=e.touches[0], pos=getCanvasPos(t.clientX,t.clientY);
            if(isCreating){ currentMouse=pos; }
            else if(startMouse.x!==undefined){ offsetX+=(pos.x-startMouse.x)/zoom; offsetY+=(pos.y-startMouse.y)/zoom; startMouse=pos; }
        }
    },{passive:false});

    canvas.addEventListener('touchend', e => {
        e.preventDefault(); pinchActive=false;
        if(e.changedTouches.length>=1&&e.touches.length===0){
            if(isCreating){
                const wS=screenToWorld(startMouse.x,startMouse.y), wE=screenToWorld(currentMouse.x,currentMouse.y);
                const d=DATA[selectedType];
                bodies.push(new Body(wS.x,wS.y,(wE.x-wS.x)*0.05,(wE.y-wS.y)*0.05,parseFloat(mRange.value),parseFloat(rRange.value),cPicker.value,d.name));
                isCreating=false;
            }
        }
        if(e.touches.length===1){ startMouse=getCanvasPos(e.touches[0].clientX,e.touches[0].clientY); }
    },{passive:false});
    let lastTap=0;
    canvas.addEventListener('touchend',e=>{ const n=Date.now(); if(n-lastTap<300)e.preventDefault(); lastTap=n; },{passive:false});

    // ── GENERATORI ────────────────────────────────────────────────────
    function spawnSolarSystem() {
        resetSim(); zoom=window.innerWidth<600?0.08:0.15;
        const sun=new Body(0,0,0,0,DATA.sun.mass,DATA.sun.radius,DATA.sun.color,"Sole");
        bodies.push(sun);
        [{t:'mercury',d:110},{t:'venus',d:180},{t:'earth',d:260},{t:'mars',d:340},
         {t:'jupiter',d:580},{t:'saturn',d:820},{t:'uranus',d:1050},{t:'neptune',d:1250}]
        .forEach(c=>{
            const p=DATA[c.t], v=Math.sqrt(G*sun.mass/c.d);
            bodies.push(new Body(c.d,0,0,v,p.mass,p.radius,p.color,p.name));
        });
        trackedBody=sun;
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function spawnGalaxy() {
        resetSim(); zoom=window.innerWidth<600?0.03:0.05;
        const core=new Body(0,0,0,0,2000000,8,"#111","Centro Galattico");
        bodies.push(core);
        for(let i=0;i<300;i++){
            const angle=Math.random()*Math.PI*2, dist=300+Math.random()*2000;
            const v=Math.sqrt(G*core.mass/dist);
            bodies.push(new Body(Math.cos(angle)*dist,Math.sin(angle)*dist,-Math.sin(angle)*v,Math.cos(angle)*v,10,1.5,`hsl(${angle*60|0},70%,80%)`,""));
        }
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function resetSim() { bodies=[]; trackedBody=null; offsetX=0; offsetY=0; zoom=1; }

    loop();
</script>
