<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Commander</title>
    <style>
        :root {
            --bg-main: #0d1117; --bg-panel: #161b22; --bg-header: #1c2128;
            --bg-hover: #262c36; --bg-active: #0d1f2d;
            --accent: #00f3ff; --accent-dim: #0e4f5c; --accent-glow: rgba(0, 243, 255, 0.15);
            --text-main: #e6edf3; --text-dim: #8b949e; --border: #30363d;
            --red: #ff7b72; --green: #7ee787; --yellow: #ffa657; --purple: #d2a8ff;
            --btn-bg: #21262d; --selection-bg: #0e4f5c; --selection-text: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            background-color: var(--bg-main); color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            user-select: none; text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        #toolbar { display: flex; align-items: center; padding: 4px 8px; gap: 2px; background-color: var(--bg-header); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .tb-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-dim);
            padding: 5px 7px; cursor: pointer; border-radius: 3px; font-size: 15px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
            min-width: 28px; min-height: 28px;
        }
        .tb-btn:hover { background: var(--bg-hover); color: var(--text-main); border-color: var(--border); }
        .tb-btn:active { transform: scale(0.95); }
        .tb-btn.active { color: var(--accent); background: var(--accent-dim); border-color: var(--accent); }
        .tb-btn.c-green { color: var(--green); border-color: rgba(126,231,135,0.3); }
        .tb-btn.c-green:hover { background: rgba(126,231,135,0.1); border-color: var(--green); color: #fff; box-shadow: 0 0 8px rgba(126,231,135,0.2); }
        .tb-btn.c-yellow { color: var(--yellow); border-color: rgba(255,166,87,0.3); }
        .tb-btn.c-yellow:hover { background: rgba(255,166,87,0.1); border-color: var(--yellow); color: #fff; box-shadow: 0 0 8px rgba(255,166,87,0.2); }
        .tb-btn.c-blue { color: var(--accent); border-color: rgba(0,243,255,0.3); }
        .tb-btn.c-blue:hover { background: rgba(0,243,255,0.1); border-color: var(--accent); color: #fff; box-shadow: 0 0 8px var(--accent-glow); }
        .tb-btn.c-purple { color: var(--purple); border-color: rgba(210,168,255,0.3); }
        .tb-btn.c-purple:hover { background: rgba(210,168,255,0.1); border-color: var(--purple); color: #fff; box-shadow: 0 0 8px rgba(210,168,255,0.2); }
        .tb-btn.c-red { color: var(--red); border-color: rgba(255,123,114,0.3); }
        .tb-btn.c-red:hover { background: rgba(255,123,114,0.1); border-color: var(--red); color: #fff; box-shadow: 0 0 8px rgba(255,123,114,0.2); }
        .tb-sep { width: 1px; height: 24px; background-color: var(--border); margin: 0 3px; flex-shrink: 0; }

        #path-bar { display: flex; padding: 4px 8px; gap: 6px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); align-items: center; }
        .path-wrap { flex: 1; min-width: 0; }
        .path-container { display: flex; gap: 4px; align-items: center; background: var(--bg-main); border: 1px solid var(--border); padding: 2px 4px; border-radius: 4px; }
        .path-label { color: var(--accent); font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .path-input { flex: 1; padding: 4px 6px; border: none; background: transparent; font-family: inherit; font-size: 13px; color: var(--text-main); outline: none; min-width: 0; }
        .path-input.base-path { flex: 0 1 160px; border-right: 1px solid var(--border); padding-right: 8px; color: var(--green); font-style: italic; }
        .path-input.base-path::placeholder { color: var(--text-dim); font-style: normal; font-size: 11px; }
        .path-input.base-path:focus { color: #ffffff; }
        .btn-open { padding: 4px 10px; cursor: pointer; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-weight: bold; font-size: 12px; border-radius: 3px; text-transform: uppercase; white-space: nowrap; }
        .btn-open:hover { background: var(--accent); color: var(--bg-main); box-shadow: 0 0 10px var(--accent-glow); }
        .path-sync-wrap { flex-shrink: 0; }
        .btn-sync { padding: 6px 8px; cursor: pointer; background: transparent; color: var(--accent); border: 1px solid var(--accent); font-weight: bold; font-family: inherit; border-radius: 3px; box-shadow: 0 0 5px var(--accent-glow); transition: all 0.2s; }
        .btn-sync:hover { background: var(--accent); color: var(--bg-main); }

        #panels-container { display: flex; flex: 1; overflow: hidden; padding: 6px; gap: 0; position: relative; }
        .panel { display: flex; flex-direction: column; border: 1px solid var(--border); background-color: var(--bg-panel); overflow: hidden; border-radius: 4px; transition: border-color 0.2s, box-shadow 0.2s; min-width: 150px; }
        .panel.active { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow), inset 0 0 15px rgba(0, 243, 255, 0.03); }
        .file-header { display: flex; padding: 5px 8px; background-color: var(--bg-header); border-bottom: 1px solid var(--border); font-weight: bold; font-size: 12px; color: var(--text-dim); cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; align-items: stretch; }
        .file-header > div.col-cell { padding: 2px; overflow: hidden; }
        .file-header > div.sortable { cursor: pointer; border-radius: 2px; }
        .file-header > div.sortable:hover { color: var(--accent); background: var(--bg-hover); }

        .col-resize-handle { width: 7px; flex-shrink: 0; cursor: col-resize; position: relative; margin: 0 -3px; z-index: 5; }
        .col-resize-handle::before { content: ''; position: absolute; left: 50%; top: 15%; bottom: 15%; width: 1px; background: transparent; transform: translateX(-50%); transition: background 0.15s, box-shadow 0.15s; }
        .col-resize-handle:hover::before, .col-resize-handle.active::before { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
        .col-resize-handle:hover, .col-resize-handle.active { background: rgba(0, 243, 255, 0.04); }

        .panel-divider { width: 8px; flex-shrink: 0; cursor: col-resize; background: var(--border); border-radius: 4px; transition: background 0.2s, box-shadow 0.2s; position: relative; margin: 0 3px; }
        .panel-divider::before { content: ''; position: absolute; left: 50%; top: 20%; bottom: 20%; width: 2px; background: transparent; transform: translateX(-50%); border-radius: 1px; transition: background 0.2s, box-shadow 0.2s; }
        .panel-divider:hover::before, .panel-divider.active::before { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
        .panel-divider:hover, .panel-divider.active { background: rgba(0, 243, 255, 0.08); box-shadow: 0 0 12px var(--accent-glow); }

        .file-list { flex: 1; overflow-y: auto; outline: none; position: relative; }
        .file-list::-webkit-scrollbar { width: 6px; }
        .file-list::-webkit-scrollbar-track { background: var(--bg-panel); }
        .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .file-item { display: flex; padding: 3px 8px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--bg-main); transition: background 0.1s; align-items: center; }
        .file-item:hover { background-color: var(--bg-hover); }
        .file-item.selected { background-color: var(--selection-bg); color: var(--selection-text); text-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .col-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .col-type { text-align: left; padding-left: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-size { text-align: right; padding-right: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-date { text-align: right; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .zip-icon { color: var(--yellow); }

        /* Icone per tipo file */
        .icon-office { color: #e44d26; }
        .icon-pdf { color: #ff4444; }
        .icon-exe { color: var(--purple); }
        .icon-img { color: #7ee787; }
        .icon-audio { color: #ffa657; }
        .icon-video { color: #d2a8ff; }
        .icon-archive { color: var(--yellow); }
        .icon-code { color: var(--accent); }
        .icon-text { color: var(--text-dim); }

        #status-bar { padding: 5px 12px; background-color: var(--bg-panel); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; }
        #function-keys { display: flex; padding: 6px; gap: 6px; background-color: var(--bg-panel); border-top: 1px solid var(--border); flex-wrap: wrap; }
        .fkey { padding: 5px 10px; background: var(--btn-bg); border: 1px solid var(--border); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold; color: var(--text-dim); border-radius: 3px; text-transform: uppercase; transition: all 0.2s; }
        .fkey:hover { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; width: 90%; max-width: 700px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 0 30px var(--accent-glow); }
        .modal-box h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .modal-input, .modal-textarea { width: 100%; padding: 10px; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); font-family: inherit; font-size: 13px; border-radius: 4px; outline: none; margin-bottom: 15px; }
        .modal-input:focus, .modal-textarea:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
        .modal-textarea { color: var(--green); resize: none; height: 80px; word-break: break-all; }
        .search-results { flex: 1; overflow-y: auto; background: var(--bg-main); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; padding: 0; min-height: 150px; }
        .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; justify-content: space-between; }
        .search-item:hover { background: var(--bg-hover); color: var(--accent); }
        .search-item span.path { color: var(--text-dim); margin-left: 15px; font-size: 11px; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .modal-btn { padding: 8px 16px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text-main); font-family: inherit; font-weight: bold; font-size: 12px; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .modal-btn:hover { border-color: var(--accent); color: var(--accent); }
        .modal-btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .modal-btn.primary:hover { background: var(--accent); color: var(--bg-main); }
        .modal-btn.primary-yellow { background: rgba(255,166,87,0.1); border-color: var(--yellow); color: var(--yellow); }
        .modal-btn.primary-yellow:hover { background: var(--yellow); color: var(--bg-main); }
        .modal-btn.primary-green { background: rgba(126,231,135,0.1); border-color: var(--green); color: var(--green); }
        .modal-btn.primary-green:hover { background: var(--green); color: var(--bg-main); }
        .modal-btn.primary-red { background: rgba(255,123,114,0.1); border-color: var(--red); color: var(--red); }
        .modal-btn.primary-red:hover { background: var(--red); color: var(--bg-main); }
        .copy-info { margin-bottom: 12px; font-size: 13px; color: var(--text-dim); word-break: break-all; }
        .copy-info span { color: var(--text-main); font-weight: bold; }

        /* Info box nel modal di azione file */
        .file-action-info { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 16px; }
        .file-action-icon { font-size: 36px; flex-shrink: 0; }
        .file-action-details { flex: 1; min-width: 0; }
        .file-action-name { font-size: 15px; font-weight: bold; color: var(--text-main); word-break: break-all; margin-bottom: 4px; }
        .file-action-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 14px; flex-wrap: wrap; }
        .file-action-meta span { white-space: nowrap; }
        .file-action-warn { font-size: 11px; color: var(--yellow); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        .file-action-exe-warn { font-size: 12px; color: var(--red); padding: 10px 14px; background: rgba(255,123,114,0.06); border: 1px solid rgba(255,123,114,0.25); border-radius: 6px; margin-bottom: 16px; line-height: 1.5; }

        #progress-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        #progress-overlay.active { display: flex; }
        .progress-box { background: var(--bg-panel); border: 1px solid var(--accent); padding: 28px 36px; border-radius: 8px; width: 90%; max-width: 480px; text-align: center; box-shadow: 0 0 40px var(--accent-glow); }
        .progress-title { color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; }
        .progress-track { width: 100%; height: 14px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 0%; border-radius: 7px; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); box-shadow: 0 0 12px var(--accent-glow); transition: width 0.15s ease-out; position: relative; }
        .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%); animation: progressShine 1.5s infinite; }
        @keyframes progressShine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .progress-info { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-dim); }
        .progress-percent { color: var(--accent); font-weight: bold; font-size: 16px; letter-spacing: 1px; text-shadow: 0 0 8px var(--accent-glow); }
        .progress-detail { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; text-align: right; }
        .progress-size { margin-top: 8px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }

        #toast-container { position: fixed; top: 60px; right: 16px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { padding: 10px 18px; border-radius: 4px; font-family: inherit; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; pointer-events: auto; animation: toastIn 0.3s ease-out, toastOut 0.4s 2.2s ease-in forwards; border: 1px solid; text-transform: uppercase; }
        .toast.success { background: rgba(126,231,135,0.12); border-color: var(--green); color: var(--green); }
        .toast.error { background: rgba(255,123,114,0.12); border-color: var(--red); color: var(--red); }
        .toast.info { background: rgba(0,243,255,0.1); border-color: var(--accent); color: var(--accent); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        #mobile-switch {
            display: none; position: absolute; bottom: 16px; right: 16px; z-index: 50;
            padding: 10px 20px; background: var(--bg-panel); border: 1px solid var(--accent);
            color: var(--accent); font-family: inherit; font-size: 11px; font-weight: bold;
            border-radius: 24px; cursor: pointer; box-shadow: 0 0 16px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.6);
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.2s;
            white-space: nowrap; backdrop-filter: blur(6px);
        }
        #mobile-switch:hover { background: var(--accent); color: var(--bg-main); box-shadow: 0 0 24px var(--accent-glow), 0 4px 16px rgba(0,0,0,0.7); }
        #mobile-switch:active { transform: scale(0.93); }
        #mobile-switch .sw-active { color: var(--accent); font-weight: 900; }
        #mobile-switch .sw-dim { color: var(--text-dim); }
        #mobile-switch .sw-arrow { color: var(--border); margin: 0 4px; }
        #mobile-switch:hover .sw-active, #mobile-switch:hover .sw-dim, #mobile-switch:hover .sw-arrow { color: var(--bg-main); }

        @media (max-width: 768px) {
            #mobile-switch { display: flex; align-items: center; justify-content: center; }
            .panel-divider { display: none !important; }
            .panel { display: none !important; flex: 1 1 0% !important; width: 100% !important; min-width: 0 !important; border-radius: 4px; }
            .panel.active { display: flex !important; }
            .col-resize-handle { display: none !important; }
            .path-wrap { display: none !important; }
            .path-wrap.mobile-visible { display: block !important; flex: 1; min-width: 0; }
            .path-sync-wrap { display: none !important; }
            #path-bar { flex-wrap: nowrap; }
            .col-name, .col-type, .col-size, .col-date { flex: unset !important; width: unset !important; min-width: unset !important; }
            .col-name { flex: 3 !important; }
            .col-type { flex: 1 !important; }
            .col-size { flex: 1 !important; }
            .col-date { flex: 1.5 !important; }
            #toolbar { padding: 3px 4px; gap: 1px; }
            .tb-btn { min-width: 26px; min-height: 26px; padding: 4px 5px; font-size: 14px; }
            .tb-sep { margin: 0 2px; }
            #status-bar { padding: 4px 8px; font-size: 11px; }
            #function-keys { padding: 4px; gap: 4px; }
            .fkey { padding: 4px 8px; font-size: 10px; }
        }
        @media (max-width: 480px) {
            .tb-ext { display: none !important; }
        }
    </style>
</head>

    <div id="path-bar">
        <div id="path-left-wrap" class="path-wrap mobile-visible">
            <div class="path-container">
                <span class="path-label">Src</span>

                <div class="col-type col-cell sortable" onclick="event.stopPropagation(); handleSort('right', 'type')">Tipo <span id="sort-right-type"></span></div>

        <div class="modal-btns">

    <div id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    /* ============================================================
       STATO PRINCIPALE
       ============================================================ */
    let state = {
        active: 'left', handles: { left: null, right: null }, files: { left: [], right: [] },
        selected: { left: new Set(), right: new Set() }, paths: { left: '', right: '' },
        history: { left: [], right: [] }, forwardHistory: { left: [], right: [] },
        basePath: { left: '', right: '' }, sort: { left: { col: 'type', dir: 'asc' }, right: { col: 'type', dir: 'asc' } }
    };
    let inMemoryZip = null, inMemoryZipPath = '', isDragging = false, dragStartIndex = -1, dragPane = '', hasDragged = false;
    let renameTargetIndex = -1, renameTargetPane = '', copyTargetData = null;

    // Dati del file in attesa di azione (per il modal)
    let pendingFileAction = null;

    /* ============================================================
       CLASSIFICAZIONE FILE PER CATEGORIA
       ============================================================ */
    const TEXT_EXTENSIONS = new Set([
        'txt','md','csv','json','xml','html','htm','css','js','ts','jsx','tsx',
        'py','rb','php','java','c','cpp','h','hpp','cs','go','rs','swift','kt',
        'sh','bat','ps1','cmd','log','ini','cfg','conf','yml','yaml','toml',
        'env','gitignore','dockerfile','makefile','sql','r','lua','pl','pm',
        'vue','svelte','scss','sass','less','graphql','tf','hcl','proto'
    ]);
    const IMAGE_EXTENSIONS = new Set(['png','jpg','jpeg','gif','bmp','svg','webp','ico','tiff','tif','avif']);
    const AUDIO_EXTENSIONS = new Set(['mp3','wav','ogg','flac','aac','wma','m4a','opus']);
    const VIDEO_EXTENSIONS = new Set(['mp4','avi','mkv','mov','wmv','flv','webm','m4v','mpg','mpeg']);
    const OFFICE_EXTENSIONS = new Set([
        'doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp','rtf',
        'docm','xlsm','pptm','xlt','xltm','dot','dotx','pot','potx','xlam'
    ]);
    const PDF_EXTENSION = 'pdf';
    const ARCHIVE_EXTENSIONS = new Set(['zip','rar','7z','tar','gz','bz2','xz','iso','dmg']);
    const EXE_EXTENSIONS = new Set(['exe','msi','bat','cmd','com','scr','wsf','vbs','js','vbe','wsh']);

    function getFileCategory(name) {
        const ext = name.split('.').pop().toLowerCase();
        if (TEXT_EXTENSIONS.has(ext)) return 'text';
        if (IMAGE_EXTENSIONS.has(ext)) return 'image';
        if (AUDIO_EXTENSIONS.has(ext)) return 'audio';
        if (VIDEO_EXTENSIONS.has(ext)) return 'video';
        if (OFFICE_EXTENSIONS.has(ext)) return 'office';
        if (ext === PDF_EXTENSION) return 'pdf';
        if (ARCHIVE_EXTENSIONS.has(ext)) return 'archive';
        if (EXE_EXTENSIONS.has(ext)) return 'executable';
        return 'binary';
    }

    function getCategoryIcon(cat) {
        switch (cat) {
            case 'text': return '<span class="icon-code">📄</span>';
            case 'image': return '<span class="icon-img">🖼️</span>';
            case 'audio': return '<span class="icon-audio">🎵</span>';
            case 'video': return '<span class="icon-video">🎬</span>';
            case 'office': return '<span class="icon-office">📊</span>';
            case 'pdf': return '<span class="icon-pdf">📕</span>';
            case 'archive': return '<span class="icon-archive">📦</span>';
            case 'executable': return '<span class="icon-exe">⚡</span>';
            default: return '📄';
        }
    }

    function getCategoryLabel(cat) {
        switch (cat) {
            case 'text': return 'File di testo';
            case 'image': return 'Immagine';
            case 'audio': return 'Audio';
            case 'video': return 'Video';
            case 'office': return 'Documento Office';
            case 'pdf': return 'Documento PDF';
            case 'archive': return 'Archivio';
            case 'executable': return 'Eseguibile';
            default: return 'File binario';
        }
    }

    /* ============================================================
       RESIZE COLONNE
       ============================================================ */
    let colResizing = false, colResizeIdx = -1, colResizeStartX = 0;
    let colProportions = [3 / 6.5, 1 / 6.5, 1 / 6.5, 1.5 / 6.5];

    /* ============================================================
       RESIZE PANNELLI
       ============================================================ */
    let panelResizing = false, panelResizeStartX = 0, panelLeftStartW = 0;

    /* ============================================================
       UTILITÀ
       ============================================================ */
    function isMobile() { return window.innerWidth <= 768; }
    function showProgress(t) {
        document.getElementById('progress-title').textContent = t;
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-percent').textContent = '0%';
        document.getElementById('progress-detail').textContent = '';
        document.getElementById('progress-size').textContent = '';
        document.getElementById('progress-overlay').classList.add('active');
    }
    function updateProgress(p, d, s) {
        const pr = Math.min(100, Math.max(0, Math.round(p)));
        document.getElementById('progress-fill').style.width = pr + '%';
        document.getElementById('progress-percent').textContent = pr + '%';
        if (d !== undefined) document.getElementById('progress-detail').textContent = d;
        if (s !== undefined) document.getElementById('progress-size').textContent = s;
    }
    function hideProgress() { document.getElementById('progress-overlay').classList.remove('active'); }
    function showToast(m, t = 'info') {
        const c = document.getElementById('toast-container'), e = document.createElement('div');
        e.className = `toast ${t}`; e.textContent = m; c.appendChild(e);
        setTimeout(() => { if (e.parentNode) e.parentNode.removeChild(e); }, 2800);
    }
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatSize(b) {
        if (b === 0) return '0'; const k = 1024, s = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(b) / Math.log(k));
        return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + s[i];
    }
    function getMimeType(name) {
        const ext = name.split('.').pop().toLowerCase();
        const map = {
            'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif','svg':'image/svg+xml','webp':'image/webp','bmp':'image/bmp','ico':'image/x-icon',
            'mp3':'audio/mpeg','wav':'audio/wav','ogg':'audio/ogg','flac':'audio/flac','aac':'audio/aac','m4a':'audio/mp4',
            'mp4':'video/mp4','webm':'video/webm','avi':'video/x-msvideo','mkv':'video/x-matroska','mov':'video/quicktime',
            'pdf':'application/pdf',
            'doc':'application/msword','docx':'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'xls':'application/vnd.ms-excel','xlsx':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'ppt':'application/vnd.ms-powerpoint','pptx':'application/vnd.openxmlformats-officedocument.presentationml.presentation',
            'zip':'application/zip','rar':'application/x-rar-compressed','7z':'application/x-7z-compressed',
            'txt':'text/plain','html':'text/html','htm':'text/html','css':'text/css','js':'text/javascript','json':'application/json','xml':'text/xml',
            'exe':'application/x-msdownload','msi':'application/x-msdownload',
        };
        return map[ext] || 'application/octet-stream';
    }

    document.getElementById('base-left').addEventListener('input', (e) => { state.basePath.left = e.target.value; });
    document.getElementById('base-right').addEventListener('input', (e) => { state.basePath.right = e.target.value; });

    /* ============================================================
       MOBILE
       ============================================================ */
    function switchMobilePanel() { setActive(state.active === 'left' ? 'right' : 'left'); }
    function updateMobileVisibility() {
        const lw = document.getElementById('path-left-wrap');
        const rw = document.getElementById('path-right-wrap');
        if (lw) lw.classList.toggle('mobile-visible', state.active === 'left');
        if (rw) rw.classList.toggle('mobile-visible', state.active === 'right');
        const swSrc = document.getElementById('sw-src');
        const swDst = document.getElementById('sw-dst');
        if (swSrc && swDst) {
            swSrc.className = state.active === 'left' ? 'sw-active' : 'sw-dim';
            swDst.className = state.active === 'right' ? 'sw-active' : 'sw-dim';
        }
        if (isMobile()) requestAnimationFrame(() => applyColumnWidths());
    }

    /* ============================================================
       RESIZE COLONNE
       ============================================================ */
    function applyColumnWidths() {
        if (isMobile()) return;
        const colClasses = ['col-name', 'col-type', 'col-size', 'col-date'];
        document.querySelectorAll('.file-header').forEach(header => {
            const totalW = header.offsetWidth - 21;
            if (totalW <= 0) return;
            const pixels = colProportions.map(p => Math.max(30, Math.round(p * totalW)));
            const used = pixels[0] + pixels[1] + pixels[2];
            pixels[3] = Math.max(30, totalW - used);
            colClasses.forEach((cls, i) => {
                const el = header.querySelector('.' + cls);
                if (el) { el.style.flex = '0 0 ' + pixels[i] + 'px'; el.style.minWidth = '30px'; el.style.width = pixels[i] + 'px'; }
            });
        });
        ['left', 'right'].forEach(pane => {
            const header = document.querySelector('#panel-' + pane + ' .file-header');
            if (!header) return;
            const totalW = header.offsetWidth - 21;
            if (totalW <= 0) return;
            const pixels = colProportions.map(p => Math.max(30, Math.round(p * totalW)));
            const used = pixels[0] + pixels[1] + pixels[2];
            pixels[3] = Math.max(30, totalW - used);
            const list = document.getElementById('list-' + pane);
            if (!list) return;
            colClasses.forEach((cls, i) => {
                list.querySelectorAll('.' + cls).forEach(el => {
                    el.style.flex = '0 0 ' + pixels[i] + 'px'; el.style.minWidth = '30px'; el.style.width = pixels[i] + 'px';
                });
            });
        });
    }
    function initPanelWidths() {
        if (isMobile()) return;
        const container = document.getElementById('panels-container');
        if (!container) return;
        const totalW = container.offsetWidth - 8 - 12;
        if (totalW <= 300) return;
        const half = Math.floor(totalW / 2);
        document.getElementById('panel-left').style.flex = '0 0 ' + half + 'px';
        document.getElementById('panel-right').style.flex = '0 0 ' + (totalW - half) + 'px';
    }

    /* ============================================================
       EVENTI RESIZE COLONNE
       ============================================================ */
    document.querySelectorAll('.col-resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', (e) => {
            if (isMobile()) return;
            e.preventDefault(); e.stopPropagation();
            colResizing = true; colResizeIdx = parseInt(handle.dataset.colIdx); colResizeStartX = e.clientX;
            document.querySelectorAll('.col-resize-handle[data-col-idx="' + colResizeIdx + '"]').forEach(h => h.classList.add('active'));
            document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
        });
    });

    /* ============================================================
       EVENTI RESIZE PANNELLI
       ============================================================ */
    document.getElementById('panel-divider').addEventListener('mousedown', (e) => {
        if (isMobile()) return;
        e.preventDefault(); e.stopPropagation();
        panelResizing = true; panelResizeStartX = e.clientX;
        panelLeftStartW = document.getElementById('panel-left').offsetWidth;
        document.getElementById('panel-divider').classList.add('active');
        document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
    });

    /* ============================================================
       MOUSEMOVE GLOBALE
       ============================================================ */
    document.addEventListener('mousemove', (e) => {
        if (colResizing) {
            const header = document.querySelector('#panel-left .file-header');
            if (!header) return;
            const totalW = header.offsetWidth - 21; if (totalW <= 0) return;
            const dx = e.clientX - colResizeStartX, minProp = 30 / totalW;
            const newL = colProportions[colResizeIdx] + dx / totalW;
            const newR = colProportions[colResizeIdx + 1] - dx / totalW;
            if (newL >= minProp && newR >= minProp) {
                colProportions[colResizeIdx] = newL; colProportions[colResizeIdx + 1] = newR;
                colResizeStartX = e.clientX; applyColumnWidths();
            }
            return;
        }
        if (panelResizing) {
            const container = document.getElementById('panels-container');
            const totalW = container.offsetWidth - 8 - 12, minW = 180;
            const dx = e.clientX - panelResizeStartX;
            const newL = panelLeftStartW + dx, newR = totalW - newL;
            if (newL >= minW && newR >= minW) {
                document.getElementById('panel-left').style.flex = '0 0 ' + newL + 'px';
                document.getElementById('panel-right').style.flex = '0 0 ' + newR + 'px';
                applyColumnWidths();
            }
            return;
        }
    });

    /* ============================================================
       MOUSEUP GLOBALE
       ============================================================ */
    document.addEventListener('mouseup', () => {
        if (isDragging) {
            if (!hasDragged) {
                state.selected[dragPane].has(dragStartIndex)
                    ? state.selected[dragPane].delete(dragStartIndex)
                    : state.selected[dragPane].add(dragStartIndex);
                updateSelectionUI(dragPane);
            }
            isDragging = false; hasDragged = false; dragStartIndex = -1; dragPane = '';
        }
        if (colResizing) {
            colResizing = false;
            document.querySelectorAll('.col-resize-handle').forEach(h => h.classList.remove('active'));
            document.body.style.cursor = ''; document.body.style.userSelect = '';
        }
        if (panelResizing) {
            panelResizing = false;
            document.getElementById('panel-divider').classList.remove('active');
            document.body.style.cursor = ''; document.body.style.userSelect = '';
        }
    });
    document.addEventListener('contextmenu', (e) => { if (e.target.closest('.file-list')) e.preventDefault(); });

    /* ============================================================
       INIZIALIZZAZIONE
       ============================================================ */
    window.addEventListener('load', () => { requestAnimationFrame(() => { requestAnimationFrame(() => { initPanelWidths(); applyColumnWidths(); updateMobileVisibility(); }); }); });
    window.addEventListener('resize', () => { initPanelWidths(); applyColumnWidths(); updateMobileVisibility(); });

    /* ============================================================
       NAVIGAZIONE E VISTE
       ============================================================ */
    async function refreshRelevantPanes(...paths) {
        const ap = paths.filter(p => p && p.length > 0); if (!ap.length) return;
        if (state.handles.left && !inMemoryZip && ap.some(p => state.paths.left.startsWith(p))) await listFiles('left');
        if (state.handles.right && !inMemoryZip && ap.some(p => state.paths.right.startsWith(p))) {
            if (state.paths.left !== state.paths.right) await listFiles('right');
        }
    }
    function setView(type) {
        document.getElementById('btn-view-list').classList.toggle('active', type === 'list');
        document.getElementById('btn-view-tree').classList.toggle('active', type === 'tree');
        if (type === 'tree') showToast("Vista ad albero non supportata", "error");
    }
    function handleSelectAll() { const p = state.active; state.selected[p].clear(); state.files[p].forEach((f, i) => { if (!f.isUp) state.selected[p].add(i); }); updateSelectionUI(p); }
    function handleDeselectAll() { state.selected[state.active].clear(); updateSelectionUI(state.active); }
    function setActive(p) {
        state.active = p;
        document.getElementById('panel-left').classList.toggle('active', p === 'left');
        document.getElementById('panel-right').classList.toggle('active', p === 'right');
        document.getElementById(`list-${p}`).focus(); updateMobileVisibility();
    }
    function updateStatus() {
        const p = state.active, c = state.selected[p].size;
        if (c === 0) { document.getElementById('status-bar').innerText = `PERCORSO: ${state.paths[p] || 'NESSUNO'}`; return; }
        let s = 0; state.selected[p].forEach(i => { s += state.files[p][i].size; });
        document.getElementById('status-bar').innerText = `SELEZIONATI: ${c} ELEMENTO(I) - DIM: ${formatSize(s)}`;
    }
    function updateSelectionUI(p) {
        const l = document.getElementById(`list-${p}`);
        l.querySelectorAll('.file-item').forEach((el, i) => { el.classList.toggle('selected', state.selected[p].has(i)); });
        updateStatus();
    }
    function selectRange(p, s, e) {
        const min = Math.max(0, Math.min(s, e)), max = Math.min(state.files[p].length - 1, Math.max(s, e));

    async function executeFileAction(action) {
        if (!pendingFileAction) return;
        const { pane, fileName, cat, fileData } = pendingFileAction;

        closeFileActionModal();

        try {
            let fileBlob;

            if (inMemoryZip) {
                let sp = state.paths[pane].substring(inMemoryZipPath.length + 1) + fileName;
                if (sp.startsWith('/')) sp = sp.substring(1);
                const content = await inMemoryZip.file(sp).async('blob');

            } else {

            if (action === 'open') {

                document.getElementById('status-bar').innerText = `APERTO: ${fileName}`;
                showToast(`Aperto: ${fileName}`, "info");

                } catch (e) {
                    if (e.name !== 'AbortError') {
                        showToast("Errore salvataggio: " + e.message, "error");
                    }
                }
            }
        } catch (e) {
            showToast("Errore: " + e.message, "error");
        }
    }

        const p = state.active;
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[p]) return showToast("Nessuna cartella aperta", "error");
        const sa = Array.from(state.selected[p]).sort((a, b) => a - b);
        if (!sa.length) return showToast("Nessun elemento", "error");
        if (sa.length > 1) return showToast("Seleziona un solo elemento", "error");
        const i = sa[0], fd = state.files[p][i];
        if (fd.isUp) return showToast("Impossibile rinominare [..]", "error");
        renameTargetIndex = i; renameTargetPane = p;
        document.getElementById('rename-original').textContent = fd.name;
        const inp = document.getElementById('rename-input'); inp.value = fd.name;
        const di = fd.name.lastIndexOf('.');
        if (di > 0 && fd.kind === 'file') { inp.setSelectionRange(0, di); } else { inp.select(); }
        document.getElementById('rename-error').textContent = '';
        document.getElementById('rename-modal-overlay').classList.add('active'); inp.focus();
    }
    function closeRenameModal() { document.getElementById('rename-modal-overlay').classList.remove('active'); renameTargetIndex = -1; renameTargetPane = ''; document.getElementById(`list-${state.active}`).focus(); }
    async function executeRename() {

        if (!nn) { ed.textContent = "Nome vuoto."; inp.focus(); return; }
        if (nn === on) { closeRenameModal(); return; }
        if (/[\/\\:*?"<>|]/.test(nn)) { ed.textContent = "Caratteri non validi."; inp.focus(); return; }
        if (state.files[p].find((f, x) => x !== i && !f.isUp && f.name.toLowerCase() === nn.toLowerCase())) { ed.textContent = `Esiste gia "${nn}"`; inp.focus(); return; }

            const dh = state.handles[p], fd = state.files[p][i];
            if (fd.kind === 'file') { const oh = await dh.getFileHandle(on), of = await oh.getFile(), c = await of.arrayBuffer(), nh = await dh.getFileHandle(nn, { create: true }), w = await nh.createWritable(); await w.write(c); await w.close(); await dh.removeEntry(on); }
            else { const oh = await dh.getDirectoryHandle(on), nh = await dh.getDirectoryHandle(nn, { create: true }); await copyDiskDirectory(oh, nh); await dh.removeEntry(on, { recursive: true }); }

        } catch (e) { ed.textContent = "Errore: " + e.message; }
    }

        const rd = document.getElementById('search-results'); rd.innerHTML = '<div style="padding:10px;color:var(--yellow)">Cercando...</div>';
        const p = state.active, rh = state.handles[p], rp = state.paths[p], res = [];
        async function rs(dh, cp) { for await (const e of dh.values()) { if (e.name.toLowerCase().includes(t.toLowerCase())) res.push({ name: e.name, kind: e.kind, path: cp + '/' + e.name }); if (e.kind === 'directory') { try { await rs(await dh.getDirectoryHandle(e.name), cp + '/' + e.name); } catch (ex) { } } } }
        try {
            await rs(rh, rp); rd.innerHTML = '';
            if (!res.length) { rd.innerHTML = '<div style="padding:10px;color:var(--text-dim)">Nessun risultato.</div>'; return; }
            res.forEach(r => { const d = document.createElement('div'); d.className = 'search-item'; d.innerHTML = `<div>${r.kind === 'directory' ? '\uD83D\uDCC1' : '\uD83D\uDCC4'} ${escapeHtml(r.name)}</div><div class="path">${escapeHtml(r.path)}</div>`; d.onclick = () => { closeSearchModal(); showToast("Risultato: " + r.path, "info"); }; rd.appendChild(d); });
            showToast(`Trovati ${res.length}`, "success");
        } catch (e) { rd.innerHTML = `<div style="padding:10px;color:var(--red)">Errore: ${e.message}</div>`; }
    }

    /* ============================================================
       EDITOR (F3)
       ============================================================ */
    async function handleF3() {
        if (inMemoryZip) { const f = getSelectedData(state.active); if (f.length === 1 && !f[0].isUp) return openFile(state.active, f[0].name); return showToast("Seleziona un file", "error"); }
        const p = state.active, sa = Array.from(state.selected[p]); let fn = 'nuovo.txt', fp = '', ft = 'TXT', c = '';
        if (sa.length === 1) { const fd = state.files[p][sa[0]]; if (fd && !fd.isUp && fd.kind === 'file') { try { document.getElementById('status-bar').innerText = `CARICAMENTO ${fd.name}...`; const f = await (await state.handles[p].getFileHandle(fd.name)).getFile(); if (f.size > 5 * 1024 * 1024) return showToast("File > 5MB", "error"); c = await f.text(); fn = fd.name; fp = state.paths[p] + '/' + fd.name; ft = fd.type; } catch (e) { showToast("Editor aperto vuoto", "info"); } } }
        if (state.paths[p]) fp = fp || state.paths[p] + '/nuovo.txt';
        try { localStorage.setItem('webEditPlus_transfer', `|||N_START|||${fn}|||N_END|||` + `|||P_START|||${fp}|||P_END|||` + `|||C_START|||${c}|||C_END|||` + `|||T_START|||${ft}|||T_END|||`); window.open('WebEditPlus.html?load=1', '_blank'); document.getElementById('status-bar').innerText = `EDITOR: ${fn}`; showToast(c ? `Editor: ${fn}` : "Editor vuoto", c ? "success" : "info"); } catch (e) { showToast("Errore editor: " + e.message, "error"); }
    }

    /* ============================================================
       UTILITY FILE SYSTEM
       ============================================================ */
    function getSelectedData(p) { return Array.from(state.selected[p]).map(i => state.files[p][i]).filter(f => !f.isUp); }
    async function getDiskHandles(p) { const dh = state.handles[p], f = []; for (const i of state.selected[p]) { const d = state.files[p][i]; if (d.isUp) continue; try { const h = d.kind === 'file' ? await dh.getFileHandle(d.name) : await dh.getDirectoryHandle(d.name); f.push({ handle: h, data: d }); } catch (e) { } } return f; }
    async function copyDiskDirectory(s, d) { for await (const e of s.values()) { if (e.kind === 'file') { const f = await e.getFile(), c = await f.arrayBuffer(), n = await d.getFileHandle(e.name, { create: true }), w = await n.createWritable(); await w.write(c); await w.close(); } else { const nd = await d.getDirectoryHandle(e.name, { create: true }); await copyDiskDirectory(await s.getDirectoryHandle(e.name), nd); } } }

    /* ============================================================
       COPIA (F5)
       ============================================================ */
    async function handleF5() {
        const s = state.active, d = s === 'left' ? 'right' : 'left';
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[s] || !state.handles[d]) return showToast("Servono src e dst", "error");
        const files = await getDiskHandles(s);
        if (!files.length) return showToast("Nessun elemento", "error");
        if (files.length === 1) {
            copyTargetData = { files, dest: d, src: s };
            document.getElementById('copy-src-name').textContent = files[0].data.name;
            document.getElementById('copy-dst-path').textContent = state.paths[d];
            document.getElementById('copy-new-name').value = files[0].data.name;
            document.getElementById('copy-error').textContent = '';
            document.getElementById('copy-modal-overlay').classList.add('active');
            document.getElementById('copy-new-name').focus();
            return;
        }
        if (!confirm(`Copiare ${files.length} elementi?`)) return;
        showProgress("COPIA FILE"); let c = 0;
        for (const f of files) {
            updateProgress((c / files.length) * 100, f.data.name);
            try {
                if (f.data.kind === 'file') { const file = await f.handle.getFile(), content = await file.arrayBuffer(); const nh = await state.handles[d].getFileHandle(f.data.name, { create: true }); const w = await nh.createWritable(); await w.write(content); await w.close(); }
                else { const nd = await state.handles[d].getDirectoryHandle(f.data.name, { create: true }); await copyDiskDirectory(f.handle, nd); }
                c++;
            } catch (e) { showToast(`Err: ${f.data.name}`, "error"); }
        }
        updateProgress(100, 'Completato'); hideProgress();
        await refreshRelevantPanes(state.paths[d], state.paths[s]);
        showToast(`Copiati ${c} elementi`, "success");
    }
    async function executeCopy() {
        if (!copyTargetData) return;
        const { files, dest, src } = copyTargetData;
        const nn = document.getElementById('copy-new-name').value.trim();
        const errEl = document.getElementById('copy-error');
        if (!nn) { errEl.textContent = "Nome vuoto."; return; }
        try {
            const f = files[0];
            if (f.data.kind === 'file') { const file = await f.handle.getFile(), content = await file.arrayBuffer(); const nh = await state.handles[dest].getFileHandle(nn, { create: true }); const w = await nh.createWritable(); await w.write(content); await w.close(); }
            else { const nd = await state.handles[dest].getDirectoryHandle(nn, { create: true }); await copyDiskDirectory(f.handle, nd); }
            closeCopyModal(); await refreshRelevantPanes(state.paths[dest], state.paths[src]);
            showToast(`Copiato: ${nn}`, "success");
        } catch (e) { errEl.textContent = "Errore: " + e.message; }
    }
    function closeCopyModal() { document.getElementById('copy-modal-overlay').classList.remove('active'); copyTargetData = null; document.getElementById(`list-${state.active}`).focus(); }

    /* ============================================================
       SPOSTA (F6)
       ============================================================ */
    async function handleF6() {
        const s = state.active, d = s === 'left' ? 'right' : 'left';
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[s] || !state.handles[d]) return showToast("Servono src e dst", "error");
        const files = await getDiskHandles(s);
        if (!files.length) return showToast("Nessun elemento", "error");
        if (!confirm(`Spostare ${files.length} elementi?`)) return;
        showProgress("SPOSTAMENTO FILE"); let c = 0;
        for (const f of files) {
            updateProgress((c / files.length) * 100, f.data.name);
            try {
                if (f.data.kind === 'file') { const file = await f.handle.getFile(), content = await file.arrayBuffer(); const nh = await state.handles[d].getFileHandle(f.data.name, { create: true }); const w = await nh.createWritable(); await w.write(content); await w.close(); await state.handles[s].removeEntry(f.data.name); }
                else { const nd = await state.handles[d].getDirectoryHandle(f.data.name, { create: true }); await copyDiskDirectory(f.handle, nd); await state.handles[s].removeEntry(f.data.name, { recursive: true }); }
                c++;
            } catch (e) { showToast(`Err: ${f.data.name}`, "error"); }
        }
        updateProgress(100, 'Completato'); hideProgress();
        await refreshRelevantPanes(state.paths[d], state.paths[s]);
        showToast(`Spostati ${c} elementi`, "success");
    }

    /* ============================================================
       NUOVA CARTELLA (F7)
       ============================================================ */
    async function handleF7() {
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[state.active]) return showToast("Nessuna cartella aperta", "error");
        const name = prompt("Nome nuova cartella:");
        if (!name || !name.trim()) return;
        if (/[\/\\:*?"<>|]/.test(name)) return showToast("Nome non valido", "error");
        try { await state.handles[state.active].getDirectoryHandle(name.trim(), { create: true }); await listFiles(state.active); showToast(`Creata: ${name}`, "success"); }
        catch (e) { showToast("Errore: " + e.message, "error"); }
    }

    /* ============================================================
       ELIMINA (F8)
       ============================================================ */
    async function handleF8() {
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[state.active]) return showToast("Nessuna cartella aperta", "error");
        const p = state.active, sa = Array.from(state.selected[p]).filter(i => !state.files[p][i].isUp);
        if (!sa.length) return showToast("Nessun elemento", "error");
        const names = sa.map(i => state.files[p][i].name);
        if (!confirm(`Eliminare ${names.length} elemento/i?\n${names.join('\n')}`)) return;
        showProgress("ELIMINAZIONE"); let c = 0;
        for (const i of sa) {
            const f = state.files[p][i];
            updateProgress((c / sa.length) * 100, f.name);
            try { await state.handles[p].removeEntry(f.name, { recursive: f.kind === 'directory' }); c++; }
            catch (e) { showToast(`Err: ${f.name}`, "error"); }
        }
        updateProgress(100, 'Completato'); hideProgress();
        await refreshRelevantPanes(state.paths[p]);
        showToast(`Eliminati ${c} elementi`, "success");
    }

    /* ============================================================
       CREA ZIP
       ============================================================ */
    async function handleZip() {
        const s = state.active, d = s === 'left' ? 'right' : 'left';
        if (inMemoryZip) return showToast("Impossibile nello ZIP", "error");
        if (!state.handles[s] || !state.handles[d]) return showToast("Servono src e dst", "error");
        const files = await getDiskHandles(s);
        if (!files.length) return showToast("Nessun elemento", "error");
        const zipName = prompt("Nome archivio ZIP:", "archivio.zip");
        if (!zipName || !zipName.trim()) return;
        if (!zipName.trim().toLowerCase().endsWith('.zip')) return showToast("Estensione .zip richiesta", "error");
        if (!confirm(`Creare ZIP con ${files.length} elementi?`)) return;
        showProgress("CREAZIONE ZIP"); let c = 0;
        try {
            const zip = new JSZip();
            for (const f of files) {
                updateProgress((c / files.length) * 50, f.data.name);
                if (f.data.kind === 'file') { const file = await f.handle.getFile(); zip.file(f.data.name, file); }
                else {
                    async function addDirToZip(dh, path) {
                        for await (const e of dh.values()) {
                            const ep = path + '/' + e.name;
                            if (e.kind === 'file') { const file = await e.getFile(); zip.file(ep, file); }
                            else { zip.folder(ep); await addDirToZip(await dh.getDirectoryHandle(e.name), ep); }
                        }
                    }
                    zip.folder(f.data.name); await addDirToZip(f.handle, f.data.name);
                }
                c++;
            }
            updateProgress(60, 'Compressione...');
            const blob = await zip.generateAsync({ type: 'blob' }, (m) => { updateProgress(60 + m.percent * 0.4, 'Compressione...'); });
            updateProgress(100, 'Scrittura...');
            const h = await state.handles[d].getFileHandle(zipName.trim(), { create: true });
            const w = await h.createWritable(); await w.write(blob); await w.close();
            hideProgress(); await refreshRelevantPanes(state.paths[d]);
            showToast(`ZIP creato: ${zipName}`, "success");
        } catch (e) { hideProgress(); showToast("Errore ZIP: " + e.message, "error"); }
    }

    /* ============================================================
       ESTRAI ZIP
       ============================================================ */
    async function handleUnzip() {
        const s = state.active, d = s === 'left' ? 'right' : 'left';
        if (inMemoryZip) {
            const fe = getSelectedData(s); if (!fe.length) return showToast("Seleziona file", "error"); if (!state.handles[d]) return showToast("Destinazione non aperta", "error"); if (!confirm(`Estrarre ${fe.length} file?`)) return;
            showProgress("ESTRAZIONE ZIP IN MEMORIA"); let c = 0;
            for (const f of fe) { if (f.kind === 'file') try { updateProgress((c / fe.length) * 100, f.name); let sp = state.paths[s].substring(inMemoryZipPath.length + 1) + f.name; if (sp.startsWith('/')) sp = sp.substring(1); const ct = await inMemoryZip.file(sp).async('blob'), h = await state.handles[d].getFileHandle(f.name, { create: true }), w = await h.createWritable(); await w.write(ct); await w.close(); c++; } catch (e) { showToast(`Err: ${f.name}`, "error"); } }
            updateProgress(100, 'Completato'); hideProgress(); await refreshRelevantPanes(state.paths[d]); return showToast(`Estratti ${c} file`, "success");
        }
        if (!state.handles[s] || !state.handles[d]) return showToast("Servono src e dst", "error");
        const files = await getDiskHandles(s); if (!files.length) return showToast("Nessun elemento", "error");
        if (files.length !== 1 || !files[0].data.isZip || files[0].data.kind !== 'file') return showToast("Seleziona un singolo .zip", "error");
        if (!confirm(`Estrarre ${files[0].data.name}?`)) return;
        showProgress("ESTRAZIONE ZIP"); updateProgress(0, 'Lettura archivio...');
        try {
            const f = await files[0].handle.getFile();
            updateProgress(10, 'Parsing archivio...');
            const buf = await f.arrayBuffer();
            const zip = await JSZip.loadAsync(buf);
            const entries = []; zip.forEach((path, entry) => { entries.push({ path, entry }); });
            let c = 0, total = entries.length;
            for (const { path, entry } of entries) {
                updateProgress(10 + (c / total) * 85, path);
                const parts = path.split('/'); let current = state.handles[d];
                for (let i = 0; i < parts.length - 1; i++) { if (parts[i]) current = await current.getDirectoryHandle(parts[i], { create: true }); }
                const fn = parts[parts.length - 1];
                if (fn && !entry.dir) { const blob = await entry.async('blob'); const h = await current.getFileHandle(fn, { create: true }); const w = await h.createWritable(); await w.write(blob); await w.close(); }
                c++;
            }
            updateProgress(100, 'Completato'); hideProgress();
            await refreshRelevantPanes(state.paths[d]);
            showToast(`Estratti ${c} elementi`, "success");
        } catch (e) { hideProgress(); showToast("Errore estrazione: " + e.message, "error"); }
    }

    /* ============================================================
       SELEZIONE CON TASTIERA
       ============================================================ */
    function moveSelection(p, dir) {
        const files = state.files[p]; if (!files.length) return;
        const sa = Array.from(state.selected[p]).sort((a, b) => a - b);
        const cur = sa.length > 0 ? sa[sa.length - 1] : 0;
        let next = cur + dir; if (next < 0) next = 0; if (next >= files.length) next = files.length - 1;
        state.selected[p].clear(); state.selected[p].add(next); updateSelectionUI(p);
        const list = document.getElementById(`list-${p}`); const items = list.querySelectorAll('.file-item');
        if (items[next]) items[next].scrollIntoView({ block: 'nearest' });
    }

    /* ============================================================
       SHORTCUT TASTIERA
       ============================================================ */
    document.addEventListener('keydown', (e) => {
        const tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (e.key === 'Backspace') { e.preventDefault(); navigateBack(state.active); }
        else if (e.key === 'F2' && e.shiftKey) { e.preventDefault(); handleRename(); }
        else if (e.key === 'F2') { e.preventDefault(); refreshPane(state.active); }
        else if (e.key === 'F3') { e.preventDefault(); handleF3(); }
        else if (e.key === 'F4') { e.preventDefault(); handleF4(); }
        else if (e.key === 'F5') { e.preventDefault(); handleF5(); }
        else if (e.key === 'F6') { e.preventDefault(); handleF6(); }
        else if (e.key === 'F7') { e.preventDefault(); handleF7(); }
        else if (e.key === 'F8') { e.preventDefault(); handleF8(); }
        else if (e.key === 'Delete') { e.preventDefault(); handleF8(); }
        else if (e.ctrlKey && e.key === 'f') { e.preventDefault(); openSearchModal(); }
        else if (e.ctrlKey && e.key === 'a') { e.preventDefault(); handleSelectAll(); }
        else if (e.key === 'Escape') {
            if (document.querySelector('.modal-overlay.active')) {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                pendingFileAction = null;
                document.getElementById(`list-${state.active}`).focus();
            }
        }
        else if (e.key === 'ArrowDown') { e.preventDefault(); moveSelection(state.active, 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); moveSelection(state.active, -1); }
        else if (e.key === 'Enter') {
            e.preventDefault();
            const sa = Array.from(state.selected[state.active]);
            if (sa.length === 1) {
                const f = state.files[state.active][sa[0]];
                if (f.isUp) navigateBack(state.active);
                else if (f.kind === 'directory') navigateInto(state.active, f.name);
                else openFileSmart(state.active, f.name);
            }
        }
        else if (e.key === 'Tab') { e.preventDefault(); setActive(state.active === 'left' ? 'right' : 'left'); }
    });

    /* ============================================================
       ENTER/ESC NEI MODAL
       ============================================================ */
    document.getElementById('rename-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); executeRename(); }
        if (e.key === 'Escape') { e.preventDefault(); closeRenameModal(); }
    });
    document.getElementById('search-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); executeSearch(); }
        if (e.key === 'Escape') { e.preventDefault(); closeSearchModal(); }
    });
    document.getElementById('copy-new-name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); executeCopy(); }
        if (e.key === 'Escape') { e.preventDefault(); closeCopyModal(); }
    });
    document.getElementById('fileaction-modal-overlay').addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { e.preventDefault(); closeFileActionModal(); }
    });
</script>
